<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Cottagecore Bloom — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one pressed-flower herbarium webcam frame: a
       deckled cream PAPER border (a hole for the cam in the middle stays fully
       transparent), hand-drawn ivy sprigs in every corner, a leaf-green
       "ON CAMERA" caption, and a deckled paper nameplate clipped to the bottom
       holding #handle. Place the camera BEHIND this overlay.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint dandelion seeds / pollen drift around the frame */
    canvas.bg{pointer-events:none;opacity:.5;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;pointer-events:none;
      transform:translate(-50%,-50%);
      animation:camin 1s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* deckled cream PAPER border ring; the inside stays transparent for the cam.
       We draw the paper only as a thick border via a clip-path "frame" using the
       card's torn-edge polygon on the OUTER edge and a clean rounded inner hole. */
    .frame{position:absolute;inset:0;pointer-events:none;
      /* warm cream paper grain, same family as the card */
      background:
        repeating-linear-gradient(94deg, rgba(90,74,58,.02) 0 2px, transparent 2px 5px),
        repeating-linear-gradient(2deg, rgba(90,74,58,.014) 0 3px, transparent 3px 7px),
        linear-gradient(176deg, var(--cream) 0%, var(--paper-edge) 100%);
      box-shadow:0 24px 60px -16px var(--paper-shadow), 0 6px 16px rgba(90,74,58,.10);
      border-radius:16px;
      /* OUTER deckled edge (torn paper), same polygon family as the card */
      clip-path:polygon(
        0% 4%, 3% 1%, 9% 3%, 16% 0%, 24% 3%, 33% 1%, 42% 4%, 51% 1%, 60% 3%,
        69% 0%, 78% 3%, 86% 1%, 93% 4%, 98% 1%, 100% 5%,
        99% 13%, 100% 22%, 98% 32%, 100% 42%, 99% 52%, 100% 62%, 98% 72%, 100% 82%, 99% 92%, 100% 96%,
        96% 99%, 88% 97%, 79% 100%, 70% 97%, 60% 100%, 50% 97%, 40% 100%, 31% 97%, 22% 100%,
        13% 97%, 5% 99%, 1% 96%,
        2% 86%, 0% 76%, 2% 66%, 0% 56%, 1% 46%, 0% 36%, 2% 26%, 0% 16%, 1% 8%);}
    /* the transparent cam HOLE: a clean rounded rect punched out via the inner
       border using a big inset + transparent center. We use a mask so the middle
       is truly clear (camera shows through). */
    .frame{
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
              mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
              mask-composite:exclude;
      /* the content-box defines the hole; padding = paper border thickness */
      padding:30px;
      border-radius:16px;}
    /* faint inner ruled herbarium frame hugging the cam hole */
    .frame-rule{position:absolute;inset:30px;pointer-events:none;
      border:1px solid rgba(125,164,83,.36);border-radius:8px;
      box-shadow:inset 0 0 0 1px rgba(255,253,244,.5), 0 0 0 1px rgba(125,164,83,.14);}

    /* hand-drawn ivy / pressed-flower sprigs in every corner of the frame */
    .sprig{position:absolute;width:210px;height:210px;pointer-events:none;
      filter:drop-shadow(0 3px 4px rgba(90,74,58,.16));
      animation:sprigin 1.2s var(--ease) both .3s;}
    .sprig svg{width:100%;height:100%;display:block;}
    .sprig--tl{left:-30px;top:-34px;transform-origin:top left;}
    .sprig--tr{right:-30px;top:-34px;transform:scaleX(-1);transform-origin:top right;}
    .sprig--bl{left:-30px;bottom:-34px;transform:scaleY(-1);transform-origin:bottom left;}
    .sprig--br{right:-30px;bottom:-34px;transform:scale(-1,-1);transform-origin:bottom right;}
    .sprig .leaf{transform-box:fill-box;transform-origin:0% 50%;animation:sway 6s var(--ease-soft) infinite;}
    .sprig .leaf:nth-child(2n){animation-duration:7.4s;animation-delay:-1.2s;}
    .sprig .leaf:nth-child(3n){animation-duration:5.6s;animation-delay:-2.6s;}
    .sprig .bloom{transform-box:fill-box;transform-origin:50% 50%;animation:breathe 5.2s var(--ease-soft) infinite;}

    /* leaf-green "ON CAMERA" caption, top-left above the frame */
    .cap{position:absolute;left:6px;top:-44px;pointer-events:none;display:flex;align-items:center;gap:12px;
      font-family:"Optima","Gill Sans","Gill Sans MT","Segoe UI",Candara,system-ui,sans-serif;
      letter-spacing:.40em;font-size:18px;color:var(--leaf-deep);text-indent:.40em;opacity:.85;}
    .cap .dot{width:10px;height:10px;border-radius:50%;background:var(--leaf);flex:none;
      box-shadow:0 0 0 4px rgba(125,164,83,.22);animation:pulse 2.4s var(--ease-soft) infinite;}

    /* a little sprig crest, top-right above the frame (matches the card crest) */
    .crest-tr{position:absolute;right:4px;top:-46px;pointer-events:none;display:flex;align-items:center;gap:12px;}
    .crest-tr .r{width:62px;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--vine));}
    .crest-tr svg{width:26px;height:26px;display:block;}

    /* nameplate — a deckled paper chip clipped to bottom-center of the frame */
    .plate{position:absolute;left:50%;bottom:-22px;transform:translateX(-50%);pointer-events:none;
      display:flex;align-items:center;gap:14px;white-space:nowrap;padding:9px 28px;
      color:var(--ink);
      background:
        repeating-linear-gradient(94deg, rgba(90,74,58,.018) 0 2px, transparent 2px 5px),
        linear-gradient(176deg, var(--cream) 0%, var(--paper-edge) 100%);
      box-shadow:0 12px 28px -8px var(--paper-shadow), inset 0 0 24px rgba(239,231,210,.6);
      border-radius:10px;
      clip-path:polygon(
        0% 16%, 6% 4%, 16% 10%, 28% 2%, 42% 9%, 56% 2%, 70% 9%, 82% 2%, 92% 10%, 100% 18%,
        100% 82%, 92% 92%, 82% 98%, 70% 91%, 56% 98%, 42% 91%, 28% 98%, 16% 90%, 6% 96%, 0% 84%);}
    .plate::before{content:"";position:absolute;inset:6px;border:1px solid rgba(125,164,83,.30);
      border-radius:5px;pointer-events:none;}
    .plate .bud{width:9px;height:9px;border-radius:50%;background:var(--rose);flex:none;
      box-shadow:0 0 0 3px rgba(226,160,180,.22);}
    .plate .who{
      font-family:"Iowan Old Style","Hoefler Text","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
      font-weight:600;letter-spacing:.04em;font-size:25px;color:var(--ink);
      text-shadow:0 1px 0 rgba(255,253,244,.7);}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .sprig{animation:none!important;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .sprig{opacity:1;}
    #stage.render .sprig--tl{transform:none;}
    #stage.render .sprig--tr{transform:scaleX(-1);}
    #stage.render .sprig--bl{transform:scaleY(-1);}
    #stage.render .sprig--br{transform:scale(-1,-1);}
    #stage.render .sprig .leaf,
    #stage.render .sprig .bloom,
    #stage.render .cap .dot{animation:none!important;}
  </style>
</head>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;            // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint dandelion seeds + pollen drifting around the frame ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = (cv && cv.width) || 1920, H = (cv && cv.height) || 1080;
    const R = (a, b) => a + Math.random() * (b - a);
    const seeds = Array.from({ length: Math.max(0, num("seeds_n", 8)) }, () => ({
      x: R(0, W), y: R(0, H), vy: -R(7, 15) / 60, sway: R(0.5, 1.5),
      ph: R(0, 6.28), rot: R(0, 6.28), spin: R(-0.4, 0.4) / 60, sz: R(0.7, 1.3), a: R(0.45, 0.8),
    }));
    const pollen = Array.from({ length: Math.max(0, num("pollen", 44)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.6), vy: -R(3, 10) / 60, sway: R(0.3, 1.1),
      ph: R(0, 6.28), tw: R(0.5, 1.5), a: R(0.18, 0.5), warm: Math.random() < 0.7,
    }));
    function drawSeed(s){
      const sc = s.sz;
      ctx.save();
      ctx.translate(Math.round(s.x), Math.round(s.y)); ctx.rotate(s.rot); ctx.globalAlpha = s.a;
      ctx.strokeStyle = "#FBF6E9"; ctx.lineWidth = 1; ctx.lineCap = "round";
      const tuftR = 8 * sc;
      for (let i = 0; i < 11; i++){
        const ang = -Math.PI / 2 + (i - 5) * 0.20;
        ctx.globalAlpha = s.a * 0.5;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(ang) * tuftR, Math.sin(ang) * tuftR - 2 * sc); ctx.stroke();
      }
      ctx.globalAlpha = s.a * 0.28; ctx.fillStyle = "#FFFDF4";
      ctx.beginPath(); ctx.arc(0, -tuftR * 0.45, tuftR * 0.6, 0, 6.2832); ctx.fill();
      ctx.globalAlpha = s.a; ctx.strokeStyle = "#B7A98C"; ctx.lineWidth = 1.5 * sc;
      ctx.beginPath(); ctx.moveTo(0, 1 * sc); ctx.lineTo(0, 6 * sc); ctx.stroke();
      ctx.restore();
    }
    let life = 0;
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      life += dt;                                  // frame-driven so render mode is deterministic
      const breeze = Math.sin(life * 0.35) * 0.6 + 0.5;
      for (const m of pollen){
        m.ph += 0.045 * dt * 60; m.y += m.vy * dt * 60;
        m.x += (Math.sin(m.ph) * m.sway + breeze * 0.5) * dt * 60 * 0.6;
        if (m.y < -10){ m.y = H + 10; m.x = R(0, W); }
        if (m.x < -10) m.x = W + 10; if (m.x > W + 10) m.x = -10;
        const tw = 0.55 + Math.sin(m.ph * m.tw) * 0.45;
        ctx.globalAlpha = m.a * tw; ctx.fillStyle = m.warm ? "#FBEFC9" : "#FBF6E9";
        const sz = Math.max(1, Math.round(m.z * 1.6));
        ctx.fillRect(Math.round(m.x), Math.round(m.y), sz, sz);
      }
      for (const s of seeds){
        s.ph += 0.02 * dt * 60; s.rot += s.spin * dt * 60; s.y += s.vy * dt * 60;
        s.x += (Math.sin(s.ph) * s.sway + breeze * 0.7) * dt * 60 * 0.5;
        if (s.y < -30){ s.y = H + 30; s.x = R(0, W); }
        if (s.x < -30) s.x = W + 30; if (s.x > W + 30) s.x = -30;
        drawSeed(s);
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    window.__bloomDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
