<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kitsune Lantern — Twitch Panels (generator)</title>
  <!--
    Twitch profile panels are PNG image files (recommended 320 x 100 px) you
    upload to your channel's "About" page. This file renders each of the 12
    panels onto a <canvas> at EXACTLY 320 x 100 in the Kitsune Lantern
    "Foxfire Night" yokai-folklore language:
        - a washi (rice-paper) night card on deep indigo, edged with a thin
          gold hairline + a soft vermilion halo
        - a small hanging chochin LANTERN glyph glowing warm orange on the left
          (two panels carry the 狐 fox-kanji on the lantern)
        - a thin foxfire-gold line icon (heart, calendar, list, ...)
        - the label in an elegant mincho serif, cream, with a warm gold glow
        - a foxfire-diamond underline rule
    Each panel has its own Download button + there is a "Download all".

    How to use:
      1. Open this file in a browser.
      2. Click "Download all" (or the individual Download buttons).
      3. Upload each .png to Twitch:
         twitch.tv/<you>/about -> Edit Panels -> + -> upload image.
  -->
  <style>
    /* ---- Kitsune Lantern "Foxfire Night" palette (mirrors shared.css) ---- */
    :root{
      --night:#100A16; --night2:#0A0610; --night-violet:#1B1230;
      --orange:#FF6A3D; --orange-deep:#C73D1E; --violet:#7B5CFF;
      --gold:#FFD166; --cream:#F6EFE8; --dim:#C9B7A8;
    }
    *{box-sizing:border-box;}
    body{margin:0;
      font-family:"Yu Mincho","Hiragino Mincho ProN","Songti SC","Georgia","Times New Roman",serif;
      color:var(--cream);padding:36px 32px 60px;
      background:
        radial-gradient(900px 520px at 18% -10%, rgba(255,106,61,.14), transparent 60%),
        radial-gradient(760px 480px at 100% 110%, rgba(123,92,255,.18), transparent 60%),
        linear-gradient(168deg, #160E22, var(--night2));
      min-height:100vh;}
    .kicker{letter-spacing:.5em;font-size:12px;color:var(--gold);text-transform:uppercase;
      margin:0 0 8px;display:flex;align-items:center;gap:11px;text-indent:.5em;}
    .dia{width:9px;height:9px;border:1px solid var(--gold);transform:rotate(45deg);
      box-shadow:0 0 12px rgba(255,209,102,.6);}
    h1{font-weight:700;font-size:32px;letter-spacing:.5px;margin:0 0 6px;color:var(--cream);
      text-shadow:0 0 28px rgba(255,106,61,.30);}
    p.lead{color:var(--dim);margin:0 0 24px;max-width:720px;line-height:1.6;
      font-style:italic;font-size:17px;}
    code{font-family:"Courier New",monospace;color:var(--gold);
      background:rgba(255,209,102,.08);padding:2px 7px;border-radius:3px;font-style:normal;}
    .toolbar{margin:0 0 30px;display:flex;gap:14px;flex-wrap:wrap;}
    button{font-family:"Yu Mincho","Hiragino Mincho ProN","Georgia",serif;font-weight:700;
      font-size:13px;letter-spacing:3px;text-transform:uppercase;padding:12px 24px;cursor:pointer;
      color:var(--night2);background:linear-gradient(180deg,var(--gold),var(--orange));
      border:1px solid rgba(255,209,102,.6);border-radius:2px;
      box-shadow:0 6px 24px rgba(255,106,61,.30);}
    button:hover{filter:brightness(1.08);}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(348px,1fr));gap:26px;}
    .card{background:rgba(20,12,30,.55);padding:16px;border-radius:4px;
      border:1px solid rgba(255,209,102,.24);}
    /* checkerboard so the panel's transparent corners are visible */
    .frame{border-radius:3px;overflow:hidden;display:block;background-color:#140d1c;
      background-image:
        linear-gradient(45deg,#2a1c3a20 25%,transparent 25%),
        linear-gradient(-45deg,#2a1c3a20 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#2a1c3a20 75%),
        linear-gradient(-45deg,transparent 75%,#2a1c3a20 75%);
      background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;}
    canvas{display:block;width:320px;height:100px;}
    .card-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:12px;}
    .card-row .name{letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
    .card-row a{letter-spacing:1px;color:var(--gold);text-decoration:none;
      border:1px solid rgba(255,209,102,.34);border-radius:2px;padding:5px 12px;}
    .card-row a:hover{background:rgba(255,209,102,.16);}
  </style>
</head>
<body>
  <p class="kicker"><span class="dia"></span>KITSUNE LANTERN · PANELS</p>
  <h1>Kitsune Lantern — Twitch Panels</h1>
  <p class="lead">
    Twelve <strong>320&times;100</strong> profile panels in the foxfire-night style:
    a washi night card with a hanging chochin lantern, a thin foxfire-gold line icon,
    and a mincho label. Download all then upload at
    <code>twitch.tv/&lt;you&gt;/about → Edit Panels</code>.
  </p>
  <div class="toolbar">
    <button id="dlAll">Download all</button>
  </div>
  <div class="grid" id="grid"></div>

  <script>
  (function () {
    "use strict";

    // ---- Tokens (hex constants mirror the shared.css design tokens) ----
    var W = 320, H = 100;
    var NIGHT = '#100A16', NIGHT_VIOLET = '#1B1230';
    var ORANGE = '#FF6A3D', ORANGE_DEEP = '#C73D1E', VIOLET = '#7B5CFF';
    var GOLD = '#FFD166', CREAM = '#F6EFE8', DIM = '#C9B7A8';

    // ---- Panel inventory (12, per the design brief) ----
    var PANELS = [
      { id: 'about',     title: 'ABOUT',     icon: 'heart',    kanji: true  },
      { id: 'schedule',  title: 'SCHEDULE',  icon: 'calendar', kanji: false },
      { id: 'rules',     title: 'RULES',     icon: 'list',     kanji: false },
      { id: 'donations', title: 'DONATIONS', icon: 'coin',     kanji: false },
      { id: 'discord',   title: 'DISCORD',   icon: 'discord',  kanji: false },
      { id: 'twitter',   title: 'TWITTER',   icon: 'twitter',  kanji: false },
      { id: 'youtube',   title: 'YOUTUBE',   icon: 'play',     kanji: false },
      { id: 'instagram', title: 'INSTAGRAM', icon: 'camera',   kanji: false },
      { id: 'merch',     title: 'MERCH',     icon: 'tag',      kanji: false },
      { id: 'sponsors',  title: 'SPONSORS',  icon: 'ribbon',   kanji: false },
      { id: 'subscribe', title: 'SUBSCRIBE', icon: 'star',     kanji: true  },
      { id: 'community', title: 'COMMUNITY', icon: 'torii',    kanji: false }
    ];

    // ---- helpers ----------------------------------------------------------
    function roundRectPath(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    // soft warm bloom (blurred radial gradient) — lantern halo / foxfire
    function bloom(ctx, cx, cy, rad, rgb, alpha) {
      var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
      g.addColorStop(0,    'rgba(' + rgb + ',' + alpha + ')');
      g.addColorStop(0.55, 'rgba(' + rgb + ',' + (alpha * 0.32).toFixed(3) + ')');
      g.addColorStop(1,    'rgba(' + rgb + ',0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    // a small hanging chochin LANTERN: cord + cap + ribbed glowing body + foot.
    // Drawn centred on (cx, bodyTop). withKanji paints 狐 on the paper.
    function lantern(ctx, cx, cordTop, withKanji) {
      var bodyW = 30, bodyH = 40;
      var capY = cordTop + 16;
      var bodyY = capY + 7;
      var cy = bodyY + bodyH / 2;

      // cord
      ctx.save();
      ctx.strokeStyle = 'rgba(255,209,102,0.55)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx, cordTop); ctx.lineTo(cx, capY); ctx.stroke();
      ctx.restore();

      // warm halo behind the lantern
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 34);
      g.addColorStop(0, 'rgba(255,106,61,0.42)');
      g.addColorStop(1, 'rgba(255,106,61,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, 34, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // cap (dark wood)
      ctx.fillStyle = '#2a160d';
      roundRectPath(ctx, cx - 9, capY, 18, 6, 2); ctx.fill();

      // body — glowing paper capsule
      ctx.save();
      roundRectPath(ctx, cx - bodyW / 2, bodyY, bodyW, bodyH, 14);
      ctx.clip();
      var bg = ctx.createRadialGradient(cx, cy - 2, 2, cx, cy, bodyW);
      bg.addColorStop(0,   '#FFE7B0');
      bg.addColorStop(0.5, ORANGE);
      bg.addColorStop(0.86, ORANGE_DEEP);
      bg.addColorStop(1,   '#7e2412');
      ctx.fillStyle = bg;
      ctx.fillRect(cx - bodyW, bodyY - 4, bodyW * 2, bodyH + 8);
      // paper ribbing
      ctx.strokeStyle = 'rgba(120,30,14,0.42)';
      ctx.lineWidth = 1;
      for (var ry = bodyY + 5; ry < bodyY + bodyH; ry += 6) {
        ctx.beginPath(); ctx.moveTo(cx - bodyW, ry); ctx.lineTo(cx + bodyW, ry); ctx.stroke();
      }
      // kanji 狐 on the paper
      if (withKanji) {
        ctx.fillStyle = 'rgba(246,239,232,0.82)';
        ctx.font = '700 20px "Yu Mincho","Hiragino Mincho ProN","Georgia",serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(126,36,18,0.8)'; ctx.shadowBlur = 4;
        ctx.fillText('狐', cx, cy + 1);
        ctx.shadowBlur = 0;
      }
      ctx.restore();

      // body rim
      ctx.strokeStyle = 'rgba(255,209,102,0.5)';
      ctx.lineWidth = 1;
      roundRectPath(ctx, cx - bodyW / 2, bodyY, bodyW, bodyH, 14); ctx.stroke();

      // foot + tassel
      ctx.fillStyle = '#2a160d';
      roundRectPath(ctx, cx - 7, bodyY + bodyH, 14, 5, 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,106,61,0.7)';
      ctx.beginPath(); ctx.moveTo(cx, bodyY + bodyH + 5); ctx.lineTo(cx, bodyY + bodyH + 14); ctx.stroke();
    }

    // ---- panel renderer ---------------------------------------------------
    function drawPanel(ctx, p) {
      ctx.clearRect(0, 0, W, H);

      var pad = 4;
      var x = pad, y = pad, w = W - pad * 2, h = H - pad * 2;
      var r = 10;

      // washi night card body, clipped to a soft-cornered rect
      ctx.save();
      roundRectPath(ctx, x, y, w, h, r);
      ctx.clip();

      var bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, 'rgba(27,18,48,0.92)');
      bg.addColorStop(1, 'rgba(10,6,16,0.95)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // foxfire glows inside the card
      bloom(ctx, 250, 14, 150, '123,92,255', 0.14);   // violet upper-right
      bloom(ctx, 52, 78, 120, '255,106,61', 0.20);     // warm lantern side

      // faint paper-grain weave (soft diagonal hairlines)
      ctx.save();
      ctx.strokeStyle = 'rgba(246,239,232,0.035)';
      ctx.lineWidth = 1;
      for (var gx = -H; gx < W; gx += 7) {
        ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx + H, H); ctx.stroke();
      }
      ctx.restore();

      // low mist wash at the foot
      var mist = ctx.createLinearGradient(0, H * 0.5, 0, H);
      mist.addColorStop(0, 'rgba(255,106,61,0)');
      mist.addColorStop(1, 'rgba(255,106,61,0.06)');
      ctx.fillStyle = mist; ctx.fillRect(0, 0, W, H);

      // subtle vignette
      var vg = ctx.createRadialGradient(W / 2, H / 2, 40, W / 2, H / 2, 210);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(8,4,14,0.55)');
      ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
      ctx.restore();

      // a small hanging chochin lantern in the left zone
      lantern(ctx, 30, y + 1, p.kanji);

      // gold hairline rule separating the lantern zone from the label
      ctx.save();
      var ruleX = 60;
      ctx.strokeStyle = 'rgba(255,209,102,0.55)';
      ctx.lineWidth = 1;
      ctx.shadowColor = 'rgba(255,209,102,0.5)'; ctx.shadowBlur = 7;
      ctx.beginPath(); ctx.moveTo(ruleX, y + 18); ctx.lineTo(ruleX, y + h - 18); ctx.stroke();
      ctx.shadowBlur = 0;
      // foxfire diamonds capping the rule
      ctx.fillStyle = GOLD;
      [y + 18, y + h - 18].forEach(function (cy) {
        ctx.save(); ctx.translate(ruleX, cy); ctx.rotate(Math.PI / 4);
        ctx.fillRect(-2.2, -2.2, 4.4, 4.4); ctx.restore();
      });
      ctx.restore();

      // thin foxfire-gold line icon
      drawIcon(ctx, p.icon, 88, 38, 26);

      // kicker above the title — spaced mincho caps in gold
      ctx.save();
      ctx.font = '600 9px "Yu Mincho","Hiragino Mincho ProN","Georgia",serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = 'rgba(255,209,102,0.85)';
      drawSpaced(ctx, 'KITSUNE LANTERN', 108, 32, 2.0);
      ctx.restore();

      // label in mincho serif (cream) with a warm gold glow — shrink to fit
      ctx.save();
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      var label = p.title;
      var size = 27;
      var lx = 108, maxW = W - lx - 22;
      ctx.font = '700 ' + size + 'px "Yu Mincho","Hiragino Mincho ProN","Georgia",serif';
      while (ctx.measureText(label).width > maxW && size > 13) {
        size -= 1;
        ctx.font = '700 ' + size + 'px "Yu Mincho","Hiragino Mincho ProN","Georgia",serif';
      }
      ctx.shadowColor = 'rgba(255,106,61,0.5)'; ctx.shadowBlur = 16;
      ctx.fillStyle = CREAM;
      ctx.fillText(label, lx, 70);
      ctx.shadowBlur = 0;
      ctx.restore();

      // foxfire underline rule under the label (gradient + centre diamond)
      ctx.save();
      var barX = 108, barY = 80, barW = W - barX - 22;
      var grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      grad.addColorStop(0, 'rgba(255,106,61,0)');
      grad.addColorStop(0.2, ORANGE);
      grad.addColorStop(0.5, GOLD);
      grad.addColorStop(0.8, ORANGE);
      grad.addColorStop(1, 'rgba(255,106,61,0)');
      ctx.strokeStyle = grad; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(barX, barY); ctx.lineTo(barX + barW, barY); ctx.stroke();
      ctx.fillStyle = GOLD;
      ctx.shadowColor = 'rgba(255,209,102,0.7)'; ctx.shadowBlur = 6;
      ctx.save(); ctx.translate(barX + barW * 0.5, barY); ctx.rotate(Math.PI / 4);
      ctx.fillRect(-2.2, -2.2, 4.4, 4.4); ctx.restore();
      ctx.shadowBlur = 0;
      ctx.restore();

      // the card frame: gold hairline + faint inner halo line (on top)
      ctx.save();
      ctx.strokeStyle = 'rgba(255,209,102,0.42)';
      ctx.lineWidth = 1;
      roundRectPath(ctx, x + 0.5, y + 0.5, w - 1, h - 1, r); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,209,102,0.16)';
      roundRectPath(ctx, x + 4.5, y + 4.5, w - 9, h - 9, r - 3); ctx.stroke();
      ctx.restore();
    }

    // draw text with manual letter spacing (px between chars)
    function drawSpaced(ctx, str, x, y, sp) {
      var cx = x;
      for (var i = 0; i < str.length; i++) {
        var ch = str[i];
        ctx.fillText(ch, cx, y);
        cx += ctx.measureText(ch).width + sp;
      }
    }

    // ---- foxfire-gold line icons -----------------------------------------
    function drawIcon(ctx, kind, cx, cy, s) {
      ctx.save();
      ctx.translate(cx, cy);
      var h = s / 2;
      ctx.strokeStyle = GOLD;
      ctx.fillStyle = GOLD;
      ctx.lineWidth = 1.8;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.shadowColor = 'rgba(255,209,102,0.55)';
      ctx.shadowBlur = 7;

      switch (kind) {
        case 'heart': {
          ctx.beginPath();
          ctx.moveTo(0, h * 0.85);
          ctx.bezierCurveTo(-h * 1.25, h * 0.05, -h * 0.65, -h * 0.95, 0, -h * 0.25);
          ctx.bezierCurveTo(h * 0.65, -h * 0.95, h * 1.25, h * 0.05, 0, h * 0.85);
          ctx.closePath(); ctx.stroke();
          break;
        }
        case 'calendar': {
          ctx.strokeRect(-h, -h * 0.7, s, s * 0.85);
          ctx.beginPath();
          ctx.moveTo(-h, -h * 0.35); ctx.lineTo(h, -h * 0.35);
          ctx.moveTo(-h * 0.55, -h);  ctx.lineTo(-h * 0.55, -h * 0.5);
          ctx.moveTo(h * 0.55, -h);   ctx.lineTo(h * 0.55, -h * 0.5);
          ctx.stroke();
          for (var rr = 0; rr < 2; rr++)
            for (var c = 0; c < 3; c++) {
              ctx.beginPath();
              ctx.arc(-h * 0.5 + c * h * 0.5, -h * 0.02 + rr * h * 0.45, 1.3, 0, Math.PI * 2);
              ctx.fill();
            }
          break;
        }
        case 'list': {
          for (var i = 0; i < 3; i++) {
            var ly = -h * 0.6 + i * h * 0.6;
            ctx.save(); ctx.translate(-h * 0.78, ly); ctx.rotate(Math.PI / 4);
            ctx.fillRect(-1.6, -1.6, 3.2, 3.2); ctx.restore();   // foxfire diamond bullet
            ctx.beginPath();
            ctx.moveTo(-h * 0.42, ly); ctx.lineTo(h * 0.9, ly); ctx.stroke();
          }
          break;
        }
        case 'coin': {
          ctx.beginPath(); ctx.arc(0, 0, h * 0.95, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, 0, h * 0.72, 0, Math.PI * 2); ctx.stroke();
          ctx.font = '700 ' + Math.round(s * 0.54) + 'px "Yu Mincho",Georgia,serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('¥', 0, 1);
          break;
        }
        case 'discord': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.85, -h * 0.45);
          ctx.quadraticCurveTo(0, -h * 0.85, h * 0.85, -h * 0.45);
          ctx.lineTo(h * 0.7, h * 0.55);
          ctx.quadraticCurveTo(h * 0.45, h * 0.8, h * 0.2, h * 0.55);
          ctx.lineTo(-h * 0.2, h * 0.55);
          ctx.quadraticCurveTo(-h * 0.45, h * 0.8, -h * 0.7, h * 0.55);
          ctx.closePath(); ctx.stroke();
          ctx.beginPath(); ctx.arc(-h * 0.32, 0, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(h * 0.32, 0, 2, 0, Math.PI * 2); ctx.fill();
          break;
        }
        case 'twitter': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.9, h * 0.25);
          ctx.quadraticCurveTo(-h * 0.1, h * 0.55, h * 0.55, -h * 0.05);
          ctx.quadraticCurveTo(h * 0.95, -h * 0.35, h * 0.85, -h * 0.7);
          ctx.quadraticCurveTo(h * 0.4, -h * 0.35, -h * 0.1, -h * 0.2);
          ctx.quadraticCurveTo(-h * 0.6, -h * 0.05, -h * 0.9, h * 0.25);
          ctx.closePath(); ctx.stroke();
          break;
        }
        case 'play': {
          roundRect(ctx, -h, -h * 0.7, s, s * 0.85, 5); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.22, -h * 0.32);
          ctx.lineTo(-h * 0.22, h * 0.28);
          ctx.lineTo(h * 0.42, -h * 0.02);
          ctx.closePath(); ctx.fill();
          break;
        }
        case 'camera': {
          roundRect(ctx, -h, -h * 0.55, s, s * 0.95, 6); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, h * 0.1, h * 0.4, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(h * 0.55, -h * 0.25, 1.6, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath();
          ctx.moveTo(-h * 0.35, -h * 0.55);
          ctx.lineTo(-h * 0.15, -h * 0.85);
          ctx.lineTo(h * 0.15, -h * 0.85);
          ctx.lineTo(h * 0.35, -h * 0.55);
          ctx.stroke();
          break;
        }
        case 'tag': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.1, -h * 0.85);
          ctx.lineTo(h * 0.85, -h * 0.85);
          ctx.lineTo(h * 0.85, h * 0.1);
          ctx.lineTo(-h * 0.15, h * 0.85);
          ctx.lineTo(-h * 0.85, h * 0.15);
          ctx.lineTo(-h * 0.85, -h * 0.6);
          ctx.closePath(); ctx.stroke();
          ctx.beginPath(); ctx.arc(-h * 0.5, -h * 0.5, 2, 0, Math.PI * 2); ctx.stroke();
          break;
        }
        case 'ribbon': {
          ctx.beginPath(); ctx.arc(0, -h * 0.25, h * 0.55, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.3, h * 0.2); ctx.lineTo(-h * 0.5, h * 0.85); ctx.lineTo(-h * 0.1, h * 0.55);
          ctx.moveTo(h * 0.3, h * 0.2);  ctx.lineTo(h * 0.5, h * 0.85); ctx.lineTo(h * 0.1, h * 0.55);
          ctx.stroke();
          ctx.save(); ctx.translate(0, -h * 0.25); ctx.rotate(Math.PI / 4);
          ctx.fillRect(-2, -2, 4, 4); ctx.restore();
          break;
        }
        case 'star': {
          ctx.beginPath();
          for (var sp = 0; sp < 10; sp++) {
            var rad = (sp % 2 === 0) ? h * 0.95 : h * 0.42;
            var ang = -Math.PI / 2 + sp * Math.PI / 5;
            var X = Math.cos(ang) * rad, Y = Math.sin(ang) * rad;
            if (sp === 0) ctx.moveTo(X, Y); else ctx.lineTo(X, Y);
          }
          ctx.closePath(); ctx.stroke();
          break;
        }
        case 'torii': {
          // a little torii gate — community marker
          ctx.beginPath();
          ctx.moveTo(-h * 0.95, -h * 0.55);
          ctx.quadraticCurveTo(0, -h * 0.78, h * 0.95, -h * 0.55);   // top lintel sweep
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.78, -h * 0.28); ctx.lineTo(h * 0.78, -h * 0.28); // second rail
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.5, -h * 0.55); ctx.lineTo(-h * 0.5, h * 0.85);   // left pillar
          ctx.moveTo(h * 0.5, -h * 0.55);  ctx.lineTo(h * 0.5, h * 0.85);    // right pillar
          ctx.stroke();
          break;
        }
        default:
          ctx.beginPath(); ctx.arc(0, 0, h * 0.7, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    // ---- build the grid ---------------------------------------------------
    var grid = document.getElementById('grid');
    var made = [];

    function build() {
      for (var i = 0; i < PANELS.length; i++) {
        var p = PANELS[i];
        var card = document.createElement('div'); card.className = 'card';
        var frame = document.createElement('div'); frame.className = 'frame';
        var cv = document.createElement('canvas'); cv.width = W; cv.height = H;
        var ctx = cv.getContext('2d');
        drawPanel(ctx, p);
        frame.appendChild(cv);

        var row = document.createElement('div'); row.className = 'card-row';
        var nm = document.createElement('span'); nm.className = 'name'; nm.textContent = p.title;
        var dl = document.createElement('a'); dl.textContent = 'Download'; dl.href = '#';
        (function (canvas, id) {
          dl.addEventListener('click', function (e) { e.preventDefault(); save(canvas, id); });
        })(cv, p.id);
        row.appendChild(nm); row.appendChild(dl);

        card.appendChild(frame); card.appendChild(row);
        grid.appendChild(card);
        made.push({ canvas: cv, id: p.id });
      }
    }

    function save(canvas, id) {
      var a = document.createElement('a');
      a.download = 'panel-' + id + '.png';
      a.href = canvas.toDataURL('image/png');
      document.body.appendChild(a); a.click(); a.remove();
    }

    document.getElementById('dlAll').addEventListener('click', function () {
      var i = 0;
      (function next() {
        if (i >= made.length) return;
        save(made[i].canvas, made[i].id);
        i++;
        setTimeout(next, 200);
      })();
    });

    // headless export hook: [{name, dataURL}] for every panel
    window.__exportAssets = function () {
      return made.map(function (m) { return { name: m.id, dataURL: m.canvas.toDataURL('image/png') }; });
    };

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(build);
    } else {
      build();
    }
  })();
  </script>
</body>
