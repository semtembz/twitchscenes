<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Studio Noir — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one Studio Noir ~16:9 webcam frame. Place your
       camera BEHIND this overlay; the inside of the frame is fully transparent
       so the camera shows through it. The frame is a thin steel broadcast hairline
       with an amber accent rule down the left edge, steel corner brackets w/ amber
       ticks, a small "ON CAMERA" cap top-left, and a charcoal nameplate slab
       (amber left border) with @handle clipped to the bottom edge.
       Optional URL params: ?handle=@you   ?pos=center|lower   ?w=1120&h=630 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint key-light dust drifts around the frame */
    canvas.bg{pointer-events:none;opacity:.5;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .85s var(--ease-slab) both .1s;}
    .cam.lower{top:auto;bottom:104px;transform:translateX(-50%);}
    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.975)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* thin steel broadcast hairline border; INSIDE stays transparent */
    .frame{position:absolute;inset:0;background:transparent;
      border:1px solid var(--hair);
      box-shadow:
        0 0 0 1px rgba(13,15,18,.45),
        0 22px 60px rgba(0,0,0,.55),
        inset 0 0 26px rgba(13,15,18,.32);}
    /* a thin amber accent RULE down the left edge of the frame (the signature) */
    .frame::before{content:"";position:absolute;left:-3px;top:0;bottom:0;width:3px;
      background:linear-gradient(180deg,var(--amber),#9c7620);
      box-shadow:0 0 16px var(--amber-glow);}
    /* faint raked sheen across the top edge of the frame */
    .frame::after{content:"";position:absolute;left:0;right:0;top:0;height:120px;pointer-events:none;
      opacity:.5;mix-blend-mode:screen;
      background:linear-gradient(180deg, rgba(245,247,249,.06), transparent);}

    /* steel corner brackets w/ amber ticks in each corner of the frame */
    .crn{position:absolute;width:58px;height:58px;pointer-events:none;
      animation:crnin 1s var(--ease) both .3s;}
    .crn::before{content:"";position:absolute;width:58px;height:1px;background:var(--steel);opacity:.6;}
    .crn::after{content:"";position:absolute;width:1px;height:58px;background:var(--steel);opacity:.6;}
    .crn .tick{position:absolute;background:var(--amber);box-shadow:0 0 10px var(--amber-glow);}
    .crn .tick.h{width:20px;height:2px;} .crn .tick.v{width:2px;height:20px;}
    .crn--tl{left:-1px;top:-1px;}
    .crn--tl::before{left:0;top:0;} .crn--tl::after{left:0;top:0;}
    .crn--tl .tick.h{left:0;top:0;} .crn--tl .tick.v{left:0;top:0;}
    .crn--tr{right:-1px;top:-1px;}
    .crn--tr::before{right:0;top:0;} .crn--tr::after{right:0;top:0;}
    .crn--tr .tick.h{right:0;top:0;} .crn--tr .tick.v{right:0;top:0;}
    .crn--bl{left:-1px;bottom:-1px;}
    .crn--bl::before{left:0;bottom:0;} .crn--bl::after{left:0;bottom:0;}
    .crn--bl .tick.h{left:0;bottom:0;} .crn--bl .tick.v{left:0;bottom:0;}
    .crn--br{right:-1px;bottom:-1px;}
    .crn--br::before{right:0;bottom:0;} .crn--br::after{right:0;bottom:0;}
    .crn--br .tick.h{right:0;bottom:0;} .crn--br .tick.v{right:0;bottom:0;}
    @keyframes crnin{from{opacity:0}to{opacity:1}}

    /* small "ON CAMERA" cap top-left, above the frame */
    .cap{position:absolute;left:0;top:-40px;display:flex;align-items:center;gap:12px;
      font-family:var(--display);font-weight:700;letter-spacing:.4em;text-indent:.4em;
      font-size:18px;color:var(--steel);text-transform:uppercase;opacity:.85;
      animation:fade .9s var(--ease) both .35s;}
    .cap .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);
      box-shadow:0 0 10px var(--amber-glow);animation:dotpulse 1.9s ease-out infinite;}
    @keyframes dotpulse{
      0%{box-shadow:0 0 0 0 rgba(227,178,60,.6);transform:scale(1)}
      70%{box-shadow:0 0 0 9px rgba(227,178,60,0);transform:scale(1.12)}
      100%{box-shadow:0 0 0 0 rgba(227,178,60,0);transform:scale(1)}}
    @keyframes fade{from{opacity:0}to{opacity:.85}}

    /* small STUDIO NOIR station mark top-right, above the frame */
    .station{position:absolute;right:0;top:-40px;display:flex;align-items:center;gap:11px;
      font-family:var(--display);font-weight:700;letter-spacing:.4em;text-indent:.4em;
      font-size:17px;color:var(--steel);text-transform:uppercase;opacity:.78;
      animation:fade2 .9s var(--ease) both .4s;}
    .station .bar{width:26px;height:2px;background:var(--amber);box-shadow:0 0 10px var(--amber-glow);}
    @keyframes fade2{from{opacity:0}to{opacity:.78}}

    /* charcoal nameplate slab (amber left border) clipped to bottom of the frame */
    .plate{position:absolute;left:24px;bottom:-22px;display:flex;align-items:center;gap:13px;
      padding:9px 24px 9px 18px;white-space:nowrap;
      background:var(--slab);border:1px solid var(--slab-edge);border-left:3px solid var(--amber);
      box-shadow:0 14px 36px rgba(0,0,0,.5), inset 0 1px 0 rgba(245,247,249,.04);
      animation:platein .85s var(--ease-slab) both .4s;}
    .plate .who{font-family:var(--display);font-weight:700;font-size:25px;letter-spacing:.16em;
      text-indent:.16em;color:var(--white);text-shadow:0 1px 0 rgba(0,0,0,.4);}
    .plate .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);
      box-shadow:0 0 10px var(--amber-glow);}
    @keyframes platein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    /* render mode: freeze entrances + ambient pulses to a clean final state */
    #stage.render .cam,
    #stage.render .crn,
    #stage.render .cap,
    #stage.render .station,
    #stage.render .plate{animation:none!important;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .crn{opacity:1;}
    #stage.render .cap{opacity:.85;}
    #stage.render .station{opacity:.78;}
    #stage.render .plate{opacity:1;transform:none;}
    #stage.render .cap .dot{animation:none!important;box-shadow:0 0 0 0 rgba(227,178,60,0)!important;transform:scale(1)!important;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>

      <!-- steel corner brackets w/ amber ticks -->
      <div class="crn crn--tl" aria-hidden="true"><span class="tick h"></span><span class="tick v"></span></div>
      <div class="crn crn--tr" aria-hidden="true"><span class="tick h"></span><span class="tick v"></span></div>
      <div class="crn crn--bl" aria-hidden="true"><span class="tick h"></span><span class="tick v"></span></div>
      <div class="crn crn--br" aria-hidden="true"><span class="tick h"></span><span class="tick v"></span></div>

      <!-- caption + station mark = editable slots (type your text, or delete) -->
      <span class="cap"><span class="dot" aria-hidden="true"></span><span class="is-slot" data-slot="tag2">[ your text here ]</span></span>
      <span class="station"><span class="bar" aria-hidden="true"></span><span class="is-slot" data-slot="tag">[ your text here ]</span></span>

      <!-- charcoal nameplate slab with @handle -->
      <div class="plate"><span class="dot" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    /* ---- editable text slots: any [data-slot] ships a muted "[ your text here ]"
       placeholder the buyer edits or deletes. ?slotname=Text sets it at render
       time; ?slotname=- (or empty/none/off) removes it entirely. ---- */
    document.querySelectorAll("[data-slot]").forEach((sl) => {
      const v = params.get(sl.dataset.slot);
      if (v == null) return;
      if (v === "-" || v === "" || v === "none" || v === "off") { sl.remove(); return; }
      sl.textContent = v;
      sl.classList.remove("is-slot");
    });

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint key-light dust + soft cool motes drifting around the frame ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    const R = (a, b) => a + Math.random() * (b - a);
    const dust = ctx ? Array.from({ length: Math.max(0, num("dust", 34)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.4),
      vx: R(2, 6) / 60, vy: R(2, 5) / 60, ph: R(0, 6.28), tw: R(0.5, 1.5), a: R(0.12, 0.45),
    })) : [];
    const motes = ctx ? Array.from({ length: Math.max(0, num("motes", 3)) }, () => ({
      x: R(0, W), y: R(0, H * 0.7), r: R(140, 260),
      vx: R(-1.6, 1.6) / 60, vy: R(-1.2, 1.2) / 60, ph: R(0, 6.28), ps: R(0.25, 0.6), a: R(0.035, 0.07),
    })) : [];

    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = "lighter";
      for (const m of motes){
        m.x += m.vx * dt * 60; m.y += m.vy * dt * 60; m.ph += m.ps * dt;
        if (m.x < -320) m.x = W + 320; if (m.x > W + 320) m.x = -320;
        if (m.y < -320) m.y = H + 320; if (m.y > H + 320) m.y = -320;
        const breathe = 0.84 + Math.sin(m.ph) * 0.16, a = m.a * breathe;
        const g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r);
        g.addColorStop(0, `rgba(192,198,204,${a.toFixed(3)})`);
        g.addColorStop(0.55, `rgba(192,198,204,${(a * 0.3).toFixed(3)})`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(Math.round(m.x), Math.round(m.y), m.r, 0, 6.2832); ctx.fill();
      }
      ctx.globalCompositeOperation = "source-over";
      for (const d of dust){
        d.x += d.vx * dt * 60; d.y += d.vy * dt * 60; d.ph += 0.04 * dt * 60;
        if (d.x > W + 8){ d.x = -8; d.y = Math.random() * H; }
        if (d.y > H + 8){ d.y = -8; d.x = Math.random() * W; }
        const tw = 0.5 + Math.sin(d.ph * d.tw) * 0.5;
        ctx.globalAlpha = d.a * tw;
        ctx.fillStyle = "#C0C6CC";
        const s = Math.max(1, Math.round(d.z * 1.5));
        ctx.fillRect(Math.round(d.x), Math.round(d.y), s, s);
      }
      ctx.globalAlpha = 1;
    }
    window.__noirDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
