<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Kitsune Lantern — In-Game Overlay</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT in-game HUD: a slim washi strip lower-left carrying a small
       hanging chochin lantern, a clean "LIVE" tag + @handle, plus a tiny fox-mask
       seal + 狐 mark top-right. One editable slot (tag) for a themed caption.
       Most of the screen stays transparent so gameplay shows through.
       Optional URL params: ?handle=@you  ?tag=Text  (?tag=- removes the slot) -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent overlay: no page chrome, no night background, no atmosphere */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* a faint foxfire field hugs only the lower-left strip (low alpha) */
    canvas.bg{pointer-events:none;opacity:.55;}

    /* ---- slim washi HUD strip, lower-left ---- */
    .slot{position:absolute;left:60px;bottom:56px;height:64px;pointer-events:none;
      display:flex;align-items:center;gap:20px;padding:0 30px 0 26px;
      background:linear-gradient(180deg, rgba(28,18,40,.60), rgba(14,8,18,.48));
      border:1px solid var(--hair);border-radius:7px;
      box-shadow:0 18px 50px rgba(6,3,12,.55), inset 0 0 40px rgba(20,12,30,.5),
        0 0 30px rgba(255,106,61,.07);
      animation:slotin .9s var(--ease) both .15s;}
    /* inner gold hairline */
    .slot::before{content:"";position:absolute;inset:5px;border:1px solid var(--hair-soft);
      border-radius:4px;pointer-events:none;}
    /* slow warm light-sweep travels along the strip */
    .slot::after{content:"";position:absolute;top:0;bottom:0;left:-130px;width:130px;pointer-events:none;
      border-radius:7px;mix-blend-mode:screen;
      background:linear-gradient(105deg, transparent, rgba(255,209,102,.14), transparent);
      animation:slotsweep 6.5s linear infinite;}
    @keyframes slotin{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}
    @keyframes slotsweep{0%{left:-130px}100%{left:100%}}

    /* a small hanging chochin lantern marks the head of the strip */
    .lamp{position:relative;width:30px;height:42px;flex:0 0 auto;
      transform-origin:50% -10px;animation:lampsway 5.4s ease-in-out infinite;}
    .lamp .cap{position:absolute;left:50%;top:-7px;transform:translateX(-50%);
      width:14px;height:5px;border-radius:3px 3px 1px 1px;
      background:linear-gradient(180deg,#3a2418,#1c1009);}
    .lamp .glow{position:absolute;left:50%;top:0;transform:translateX(-50%);
      width:30px;height:40px;border-radius:50%/56%;
      background:radial-gradient(58% 52% at 50% 42%, var(--gold) 0%, var(--orange) 50%, var(--orange-deep) 88%, #7e2412 100%);
      box-shadow:0 0 22px 3px var(--glow-warm), inset 0 0 12px rgba(255,237,190,.55);}
    /* ribbed paper bands */
    .lamp .glow::before{content:"";position:absolute;inset:0;border-radius:inherit;
      background:repeating-linear-gradient(180deg, rgba(120,30,14,0) 0 5px, rgba(120,30,14,.36) 5px 6px);
      -webkit-mask:radial-gradient(58% 52% at 50% 50%, #000 68%, transparent 100%);
              mask:radial-gradient(58% 52% at 50% 50%, #000 68%, transparent 100%);}
    .lamp .foot{position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);
      width:9px;height:4px;border-radius:1px 1px 3px 3px;background:linear-gradient(180deg,#3a2418,#180c06);}
    @keyframes lampsway{0%,100%{transform:rotate(-3.4deg)}50%{transform:rotate(3.4deg)}}

    /* "LIVE" tag — functional, clean spaced mincho caps + a foxfire diamond */
    .slot .tag{display:flex;align-items:center;gap:11px;
      font-family:"Yu Mincho","Hiragino Mincho ProN","Songti SC","Georgia",serif;
      letter-spacing:.42em;font-size:19px;font-weight:600;text-transform:uppercase;
      color:var(--gold);text-indent:.42em;text-shadow:0 0 14px rgba(255,209,102,.4);}
    .slot .tag .dia{width:11px;height:11px;border:1px solid var(--orange);transform:rotate(45deg);
      background:var(--orange);box-shadow:0 0 12px var(--glow-warm);
      animation:livepulse 2.2s ease-in-out infinite;}
    @keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 12px var(--glow-warm)}50%{opacity:.4;box-shadow:0 0 5px var(--glow-warm)}}

    /* thin gold divider rule with a tiny diamond, between tag and handle */
    .slot .div{position:relative;width:1px;height:32px;
      background:linear-gradient(180deg,transparent,var(--gold),transparent);}
    .slot .div::after{content:"";position:absolute;left:50%;top:50%;width:6px;height:6px;
      border:1px solid var(--gold);transform:translate(-50%,-50%) rotate(45deg);
      box-shadow:0 0 8px var(--glow-gold);}

    /* handle — refined mincho serif in cream */
    .slot .who{
      font-family:"Yu Mincho","Hiragino Mincho ProN","Songti SC","Georgia",serif;
      font-weight:600;letter-spacing:.04em;font-size:29px;color:var(--cream);
      text-shadow:0 2px 0 rgba(0,0,0,.34),0 0 26px rgba(255,106,61,.3);white-space:nowrap;}

    /* editable caption slot — sits clear ABOVE the strip, on its own line in
       open transparent space (the strip top edge is at bottom:120px; this sits
       just above it so the [N] badge is never clipped by the canvas bottom edge
       nor dimmed under the strip's drop-shadow).
       ships the verbatim "[ your text here ]" placeholder (italic, muted). */
    .caption{position:absolute;left:64px;bottom:132px;pointer-events:none;
      font-family:"Yu Mincho","Hiragino Mincho ProN","Songti SC","Georgia",serif;
      letter-spacing:.36em;font-size:16px;color:var(--dim);text-indent:.36em;
      white-space:nowrap;text-shadow:0 0 12px rgba(255,209,102,.2);
      animation:fade .9s var(--ease) both .35s;}

    /* tiny fox-mask seal + 狐 mark, top-right */
    .seal-tr{position:absolute;top:46px;right:60px;display:flex;align-items:center;gap:14px;
      pointer-events:none;animation:fade .9s var(--ease) both .25s;}
    .seal-tr .mask{width:30px;height:21px;display:block;filter:drop-shadow(0 0 10px var(--glow-warm));}
    .seal-tr .r{width:60px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}
    .seal-tr .kj{font-family:"Yu Mincho","Hiragino Mincho ProN","Songti SC","Georgia",serif;
      font-size:30px;line-height:1;color:rgba(255,106,61,.5);
      text-shadow:0 0 16px rgba(255,106,61,.4);}
    @keyframes fade{from{opacity:0}to{opacity:1}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .slot,#stage.render .caption,#stage.render .seal-tr{animation:none!important;}
    #stage.render .slot::after{animation:none;display:none;}
    #stage.render .slot .tag .dia,#stage.render .lamp{animation:none;}
    #stage.render .slot{opacity:1;transform:none;}
    #stage.render .caption,#stage.render .seal-tr{opacity:1;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- tiny fox-mask seal + 狐 mark, top-right -->
    <div class="seal-tr" aria-hidden="true">
      <span class="r"></span>
      <svg class="mask" viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="#FFD166" stroke-width="3" stroke-linejoin="round">
          <path d="M50 66 C24 60 8 42 6 18 L26 8 L50 16 L74 8 L94 18 C92 42 76 60 50 66 Z"
                fill="rgba(255,106,61,0.10)"/>
          <path d="M26 8 L20 -2 M74 8 L80 -2" stroke-linecap="round"/>
        </g>
        <g fill="#C73D1E">
          <path d="M34 30 q6 -7 12 0 q-6 4 -12 0 Z"/>
          <path d="M54 30 q6 -7 12 0 q-6 4 -12 0 Z"/>
        </g>
        <path d="M44 44 q6 5 12 0" fill="none" stroke="#C73D1E" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="kj">狐</span>
    </div>

    <!-- slim washi HUD strip, lower-left -->
    <div class="slot">
      <span class="lamp" aria-hidden="true">
        <span class="cap"></span><span class="glow"></span><span class="foot"></span>
      </span>
      <span class="tag"><span class="dia"></span>LIVE</span>
      <span class="div" aria-hidden="true"></span>
      <span class="who" id="handle">@yourhandle</span>
    </div>

    <!-- editable themed caption slot (COPY STANDARD) -->
    <p class="caption is-slot" id="tag" data-slot="tag"><span class="slot-no">21</span><span class="slot-txt">your text here</span></p>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    /* ---- editable text slots (caption): ?tag=Text fills, ?tag=- removes ---- */
    document.querySelectorAll("[data-slot]").forEach((node) => {
      const v = params.get(node.dataset.slot);
      if (v == null) return;
      if (v === "-" || v === "" || v === "none" || v === "off") { node.remove(); return; }
      node.textContent = v;
      node.classList.remove("is-slot");
    });

    /* ---- canvas: a FEW faint foxfire motes hugging the lower-left strip ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv.getContext("2d");
    const W = cv.width || 1920, H = cv.height || 1080;
    const R = (a, b) => a + Math.random() * (b - a);
    // seed in a band around the lower-left strip so motes read as lantern foxfire
    const wisps = Array.from({ length: Math.max(0, num("wisps", 16)) }, () => ({
      x: R(20, 560), y: R(H - 360, H - 30), r: R(5, 13),
      drift: R(-5, 5) / 60, rise: R(4, 12) / 60, ph: R(0, 6.28),
      sw: R(0.5, 1.3), sp: R(0.5, 1.2), a: R(0.22, 0.5), warm: Math.random() < 0.45,
    }));
    function drawWisp(w, t){
      const breathe = 0.78 + 0.22 * Math.sin(t * w.sp * 2.4 + w.ph);
      const r = w.r * breathe; if (r < 0.5) return;
      const x = Math.round(w.x + Math.sin(t * 0.9 + w.ph) * w.sw * 7), y = Math.round(w.y);
      const g = ctx.createRadialGradient(x, y, 0, x, y, r * 2.6);
      if (w.warm){
        g.addColorStop(0, "rgba(255,229,170," + w.a.toFixed(3) + ")");
        g.addColorStop(.35, "rgba(255,106,61," + (w.a * .6).toFixed(3) + ")");
        g.addColorStop(1, "rgba(255,106,61,0)");
      } else {
        g.addColorStop(0, "rgba(206,196,255," + w.a.toFixed(3) + ")");
        g.addColorStop(.35, "rgba(123,92,255," + (w.a * .6).toFixed(3) + ")");
        g.addColorStop(1, "rgba(123,92,255,0)");
      }
      ctx.globalAlpha = 1; ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, r * 2.6, 0, 6.2832); ctx.fill();
      ctx.globalAlpha = Math.min(1, w.a * 1.3) * breathe;
      ctx.fillStyle = w.warm ? "#FFF1D6" : "#E8E2FF";
      ctx.beginPath(); ctx.arc(x, y, Math.max(1, r * 0.38), 0, 6.2832); ctx.fill();
    }
    let life = 0;
    function drawBg(dt){
      ctx.clearRect(0, 0, W, H); life += dt;
      for (const w of wisps){
        w.x += w.drift * dt * 60; w.y -= w.rise * dt * 60;
        if (w.y < H - 380){ w.y = H - 20; w.x = R(20, 560); }
        drawWisp(w, life);
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    window.__kitsuneDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; life = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
