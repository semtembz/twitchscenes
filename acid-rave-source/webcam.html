<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Acid Rave — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one "UV Blacklight" webcam frame: a glowing acid
       hairline border with bright laser L-ticks in every corner, a tri-color
       laser rule along the top, a slow scan sweep, and a glowing nameplate pill
       carrying #handle. Place your camera BEHIND this overlay; the inside of the
       frame is fully transparent so the cam shows through.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint UV motes drift around the frame */
    canvas.bg{pointer-events:none;opacity:.55;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* glowing acid hairline border; INSIDE stays transparent.
       a faint UV edge-glow hugs the rim only (transparent center). */
    .frame{position:absolute;inset:0;pointer-events:none;border-radius:14px;
      border:1px solid var(--acid);
      box-shadow:
        0 0 0 1px rgba(7,3,15,.55),
        0 0 24px var(--acid-glow),
        0 0 64px rgba(198,255,0,.18),
        inset 0 0 28px rgba(198,255,0,.08);}
    /* inner UV double hairline (transparent center) */
    .frame::before{content:"";position:absolute;inset:8px;border:1px solid rgba(178,107,255,.45);
      border-radius:10px;pointer-events:none;box-shadow:0 0 14px rgba(178,107,255,.3);}
    /* edge-only UV wash so the camera image is never flooded in the center */
    .frame::after{content:"";position:absolute;inset:1px;pointer-events:none;border-radius:13px;
      background:
        linear-gradient(180deg, rgba(0,229,255,.07), transparent 13%, transparent 87%, rgba(255,20,200,.08)),
        linear-gradient(90deg, rgba(198,255,0,.06), transparent 11%, transparent 89%, rgba(178,107,255,.06));}

    /* bright laser L-ticks in every corner (the signature crop-mark motif),
       each a different UV color — acid / magenta / cyan / purple */
    .tick{position:absolute;width:36px;height:36px;pointer-events:none;
      animation:tickin 1.1s var(--ease) both .35s;}
    .tick::before,.tick::after{content:"";position:absolute;}
    .tick::before{width:36px;height:2px;} .tick::after{width:2px;height:36px;}
    .tick--tl{left:-1px;top:-1px;}    .tick--tl::before{left:0;top:0;}     .tick--tl::after{left:0;top:0;}
    .tick--tr{right:-1px;top:-1px;}   .tick--tr::before{right:0;top:0;}    .tick--tr::after{right:0;top:0;}
    .tick--bl{left:-1px;bottom:-1px;} .tick--bl::before{left:0;bottom:0;}  .tick--bl::after{left:0;bottom:0;}
    .tick--br{right:-1px;bottom:-1px;}.tick--br::before{right:0;bottom:0;} .tick--br::after{right:0;bottom:0;}
    .tick--tl::before,.tick--tl::after{background:var(--acid);box-shadow:0 0 10px var(--acid-glow);}
    .tick--tr::before,.tick--tr::after{background:var(--magenta);box-shadow:0 0 10px var(--mag-glow);}
    .tick--bl::before,.tick--bl::after{background:var(--cyan);box-shadow:0 0 10px var(--cyan-glow);}
    .tick--br::before,.tick--br::after{background:var(--purple);box-shadow:0 0 10px rgba(178,107,255,.55);}
    @keyframes tickin{from{opacity:0}to{opacity:1}}

    /* tri-color laser rule riding the top edge (matches the title rule motif) */
    .lrule{position:absolute;left:24px;right:24px;top:-3px;height:3px;border-radius:3px;pointer-events:none;
      background:linear-gradient(90deg,transparent,var(--cyan) 18%,var(--white) 50%,var(--magenta) 82%,transparent);
      box-shadow:0 0 16px var(--cyan-glow),0 0 30px var(--mag-glow);
      animation:lrule 2.6s ease-in-out infinite;}
    @keyframes lrule{0%,100%{opacity:.85;transform:scaleX(.99)}50%{opacity:1;transform:scaleX(1)}}

    /* slow horizontal scan line sweeping the cam frame (frozen/hidden in render).
       travels the full frame height via --scanH (set from the chosen ?h). */
    .scan{position:absolute;left:1px;right:1px;top:0;height:2px;pointer-events:none;border-radius:2px;
      --scanH:628px;
      background:linear-gradient(90deg,transparent,rgba(198,255,0,.5) 50%,transparent);
      box-shadow:0 0 16px var(--acid-glow);opacity:.5;
      animation:camscan 6.5s linear infinite;}
    @keyframes camscan{0%{transform:translateY(0)}100%{transform:translateY(var(--scanH))}}

    /* small clinical caption + pip, top-left above the frame (clean functional label) */
    .cap{position:absolute;left:2px;top:-44px;display:flex;align-items:center;gap:11px;
      font-family:"Bahnschrift","Roboto Condensed","DejaVu Sans Mono",Consolas,monospace;
      letter-spacing:.4em;font-size:15px;color:var(--cyan);text-indent:.4em;opacity:.9;
      text-shadow:0 0 12px var(--cyan-glow);animation:tickin 1.1s var(--ease) both .45s;}
    .cap .pip{width:9px;height:9px;border-radius:50%;background:var(--cyan);
      box-shadow:0 0 10px var(--cyan-glow);animation:pip 1.8s ease-in-out infinite;}
    @keyframes pip{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.78)}}

    /* UV mark — top-right above the frame */
    .crest-tr{position:absolute;right:0;top:-44px;display:flex;align-items:center;gap:13px;
      animation:tickin 1.1s var(--ease) both .45s;}
    .crest-tr .r{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--purple));
      box-shadow:0 0 8px rgba(178,107,255,.4);}
    .crest-tr .pt{width:11px;height:11px;border:1px solid var(--acid);transform:rotate(45deg);
      box-shadow:0 0 10px var(--acid-glow);}

    /* glowing nameplate pill, clipped to bottom-center of the frame */
    .tag{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);
      display:flex;align-items:center;gap:13px;white-space:nowrap;border-radius:10px;
      background:linear-gradient(180deg, rgba(178,107,255,.14), rgba(7,3,15,.72));
      border:1px solid rgba(198,255,0,.5);padding:9px 26px;
      box-shadow:0 14px 34px rgba(0,0,0,.55),
        0 0 22px var(--acid-glow),
        inset 0 0 18px rgba(178,107,255,.10);}
    .tag .who{font-family:"Bahnschrift","Roboto Condensed","DejaVu Sans Mono",Consolas,monospace;
      letter-spacing:.26em;font-size:23px;font-weight:700;color:var(--acid);
      text-indent:.26em;text-shadow:0 0 16px var(--acid-glow);}
    .tag .dia{width:9px;height:9px;border:1px solid var(--magenta);transform:rotate(45deg);
      background:var(--magenta);box-shadow:0 0 12px var(--mag-glow);
      animation:pip 1.8s ease-in-out infinite;}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .tick,#stage.render .cap,#stage.render .crest-tr{animation:none!important;}
    #stage.render .scan{animation:none;display:none;}
    #stage.render .lrule{animation:none;opacity:1;transform:none;}
    #stage.render .cap .pip,#stage.render .tag .dia{animation:none;opacity:1;transform:rotate(45deg);}
    #stage.render .cap .pip{transform:none;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .tick{opacity:1;}
    #stage.render .cap{opacity:.9;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>
      <div class="lrule" aria-hidden="true"></div>
      <div class="scan" aria-hidden="true"></div>

      <!-- bright laser L-ticks in every corner -->
      <span class="tick tick--tl" aria-hidden="true"></span>
      <span class="tick tick--tr" aria-hidden="true"></span>
      <span class="tick tick--bl" aria-hidden="true"></span>
      <span class="tick tick--br" aria-hidden="true"></span>

      <span class="cap" aria-hidden="true"><span class="pip"></span>ON CAMERA</span>
      <span class="crest-tr" aria-hidden="true"><span class="r"></span><span class="pt"></span></span>
      <div class="tag"><span class="dia" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
      // keep the scan sweep honest to the chosen height
      const sc = cam.querySelector(".scan");
      if (sc) sc.style.setProperty("--scanH", (fh - 2) + "px");
    }

    /* ---- canvas: faint UV motes drifting around the frame, deterministic ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    // tiny seeded PRNG (mulberry32) — no Math.random in the frame fn
    let _s = 0xACED >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const PAL = ["#C6FF00","#FF14C8","#00E5FF","#B26BFF"];
    const motes = Array.from({ length: Math.max(0, num("motes", 56)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.6), vx: R(-3, 3)/60, vy: R(-5, 2)/60,
      ph: R(0, 6.28), tw: R(0.4, 1.3), a: R(0.12, 0.46), c: PAL[(srnd()*PAL.length)|0],
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = "lighter";
      for (const p of motes){
        p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.ph += 0.04 * dt * 60;
        if (p.x < -8) p.x = W + 8; if (p.x > W + 8) p.x = -8;
        if (p.y < -8) p.y = H + 8; if (p.y > H + 8) p.y = -8;
        const tw = 0.55 + Math.sin(p.ph * p.tw) * 0.45;
        ctx.globalAlpha = p.a * tw;
        ctx.fillStyle = p.c;
        const sz = Math.max(1, Math.round(p.z * 1.6));
        ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
      }
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = "source-over";
    }
    window.__acidDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
