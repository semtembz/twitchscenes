<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Transition — Witching Hour Candle-Snuff Smoke Wipe</title>
  <!--
    WITCHING HOUR stinger ("Candle-Snuff"). The candle is put out at the witching
    hour. A warm pool of candlelight swells from centre as a soft near-black/teal
    dark floods in behind it; a SWIRL of gold-dusted MOTHS spirals inward toward
    the dying flame while billowing curls of candle-SMOKE rise and fan across the
    screen. At full cover (t=0.5) the flame SNUFFS — a brief bright ember-spark
    burst with a thin rising smoke ribbon — and the warm light gutters out. The
    smoke then thins, the dark lifts, and the screen clears. Faint celestial gold
    sparks drift in the margins throughout. Transparent before & after,
    deterministic (seeded RNG, no Math.random in the frame fn), sine-driven,
    ~1300ms. Dark-academia witchcraft — NOT velvet / frost / neon / glitch.

    Plays ONCE on load, then clears.
      ?loop=1    loop it (for previewing)
      ?ms=1300   total duration in ms (default 1300)

    To use as an OBS Stinger you need a VIDEO file (OBS can't use a web page as a
    stinger). Use transition-export.html to record a transparent .webm, then add
    it as a Stinger transition with the Transition Point at ~50% (the snuff peak).
  -->
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="c" width="1920" height="1080"></canvas>
  <script>
  (() => {
    "use strict";
    const W = 1920, H = 1080, CX = W / 2, CY = H / 2;
    const cv = document.getElementById('c'), ctx = cv.getContext('2d');
    const params = new URLSearchParams(location.search);
    const DUR = Number(params.get('ms')) || 1300;
    const LOOP = params.get('loop') === '1';

    /* ---- palette (witching hour candlelit study) ---- */
    const NEAR_BLACK = [11, 14, 18], BLACKER = [6, 8, 11], TEAL = [20, 50, 58], PLUM = [91, 42, 78];
    const GOLD = [201, 162, 75], GOLD_LT = [231, 200, 120], CREAM = [232, 224, 204];
    const SMOKE = [70, 74, 70];               // cool grey candle-smoke
    const MOTH_PALE = [216, 206, 180], MOTH_DUSK = [120, 92, 52];

    const clamp01 = (x) => x < 0 ? 0 : x > 1 ? 1 : x;
    const smooth = (x) => { x = clamp01(x); return x * x * (3 - 2 * x); };
    const lerp = (a, b, t) => a + (b - a) * t;
    const rgba = (c, a) => 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (a < 0 ? 0 : a > 1 ? 1 : a).toFixed(3) + ')';

    /* ---- seeded RNG (mulberry-ish LCG) used ONCE up-front to lay out the smoke
       plumes, the spiralling moth swirl and the celestial sparks. The frame fn is
       a pure deterministic function of t — no Math.random per frame. ---- */
    let seed = 0x5C0F >>> 0;
    const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
    const R = (a, b) => a + rnd() * (b - a);

    /* SMOKE PLUMES: each is a soft rising billow of candle-smoke. They originate
       at / near the centre flame and drift upward & outward, fanning as they go,
       puffing into being with cover then thinning as the snuff settles. */
    const N_PLUME = 26;
    const plumes = Array.from({ length: N_PLUME }, () => {
      const side = rnd() < 0.5 ? -1 : 1;
      return {
        x0: CX + R(-90, 90),
        y0: CY + R(-40, 90),
        drift: side * R(120, 520),           // lateral fan as it rises
        rise: R(260, 760),                   // how high it billows
        r0: R(60, 150), r1: R(180, 420),     // grows as it rises
        curl: R(0.6, 2.0) * side,            // sideways curl amount
        curlf: R(1.0, 2.4),                  // curl frequency
        lead: R(0, 0.30), span: R(0.5, 0.95),
        a: R(0.18, 0.40),
        warm: rnd() < 0.45,                  // a few plumes glow warm near the flame
      };
    });

    /* MOTH SWIRL: a flurry of gold-dusted moths spiral INWARD toward the dying
       flame, then scatter as it snuffs. Each rides a shrinking spiral arm. */
    const N_MOTH = 13;
    const moths = Array.from({ length: N_MOTH }, () => ({
      ang0: R(0, 6.2832),
      turns: R(0.7, 1.5) * (rnd() < 0.5 ? -1 : 1),
      rad0: R(W * 0.30, W * 0.62),           // start far out
      rad1: R(40, 150),                       // spiral in close to flame
      yoff: R(-60, 60),
      size: R(13, 22),
      flaps: R(16, 26),                       // wing-flap rate
      flap0: R(0, 6.2832),
      lead: R(0, 0.22), span: R(0.55, 0.92),
      a: R(0.55, 0.9),
      pale: rnd() < 0.4,
    }));

    /* CELESTIAL SPARKS: faint gold star-sparks drifting in the margins. */
    const N_SPARK = 46;
    const sparks = Array.from({ length: N_SPARK }, () => {
      // keep them off the centre (margins / corners)
      let x = R(0, W), y = R(0, H);
      if (Math.abs(x - CX) < 360 && Math.abs(y - CY) < 240) { x = x < CX ? x * 0.5 : W - (W - x) * 0.5; }
      return {
        x, y, s: R(0.8, 2.6),
        lead: R(0, 0.4), span: R(0.4, 0.85),
        tw: R(1.2, 2.8), phase: R(0, 6.2832),
        a: R(0.3, 0.8), drift: R(-26, 8),
      };
    });

    /* EMBER SPARKS (the snuff burst): a radial spray of hot embers thrown off
       the wick at the snuff peak. Seeded directions/speeds; alive only near t=0.5. */
    const N_EMBER = 40;
    const embers = Array.from({ length: N_EMBER }, () => {
      const ang = R(-Math.PI * 0.85, -Math.PI * 0.15); // mostly upward spray
      return {
        ang, spd: R(120, 560), grav: R(120, 360),
        s: R(1.4, 3.6), a: R(0.6, 1), tw: R(2, 5), phase: R(0, 6.2832),
      };
    });

    /* ---- the warm candle-glow pool + the flooding dark. The pool swells then
       guts out at the snuff; the dark floods behind it so the screen reads as a
       study plunging into candle-snuffed black. ---- */
    function drawGround(t, cover) {
      // dark flood: near-black/teal, denser as cover rises
      const baseA = smooth(cover);
      const g = ctx.createRadialGradient(CX, CY, H * 0.05, CX, CY, Math.hypot(CX, CY));
      g.addColorStop(0.00, rgba(NEAR_BLACK, baseA * 0.80));
      g.addColorStop(0.45, rgba([14, 20, 26], baseA * 0.92));
      g.addColorStop(0.78, rgba(NEAR_BLACK, baseA * 0.97));
      g.addColorStop(1.00, rgba(BLACKER, baseA));
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      // a soft teal/plum wash so the dark isn't flat
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const tg = ctx.createRadialGradient(CX, CY * 1.5, 0, CX, CY * 1.5, H * 0.9);
      tg.addColorStop(0, rgba(TEAL, 0.10 * baseA));
      tg.addColorStop(1, rgba(PLUM, 0));
      ctx.fillStyle = tg;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();

      // the warm candle-glow POOL — swells toward the snuff, then guts out fast.
      // peaks just before t=0.5, collapses right after (the flame dies).
      const swell = Math.sin(clamp01(t / 0.5) * Math.PI * 0.5);    // 0->1 by t=0.5
      const gut = t > 0.5 ? smooth((t - 0.5) / 0.22) : 0;          // collapse after snuff
      const glow = Math.max(0, swell * (1 - gut)) * cover;
      if (glow > 0.01) {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const flick = 0.86 + Math.sin(t * 47) * 0.08 + Math.sin(t * 113) * 0.06; // candle flicker
        const gr = lerp(160, 520, swell) * (1 - gut * 0.5);
        const pg = ctx.createRadialGradient(CX, CY, 0, CX, CY, gr);
        pg.addColorStop(0.00, rgba(GOLD_LT, 0.55 * glow * flick));
        pg.addColorStop(0.35, rgba(GOLD, 0.26 * glow * flick));
        pg.addColorStop(1.00, rgba(GOLD, 0));
        ctx.fillStyle = pg;
        ctx.beginPath(); ctx.arc(CX, CY, gr, 0, 6.2832); ctx.fill();
        ctx.restore();
      }
    }

    /* ---- billowing candle-smoke plumes ---- */
    function drawSmoke(t, cover) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (const p of plumes) {
        const lt = clamp01((t - p.lead) / p.span);
        if (lt <= 0 || lt >= 1) continue;
        const e = smooth(lt);
        const ends = Math.sin(lt * Math.PI);               // 0 at ends, 1 mid
        // rise & fan, with a sideways curl
        const cx = p.x0 + p.drift * e + Math.sin(p.curlf * lt * 6.2832 + p.x0) * p.curl * 30;
        const cy = p.y0 - p.rise * e;
        const rad = lerp(p.r0, p.r1, e);
        const a = p.a * ends * lerp(0.5, 1, cover);
        if (a <= 0.02 || rad <= 1) continue;
        const col = p.warm ? GOLD : SMOKE;
        const sg = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        sg.addColorStop(0.0, rgba(col, a * (p.warm ? 0.5 : 0.7)));
        sg.addColorStop(0.6, rgba(col, a * 0.28));
        sg.addColorStop(1.0, rgba(col, 0));
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(cx, cy, rad, 0, 6.2832); ctx.fill();
      }
      ctx.restore();
    }

    /* draw one moth: fuzzy body + flapping wings, dusted gold by candlelight */
    function drawMoth(m, x, y, heading, flap, alpha) {
      const s = m.size;
      ctx.save();
      ctx.translate(Math.round(x), Math.round(y));
      ctx.rotate(heading + Math.PI / 2);
      ctx.globalAlpha = alpha;
      const wingCol = m.pale ? 'rgba(232,224,204,0.85)' : 'rgba(201,162,75,0.82)';
      const wingEdge = m.pale ? 'rgba(231,200,120,0.9)' : 'rgba(231,200,120,0.7)';
      ctx.shadowColor = 'rgba(231,200,120,0.5)'; ctx.shadowBlur = 8;
      for (const side of [-1, 1]) {
        ctx.save();
        ctx.scale(side * flap, 1);
        ctx.fillStyle = wingCol; ctx.strokeStyle = wingEdge; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(s * 0.62, -s * 0.18, s * 0.62, s * 0.42, -0.5, 0, 6.2832);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(s * 0.5, s * 0.4, s * 0.46, s * 0.34, 0.4, 0, 6.2832);
        ctx.fill();
        ctx.restore();
      }
      ctx.shadowBlur = 4;
      ctx.fillStyle = m.pale ? 'rgba(216,206,180,0.95)' : 'rgba(120,92,52,0.95)';
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.16, s * 0.55, 0, 0, 6.2832);
      ctx.fill();
      ctx.restore();
    }

    /* ---- the moth swirl spiralling inward, then scattering ---- */
    function drawMoths(t, cover) {
      for (const m of moths) {
        const lt = clamp01((t - m.lead) / m.span);
        if (lt <= 0 || lt >= 1) continue;
        const e = smooth(lt);
        // spiral inward: radius shrinks, angle winds; after the snuff they flee out
        const flee = t > 0.5 ? smooth((t - 0.5) / 0.32) : 0;
        const rad = lerp(m.rad0, m.rad1, e) + flee * (m.rad0 * 0.7);
        const ang = m.ang0 + m.turns * 6.2832 * e - flee * 2.0 * Math.sign(m.turns || 1);
        const x = CX + Math.cos(ang) * rad;
        const y = CY + m.yoff + Math.sin(ang) * rad * 0.82;
        // heading ~ tangent of the inward spiral
        const heading = ang + Math.PI / 2 * (m.turns < 0 ? -1 : 1);
        const flap = 0.32 + Math.abs(Math.sin(m.flap0 + lt * m.flaps * 6.2832)) * 0.95;
        const ends = Math.sin(lt * Math.PI);
        const a = m.a * ends * lerp(0.55, 1, cover) * (1 - flee * 0.4);
        if (a <= 0.02) continue;
        drawMoth(m, x, y, heading, flap, a);
      }
    }

    /* ---- faint celestial gold sparks drifting in the margins ---- */
    function drawSparks(t, cover) {
      ctx.save();
      for (const sp of sparks) {
        const lt = clamp01((t - sp.lead) / sp.span);
        if (lt <= 0 || lt >= 1) continue;
        const ends = Math.sin(lt * Math.PI);
        const tw = 0.5 + Math.sin(sp.phase + lt * sp.tw * 6.2832) * 0.5;
        const a = sp.a * ends * tw * lerp(0.3, 1, cover);
        if (a <= 0.02) continue;
        const x = sp.x, y = sp.y + sp.drift * smooth(lt);
        ctx.globalAlpha = a;
        ctx.fillStyle = '#E7C878';
        ctx.shadowColor = '#E7C878'; ctx.shadowBlur = 8;
        const s = sp.s;
        // tiny 4-point gold star spark
        ctx.beginPath();
        ctx.moveTo(x, y - s * 2); ctx.lineTo(x + s * 0.5, y);
        ctx.lineTo(x, y + s * 2); ctx.lineTo(x - s * 0.5, y); ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x - s * 2, y); ctx.lineTo(x, y + s * 0.5);
        ctx.lineTo(x + s * 2, y); ctx.lineTo(x, y - s * 0.5); ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    /* ---- the snuff burst: ember spray + a thin rising smoke ribbon, alive only
       around the snuff peak (t≈0.5). ---- */
    function drawSnuff(t) {
      const burst = Math.exp(-Math.pow((t - 0.5) / 0.10, 2));   // peaks at t=0.5
      if (burst <= 0.02) return;
      const age = clamp01((t - 0.46) / 0.30);                   // 0 at snuff, ->1 after
      ctx.save();
      // ember spray thrown off the wick
      for (const em of embers) {
        const px = CX + Math.cos(em.ang) * em.spd * age;
        const py = CY + Math.sin(em.ang) * em.spd * age + 0.5 * em.grav * age * age;
        const tw = 0.6 + Math.sin(em.phase + age * em.tw * 6.2832) * 0.4;
        const a = em.a * burst * (1 - age) * tw;
        if (a <= 0.02) continue;
        ctx.globalAlpha = a;
        ctx.fillStyle = '#FFF1C2';
        ctx.shadowColor = '#E7C878'; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(Math.round(px), Math.round(py), em.s, 0, 6.2832); ctx.fill();
      }
      // a single thin smoke ribbon rising from the snuffed wick
      ctx.globalAlpha = 0.5 * burst;
      ctx.globalCompositeOperation = 'screen';
      ctx.strokeStyle = rgba([120, 120, 116], 0.5);
      ctx.lineWidth = 6;
      ctx.shadowColor = 'rgba(120,120,116,0.5)'; ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      for (let i = 1; i <= 10; i++) {
        const f = i / 10;
        const ry = CY - f * 280 * age;
        const rx = CX + Math.sin(f * 6.0 + t * 8) * 30 * f;
        ctx.lineTo(rx, ry);
      }
      ctx.stroke();
      ctx.restore();
    }

    function frame(t) {
      ctx.clearRect(0, 0, W, H);
      const cover = Math.sin(clamp01(t) * Math.PI);     // 0 -> 1 -> 0, full cover at t=0.5

      drawGround(t, cover);
      drawSmoke(t, cover);
      drawMoths(t, cover);
      drawSparks(t, cover);
      drawSnuff(t);

      // a warm gold ember-flash at the very snuff peak (the flame's last gasp)
      const flash = Math.exp(-Math.pow((t - 0.5) / 0.05, 2));
      if (flash > 0.02) {
        ctx.save();
        const fg = ctx.createRadialGradient(CX, CY, 0, CX, CY, W * 0.5);
        fg.addColorStop(0, rgba(CREAM, 0.42 * flash));
        fg.addColorStop(0.4, rgba(GOLD_LT, 0.20 * flash));
        fg.addColorStop(1, rgba(GOLD, 0));
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = fg;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    // Exposed so a verification step / headless pipeline can render any frame (t in 0..1).
    window.__txDraw = (t) => frame(clamp01(t));

    let start = null;
    function loop(ts) {
      if (start == null) start = ts;
      let t = (ts - start) / DUR;
      if (t >= 1) {
        if (LOOP) { start = ts + 700; t = 0; }            // pause then replay
        else { ctx.clearRect(0, 0, W, H); return; }       // play once, then clear
      }
      frame(clamp01(t));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
