<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Oni Circuit — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one "Cyber-Samurai" webcam frame: an angular
       blade-edge border (oni-red + teal edge light) with sharp L-bracket
       corner registration ticks, a slow blade glint sweeping the top edge,
       a clean "ON CAMERA" status, and a skewed nameplate carrying #handle.
       Place your camera BEHIND this overlay; the inside of the frame is fully
       transparent so the cam shows through.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint red/teal embers drift around the frame */
    canvas.bg{pointer-events:none;opacity:.6;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* angular blade-edge border; INSIDE stays transparent. Clipped corners give
       the sharp samurai-plate silhouette. */
    .frame{position:absolute;inset:0;background:transparent;
      border:2px solid var(--oni);
      box-shadow:
        0 0 0 1px rgba(5,8,12,.6),
        0 0 24px rgba(255,45,75,.35),
        0 0 60px rgba(255,45,75,.14),
        inset 0 0 26px rgba(255,45,75,.08);
      /* notched / chamfered corners — sharp angular plate */
      clip-path:polygon(
        26px 0,calc(100% - 26px) 0,100% 26px,
        100% calc(100% - 26px),calc(100% - 26px) 100%,
        26px 100%,0 calc(100% - 26px),0 26px);}
    /* inner teal edge-light hairline, offset (the rim light), transparent inside */
    .frame::before{content:"";position:absolute;inset:6px;border:1px solid var(--teal-soft);
      box-shadow:0 0 16px rgba(22,240,200,.22),inset 0 0 16px rgba(22,240,200,.06);
      clip-path:inherit;pointer-events:none;}
    /* edge-only red glow so the cam image is never washed in the center */
    .frame::after{content:"";position:absolute;inset:2px;pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,45,75,.07), transparent 13%, transparent 87%, rgba(22,240,200,.06)),
        linear-gradient(90deg, rgba(255,45,75,.06), transparent 11%, transparent 89%, rgba(22,240,200,.05));
      clip-path:inherit;}

    /* sharp L-bracket corner registration ticks (the signature samurai crop marks) */
    .tick{position:absolute;width:36px;height:36px;pointer-events:none;
      animation:tickin 1.1s var(--ease) both .35s;}
    .tick::before,.tick::after{content:"";position:absolute;background:var(--teal-soft);
      box-shadow:0 0 9px var(--glow-teal);}
    .tick::before{width:36px;height:2px;} .tick::after{width:2px;height:36px;}
    .tick--tl{left:-3px;top:-3px;}    .tick--tl::before{left:0;top:0;}     .tick--tl::after{left:0;top:0;}
    .tick--tr{right:-3px;top:-3px;}   .tick--tr::before{right:0;top:0;}    .tick--tr::after{right:0;top:0;}
    .tick--bl{left:-3px;bottom:-3px;} .tick--bl::before{left:0;bottom:0;}  .tick--bl::after{left:0;bottom:0;}
    .tick--br{right:-3px;bottom:-3px;}.tick--br::before{right:0;bottom:0;} .tick--br::after{right:0;bottom:0;}
    @keyframes tickin{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:none}}

    /* slow blade glint sweeping the top edge of the cam frame (frozen in render) */
    .glint{position:absolute;left:2px;right:2px;top:0;height:2px;pointer-events:none;overflow:hidden;}
    .glint::after{content:"";position:absolute;top:0;height:2px;width:120px;left:-120px;
      background:linear-gradient(90deg,transparent,var(--teal),rgba(232,238,245,.9),transparent);
      box-shadow:0 0 16px var(--glow-teal);
      animation:glintsweep 5.5s linear infinite;}
    @keyframes glintsweep{0%{left:-120px}100%{left:100%}}

    /* small clean caption + oni diamond, top-left above the frame (functional label) */
    .cap{position:absolute;left:2px;top:-44px;display:flex;align-items:center;gap:12px;
      font-family:var(--mono);letter-spacing:.4em;font-size:15px;color:var(--oni);
      text-indent:.4em;opacity:.9;text-shadow:0 0 12px rgba(255,45,75,.4);
      animation:tickin 1.1s var(--ease) both .45s;}
    .cap .dia{width:9px;height:9px;background:var(--oni);transform:rotate(45deg);
      box-shadow:0 0 10px var(--glow-oni);animation:pulse 1.9s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* crest mark — top-right above the frame (rule + teal node) */
    .crest-tr{position:absolute;right:2px;top:-44px;display:flex;align-items:center;gap:13px;
      animation:tickin 1.1s var(--ease) both .45s;}
    .crest-tr .r{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--oni));
      box-shadow:0 0 8px rgba(255,45,75,.3);}
    .crest-tr .pt{width:11px;height:11px;border:1px solid var(--teal);transform:rotate(45deg);
      box-shadow:0 0 11px var(--glow-teal);}

    /* skewed blade-edge nameplate, clipped to bottom-center of the frame */
    .tag{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);
      display:flex;align-items:center;gap:14px;white-space:nowrap;
      background:linear-gradient(180deg, rgba(27,36,51,.55), rgba(5,8,12,.78));
      border:1px solid var(--steel-edge);padding:9px 28px;
      box-shadow:0 14px 34px rgba(0,0,0,.5), 0 0 22px rgba(255,45,75,.10);
      /* sharp parallelogram blade-edge clip */
      clip-path:polygon(14px 0,calc(100% - 14px) 0,100% 100%,0 100%);}
    .tag .who{font-family:var(--mono);letter-spacing:.26em;font-size:22px;color:var(--text);
      text-indent:.26em;text-shadow:0 0 14px rgba(255,45,75,.35);}
    .tag .who::before{content:"> ";color:var(--teal);text-shadow:0 0 10px var(--glow-teal);}
    .tag .dia{width:9px;height:9px;background:var(--oni);transform:rotate(45deg);
      box-shadow:0 0 10px var(--glow-oni);animation:pulse 1.9s ease-in-out infinite;}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .tick,#stage.render .cap,#stage.render .crest-tr{animation:none!important;}
    #stage.render .glint::after{animation:none;display:none;}
    #stage.render .cap .dia,#stage.render .tag .dia{animation:none;opacity:1;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .tick{opacity:1;transform:none;}
    #stage.render .cap{opacity:.9;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>
      <div class="glint" aria-hidden="true"></div>

      <!-- sharp L-bracket corner registration ticks -->
      <span class="tick tick--tl" aria-hidden="true"></span>
      <span class="tick tick--tr" aria-hidden="true"></span>
      <span class="tick tick--bl" aria-hidden="true"></span>
      <span class="tick tick--br" aria-hidden="true"></span>

      <span class="cap" aria-hidden="true"><span class="dia"></span>ON CAMERA</span>
      <span class="crest-tr" aria-hidden="true"><span class="r"></span><span class="pt"></span></span>
      <div class="tag"><span class="dia" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint red/teal embers drifting around the frame, deterministic ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    // tiny seeded PRNG (mulberry32) — no Math.random in the frame fn
    let _s = 0x4f4e >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const embers = Array.from({ length: Math.max(0, num("embers", 52)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.6), vy: R(-9, -3)/60, sway: R(0.3, 1.2),
      ph: R(0, 6.28), tw: R(0.5, 1.4), a: R(0.16, 0.55), teal: srnd() < 0.42,
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      for (const e of embers){
        e.y += e.vy * dt * 60; e.ph += 0.04 * dt * 60; e.x += Math.sin(e.ph) * e.sway * 0.6;
        if (e.y < -12){ e.y = H + 12; e.x = ((srnd() * W) | 0); }
        const tw = 0.5 + Math.sin(e.ph * e.tw) * 0.5;
        ctx.globalAlpha = e.a * tw;
        const col = e.teal ? "#16F0C8" : "#FF2D4B";
        ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 7 * e.z;
        const sz = Math.max(1, Math.round(e.z * 1.7));
        ctx.fillRect(Math.round(e.x), Math.round(e.y), sz, sz);
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    window.__oniDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
