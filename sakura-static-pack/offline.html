<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Offline Screen — Sakura Static (PNG generator)</title>
  <!--
    SAKURA STATIC · "lo-fi anime night" OFFLINE image generator.

    Twitch's offline image is a static 1920x1080 PNG you upload to your channel.
    This page bakes the lo-fi-night look (plum night gradient, soft bokeh blooms,
    drifting cherry-blossom petals, VHS scanlines + vignette, a frosted now-playing
    card, the CH 03 · LO-FI dead-channel badge, and a vertical サクラ kana accent)
    onto a <canvas> and downloads it as a PNG.

    Everything is drawn from a SEEDED LCG, so the bokeh / petal scatter is identical
    on every render (Math.random is never used) — re-running gives the same frame.

    How to use:
      1. Open this file in a browser.
      2. Click "Download offline-screen.png".
      3. Upload it: twitch.tv/<you>/dashboard -> Settings -> Channel -> Brand
         -> "Video Player Banner" (shown when you're offline).
  -->
  <style>
    :root{
      --plum-deep:#0E0A12; --plum-deepest:#07050A; --plum-mid:#1C1322;
      --mag:#FF5E9C; --mag-deep:#7B2D5E; --pink:#FFD1E6; --pink-soft:#FFE3F0;
      --washi:#F7F2F5; --dim:#C9A6BC;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:system-ui,"Segoe UI",sans-serif;background:var(--plum-deepest);
      color:var(--washi);padding:32px;}
    h1{font-weight:800;font-size:26px;color:var(--pink-soft);letter-spacing:1px;margin:0 0 6px;
      text-shadow:0 0 18px rgba(255,94,156,.35);}
    p.lead{color:var(--dim);margin:0 0 22px;max-width:780px;line-height:1.55;}
    .kicker{font-family:"Courier New",monospace;letter-spacing:4px;font-size:13px;color:var(--mag);
      margin:0 0 14px;text-transform:uppercase;}
    button{font-family:"Courier New",monospace;font-weight:700;font-size:14px;letter-spacing:3px;
      padding:13px 24px;background:var(--mag);color:var(--washi);border:1px solid var(--pink);
      border-radius:12px;cursor:pointer;box-shadow:0 0 30px rgba(255,94,156,.25);}
    button:hover{background:var(--mag-deep);}
    .preview{margin-top:22px;background:var(--plum-mid);padding:14px;border:1px solid #33203a;
      border-radius:14px;display:inline-block;}
    canvas{display:block;width:960px;height:540px;border-radius:6px;}
    code{font-family:"Courier New",monospace;color:var(--pink-soft);background:#161320;
      padding:2px 6px;border-radius:4px;}
  </style>
</head>
<body>
  <p class="kicker">CH 03 · LO-FI · OFFLINE SCREEN</p>
  <h1>OFFLINE SCREEN GENERATOR</h1>
  <p class="lead">
    Renders a 1920&times;1080 offline image in the sakura-static lo-fi-night style — seeded so
    the bokeh and petals are reproducible. Click Download then upload it on Twitch under
    <code>Settings → Channel → Brand → Video Player Banner</code>.
  </p>
  <button id="dl">Download offline-screen.png</button>

  <div class="preview">
    <canvas id="c" width="1920" height="1080"></canvas>
  </div>

  <script>
    "use strict";
    const W = 1920, H = 1080;
    // ---- palette (JS hex constants mirror the shared.css design tokens) ----
    const PLUM_DEEP = '#0E0A12', PLUM_DEEPEST = '#07050A', PLUM_MID = '#1C1322';
    const MAG = '#FF5E9C', MAG_DEEP = '#7B2D5E', PINK = '#FFD1E6', PINK_SOFT = '#FFE3F0';
    const WASHI = '#F7F2F5', DIM = '#C9A6BC';
    const PINKS = [MAG, PINK, MAG_DEEP, '#FF9EC4'];

    const cv = document.getElementById('c');
    const ctx = cv.getContext('2d');

    // ---- seeded pseudo-random (small LCG) — NEVER Math.random, so it's reproducible ----
    function makeRand(seed) {
      let s = seed >>> 0;
      return () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
    }
    const R = (rnd, a, b) => a + rnd() * (b - a);

    // ---- soft bokeh bloom (blurred radial gradient) ----
    function bloom(x, y, r, color, alpha) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, color); g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = alpha; ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // ---- a single soft cherry-blossom petal (matches shared.js drawPetal) ----
    function petal(x, y, s, rot, color, alpha) {
      ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
      ctx.globalAlpha = alpha; ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.moveTo(0, -s);
      ctx.bezierCurveTo(s * 0.6, -s * 0.6, s * 0.5, s * 0.5, 0, s);
      ctx.bezierCurveTo(-s * 0.5, s * 0.5, -s * 0.6, -s * 0.6, 0, -s); ctx.closePath(); ctx.fill();
      // tiny notch shadow at the tip
      ctx.globalAlpha = alpha * 0.5; ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(14,10,18,0.6)';
      ctx.beginPath(); ctx.moveTo(0, s); ctx.lineTo(-s * 0.12, s * 0.6); ctx.lineTo(s * 0.12, s * 0.6); ctx.closePath(); ctx.fill();
      ctx.restore(); ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }

    // ---- rounded rectangle path ----
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    async function draw() {
      await document.fonts.ready;
      const rnd = makeRand(0xA11CE); // fixed seed -> identical scatter every render

      // ---- BACKGROUND: moody plum night gradient (mirrors shared.css #stage) ----
      const grad = ctx.createLinearGradient(0, 0, W * 0.4, H);
      grad.addColorStop(0, PLUM_MID); grad.addColorStop(0.55, PLUM_DEEP); grad.addColorStop(1, PLUM_DEEPEST);
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

      // big magenta glow upper-right + cooler glow lower-left (the stage radial set)
      bloom(W * 0.78, H * 0.22, W * 0.62, 'rgba(123,45,94,0.55)', 1);
      bloom(W * 0.18, H * 0.88, W * 0.50, 'rgba(255,94,156,0.10)', 1);

      // ---- SEEDED BOKEH BLOOMS ----
      for (let i = 0; i < 16; i++) {
        const x = R(rnd, 0, W), y = R(rnd, 0, H), r = R(rnd, 80, 240);
        const c = PINKS[(rnd() * PINKS.length) | 0], a = R(rnd, 0.05, 0.16);
        bloom(x, y, r, c, a);
      }

      // ---- SEEDED SCATTERED PETALS ----
      for (let i = 0; i < 26; i++) {
        const x = R(rnd, 20, W - 20), y = R(rnd, 20, H - 20);
        const s = R(rnd, 12, 30), rot = R(rnd, 0, 6.28);
        const c = rnd() < 0.5 ? MAG : PINK, a = R(rnd, 0.30, 0.7);
        petal(x, y, s, rot, c, a);
      }

      // ---- VHS SCANLINES (soft-light feel via low-alpha dark lines) ----
      ctx.globalAlpha = 0.5; ctx.fillStyle = 'rgba(255,255,255,0.05)';
      for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
      ctx.globalAlpha = 1;

      // ---- VIGNETTE (inner shadow) ----
      const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, W * 0.62);
      vig.addColorStop(0, 'rgba(0,0,0,0)'); vig.addColorStop(1, 'rgba(0,0,0,0.72)');
      ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

      // ---- VERTICAL サクラ KANA ACCENT (right edge) ----
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = '700 120px system-ui, "Segoe UI", sans-serif';
      const kanaX = W - 92, kanaChars = ['サ', 'ク', 'ラ'];
      let ky = H / 2 - 150;
      for (const ch of kanaChars) {
        ctx.fillStyle = ch === 'ク' ? 'rgba(255,94,156,0.16)' : 'rgba(255,209,230,0.07)';
        ctx.fillText(ch, kanaX, ky); ky += 150;
      }
      ctx.restore();

      // ---- CH 03 · LO-FI DEAD-CHANNEL BADGE (top-right) ----
      ctx.save();
      ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      const badgeY = 64;
      // signal bars
      const sigX = W - 360, sigH = [10, 18, 26, 16];
      ctx.fillStyle = 'rgba(255,209,230,0.8)';
      for (let i = 0; i < sigH.length; i++) ctx.fillRect(sigX + i * 8, badgeY + 14 - sigH[i], 5, sigH[i]);
      // mono label
      ctx.font = '600 26px "Courier New", monospace';
      ctx.fillStyle = PINK; ctx.shadowColor = 'rgba(255,94,156,0.5)'; ctx.shadowBlur = 12;
      ctx.fillText('CH 03', sigX + 50, badgeY + 2);
      ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,209,230,0.5)';
      ctx.fillText('·', sigX + 142, badgeY + 2);
      ctx.fillStyle = PINK; ctx.shadowColor = 'rgba(255,94,156,0.5)'; ctx.shadowBlur = 12;
      ctx.fillText('LO-FI', sigX + 166, badgeY + 2);
      ctx.shadowBlur = 0;
      // rec dot (static — it blinks live, but a still image freezes it on)
      ctx.fillStyle = MAG; ctx.shadowColor = MAG; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(sigX + 268, badgeY + 2, 8, 0, 6.2832); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();

      // ---- FROSTED "NOW-PLAYING" CARD (lower-left) ----
      const cardX = 90, cardY = H - 360, cardW = 820, cardH = 250, rad = 26;
      // soft outer magenta glow
      ctx.save();
      ctx.shadowColor = 'rgba(255,94,156,0.20)'; ctx.shadowBlur = 60; ctx.shadowOffsetY = 24;
      ctx.fillStyle = 'rgba(24,15,30,0.62)';
      roundRect(cardX, cardY, cardW, cardH, rad); ctx.fill();
      ctx.restore();
      // hairline border
      ctx.strokeStyle = 'rgba(255,209,230,0.22)'; ctx.lineWidth = 1.5;
      roundRect(cardX, cardY, cardW, cardH, rad); ctx.stroke();

      // album-art tile (torii) on the left of the card
      const artX = cardX + 34, artY = cardY + 50, artS = 150;
      const ag = ctx.createLinearGradient(artX, artY, artX + artS, artY + artS);
      ag.addColorStop(0, MAG); ag.addColorStop(0.7, MAG_DEEP); ag.addColorStop(1, '#2a1430');
      ctx.fillStyle = ag; roundRect(artX, artY, artS, artS, 18); ctx.fill();
      ctx.save(); roundRect(artX, artY, artS, artS, 18); ctx.clip();
      ctx.fillStyle = 'rgba(0,0,0,0.10)';
      for (let yy = artY; yy < artY + artS; yy += 3) ctx.fillRect(artX, yy, artS, 1);
      ctx.restore();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = '74px system-ui, "Segoe UI", sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.82)';
      ctx.shadowColor = 'rgba(255,255,255,0.4)'; ctx.shadowBlur = 16;
      ctx.fillText('⛩', artX + artS / 2, artY + artS / 2 + 2);
      ctx.shadowBlur = 0;

      // card text block (right of the art)
      const tx = artX + artS + 34;
      ctx.textAlign = 'left';
      // kicker: ● STREAM IS (status dot + mono)
      const kY = cardY + 56;
      ctx.fillStyle = MAG; ctx.shadowColor = MAG; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(tx + 7, kY, 7, 0, 6.2832); ctx.fill(); ctx.shadowBlur = 0;
      ctx.font = '600 22px "Courier New", monospace'; ctx.fillStyle = PINK_SOFT;
      ctx.fillText('S T R E A M   I S', tx + 26, kY);

      // big title: OFFLINE (bold sans, soft magenta glow)
      ctx.font = '800 92px system-ui, "Segoe UI", sans-serif';
      ctx.fillStyle = WASHI; ctx.shadowColor = 'rgba(255,94,156,0.45)'; ctx.shadowBlur = 28;
      ctx.fillText('OFFLINE', tx, cardY + 128);
      ctx.shadowBlur = 0;

      // subtitle
      ctx.font = '400 24px system-ui, "Segoe UI", sans-serif';
      ctx.fillStyle = DIM;
      ctx.fillText('be back soon — follow to get notified', tx, cardY + 186);

      // seek bar (the lo-fi music styling; full image freezes it part-filled)
      const sbX = tx, sbY = cardY + 218, sbW = cardW - (tx - cardX) - 40, sbH = 10;
      ctx.fillStyle = 'rgba(255,255,255,0.10)'; roundRect(sbX, sbY, sbW, sbH, 5); ctx.fill();
      const sbFill = sbW * 0.46;
      const fg = ctx.createLinearGradient(sbX, 0, sbX + sbFill, 0);
      fg.addColorStop(0, MAG_DEEP); fg.addColorStop(1, MAG);
      ctx.fillStyle = fg; ctx.shadowColor = 'rgba(255,94,156,0.6)'; ctx.shadowBlur = 14;
      roundRect(sbX, sbY, sbFill, sbH, 5); ctx.fill(); ctx.shadowBlur = 0;
      ctx.fillStyle = WASHI; ctx.shadowColor = 'rgba(255,255,255,0.7)'; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(sbX + sbFill, sbY + sbH / 2, 11, 0, 6.2832); ctx.fill(); ctx.shadowBlur = 0;

      // ---- HANDLE (bottom-right, mono) ----
      ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
      ctx.font = '600 26px "Courier New", monospace';
      ctx.fillStyle = PINK; ctx.shadowColor = 'rgba(255,94,156,0.4)'; ctx.shadowBlur = 12;
      ctx.fillText('@yourhandle', W - 64, H - 60);
      ctx.shadowBlur = 0;
      ctx.font = '400 18px "Courier New", monospace'; ctx.fillStyle = DIM;
      ctx.fillText('twitch.tv/yourname', W - 64, H - 34);
    }

    function download() {
      const a = document.createElement('a');
      a.download = 'offline-screen.png';
      a.href = cv.toDataURL('image/png');
      document.body.appendChild(a); a.click(); a.remove();
    }

    document.getElementById('dl').addEventListener('click', download);
    draw();
  </script>
</body>
</html>
