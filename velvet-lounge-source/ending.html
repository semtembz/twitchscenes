<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Velvet Lounge — Thanks for Watching</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?handle=@you  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* ending: no loading bar — the handle is the hero. The wordmark
       wraps to three lines, so trim the title + margins so the whole
       block (title -> sub -> hero handle -> tag) breathes INSIDE the
       712px frame, then make the brass handle the centered focal point. */
    .ending .title{font-size:104px;margin:10px 0 4px;}
    .ending .sub{margin-top:20px;}
    .ending .handle-hero{margin-top:30px;font-size:50px;letter-spacing:.30em;text-indent:.30em;
      color:var(--brass-lt);text-shadow:0 0 26px rgba(230,201,140,.5);
      animation:framein 1s var(--ease) both .5s;}
    #stage.render .ending .handle-hero{animation:none;opacity:1;transform:none;}
    .ending .handle-tag{margin-top:12px;font-family:"Optima","Gill Sans","Futura",system-ui,sans-serif;
      letter-spacing:.46em;font-size:17px;text-indent:.46em;color:var(--brass);opacity:.85;
      text-transform:uppercase;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>
    <div class="sweep" aria-hidden="true"></div>
    <div class="sheen" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>

    <!-- EDITABLE TEXT SLOTS: each .is-slot below ships a "[ your text here ]"
         placeholder — type your own text in, or delete the whole line to remove it.
         (Or set ?tag=...&tag2=...&kicker=...&sub=...&tag3=... at render time; use =- to remove one.) -->
    <div class="mono mono--tl is-slot" data-slot="tag"><span class="slot-no">13</span><span class="slot-txt">your text here</span></div>
    <div class="mono mono--tr is-slot" data-slot="tag2"><span class="slot-no">14</span><span class="slot-txt">your text here</span></div>

    <main class="frame ending">
      <!-- deco sunburst / fan ornaments in every corner -->
      <span class="fan fan--tl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#B5894E" stroke-width="1.4">
            <path d="M2 2 L2 86 A84 84 0 0 1 86 2 Z" fill="rgba(181,137,78,0.06)" stroke="#E6C98C"/>
            <line x1="2" y1="2" x2="2" y2="86"/>
            <line x1="2" y1="2" x2="20" y2="84"/>
            <line x1="2" y1="2" x2="40" y2="78"/>
            <line x1="2" y1="2" x2="58" y2="66"/>
            <line x1="2" y1="2" x2="72" y2="50"/>
            <line x1="2" y1="2" x2="82" y2="32"/>
            <line x1="2" y1="2" x2="86" y2="2"/>
          </g>
          <circle cx="2" cy="2" r="4" fill="#E6C98C"/>
        </svg>
      </span>
      <span class="fan fan--tr" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#B5894E" stroke-width="1.4">
            <path d="M2 2 L2 86 A84 84 0 0 1 86 2 Z" fill="rgba(181,137,78,0.06)" stroke="#E6C98C"/>
            <line x1="2" y1="2" x2="2" y2="86"/><line x1="2" y1="2" x2="20" y2="84"/>
            <line x1="2" y1="2" x2="40" y2="78"/><line x1="2" y1="2" x2="58" y2="66"/>
            <line x1="2" y1="2" x2="72" y2="50"/><line x1="2" y1="2" x2="82" y2="32"/>
            <line x1="2" y1="2" x2="86" y2="2"/>
          </g>
          <circle cx="2" cy="2" r="4" fill="#E6C98C"/>
        </svg>
      </span>
      <span class="fan fan--bl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#B5894E" stroke-width="1.4">
            <path d="M2 2 L2 86 A84 84 0 0 1 86 2 Z" fill="rgba(181,137,78,0.06)" stroke="#E6C98C"/>
            <line x1="2" y1="2" x2="2" y2="86"/><line x1="2" y1="2" x2="20" y2="84"/>
            <line x1="2" y1="2" x2="40" y2="78"/><line x1="2" y1="2" x2="58" y2="66"/>
            <line x1="2" y1="2" x2="72" y2="50"/><line x1="2" y1="2" x2="82" y2="32"/>
            <line x1="2" y1="2" x2="86" y2="2"/>
          </g>
          <circle cx="2" cy="2" r="4" fill="#E6C98C"/>
        </svg>
      </span>
      <span class="fan fan--br" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#B5894E" stroke-width="1.4">
            <path d="M2 2 L2 86 A84 84 0 0 1 86 2 Z" fill="rgba(181,137,78,0.06)" stroke="#E6C98C"/>
            <line x1="2" y1="2" x2="2" y2="86"/><line x1="2" y1="2" x2="20" y2="84"/>
            <line x1="2" y1="2" x2="40" y2="78"/><line x1="2" y1="2" x2="58" y2="66"/>
            <line x1="2" y1="2" x2="72" y2="50"/><line x1="2" y1="2" x2="82" y2="32"/>
            <line x1="2" y1="2" x2="86" y2="2"/>
          </g>
          <circle cx="2" cy="2" r="4" fill="#E6C98C"/>
        </svg>
      </span>

      <div class="crest" aria-hidden="true">
        <span class="r"></span><span class="dia"></span><span class="r r--r"></span>
      </div>
      <p class="kicker is-slot" id="kicker" data-slot="kicker"><span class="slot-no">15</span><span class="slot-txt">your text here</span></p>
      <h1 class="title">THANKS FOR<span class="accent">WATCHING</span></h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="sub is-slot" data-slot="sub"><span class="slot-no">16</span><span class="slot-txt">your text here</span></p>
      <div class="handle-hero" id="handle">@yourhandle</div>
      <p class="handle-tag is-slot" data-slot="tag3"><span class="slot-no">17</span><span class="slot-txt">your text here</span></p>
    </main>
  </div>
  <script src="shared.js"></script>
</body>
</html>
