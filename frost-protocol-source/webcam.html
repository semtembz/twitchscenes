<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Frost Protocol — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one "Clean Room" webcam frame: a cold-blue
       hairline border with bright L-shaped corner registration ticks, mono
       coordinate labels, a slow horizontal scan sweep, and a frosted
       nameplate carrying #handle. Place your camera BEHIND this overlay;
       the inside of the frame is fully transparent so the cam shows through.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint frost specks drift around the frame */
    canvas.bg{pointer-events:none;opacity:.55;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* cold-blue hairline border; INSIDE stays transparent.
       a faint frosted vignette hugs the edge only (radial transparent center). */
    .frame{position:absolute;inset:0;pointer-events:none;
      border:1px solid var(--hair);
      box-shadow:
        0 0 0 1px rgba(12,16,20,.5),
        0 0 26px rgba(127,180,214,.22),
        0 0 70px rgba(127,180,214,.10),
        inset 0 0 30px rgba(127,180,214,.06);}
    /* inner condensation edge ring (transparent center, frost only at the rim) */
    .frame::before{content:"";position:absolute;inset:7px;border:1px solid var(--hair-soft);
      -webkit-mask:linear-gradient(#000,#000) padding-box,linear-gradient(#000,#000);
      pointer-events:none;}
    /* edge-only frosted glow so the camera image is never washed in the center */
    .frame::after{content:"";position:absolute;inset:1px;pointer-events:none;
      background:
        linear-gradient(180deg, rgba(207,230,242,.06), transparent 14%, transparent 86%, rgba(17,24,31,.10)),
        linear-gradient(90deg, rgba(127,180,214,.05), transparent 10%, transparent 90%, rgba(127,180,214,.05));}

    /* bright L-shaped corner registration ticks (the signature crop-mark motif) */
    .tick{position:absolute;width:34px;height:34px;pointer-events:none;
      animation:tickin 1.1s var(--ease) both .35s;}
    .tick::before,.tick::after{content:"";position:absolute;background:var(--tick);
      box-shadow:0 0 8px rgba(127,180,214,.6);}
    .tick::before{width:34px;height:2px;} .tick::after{width:2px;height:34px;}
    .tick--tl{left:-1px;top:-1px;}    .tick--tl::before{left:0;top:0;}     .tick--tl::after{left:0;top:0;}
    .tick--tr{right:-1px;top:-1px;}   .tick--tr::before{right:0;top:0;}    .tick--tr::after{right:0;top:0;}
    .tick--bl{left:-1px;bottom:-1px;} .tick--bl::before{left:0;bottom:0;}  .tick--bl::after{left:0;bottom:0;}
    .tick--br{right:-1px;bottom:-1px;}.tick--br::before{right:0;bottom:0;} .tick--br::after{right:0;bottom:0;}
    @keyframes tickin{from{opacity:0}to{opacity:1}}

    /* slow horizontal scan line sweeping the cam frame (frozen/hidden in render) */
    .scan{position:absolute;left:1px;right:1px;top:0;height:2px;pointer-events:none;
      background:linear-gradient(90deg,transparent,rgba(207,230,242,.45) 50%,transparent);
      box-shadow:0 0 16px rgba(127,180,214,.45);opacity:.55;
      animation:camscan 6.5s linear infinite;}

    /* mono coordinate labels along the frame edges (measurement motif) */
    .coord{position:absolute;font-family:var(--mono);font-size:12px;letter-spacing:.2em;
      color:rgba(127,180,214,.42);pointer-events:none;
      animation:tickin 1.1s var(--ease) both .5s;}
    .coord--tl{left:44px;top:-22px;} .coord--tr{right:44px;top:-22px;}

    /* small clinical caption + LED, top-left above the frame */
    .cap{position:absolute;left:0;top:-44px;display:flex;align-items:center;gap:11px;
      font-family:var(--mono);letter-spacing:.4em;font-size:15px;color:var(--accent);
      text-indent:.4em;opacity:.85;animation:tickin 1.1s var(--ease) both .45s;}
    .cap .led{width:8px;height:8px;border-radius:50%;background:var(--accent);
      box-shadow:0 0 10px var(--accent);animation:blink 1.8s steps(1,end) infinite;}

    /* node mark — top-right above the frame */
    .crest-tr{position:absolute;right:0;top:-44px;display:flex;align-items:center;gap:13px;
      animation:tickin 1.1s var(--ease) both .45s;}
    .crest-tr .r{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--hair));}
    .crest-tr .pt{width:9px;height:9px;border:1px solid var(--accent);transform:rotate(45deg);
      box-shadow:0 0 10px rgba(127,180,214,.5);}

    /* frosted nameplate pill, clipped to bottom-center of the frame */
    .tag{position:absolute;left:50%;bottom:-19px;transform:translateX(-50%);
      display:flex;align-items:center;gap:13px;white-space:nowrap;
      background:linear-gradient(180deg, rgba(207,230,242,.06), rgba(17,24,31,.10)), var(--glass);
      -webkit-backdrop-filter:blur(12px) saturate(105%);
              backdrop-filter:blur(12px) saturate(105%);
      border:1px solid var(--hair);padding:9px 26px;
      box-shadow:0 14px 34px rgba(0,0,0,.5), inset 0 1px 0 var(--glass-edge),
        0 0 22px rgba(127,180,214,.10);}
    .tag .who{font-family:var(--mono);letter-spacing:.28em;font-size:22px;color:var(--ice);
      text-indent:.28em;text-shadow:0 0 14px rgba(127,180,214,.3);}
    .tag .led{width:8px;height:8px;border-radius:50%;background:var(--accent);
      box-shadow:0 0 10px var(--accent);animation:blink 1.8s steps(1,end) infinite;}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .tick,#stage.render .coord,
    #stage.render .cap,#stage.render .crest-tr{animation:none!important;}
    #stage.render .scan{animation:none;display:none;}
    #stage.render .cap .led,#stage.render .tag .led{animation:none;opacity:1;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .tick{opacity:1;}
    #stage.render .coord{opacity:1;}
    #stage.render .cap{opacity:.85;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>
      <div class="scan" aria-hidden="true"></div>

      <!-- bright L-shaped corner registration ticks -->
      <span class="tick tick--tl" aria-hidden="true"></span>
      <span class="tick tick--tr" aria-hidden="true"></span>
      <span class="tick tick--bl" aria-hidden="true"></span>
      <span class="tick tick--br" aria-hidden="true"></span>

      <!-- mono coordinate labels along the top edge -->
      <span class="coord coord--tl" aria-hidden="true">X:000</span>
      <span class="coord coord--tr" aria-hidden="true">X:1120</span>

      <span class="cap" aria-hidden="true"><span class="led"></span>ON CAMERA</span>
      <span class="crest-tr" aria-hidden="true"><span class="r"></span><span class="pt"></span></span>
      <div class="tag"><span class="led" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
      // keep the top-right coordinate label honest to the chosen width
      const cr = cam.querySelector(".coord--tr");
      if (cr) cr.textContent = "X:" + Math.round(fw);
    }

    /* ---- canvas: faint frost specks drifting around the frame, deterministic ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    // tiny seeded PRNG (mulberry32) — no Math.random in the frame fn
    let _s = 0x5151 >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const specks = Array.from({ length: Math.max(0, num("specks", 64)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.5), vx: R(-3, 3)/60, vy: R(-2, 5)/60,
      ph: R(0, 6.28), tw: R(0.4, 1.3), a: R(0.14, 0.46),
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      ctx.shadowBlur = 0;
      for (const p of specks){
        p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.ph += 0.04 * dt * 60;
        if (p.x < -8) p.x = W + 8; if (p.x > W + 8) p.x = -8;
        if (p.y < -8) p.y = H + 8; if (p.y > H + 8) p.y = -8;
        const tw = 0.55 + Math.sin(p.ph * p.tw) * 0.45;
        ctx.globalAlpha = p.a * tw;
        ctx.fillStyle = "#CFE6F2";
        const sz = Math.max(1, Math.round(p.z * 1.5));
        ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
      }
      ctx.globalAlpha = 1;
    }
    window.__frostDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
