<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Miami Drive — In-Game Overlay</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT in-game HUD strip that composites OVER gameplay. Most of the
       screen stays transparent; it only paints a slim chrome/neon strip with
       @yourhandle bottom-left + a tiny channel tag top-right, plus a FEW faint
       drifting dot-stars (low alpha) so the game shows through.
       Optional URL params:  ?handle=@you   ?render=1 (headless) -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent overlay: no page chrome, no sunset background, no grid floor */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* a couple of faint dot-stars only (no full perspective grid) */
    canvas.bg{opacity:.7;pointer-events:none;}

    /* ---- slim chrome/neon "now driving" strip, lower-left ---- */
    .slot{position:absolute;left:60px;bottom:56px;height:66px;
      display:flex;align-items:center;gap:22px;padding:0 34px 0 26px;
      border-radius:10px;
      background:linear-gradient(120deg, rgba(30,10,74,.78), rgba(11,0,32,.60));
      border:1px solid rgba(0,224,208,.55);
      box-shadow:0 0 0 4px rgba(11,0,32,.40),
        0 0 30px rgba(0,224,208,.22),
        inset 0 0 26px rgba(255,46,151,.10);
      animation:slotin .7s var(--ease) both .15s;}
    /* inner hot-pink hairline */
    .slot::before{content:"";position:absolute;inset:5px;border-radius:7px;
      border:1px solid rgba(255,46,151,.30);pointer-events:none;}
    /* a chrome sheen sweeps along the strip */
    .slot::after{content:"";position:absolute;top:0;bottom:0;width:90px;left:-90px;pointer-events:none;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      mix-blend-mode:screen;animation:slotsweep 4.6s linear infinite;}
    @keyframes slotin{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}
    @keyframes slotsweep{0%{left:-90px}100%{left:100%}}

    /* LIVE pill with a diamond blip */
    .slot .live{display:flex;align-items:center;gap:11px;
      font-family:"Courier New",monospace;letter-spacing:5px;font-size:21px;color:var(--teal);
      text-shadow:0 0 12px rgba(0,224,208,.55);}
    .slot .live .dot{width:12px;height:12px;background:var(--pink);box-shadow:0 0 14px var(--pink);
      transform:rotate(45deg);animation:blip 1.4s steps(1,end) infinite;}
    /* neon divider */
    .slot .div{width:2px;height:32px;
      background:linear-gradient(180deg,transparent,rgba(0,224,208,.6),transparent);}

    /* the handle — chrome/italic with a sunset gradient fill + neon glow */
    .slot .who{font-family:"Eurostile","Bahnschrift","Arial Narrow",system-ui,sans-serif;
      font-weight:800;font-style:italic;letter-spacing:1px;font-size:32px;line-height:1;
      text-transform:none;
      background:linear-gradient(180deg,#FFFFFF 0%, #DCEBFF 30%, var(--sun-top) 56%, var(--orange) 82%, var(--pink) 100%);
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;color:transparent;
      filter:drop-shadow(0 1px 0 rgba(255,255,255,.45))
             drop-shadow(0 0 16px rgba(255,122,0,.35))
             drop-shadow(0 0 26px rgba(255,46,151,.28));}

    /* ---- tiny mono HUD tag, top-right ---- */
    .tag-tr{position:absolute;top:46px;right:60px;
      font-family:"Courier New",monospace;letter-spacing:5px;font-size:20px;color:var(--teal);
      text-shadow:0 0 12px rgba(0,224,208,.55);opacity:.88;}
    .tag-tr .sq{display:inline-block;width:11px;height:11px;background:var(--pink);
      box-shadow:0 0 12px var(--pink);transform:rotate(45deg);margin-right:10px;vertical-align:middle;}

    /* faint VHS scanline wash over the strip area only (very low alpha) */
    .scan{position:absolute;inset:0;pointer-events:none;opacity:.18;mix-blend-mode:overlay;
      background:repeating-linear-gradient(0deg, rgba(255,255,255,.06) 0 1px, transparent 1px 3px);}

    /* render mode: freeze the entrance + ambient loops to a final, deterministic state */
    #stage.render .slot{animation:none!important;transform:none!important;}
    #stage.render .slot::after{animation:none;display:none;}
    #stage.render .slot .live .dot{animation:none;}
    #stage.render .scan{display:none;}
  </style>
</head>
<body>
  <div id="stage">
    <!-- a few faint drifting dot-stars -->
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- top-right channel tag = editable label (swap it or clear it) -->
    <div class="tag-tr" aria-hidden="true"><span class="sq"></span>LIVE</div>

    <!-- the slim handle strip -->
    <div class="slot">
      <span class="live"><span class="dot"></span>LIVE</span>
      <span class="div"></span>
      <span class="who" id="handle">@yourhandle</span>
    </div>

    <!-- faint scanline wash -->
    <div class="scan" aria-hidden="true"></div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (defensive) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    /* ---- canvas field: a FEW faint twinkling dot-stars (kept low so the game shows) ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = 1920, H = 1080;
    const R = (a, b) => a + Math.random() * (b - a);
    let twinkle = 0;
    const stars = ctx ? Array.from({ length: Math.max(0, num("stars", 46)) }, () => ({
      x: (Math.random() * W) | 0, y: (Math.random() * H) | 0,
      r: R(0.6, 1.8), ph: R(0, 6.28), sp: R(0.6, 1.8),
      c: Math.random() < 0.5 ? "#00E0D0" : (Math.random() < 0.5 ? "#FF2E97" : "#FDF06A"),
    })) : [];

    function draw(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      twinkle += dt;
      for (const s of stars){
        const a = 0.18 + 0.30 * (0.5 + 0.5 * Math.sin(twinkle * s.sp + s.ph));
        ctx.globalAlpha = a; ctx.fillStyle = s.c;
        const r = Math.max(1, Math.round(s.r));
        ctx.fillRect(s.x, s.y, r, r);
      }
      ctx.globalAlpha = 1;
    }
    window.__miamiDraw = draw; // rAF-independent verification hook
    draw(0);

    /* ---- render mode: deterministic frame stepping (1 frame = 1/30s) ---- */
    if (render) {
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; twinkle = 0; draw(0); };
      window.__renderAdvance = function(){ draw(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        draw(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
