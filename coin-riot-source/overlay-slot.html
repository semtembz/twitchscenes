<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Coin Riot — In-Game Overlay</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT in-game HUD in the "Insert Coin" arcade language: a slim
       coin-op nameplate lower-left carrying a spinning $-coin token + @handle +
       a blinking "1UP" credit tag, framed by a row of chasing marquee bulbs;
       a small "INSERT COIN" mono tag top-right. Almost everything stays
       transparent so the gameplay shows through; only a faint drift of neon
       coin-sparkle specks lives near the plate. Decoration is pointer-events:none.
       Optional URL params: ?handle=@you  ?tag=1UP  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT overlay: no sign background, no full-bleed vignette */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* a sparse drift of neon specks, very low alpha, hugging the HUD */
    canvas.bg{pointer-events:none;opacity:.55;}

    /* ---- slim coin-op nameplate, lower-left ---- */
    .slot{position:absolute;left:56px;bottom:60px;height:84px;
      display:flex;align-items:center;gap:20px;padding:0 30px 0 18px;
      background:
        radial-gradient(120% 100% at 0% 0%, rgba(125,0,255,.18), transparent 64%),
        linear-gradient(180deg, #14122a, #0c0a1c);
      border:3px solid #2c2746;border-radius:14px;
      box-shadow:0 22px 60px rgba(0,0,0,.6), inset 0 0 0 2px rgba(255,255,255,.04),
        inset 0 0 50px rgba(125,0,255,.12);
      animation:slotin .9s var(--ease) both .15s;}
    /* inner neon track */
    .slot::before{content:"";position:absolute;inset:8px;border:2px solid rgba(22,224,255,.22);
      border-radius:8px;pointer-events:none;box-shadow:inset 0 0 18px rgba(22,224,255,.10);}
    /* a row of chasing marquee bulbs hugging the top edge of the plate */
    .slot .bulbrow{position:absolute;left:20px;right:20px;top:5px;display:flex;
      justify-content:space-between;align-items:center;pointer-events:none;}
    .slot .blb{width:9px;height:9px;border-radius:50%;flex:none;
      background:radial-gradient(circle at 38% 34%, #4a4060, var(--bulb-off) 72%);
      animation:s-chase 1.1s steps(1,end) infinite;}
    .slot .blb.c-cyan{animation-name:s-chaseC;}
    .slot .blb.c-red{animation-name:s-chaseR;}
    @keyframes s-chase{0%,100%{background:radial-gradient(circle at 38% 34%, #fff, var(--gold) 60%, #9a7e00 100%);box-shadow:0 0 6px var(--gold);}20%{background:radial-gradient(circle at 38% 34%, #4a4060, var(--bulb-off) 72%);box-shadow:none;}}
    @keyframes s-chaseC{0%,100%{background:radial-gradient(circle at 38% 34%, #fff, var(--cyan) 60%, #0a6b80 100%);box-shadow:0 0 6px var(--cyan);}20%{background:radial-gradient(circle at 38% 34%, #4a4060, var(--bulb-off) 72%);box-shadow:none;}}
    @keyframes s-chaseR{0%,100%{background:radial-gradient(circle at 38% 34%, #fff, var(--red) 60%, #7a1414 100%);box-shadow:0 0 6px var(--red);}20%{background:radial-gradient(circle at 38% 34%, #4a4060, var(--bulb-off) 72%);box-shadow:none;}}
    @keyframes slotin{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}

    /* the spinning $-coin token */
    .slot .tok{width:50px;height:50px;border-radius:50%;flex:none;
      display:flex;align-items:center;justify-content:center;
      background:radial-gradient(circle at 38% 32%, #FFF3B0, var(--gold) 52%, #b88f00 100%);
      box-shadow:0 0 18px rgba(255,212,0,.6),inset 0 -5px 8px rgba(120,90,0,.6),inset 0 4px 7px rgba(255,255,255,.5);
      font-family:var(--marquee);font-weight:900;font-size:28px;color:#7a5a00;
      text-shadow:0 1px 0 rgba(255,255,255,.4);animation:s-tokspin 5s linear infinite;}
    .slot .tok::after{content:"$";}
    @keyframes s-tokspin{0%{transform:scaleX(1)}50%{transform:scaleX(.18)}100%{transform:scaleX(1)}}

    /* "1UP" credit tag — blinking gold dot + chunky mono caps */
    .slot .tag{display:flex;align-items:center;gap:10px;
      font-family:var(--mono);letter-spacing:.3em;font-size:16px;font-weight:700;
      text-transform:uppercase;color:var(--red);text-indent:.3em;text-shadow:0 0 10px rgba(255,59,59,.5);}
    .slot .tag .credit{width:9px;height:9px;border-radius:50%;background:var(--gold);
      box-shadow:0 0 12px var(--gold);animation:s-blink 1.05s steps(1,end) infinite;}
    @keyframes s-blink{0%,55%{opacity:1}56%,100%{opacity:.18}}

    /* thin neon divider */
    .slot .div{width:2px;height:40px;border-radius:2px;
      background:linear-gradient(180deg,transparent,var(--cyan),transparent);
      box-shadow:0 0 8px rgba(22,224,255,.5);}

    /* handle — chunky mono, cyan */
    .slot .who{font-family:var(--mono);font-weight:700;letter-spacing:.22em;font-size:24px;color:var(--cyan);
      text-indent:.22em;text-shadow:0 0 14px rgba(22,224,255,.4);white-space:nowrap;}

    /* small mono tag, top-right */
    .tag-tr{position:absolute;top:46px;right:60px;display:flex;align-items:center;gap:12px;
      font-family:var(--mono);font-weight:700;letter-spacing:.34em;font-size:16px;color:var(--gold);
      text-indent:.34em;text-shadow:0 0 12px rgba(255,212,0,.45);
      animation:slotin 1s var(--ease) both .3s;}
    .tag-tr .pt{width:9px;height:9px;border-radius:50%;background:var(--gold);
      box-shadow:0 0 10px var(--gold);}

    /* render mode: freeze entrances; coin spin keeps looping (ambience) */
    #stage.render .slot,#stage.render .tag-tr{animation:none!important;opacity:1!important;transform:none!important;}
    #stage.render .slot .tag .credit{animation:none;opacity:1;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- small INSERT COIN tag, top-right -->
    <div class="tag-tr" aria-hidden="true"><span class="pt"></span>INSERT COIN</div>

    <!-- slim coin-op nameplate, lower-left -->
    <div class="slot">
      <span class="bulbrow" aria-hidden="true"></span>
      <span class="tok" aria-hidden="true"></span>
      <span class="tag"><span class="credit" aria-hidden="true"></span>1UP</span>
      <span class="div" aria-hidden="true"></span>
      <span class="who" id="handle">@yourhandle</span>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + tag (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;
    const tag = params.get("tag"), tagEl = document.querySelector(".slot .tag");
    if (tag && tagEl) tagEl.lastChild.textContent = tag;

    /* ---- fill the nameplate marquee bulb row ---- */
    const row = document.querySelector(".slot .bulbrow");
    if (row) {
      const PER = 16, cols = ["", "c-cyan", "c-red"];
      for (let i = 0; i < PER; i++) {
        const b = document.createElement("span");
        b.className = "blb" + (cols[i % 3] ? " " + cols[i % 3] : "");
        b.style.animationDelay = (-(i / PER) * 1.1).toFixed(3) + "s";
        row.appendChild(b);
      }
    }

    /* ---- canvas: a few subtle drifting neon coin specks (low alpha), deterministic ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    const COINS = ["#FFD400", "#FF3B3B", "#16E0FF", "#7D00FF", "#FFFFFF"];
    // tiny seeded PRNG (mulberry32) — no Math.random in the frame fn
    let _s = 0x7A1d >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const specks = Array.from({ length: Math.max(0, num("specks", 54)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.6), vx: R(-4, 2)/60, vy: R(-4, 3)/60,
      ph: R(0, 6.28), tw: R(0.5, 1.5), a: R(0.16, 0.5),
      c: COINS[(srnd()*COINS.length)|0],
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      for (const p of specks){
        p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.ph += 0.05 * dt * 60;
        if (p.x < -8) p.x = W + 8; if (p.x > W + 8) p.x = -8;
        if (p.y < -8) p.y = H + 8; if (p.y > H + 8) p.y = -8;
        const tw = 0.5 + Math.sin(p.ph * p.tw) * 0.5;
        ctx.globalAlpha = p.a * tw;
        ctx.fillStyle = p.c; ctx.shadowColor = p.c; ctx.shadowBlur = 5 * p.z;
        const sz = Math.max(1, Math.round(p.z * 2));
        ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    window.__coinDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
