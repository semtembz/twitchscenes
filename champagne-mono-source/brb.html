<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Champagne Mono — Be Right Back</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?seconds=60  ?handle=@you  ?render=1
       Editable slots: ?kicker=...  ?sub=...  ?tag=...  ?tag2=...  (=- removes one) -->
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>
    <div class="sweep" aria-hidden="true"></div>

    <!-- EDITABLE TEXT SLOTS: each .is-slot below ships a "[ your text here ]"
         placeholder — type your own text in, or delete the whole line to remove it.
         (Or set ?tag=...&tag2=...&kicker=...&sub=... at render time; use =- to remove one.) -->
    <div class="mono mono--tl is-slot" data-slot="tag"><span class="slot-no">5</span><span class="slot-txt">your text here</span></div>
    <div class="mono mono--tr is-slot" data-slot="tag2"><span class="slot-no">6</span><span class="slot-txt">your text here</span></div>

    <main class="plate">
      <!-- delicate gold filigree flourishes in every corner of the plate -->
      <span class="corner corner--tl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#C9A86A" stroke-width="1.3" stroke-linecap="round">
            <path d="M6 6 L48 6"/><path d="M6 6 L6 48"/>
            <path d="M6 6 C40 8 60 28 62 62"/>
            <path d="M14 14 C36 16 50 30 52 52" stroke="#9C8458" stroke-width="1"/>
          </g>
          <circle cx="6" cy="6" r="3.2" fill="#9C8458"/>
          <circle cx="62" cy="62" r="2.4" fill="#C9A86A"/>
        </svg>
      </span>
      <span class="corner corner--tr" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#C9A86A" stroke-width="1.3" stroke-linecap="round">
            <path d="M6 6 L48 6"/><path d="M6 6 L6 48"/>
            <path d="M6 6 C40 8 60 28 62 62"/>
            <path d="M14 14 C36 16 50 30 52 52" stroke="#9C8458" stroke-width="1"/>
          </g>
          <circle cx="6" cy="6" r="3.2" fill="#9C8458"/>
          <circle cx="62" cy="62" r="2.4" fill="#C9A86A"/>
        </svg>
      </span>
      <span class="corner corner--bl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#C9A86A" stroke-width="1.3" stroke-linecap="round">
            <path d="M6 6 L48 6"/><path d="M6 6 L6 48"/>
            <path d="M6 6 C40 8 60 28 62 62"/>
            <path d="M14 14 C36 16 50 30 52 52" stroke="#9C8458" stroke-width="1"/>
          </g>
          <circle cx="6" cy="6" r="3.2" fill="#9C8458"/>
          <circle cx="62" cy="62" r="2.4" fill="#C9A86A"/>
        </svg>
      </span>
      <span class="corner corner--br" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#C9A86A" stroke-width="1.3" stroke-linecap="round">
            <path d="M6 6 L48 6"/><path d="M6 6 L6 48"/>
            <path d="M6 6 C40 8 60 28 62 62"/>
            <path d="M14 14 C36 16 50 30 52 52" stroke="#9C8458" stroke-width="1"/>
          </g>
          <circle cx="6" cy="6" r="3.2" fill="#9C8458"/>
          <circle cx="62" cy="62" r="2.4" fill="#C9A86A"/>
        </svg>
      </span>

      <div class="crest" aria-hidden="true">
        <span class="r"></span><span class="dia"></span><span class="r r--r"></span>
      </div>
      <p class="kicker is-slot" id="kicker" data-slot="kicker"><span class="slot-no">7</span><span class="slot-txt">your text here</span></p>
      <h1 class="title">BE RIGHT<span class="accent">BACK</span><span class="shine" aria-hidden="true"></span></h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="sub is-slot" data-slot="sub"><span class="slot-no">8</span><span class="slot-txt">your text here</span></p>
      <div class="bar" aria-hidden="true"><div class="fill" id="fill"></div></div>
    </main>

    <div class="handle" id="handle">@yourhandle</div>
  </div>
  <script src="shared.js"></script>
</body>
</html>
