<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Bit Quest — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one "16-bit JRPG window" webcam frame: the iconic
       blue JRPG menu border (white DOUBLE border + hard pixel drop shadow +
       inner blue highlight edge) wrapping a fully-transparent cutout, gold
       corner gem rivets, a clean pixel "ON CAMERA" caption, and a JRPG
       nameplate carrying #handle. Place your camera BEHIND this overlay; the
       inside of the frame is fully transparent so the cam shows through.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint pixel sparkles drift around the frame */
    canvas.bg{pointer-events:none;opacity:.6;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* the iconic JRPG window border; INSIDE stays fully transparent.
       white DOUBLE border + blue gap + dark keyline + hard pixel drop shadow
       + an inner blue highlight edge, exactly like the centerpiece window. */
    .frame{position:absolute;inset:0;background:transparent;pointer-events:none;
      border:5px solid #FFFFFF;border-radius:18px;
      box-shadow:
        0 0 0 5px var(--win-bot),                  /* blue gap between white lines */
        0 0 0 10px #FFFFFF,                          /* outer white line */
        0 0 0 14px var(--ink),                       /* dark keyline */
        16px 20px 0 rgba(15,8,32,.5),                /* hard pixel drop shadow */
        inset 0 0 0 4px var(--win-edge),             /* inner blue highlight edge */
        inset 0 0 0 5px rgba(15,8,32,.35);}          /* thin inner ink seam */

    /* gold corner gem rivets on every frame corner (pixel-style, like .gem) */
    .gem{position:absolute;width:18px;height:18px;background:var(--gold);transform:rotate(45deg);
      box-shadow:0 0 0 3px var(--ink), 0 0 14px rgba(255,203,71,.7);pointer-events:none;
      animation:gemin 1.1s var(--ease) both .35s;}
    .gem--tl{left:-6px;top:-6px;}   .gem--tr{right:-6px;top:-6px;}
    .gem--bl{left:-6px;bottom:-6px;}.gem--br{right:-6px;bottom:-6px;}
    @keyframes gemin{from{opacity:0;transform:rotate(45deg) scale(.4)}to{opacity:1;transform:rotate(45deg) scale(1)}}

    /* small pixel caption + blinking LED, top-left above the frame (clean, functional) */
    .cap{position:absolute;left:2px;top:-46px;display:flex;align-items:center;gap:12px;
      font-family:var(--pixel);font-weight:700;letter-spacing:.22em;font-size:20px;
      text-transform:uppercase;color:var(--teal);text-indent:.22em;
      text-shadow:2px 2px 0 var(--ink);
      animation:gemin 1.1s var(--ease) both .45s;}
    .cap .led{width:11px;height:11px;background:var(--pink);
      box-shadow:0 0 0 2px var(--ink), 0 0 10px rgba(255,143,177,.9);
      animation:ledblink 1.4s var(--step) infinite;}
    @keyframes ledblink{0%,55%{opacity:1}56%,100%{opacity:.25}}

    /* corner mark — gold cursor + pixel rule, top-right above the frame */
    .crest-tr{position:absolute;right:2px;top:-44px;display:flex;align-items:center;gap:13px;
      animation:gemin 1.1s var(--ease) both .45s;}
    .crest-tr .r{width:70px;height:4px;background:rgba(255,255,255,.85);box-shadow:1px 1px 0 var(--ink);}
    .crest-tr .pt{color:var(--gold);font-size:22px;line-height:1;text-shadow:2px 2px 0 var(--ink);
      transform:translateY(-1px);}

    /* JRPG nameplate plate, clipped to bottom-center of the frame */
    .tag{position:absolute;left:50%;bottom:-26px;transform:translateX(-50%);
      display:flex;align-items:center;gap:14px;white-space:nowrap;padding:9px 26px;
      background:linear-gradient(180deg, var(--win-top) 0%, #2B43C4 55%, var(--win-bot) 100%);
      border:4px solid #FFFFFF;border-radius:12px;
      box-shadow:
        0 0 0 4px var(--ink),
        8px 10px 0 rgba(15,8,32,.5),
        inset 0 0 0 3px var(--win-edge);}
    .tag .who{font-family:var(--pixel);font-weight:700;letter-spacing:.12em;font-size:24px;
      color:var(--text);text-shadow:2px 2px 0 var(--ink);}
    .tag .led{width:9px;height:9px;background:var(--gold);
      box-shadow:0 0 0 2px var(--ink), 0 0 8px rgba(255,203,71,.8);
      animation:ledblink 1.4s var(--step) infinite;}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .gem,#stage.render .cap,#stage.render .crest-tr{animation:none!important;}
    #stage.render .cap .led,#stage.render .tag .led{animation:none;opacity:1;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .gem{opacity:1;transform:rotate(45deg) scale(1);}
    #stage.render .cap{opacity:1;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>

      <!-- gold corner gem rivets -->
      <span class="gem gem--tl" aria-hidden="true"></span>
      <span class="gem gem--tr" aria-hidden="true"></span>
      <span class="gem gem--bl" aria-hidden="true"></span>
      <span class="gem gem--br" aria-hidden="true"></span>

      <span class="cap" aria-hidden="true"><span class="led"></span>ON CAMERA</span>
      <span class="crest-tr" aria-hidden="true"><span class="r"></span><span class="pt">&#9654;</span></span>
      <div class="tag"><span class="led" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint pixel sparkles drifting around the frame, deterministic ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    // tiny seeded PRNG (mulberry32) — no Math.random in the frame fn
    let _s = 0x1f2e >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const PAL = ["#FFCB47", "#FFFFFF", "#3AD6C5"];
    const sparks = Array.from({ length: Math.max(0, num("sparks", 38)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.5, 1.4), vx: R(-2, 2)/60, vy: R(-4, 2)/60,
      ph: R(0, 6.28), tw: R(0.4, 1.2), a: R(0.14, 0.46),
      c: PAL[Math.floor(srnd()*PAL.length)],
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, W, H);
      for (const p of sparks){
        p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.ph += 0.04 * dt * 60;
        if (p.x < -8) p.x = W + 8; if (p.x > W + 8) p.x = -8;
        if (p.y < -8) p.y = H + 8; if (p.y > H + 8) p.y = -8;
        const tw = 0.5 + Math.sin(p.ph * p.tw) * 0.5;
        ctx.globalAlpha = p.a * tw;
        ctx.fillStyle = p.c;
        const sz = Math.max(2, Math.round(p.z * 3));
        ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
      }
      ctx.globalAlpha = 1;
    }
    window.__bitDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
