<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Mecha Hangar — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one Mecha-Hangar ~16:9 webcam port: a heavy riveted
       STEEL frame with chamfered corners, four BOLT plates, a glowing amber
       inner SEAM ring, and hazard-stripe corner ticks. Place your camera BEHIND
       this overlay; the inside of the port is fully transparent so the cam shows
       through it. A stencil nameplate (#handle) clips to the bottom edge.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint welding sparks rise around the port */
    canvas.bg{pointer-events:none;opacity:.6;}

    /* the cam port wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease-mech) both .12s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* heavy riveted STEEL frame; INSIDE stays transparent.
       chamfered industrial corners match the bay-door language. */
    .frame{position:absolute;inset:0;background:transparent;pointer-events:none;
      border:3px solid var(--steel-hi);
      box-shadow:
        inset 0 0 0 3px var(--steel-lo),
        inset 0 0 0 4px rgba(11,16,20,.85),
        0 0 0 2px rgba(11,16,20,.7),
        0 0 30px rgba(0,0,0,.55),
        0 24px 60px rgba(0,0,0,.5);
      clip-path:polygon(28px 0,calc(100% - 28px) 0,100% 28px,100% calc(100% - 28px),
        calc(100% - 28px) 100%,28px 100%,0 calc(100% - 28px),0 28px);}
    /* glowing amber inner SEAM ring just inside the steel (transparent core) */
    .frame::before{content:"";position:absolute;inset:7px;border:1px solid var(--line-amber);
      box-shadow:inset 0 0 22px rgba(245,166,35,.12),0 0 14px rgba(245,166,35,.18);
      clip-path:inherit;pointer-events:none;}
    /* brushed-steel sheen band across the top rail only */
    .frame::after{content:"";position:absolute;left:7px;right:7px;top:7px;height:10px;pointer-events:none;
      background:linear-gradient(180deg,rgba(94,114,127,.35),transparent);
      clip-path:polygon(22px 0,calc(100% - 22px) 0,100% 100%,0 100%);}

    /* four corner BOLT plates pinned to the steel frame */
    .bolt{position:absolute;width:42px;height:42px;z-index:3;pointer-events:none;
      background:linear-gradient(135deg,var(--steel-hi),var(--steel) 55%,var(--steel-lo));
      border:2px solid rgba(11,16,20,.8);border-radius:5px;
      box-shadow:0 2px 6px rgba(0,0,0,.6),inset 0 1px 0 rgba(94,114,127,.5);}
    .bolt::before{content:"";position:absolute;inset:0;margin:auto;width:11px;height:11px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%,var(--rivet-hi),var(--rivet) 60%,#1c252b);
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.5),0 0 4px rgba(0,0,0,.6);}
    .bolt--tl{left:-8px;top:-8px;}.bolt--tr{right:-8px;top:-8px;}
    .bolt--bl{left:-8px;bottom:-8px;}.bolt--br{right:-8px;bottom:-8px;}

    /* hazard-stripe corner TICKS clipped just outside the steel chamfers */
    .tick{position:absolute;width:64px;height:8px;z-index:2;pointer-events:none;opacity:.9;
      background:repeating-linear-gradient(45deg,var(--amber) 0 8px,#14171A 8px 16px);
      box-shadow:inset 0 0 0 1px rgba(11,16,20,.9);
      animation:tickin 1s var(--ease) both .35s;}
    .tick--t{left:50%;top:-16px;transform:translateX(-50%);}
    .tick--b{left:50%;bottom:-16px;transform:translateX(-50%);}
    @keyframes tickin{from{opacity:0}to{opacity:.9}}

    /* "ON CAMERA" stencil caption, top-left above the port */
    .cap{position:absolute;left:6px;top:-44px;display:flex;align-items:center;gap:12px;
      font-family:"Bahnschrift","DIN Condensed","Stencil Std","Impact",system-ui,sans-serif;
      letter-spacing:.3em;font-size:18px;font-weight:700;text-transform:uppercase;
      color:rgba(245,166,35,.82);text-indent:.3em;
      text-shadow:0 1px 0 #0B1014,0 0 12px rgba(245,166,35,.3);}
    .cap .dot{width:9px;height:9px;border-radius:50%;background:var(--red);
      box-shadow:0 0 10px var(--red-glow);animation:reddot 1.2s steps(1) infinite;}

    /* steel hairline + bolt mark, top-right above the port */
    .crest-tr{position:absolute;right:4px;top:-42px;display:flex;align-items:center;gap:12px;}
    .crest-tr .r{width:64px;height:2px;background:linear-gradient(90deg,transparent,var(--rivet));}
    .crest-tr .dia{width:11px;height:11px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%,var(--rivet-hi),var(--rivet) 60%,#1c252b);
      box-shadow:0 0 6px rgba(0,0,0,.6);}

    /* handle NAMEPLATE — riveted steel pill clipped to the bottom edge */
    .plate{position:absolute;left:50%;bottom:-22px;transform:translateX(-50%);
      display:flex;align-items:center;gap:14px;white-space:nowrap;z-index:4;
      background:linear-gradient(180deg,rgba(30,42,51,.9),rgba(16,22,27,.86));
      border:2px solid rgba(11,16,20,.85);padding:9px 26px;
      box-shadow:
        inset 0 0 0 2px var(--steel-hi),
        0 12px 30px rgba(0,0,0,.55),0 0 22px rgba(245,166,35,.08);
      clip-path:polygon(14px 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,14px 100%,0 50%);}
    .plate .beam{width:10px;height:10px;border-radius:50%;background:var(--amber);
      box-shadow:0 0 12px var(--amber-glow);animation:beam 2.4s ease-in-out infinite;}
    .plate .who{
      font-family:"Consolas","SFMono-Regular",ui-monospace,monospace;
      letter-spacing:.16em;font-size:23px;font-weight:700;color:var(--text);
      text-shadow:0 0 16px rgba(245,166,35,.25);}
    @keyframes beam{0%,100%{opacity:1}50%{opacity:.45}}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,
    #stage.render .tick{animation:none!important;}
    #stage.render .plate .beam,
    #stage.render .cap .dot{animation:none;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .tick{opacity:.9;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>

      <!-- corner bolt plates -->
      <span class="bolt bolt--tl" aria-hidden="true"></span>
      <span class="bolt bolt--tr" aria-hidden="true"></span>
      <span class="bolt bolt--bl" aria-hidden="true"></span>
      <span class="bolt bolt--br" aria-hidden="true"></span>

      <!-- hazard-stripe corner ticks (top + bottom centre) -->
      <span class="tick tick--t" aria-hidden="true"></span>
      <span class="tick tick--b" aria-hidden="true"></span>

      <span class="cap" aria-hidden="true"><span class="dot"></span>ON CAMERA</span>
      <span class="crest-tr" aria-hidden="true"><span class="r"></span><span class="dia"></span></span>
      <div class="plate"><span class="beam" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint rising welding SPARKS around the port ----
       deterministic seeded RNG (mulberry32) so render mode is reproducible. */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;

    let _s = 0x4D3C >>> 0;
    function srnd(){
      _s |= 0; _s = (_s + 0x6D2B79F5) | 0;
      let t = Math.imul(_s ^ (_s >>> 15), 1 | _s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    const R = (a, b) => a + srnd() * (b - a);

    function spawnSpark(){
      // sparks rise from the bay floor, clustered mid-frame, fanning outward
      return {
        x: W * R(0.30, 0.70) + R(-120, 120),
        y: H + R(0, 26),
        vx: R(-1.8, 1.8),
        vy: R(-10, -6),
        g: R(0.09, 0.18),
        life: 0, max: R(48, 100),
        heat: R(0.7, 1),
        sz: R(0.9, 2.1),
      };
    }

    let sparks = [];
    function buildField(){
      _s = 0x4D3C >>> 0;
      sparks = [];
      if (!ctx) return;
      const NS = Math.max(0, num("sparks", 26));
      sparks = Array.from({ length: NS }, () => {
        const s = spawnSpark();
        s.life = R(0, s.max);
        s.y = H - (s.life / s.max) * R(100, 560);
        return s;
      });
    }
    buildField();

    function drawBg(dt){
      if (!ctx) return;
      const f = dt * 60;
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = "lighter";
      for (const s of sparks){
        s.vy += s.g * f;
        s.x += s.vx * f; s.y += s.vy * f;
        s.life += f;
        if (s.life >= s.max || s.y > H + 40){ Object.assign(s, spawnSpark()); continue; }
        const k = s.life / s.max;
        const fade = k < 0.12 ? k / 0.12 : (1 - (k - 0.12) / 0.88);
        const a = Math.max(0, fade) * 0.9;
        const heat = s.heat * (1 - k * 0.6);
        const cr = 255, cg = Math.round(120 + heat * 130), cb = Math.round(30 + heat * 90);
        const x = Math.round(s.x), y = Math.round(s.y);
        ctx.globalAlpha = a * 0.5;
        const g = ctx.createRadialGradient(x, y, 0, x, y, s.sz * 5);
        g.addColorStop(0, `rgba(${cr},${cg},${cb},0.9)`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, s.sz * 5, 0, 6.2832); ctx.fill();
        ctx.globalAlpha = a;
        ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
        ctx.fillRect(x, y, Math.max(1, Math.round(s.sz)), Math.max(1, Math.round(s.sz)));
        ctx.globalAlpha = a * 0.5;
        ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.8)`;
        ctx.lineWidth = Math.max(1, s.sz * 0.8);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(Math.round(s.x - s.vx * 1.6), Math.round(s.y - s.vy * 1.6));
        ctx.stroke();
      }
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
    }
    window.__mechaDraw = () => drawBg(1/30); // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; buildField(); drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
