<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aurora Noir — Twitch Panels (generator)</title>
  <!--
    Twitch profile panels are PNG image files (recommended 320 x 100 px) you
    upload to your channel's "About" page. This file renders each of the 12
    panels onto a <canvas> at EXACTLY 320 x 100 in the AURORA NOIR
    "aurora behind black glass" language:
        - a frosted black-glass card (deep blue-black gradient) with a thin
          iridescent mint->violet hairline edge that catches the aurora
        - a faint mint->violet aurora curtain glazing behind the glass
        - a thin iridescent line icon (heart, calendar, list, ...)
        - a wide-tracked light-sans label in white with a soft aurora glow
          + a thin iridescent underline w/ a centre dot
    Each panel has its own Download button + there is a "Download all".

    How to use:
      1. Open this file in a browser.
      2. Click "Download all" (or the individual Download buttons).
      3. Upload each .png to Twitch:
         twitch.tv/<you>/about -> Edit Panels -> + -> upload image.
  -->
  <style>
    /* ---- Aurora Noir palette (mirrors shared.css design tokens) ---- */
    :root{
      --black:#08090D; --black2:#14161D; --black3:#05060A;
      --mint:#5BE0C0; --violet:#8A7BFF; --white:#EAF0F2; --dim:#9AA7B4;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:"Segoe UI",system-ui,"Helvetica Neue",Helvetica,Arial,sans-serif;
      color:var(--white);
      padding:36px 32px 60px;
      background:
        radial-gradient(900px 520px at 16% -10%, rgba(91,224,192,0.10), transparent 60%),
        radial-gradient(760px 520px at 100% 110%, rgba(138,123,255,0.12), transparent 60%),
        linear-gradient(170deg, #0B0D13, var(--black3));
      min-height:100vh;
    }
    .kicker{
      letter-spacing:.42em; font-size:12px; text-indent:.42em;
      color:var(--mint); text-transform:uppercase; margin:0 0 8px;
      display:flex; align-items:center; gap:11px;
      text-shadow:0 0 14px rgba(91,224,192,.4);
    }
    .dot{width:9px;height:9px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%, var(--white), var(--mint) 60%, var(--violet));
      box-shadow:0 0 12px rgba(91,224,192,.6);}
    h1{font-weight:200;font-size:32px;letter-spacing:.04em;margin:0 0 6px;
      color:var(--white);text-shadow:0 0 30px rgba(91,224,192,.22),0 0 60px rgba(138,123,255,.16);}
    p.lead{color:var(--dim);margin:0 0 24px;max-width:720px;line-height:1.6;
      font-style:italic;font-weight:300;font-size:16px;}
    code{font-family:"Consolas","Courier New",monospace;color:var(--mint);
      background:rgba(91,224,192,0.08);padding:2px 7px;border-radius:3px;font-style:normal;}
    .toolbar{margin:0 0 30px;display:flex;gap:14px;flex-wrap:wrap;}
    button{
      font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.18em;text-transform:uppercase;
      padding:12px 24px;cursor:pointer;color:var(--black3);
      background:linear-gradient(180deg,var(--mint),#3fbfa3);
      border:1px solid rgba(91,224,192,.6);border-radius:3px;
      box-shadow:0 6px 28px rgba(91,224,192,.25);
    }
    button:hover{filter:brightness(1.08);}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(348px,1fr));gap:26px;}
    .card{background:rgba(20,22,29,0.5);padding:16px;border-radius:6px;
      border:1px solid rgba(91,224,192,0.18);}
    /* checkerboard so transparent corners are visible */
    .frame{border-radius:4px;overflow:hidden;display:block;
      background-color:#0c0e15;
      background-image:
        linear-gradient(45deg, #161a2420 25%, transparent 25%),
        linear-gradient(-45deg, #161a2420 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #161a2420 75%),
        linear-gradient(-45deg, transparent 75%, #161a2420 75%);
      background-size:16px 16px;
      background-position:0 0, 0 8px, 8px -8px, -8px 0;}
    canvas{display:block;width:320px;height:100px;}
    .card-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:12px;}
    .card-row .name{letter-spacing:.14em;color:var(--dim);text-transform:uppercase;}
    .card-row a{letter-spacing:.08em;color:var(--mint);text-decoration:none;
      border:1px solid rgba(91,224,192,0.3);border-radius:3px;padding:5px 12px;}
    .card-row a:hover{background:rgba(91,224,192,0.14);}
  </style>
</head>
<body>
  <p class="kicker"><span class="dot"></span>AURORA NOIR · PANELS</p>
  <h1>Aurora Noir — Twitch Panels</h1>
  <p class="lead">
    Twelve <strong>320&times;100</strong> profile panels in the aurora-behind-black-glass style:
    a frosted black-glass card with a thin iridescent mint&rarr;violet edge, a soft aurora glaze,
    and a fine line icon. Download all then upload at
    <code>twitch.tv/&lt;you&gt;/about → Edit Panels</code>.
  </p>
  <div class="toolbar">
    <button id="dlAll">Download all</button>
  </div>
  <div class="grid" id="grid"></div>

  <script>
  (function () {
    "use strict";

    // ---- Tokens (hex constants mirror the shared.css design tokens) ----
    var W = 320, H = 100;
    var BLACK = '#08090D', BLACK2 = '#14161D', BLACK3 = '#05060A';
    var MINT = '#5BE0C0', VIOLET = '#8A7BFF', WHITE = '#EAF0F2', DIM = '#9AA7B4';

    // ---- Panel inventory (per the design brief) ----
    var PANELS = [
      { id: 'about',     title: 'ABOUT',      icon: 'heart' },
      { id: 'schedule',  title: 'SCHEDULE',   icon: 'calendar' },
      { id: 'rules',     title: 'RULES',      icon: 'list' },
      { id: 'donations', title: 'DONATIONS',  icon: 'coin' },
      { id: 'discord',   title: 'DISCORD',    icon: 'discord' },
      { id: 'twitter',   title: 'TWITTER',    icon: 'twitter' },
      { id: 'youtube',   title: 'YOUTUBE',    icon: 'play' },
      { id: 'instagram', title: 'INSTAGRAM',  icon: 'camera' },
      { id: 'merch',     title: 'MERCH',      icon: 'tag' },
      { id: 'sponsors',  title: 'SPONSORS',   icon: 'ribbon' },
      { id: 'subscribe', title: 'SUBSCRIBE',  icon: 'star' },
      { id: 'community', title: 'COMMUNITY',  icon: 'community' }
    ];

    // ---- helpers ----------------------------------------------------------
    function roundRectPath(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    // a soft iridescent aurora curtain (vertical mint/violet ribbon glaze)
    function curtain(ctx, cx, topY, botY, halfW, rgb, alpha) {
      var x0 = cx - halfW, x1 = cx + halfW;
      var g = ctx.createLinearGradient(x0, 0, x1, 0);
      g.addColorStop(0.0, 'rgba(' + rgb + ',0)');
      g.addColorStop(0.5, 'rgba(' + rgb + ',' + alpha + ')');
      g.addColorStop(1.0, 'rgba(' + rgb + ',0)');
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = g;
      ctx.fillRect(Math.round(x0), Math.round(topY), Math.round(halfW * 2), Math.round(botY - topY));
      ctx.restore();
    }

    // ---- panel renderer ---------------------------------------------------
    function drawPanel(ctx, p) {
      ctx.clearRect(0, 0, W, H);

      var pad = 3, rad = 14;
      var x = pad, y = pad, w = W - pad * 2, h = H - pad * 2;

      // frosted black-glass card body, clipped to a rounded rect
      ctx.save();
      roundRectPath(ctx, x, y, w, h, rad);
      ctx.clip();

      // deep blue-black gradient
      var bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, 'rgba(20,22,29,0.92)');
      bg.addColorStop(1, 'rgba(8,9,13,0.95)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // aurora curtains glazing behind the glass (additive, soft)
      curtain(ctx, 250, -10, H + 10, 70, '91,224,192', 0.16);
      curtain(ctx, 296, -10, H + 10, 56, '138,123,255', 0.16);
      curtain(ctx, 64, -10, H + 10, 60, '91,224,192', 0.10);

      // a soft inner top-light pool where the aurora hits the glass
      var pool = ctx.createLinearGradient(0, 0, 0, H * 0.7);
      pool.addColorStop(0, 'rgba(91,224,192,0.07)');
      pool.addColorStop(1, 'rgba(91,224,192,0)');
      ctx.fillStyle = pool;
      ctx.fillRect(0, 0, W, H);

      // subtle vignette so the title reads
      var vg = ctx.createRadialGradient(W / 2, H / 2, 36, W / 2, H / 2, 200);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(3,4,8,0.55)');
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();

      // thin iridescent line icon
      drawIcon(ctx, p.icon, 30, H / 2, 30);

      // iridescent vertical divider between icon and text (mint->violet)
      ctx.save();
      var dvX = 56;
      var dg = ctx.createLinearGradient(0, y + 18, 0, y + h - 18);
      dg.addColorStop(0, 'rgba(91,224,192,0)');
      dg.addColorStop(0.5, 'rgba(120,180,220,0.7)');
      dg.addColorStop(1, 'rgba(138,123,255,0)');
      ctx.strokeStyle = dg; ctx.lineWidth = 1;
      ctx.shadowColor = 'rgba(91,224,192,0.4)'; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.moveTo(dvX, y + 18); ctx.lineTo(dvX, y + h - 18); ctx.stroke();
      ctx.restore();

      // kicker above the title — spaced light caps, mint
      ctx.save();
      ctx.font = '400 9px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = MINT;
      ctx.globalAlpha = 0.85;
      ctx.shadowColor = 'rgba(91,224,192,0.4)'; ctx.shadowBlur = 6;
      drawSpaced(ctx, 'AURORA NOIR', 72, 32, 2.6);
      ctx.restore();

      // label — light-weight white wide-tracked, soft aurora glow (shrink-to-fit)
      ctx.save();
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      var label = p.title;
      var size = 27;
      var maxW = W - 72 - 22;
      var trk = 1.4;                                  // letter tracking
      function fits(sz) {
        ctx.font = '300 ' + sz + 'px "Segoe UI",system-ui,sans-serif';
        return spacedWidth(ctx, label, trk) <= maxW;
      }
      while (!fits(size) && size > 13) size -= 1;
      ctx.font = '300 ' + size + 'px "Segoe UI",system-ui,sans-serif';
      ctx.fillStyle = WHITE;
      ctx.shadowColor = 'rgba(91,224,192,0.40)'; ctx.shadowBlur = 16;
      drawSpaced(ctx, label, 72, 66, trk);
      ctx.shadowBlur = 0;
      ctx.restore();

      // delicate iridescent underline rule with a centre dot
      ctx.save();
      var barX = 72, barY = 78, barW = W - 72 - 22;
      var grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      grad.addColorStop(0, 'rgba(91,224,192,0)');
      grad.addColorStop(0.24, MINT);
      grad.addColorStop(0.5, WHITE);
      grad.addColorStop(0.76, VIOLET);
      grad.addColorStop(1, 'rgba(138,123,255,0)');
      ctx.strokeStyle = grad; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(barX, barY); ctx.lineTo(barX + barW, barY); ctx.stroke();
      // centre dot
      ctx.fillStyle = WHITE;
      ctx.shadowColor = 'rgba(91,224,192,0.7)'; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(barX + barW / 2, barY, 2.1, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // the iridescent glass edge: drawn ON TOP (mint->violet gradient stroke)
      ctx.save();
      var eg = ctx.createLinearGradient(x, y, x + w, y + h);
      eg.addColorStop(0, 'rgba(91,224,192,0.55)');
      eg.addColorStop(0.4, 'rgba(234,240,242,0.16)');
      eg.addColorStop(0.6, 'rgba(234,240,242,0.10)');
      eg.addColorStop(1, 'rgba(138,123,255,0.55)');
      ctx.strokeStyle = eg; ctx.lineWidth = 1.2;
      roundRectPath(ctx, x + 0.6, y + 0.6, w - 1.2, h - 1.2, rad);
      ctx.stroke();
      ctx.restore();
    }

    // draw text with simple manual letter spacing (px between chars)
    function drawSpaced(ctx, str, x, y, sp) {
      var cx = x;
      for (var i = 0; i < str.length; i++) {
        ctx.fillText(str[i], cx, y);
        cx += ctx.measureText(str[i]).width + sp;
      }
    }
    function spacedWidth(ctx, str, sp) {
      var total = 0;
      for (var i = 0; i < str.length; i++) total += ctx.measureText(str[i]).width + sp;
      return total - sp;
    }

    // ---- line icons (thin iridescent strokes, soft aurora glow) -----------
    function drawIcon(ctx, kind, cx, cy, s) {
      ctx.save();
      ctx.translate(cx, cy);
      var h = s / 2;
      ctx.strokeStyle = MINT;
      ctx.fillStyle = MINT;
      ctx.lineWidth = 1.8;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.shadowColor = 'rgba(91,224,192,0.6)';
      ctx.shadowBlur = 8;

      switch (kind) {
        case 'heart': {
          ctx.beginPath();
          ctx.moveTo(0, h * 0.85);
          ctx.bezierCurveTo(-h * 1.25, h * 0.05, -h * 0.65, -h * 0.95, 0, -h * 0.25);
          ctx.bezierCurveTo(h * 0.65, -h * 0.95, h * 1.25, h * 0.05, 0, h * 0.85);
          ctx.closePath(); ctx.stroke();
          break;
        }
        case 'calendar': {
          ctx.strokeRect(-h, -h * 0.7, s, s * 0.85);
          ctx.beginPath();
          ctx.moveTo(-h, -h * 0.35); ctx.lineTo(h, -h * 0.35);
          ctx.moveTo(-h * 0.55, -h);  ctx.lineTo(-h * 0.55, -h * 0.5);
          ctx.moveTo(h * 0.55, -h);   ctx.lineTo(h * 0.55, -h * 0.5);
          ctx.stroke();
          for (var r = 0; r < 2; r++)
            for (var c = 0; c < 3; c++) {
              ctx.beginPath();
              ctx.arc(-h * 0.5 + c * h * 0.5, -h * 0.02 + r * h * 0.45, 1.3, 0, Math.PI * 2);
              ctx.fill();
            }
          break;
        }
        case 'list': {
          for (var i = 0; i < 3; i++) {
            var ly = -h * 0.6 + i * h * 0.6;
            ctx.beginPath();                                  // iridescent dot bullet
            ctx.arc(-h * 0.78, ly, 1.7, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-h * 0.42, ly); ctx.lineTo(h * 0.9, ly); ctx.stroke();
          }
          break;
        }
        case 'coin': {
          ctx.beginPath(); ctx.arc(0, 0, h * 0.95, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, 0, h * 0.72, 0, Math.PI * 2); ctx.stroke();
          ctx.font = '300 ' + Math.round(s * 0.56) + 'px "Segoe UI",system-ui,sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('$', 0, 1);
          break;
        }
        case 'discord': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.85, -h * 0.45);
          ctx.quadraticCurveTo(0, -h * 0.85, h * 0.85, -h * 0.45);
          ctx.lineTo(h * 0.7, h * 0.55);
          ctx.quadraticCurveTo(h * 0.45, h * 0.8, h * 0.2, h * 0.55);
          ctx.lineTo(-h * 0.2, h * 0.55);
          ctx.quadraticCurveTo(-h * 0.45, h * 0.8, -h * 0.7, h * 0.55);
          ctx.closePath(); ctx.stroke();
          ctx.beginPath(); ctx.arc(-h * 0.32, 0, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(h * 0.32, 0, 2, 0, Math.PI * 2); ctx.fill();
          break;
        }
        case 'twitter': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.9, h * 0.25);
          ctx.quadraticCurveTo(-h * 0.1, h * 0.55, h * 0.55, -h * 0.05);
          ctx.quadraticCurveTo(h * 0.95, -h * 0.35, h * 0.85, -h * 0.7);
          ctx.quadraticCurveTo(h * 0.4, -h * 0.35, -h * 0.1, -h * 0.2);
          ctx.quadraticCurveTo(-h * 0.6, -h * 0.05, -h * 0.9, h * 0.25);
          ctx.closePath(); ctx.stroke();
          break;
        }
        case 'play': {
          roundRectLocal(ctx, -h, -h * 0.7, s, s * 0.85, 5); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.22, -h * 0.32);
          ctx.lineTo(-h * 0.22, h * 0.28);
          ctx.lineTo(h * 0.42, -h * 0.02);
          ctx.closePath(); ctx.fill();
          break;
        }
        case 'camera': {
          roundRectLocal(ctx, -h, -h * 0.55, s, s * 0.95, 6); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, h * 0.1, h * 0.4, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(h * 0.55, -h * 0.25, 1.6, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath();
          ctx.moveTo(-h * 0.35, -h * 0.55);
          ctx.lineTo(-h * 0.15, -h * 0.85);
          ctx.lineTo(h * 0.15, -h * 0.85);
          ctx.lineTo(h * 0.35, -h * 0.55);
          ctx.stroke();
          break;
        }
        case 'tag': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.1, -h * 0.85);
          ctx.lineTo(h * 0.85, -h * 0.85);
          ctx.lineTo(h * 0.85, h * 0.1);
          ctx.lineTo(-h * 0.15, h * 0.85);
          ctx.lineTo(-h * 0.85, h * 0.15);
          ctx.lineTo(-h * 0.85, -h * 0.6);
          ctx.closePath(); ctx.stroke();
          ctx.beginPath(); ctx.arc(-h * 0.5, -h * 0.5, 2, 0, Math.PI * 2); ctx.stroke();
          break;
        }
        case 'ribbon': {
          ctx.beginPath(); ctx.arc(0, -h * 0.25, h * 0.55, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.3, h * 0.2); ctx.lineTo(-h * 0.5, h * 0.85);
          ctx.lineTo(-h * 0.1, h * 0.55);
          ctx.moveTo(h * 0.3, h * 0.2);  ctx.lineTo(h * 0.5, h * 0.85);
          ctx.lineTo(h * 0.1, h * 0.55);
          ctx.stroke();
          ctx.beginPath(); ctx.arc(0, -h * 0.25, 2, 0, Math.PI * 2); ctx.fill();
          break;
        }
        case 'star': {
          ctx.beginPath();
          for (var sp = 0; sp < 10; sp++) {
            var rad = (sp % 2 === 0) ? h * 0.95 : h * 0.42;
            var ang = -Math.PI / 2 + sp * Math.PI / 5;
            var X = Math.cos(ang) * rad, Y = Math.sin(ang) * rad;
            if (sp === 0) ctx.moveTo(X, Y); else ctx.lineTo(X, Y);
          }
          ctx.closePath(); ctx.stroke();
          break;
        }
        case 'community': {
          // three connected figures (a small constellation of people)
          var pts = [[-h * 0.62, h * 0.15], [h * 0.62, h * 0.15], [0, -h * 0.5]];
          for (var k = 0; k < pts.length; k++) {
            ctx.beginPath(); ctx.arc(pts[k][0], pts[k][1] - h * 0.12, h * 0.22, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath();                                  // shoulders
            ctx.arc(pts[k][0], pts[k][1] + h * 0.62, h * 0.42, Math.PI * 1.15, Math.PI * 1.85);
            ctx.stroke();
          }
          break;
        }
        default:
          ctx.beginPath(); ctx.arc(0, 0, h * 0.7, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();
    }

    // local rounded-rect path helper for icons
    function roundRectLocal(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    // ---- build the grid ---------------------------------------------------
    var grid = document.getElementById('grid');
    var made = [];

    function build() {
      for (var i = 0; i < PANELS.length; i++) {
        var p = PANELS[i];
        var card = document.createElement('div'); card.className = 'card';
        var frame = document.createElement('div'); frame.className = 'frame';
        var cv = document.createElement('canvas'); cv.width = W; cv.height = H;
        var ctx = cv.getContext('2d');
        drawPanel(ctx, p);
        frame.appendChild(cv);

        var row = document.createElement('div'); row.className = 'card-row';
        var nm = document.createElement('span'); nm.className = 'name'; nm.textContent = p.title;
        var dl = document.createElement('a'); dl.textContent = 'Download'; dl.href = '#';
        (function (canvas, id) {
          dl.addEventListener('click', function (e) { e.preventDefault(); save(canvas, id); });
        })(cv, p.id);
        row.appendChild(nm); row.appendChild(dl);

        card.appendChild(frame); card.appendChild(row);
        grid.appendChild(card);
        made.push({ canvas: cv, id: p.id });
      }
    }

    function save(canvas, id) {
      var a = document.createElement('a');
      a.download = 'panel-' + id + '.png';
      a.href = canvas.toDataURL('image/png');
      document.body.appendChild(a); a.click(); a.remove();
    }

    document.getElementById('dlAll').addEventListener('click', function () {
      var i = 0;
      (function next() {
        if (i >= made.length) return;
        save(made[i].canvas, made[i].id);
        i++;
        setTimeout(next, 200);
      })();
    });

    // headless export hook: [{name, dataURL}] for every panel
    window.__exportAssets = function () {
      return made.map(function (m) { return { name: m.id, dataURL: m.canvas.toDataURL('image/png') }; });
    };

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(build);
    } else {
      build();
    }
  })();
  </script>
</body>
</html>
