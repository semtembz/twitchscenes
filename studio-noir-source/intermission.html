<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Studio Noir — Intermission</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?seconds=60  ?handle=@you  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div id="stage">
    <!-- generative scene field: out-of-focus studio-light bokeh + key-light dust -->
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- volumetric key-light beam, film grain, vignette, broadcast frame -->
    <div class="beam" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>
    <div class="frameline frameline--t" aria-hidden="true"></div>
    <div class="frameline frameline--b" aria-hidden="true"></div>

    <!-- ON AIR tally, top-left, pulsing amber dot.
         label = editable slot (type your text, or delete the line) -->
    <div class="tally">
      <span class="dot" aria-hidden="true"></span>
      <span class="label is-slot" id="status" data-slot="tag2"><span class="slot-no">15</span><span class="slot-txt">your text here</span></span>
    </div>

    <!-- station mark, top-right on the steel frame = editable slot -->
    <div class="station">
      <span class="bar" aria-hidden="true"></span><span class="is-slot" data-slot="tag"><span class="slot-no">16</span><span class="slot-txt">your text here</span></span>
    </div>

    <!-- THE LOWER-THIRD BAR SYSTEM (signature composition) -->
    <section class="lower">
      <!-- EDITABLE TEXT SLOTS: each .is-slot ships a "[ your text here ]"
           placeholder — type your own text in, or delete the whole line to remove it.
           (Or set ?kicker=...&sub=...&tag=...&tag2=...&tag3=...&ticker=... at render
           time; use =- to remove one.) -->
      <p class="kicker is-slot" id="kicker" data-slot="kicker"><span class="slot-no">17</span><span class="slot-txt">your text here</span></p>

      <!-- HEADLINE = the standard scene message, never the theme name -->
      <div class="titlewrap">
        <h1 class="title">
          <span class="line"><span>SHORT</span></span>
          <span class="line"><span class="accent">BREAK</span></span>
        </h1>
      </div>

      <!-- subtitle -->
      <p class="sub is-slot" data-slot="sub"><span class="slot-no">18</span><span class="slot-txt">your text here</span></p>
    </section>

    <!-- sleek amber broadcast loading strap (no numbers) -->
    <div class="bar" aria-hidden="true"><div class="fill" id="fill"></div></div>

    <!-- handle, lower-right -->
    <div class="handle" id="handle">@yourhandle</div>

    <!-- clean ticker / strap near the bottom — tag cell + scrolling line are
         editable slots (both scroll copies fill identically for the loop) -->
    <div class="ticker">
      <span class="tag is-slot" data-slot="tag3"><span class="slot-no">19</span><span class="slot-txt">your text here</span></span>
      <div class="track">
        <div class="scroll">
          <span class="is-slot" data-slot="ticker"><span class="slot-no">20</span><span class="slot-txt">your text here</span></span>
          <span class="is-slot" data-slot="ticker"><span class="slot-no">21</span><span class="slot-txt">your text here</span></span>
        </div>
      </div>
    </div>
  </div>
  <script src="shared.js"></script>
</body>
</html>
