<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Transition — Coin Riot Marquee-Bulb Iris Wipe</title>
  <!--
    COIN RIOT stinger ("Insert Coin"). A coin-op MARQUEE-BULB IRIS slams shut:
    a ring of round marquee bulbs (gold / cyan / red, chasing clockwise) spirals
    inward from the screen edge, dragging a dark cabinet panel behind it until the
    whole frame is covered. At full cover a spinning gilt $-COIN medallion stamps
    dead-centre with a bulb-burst flash + coin-sparkle confetti. Then the iris
    snaps back open (bulbs spiral out) and the screen clears. A faint CRT scanline
    sheen rides the covered panel so it reads as a lit arcade cabinet, not flat.
    Transparent before & after, deterministic (seeded RNG), sine-driven, ~1100ms.
    Carnival / coin-op — NOT a velvet curtain, NOT 8-bit, NOT synthwave.

    Plays ONCE on load, then clears.
      ?loop=1   loop it (for previewing)
      ?ms=1100  total duration in ms (default 1100)

    To use as an OBS Stinger you need a VIDEO file (OBS can't use a web page as a
    stinger). Use transition-export.html to record a transparent .webm, then add it
    as a Stinger transition with the Transition Point at ~50% (the full-cover stamp).
  -->
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="c" width="1920" height="1080"></canvas>
  <script>
  (() => {
    "use strict";
    const W = 1920, H = 1080, CX = W / 2, CY = H / 2;
    const cv = document.getElementById('c'), ctx = cv.getContext('2d');
    const params = new URLSearchParams(location.search);
    const DUR = Number(params.get('ms')) || 1100;
    const LOOP = params.get('loop') === '1';

    /* ---- palette (coin riot) ---- */
    const BLACK = '#0A0A14', BLACK2 = '#06060D', PANEL = '#11111F', PANEL2 = '#0B0B17';
    const RED = '#FF3B3B', GOLD = '#FFD400', CYAN = '#16E0FF', PURPLE = '#7D00FF', WHITE = '#FFFFFF';
    const BULB_COLS = [GOLD, CYAN, RED];           // carnival chase order
    const SPARK_COLS = [GOLD, RED, CYAN, PURPLE, WHITE];

    const clamp01 = (x) => x < 0 ? 0 : x > 1 ? 1 : x;
    const smooth = (x) => { x = clamp01(x); return x * x * (3 - 2 * x); };       // smoothstep
    const lerp = (a, b, t) => a + (b - a) * t;
    const TAU = Math.PI * 2;
    const DIAG = Math.hypot(CX, CY);               // edge-to-centre reach for a full iris

    /* ---- deterministic seeded RNG (mulberry32). No Math.random in frame fns ---- */
    let seed = 0xC01ECF >>> 0;
    const rnd = () => { seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
    const R = (a, b) => a + rnd() * (b - a);

    /* ---- pre-baked coin-sparkle confetti that bursts at the full-cover stamp.
       Positions are a deterministic function of t, so the export matches the
       live page frame-for-frame. Each chip flies out from centre + tumbles. ---- */
    const N_SPARK = 52;
    const sparks = Array.from({ length: N_SPARK }, () => {
      const ang = R(0, TAU), spd = R(260, 760);
      return {
        ang, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - R(40, 160),
        g: R(420, 900), s: R(5, 13), rot: R(0, TAU), vr: R(-8, 8),
        lead: R(0, 0.10), span: R(0.42, 0.62),
        c: SPARK_COLS[(rnd() * SPARK_COLS.length) | 0], coin: rnd() < 0.5,
      };
    });

    /* ---- the bulb RING that forms the iris edge. A fixed set of bulbs sit on a
       circle; the circle's radius shrinks (iris closes) then grows (iris opens)
       with cover. Each bulb chases colour by index+time so the ring reads as a
       live, running marquee — the coin-op signature. ---- */
    const N_BULB = 64;
    const bulbBase = Array.from({ length: N_BULB }, (_, i) => ({
      a0: (i / N_BULB) * TAU,
      col: i % 3,                                  // static colour band, cycled by chase
      sz: 9,
    }));

    /* draw one round marquee bulb (lit) at x,y */
    function bulb(x, y, r, col, glow) {
      x = Math.round(x); y = Math.round(y);
      const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.55, col);
      g.addColorStop(1, 'rgba(0,0,0,0.15)');
      ctx.save();
      ctx.shadowColor = col; ctx.shadowBlur = glow;
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
      ctx.restore();
    }

    /* ---- the dark cabinet panel that the iris drags in. We paint the whole frame
       in the coin-op panel gradient, then PUNCH a clear circular hole in the middle
       whose radius is the iris opening. As cover -> 1 the hole shrinks to nothing
       (full cover); as cover -> 0 it reopens to the corners. ---- */
    function drawPanel(cover) {
      if (cover <= 0.001) return;
      // hole radius: full open (DIAG) at cover 0, closed (0) at cover 1
      const hole = DIAG * (1 - smooth(cover));
      ctx.save();
      // fill the surround with the cabinet panel
      ctx.beginPath();
      ctx.rect(0, 0, W, H);
      if (hole > 0.5) { ctx.arc(CX, CY, hole, 0, TAU, true); }   // counter-clockwise -> hole
      const pg = ctx.createRadialGradient(CX, CY, hole * 0.6, CX, CY, DIAG);
      pg.addColorStop(0, PANEL);
      pg.addColorStop(0.55, BLACK);
      pg.addColorStop(1, BLACK2);
      ctx.fillStyle = pg;
      ctx.fill('evenodd');
      ctx.restore();

      // purple/red/cyan brand wash bloom behind the panel (toward centre)
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.rect(0, 0, W, H);
      if (hole > 0.5) { ctx.arc(CX, CY, hole, 0, TAU, true); }
      const wash = ctx.createRadialGradient(CX, CY, hole, CX, CY, hole + 520);
      wash.addColorStop(0, 'rgba(125,0,255,' + (0.22 * cover).toFixed(3) + ')');
      wash.addColorStop(0.5, 'rgba(255,59,59,' + (0.10 * cover).toFixed(3) + ')');
      wash.addColorStop(1, 'rgba(22,224,255,0)');
      ctx.fillStyle = wash;
      ctx.fill('evenodd');
      ctx.restore();

      // CRT scanline sheen over the covered panel so it reads as a lit cabinet
      if (cover > 0.06) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, W, H);
        if (hole > 0.5) { ctx.arc(CX, CY, hole, 0, TAU, true); }
        ctx.clip('evenodd');
        ctx.globalAlpha = 0.10 * cover;
        ctx.fillStyle = WHITE;
        for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 1);
        ctx.restore();
      }
    }

    /* ---- the chasing bulb iris-edge: bulbs ride the rim of the hole. Radius
       tracks the panel hole so the ring sits exactly on the iris edge, spiralling
       in as it closes and out as it opens. Colour chases by time. ---- */
    function drawRing(t, cover) {
      const hole = DIAG * (1 - smooth(cover));
      const ringR = hole;                          // bulbs ride the rim
      if (ringR > DIAG * 0.985) return;            // off-screen at full open — skip
      // a whisper of spin: clockwise as it closes, gives the iris a wind-up feel
      const spin = t * 2.4;
      const chasePhase = t * 9.0;                  // colour chase speed
      // gentle size pulse so the ring breathes
      for (let i = 0; i < N_BULB; i++) {
        const b = bulbBase[i];
        const ang = b.a0 + spin;
        const x = CX + Math.cos(ang) * ringR;
        const y = CY + Math.sin(ang) * ringR;
        // chase: which colour is "hot" sweeps around the ring
        const phase = (i / N_BULB) * TAU - chasePhase;
        const lit = 0.55 + 0.45 * Math.sin(phase);
        const col = BULB_COLS[(i + (chasePhase | 0)) % 3];
        const r = b.sz * (0.7 + lit * 0.5);
        const glow = 8 + lit * 22;
        ctx.globalAlpha = 0.45 + lit * 0.55;
        bulb(x, y, r, col, glow);
      }
      ctx.globalAlpha = 1;

      // bright neon rim arc just inside the bulbs (the marquee track)
      if (ringR > 6 && ringR < DIAG) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const rimA = 0.18 + 0.22 * Math.sin(cover * Math.PI);
        ctx.strokeStyle = CYAN;
        ctx.globalAlpha = rimA;
        ctx.lineWidth = 3;
        ctx.shadowColor = CYAN; ctx.shadowBlur = 18;
        ctx.beginPath(); ctx.arc(CX, CY, Math.max(0, ringR - 16), 0, TAU); ctx.stroke();
        ctx.restore();
      }
    }

    /* ---- the gilt $-COIN medallion that stamps dead-centre at full cover. It
       spins (scaleX squash like the real coin tokens) and flares strongest at
       t=0.5, fading as the iris reopens. ---- */
    function drawCoin(t, cover) {
      const stamp = Math.pow(cover, 1.6);          // sharply peaks at full cover
      if (stamp <= 0.02) return;
      const baseR = lerp(40, 150, smooth(cover));
      // squash on X to read as a spinning coin
      const squash = Math.abs(Math.cos(t * Math.PI * 3)) * 0.8 + 0.2;
      ctx.save();
      ctx.translate(CX, CY);

      // soft gold core glow under the coin
      const cr = baseR * 2.4;
      const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, cr);
      cg.addColorStop(0, 'rgba(255,243,176,' + (0.5 * stamp).toFixed(3) + ')');
      cg.addColorStop(0.4, 'rgba(255,212,0,' + (0.26 * stamp).toFixed(3) + ')');
      cg.addColorStop(1, 'rgba(255,59,59,0)');
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = cg;
      ctx.beginPath(); ctx.arc(0, 0, cr, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

      ctx.scale(squash, 1);

      // the coin disc
      const disc = ctx.createRadialGradient(-baseR * 0.3, -baseR * 0.3, baseR * 0.1, 0, 0, baseR);
      disc.addColorStop(0, '#FFF3B0');
      disc.addColorStop(0.5, GOLD);
      disc.addColorStop(1, '#B88F00');
      ctx.globalAlpha = stamp;
      ctx.shadowColor = GOLD; ctx.shadowBlur = 40 * stamp;
      ctx.fillStyle = disc;
      ctx.beginPath(); ctx.arc(0, 0, baseR, 0, TAU); ctx.fill();

      // inner ring + rim
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 0.85 * stamp;
      ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = baseR * 0.10;
      ctx.beginPath(); ctx.arc(0, 0, baseR * 0.78, 0, TAU); ctx.stroke();
      ctx.strokeStyle = '#FFF3B0'; ctx.lineWidth = baseR * 0.05;
      ctx.beginPath(); ctx.arc(0, 0, baseR * 0.93, 0, TAU); ctx.stroke();
      ctx.restore();

      // the $ glyph stamped on the coin (drawn unsquashed-vertically but follows squash on X)
      ctx.save();
      ctx.translate(CX, CY);
      ctx.scale(squash, 1);
      ctx.globalAlpha = stamp;
      ctx.fillStyle = '#7a5a00';
      ctx.font = '900 ' + Math.round(baseR * 1.5) + 'px "Arial Black","Arial Bold",Impact,system-ui,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, baseR * 0.04);
      ctx.fillStyle = '#FFF3B0'; ctx.globalAlpha = stamp * 0.35;
      ctx.fillText('$', -baseR * 0.03, baseR * 0.01);
      ctx.restore();
    }

    /* ---- coin-sparkle confetti burst, fired off the centre at the stamp ---- */
    function drawSparks(t) {
      // sparks live in the back half of the timeline (after the stamp)
      for (const p of sparks) {
        const lt = clamp01((t - 0.42 - p.lead) / p.span);
        if (lt <= 0 || lt >= 1) continue;
        const tt = lt * 0.6;                       // seconds-ish for ballistic
        const px = CX + p.vx * tt;
        const py = CY + p.vy * tt + 0.5 * p.g * tt * tt;
        const rot = p.rot + p.vr * tt;
        const a = Math.sin(lt * Math.PI);          // fade in/out
        if (a <= 0.02) continue;
        ctx.save();
        ctx.translate(Math.round(px), Math.round(py));
        ctx.rotate(rot);
        ctx.globalAlpha = a;
        ctx.shadowColor = p.c; ctx.shadowBlur = 12;
        ctx.fillStyle = p.c;
        if (p.coin) {
          const sx = Math.abs(Math.cos(rot * 1.4)) * 0.85 + 0.15;
          ctx.beginPath(); ctx.ellipse(0, 0, p.s * sx, p.s, 0, 0, TAU); ctx.fill();
          ctx.globalAlpha = a * 0.5; ctx.fillStyle = WHITE;
          ctx.beginPath(); ctx.ellipse(-p.s * 0.2 * sx, -p.s * 0.25, p.s * 0.3 * sx, p.s * 0.3, 0, 0, TAU); ctx.fill();
        } else {
          const aa = p.s, bb = p.s * 0.32;
          ctx.beginPath();
          ctx.moveTo(0, -aa); ctx.lineTo(bb, -bb); ctx.lineTo(aa, 0); ctx.lineTo(bb, bb);
          ctx.lineTo(0, aa); ctx.lineTo(-bb, bb); ctx.lineTo(-aa, 0); ctx.lineTo(-bb, -bb);
          ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }

    function frame(t) {
      ctx.clearRect(0, 0, W, H);
      const cover = Math.sin(clamp01(t) * Math.PI);     // 0 -> 1 -> 0, full cover at t=0.5

      drawPanel(cover);
      drawRing(t, cover);
      drawCoin(t, cover);
      drawSparks(t);

      // a white bulb-burst flash at the very peak (full cover)
      const flash = Math.exp(-Math.pow((t - 0.5) / 0.045, 2));
      if (flash > 0.02) {
        ctx.save();
        const fg = ctx.createRadialGradient(CX, CY, 0, CX, CY, W * 0.55);
        fg.addColorStop(0, 'rgba(255,255,255,' + (0.5 * flash).toFixed(3) + ')');
        fg.addColorStop(0.4, 'rgba(255,212,0,' + (0.20 * flash).toFixed(3) + ')');
        fg.addColorStop(1, 'rgba(22,224,255,0)');
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = fg;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    // Exposed so a verification step / headless pipeline can render any frame (t in 0..1).
    window.__txDraw = (t) => frame(clamp01(t));

    let start = null;
    function loop(ts) {
      if (start == null) start = ts;
      let t = (ts - start) / DUR;
      if (t >= 1) {
        if (LOOP) { start = ts + 600; t = 0; }            // pause then replay
        else { ctx.clearRect(0, 0, W, H); return; }       // play once, then clear
      }
      frame(clamp01(t));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
