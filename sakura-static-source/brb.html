<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Sakura Static — Be Right Back</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?seconds=120  ?handle=@you -->
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>

    <div class="chan" aria-hidden="true">
      <span class="sig"><i style="height:8px"></i><i style="height:14px"></i><i style="height:20px"></i><i style="height:12px"></i></span>
      <span>CH&nbsp;03</span><span style="opacity:.5">·</span><span>BRB</span>
      <span class="rec"></span>
    </div>
    <div class="kana" aria-hidden="true">サ<b>ク</b>ラ</div>

    <main class="card card--bl">
      <div class="art" aria-hidden="true"><div class="torii">⛩</div></div>
      <div class="meta">
        <!-- EDITABLE TEXT SLOTS: each .is-slot below ships a "[ your text here ]"
             placeholder — type your own text in, or delete the whole line to remove it.
             (Or set ?kicker=...&sub=... at render time; use =- to remove one.) -->
        <p class="kick"><span class="dot"></span> <span class="is-slot" id="kicker" data-slot="kicker"><span class="slot-no">3</span><span class="slot-txt">your text here</span></span></p>
        <!-- HEADLINE = the standard scene message, never the theme name -->
        <h1 class="title">BE RIGHT<br><b>BACK</b></h1>
        <p class="sub is-slot" data-slot="sub"><span class="slot-no">4</span><span class="slot-txt">your text here</span></p>
        <div class="seek" aria-hidden="true">
          <div class="wave" id="wave"></div><div class="fill" id="fill"></div><div class="knob" id="knob"></div>
        </div>
      </div>
    </main>

    <div class="handle" id="handle">@yourhandle</div>
  </div>
  <script src="shared.js"></script>
</body>
</html>
