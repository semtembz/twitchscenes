<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Cottagecore Bloom — Supporter Alert</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, transparent, Local file -> this file.
       Background is TRANSPARENT so the alert composites over your scene/gameplay.
       Auto-plays a looping demo. Override via URL params:
         ?name=SomeName  ?amount=10   (?type= can also force a different event)
         ?noname=1 hides the baked name (your alert platform overlays the live name)
         ?render=1 deterministic capture mode for the headless webm pipeline -->
  <link rel="stylesheet" href="../alerts.css" />
</head>
<body data-event="supporter">
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <aside class="alert" id="alert">
      <div class="paper">
        <span class="stem" aria-hidden="true"></span>
        <span class="tagid" aria-hidden="true"></span>
        <span class="tagrule" aria-hidden="true"></span>
        <div class="art" id="art" aria-hidden="true"></div>
        <div class="meta">
          <p class="kick"><span class="bud"></span> <span id="kick-label">NEW GARDENER</span></p>
          <h1 class="name" id="name">NewFriend</h1>
          <p class="amount" id="amount"></p>
          <p class="sub" id="sub"></p>
        </div>
      </div>
    </aside>
  </div>
  <script src="../alerts.js"></script>
</body>
</html>
