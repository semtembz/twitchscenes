<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Hologrid — Donation Alert</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, transparent, Local file -> this file.
       Background is TRANSPARENT so the alert composites over your scene/gameplay.
       Auto-plays a looping demo. Override via URL params:
         ?name=SomeName  ?amount=10   (?type= can also force a different event)
         ?noname=1 hides the baked name (your alert platform overlays the live name)
         ?render=1 deterministic capture mode for the headless webm pipeline -->
  <link rel="stylesheet" href="../alerts.css" />
</head>
<body data-event="donation">
  <div id="stage">
    <canvas class="fx" width="1920" height="1080" aria-hidden="true"></canvas>

    <aside class="alert" id="alert" data-anim="donation">
      <div class="holo">
        <span class="lines" aria-hidden="true"></span>
        <span class="br br--tl" aria-hidden="true"></span><span class="br br--tr" aria-hidden="true"></span>
        <span class="br br--bl" aria-hidden="true"></span><span class="br br--br" aria-hidden="true"></span>
        <span class="seam" aria-hidden="true"></span>
        <span class="sysid" aria-hidden="true">SYS // GRID-07</span>
        <span class="sysrule" aria-hidden="true"></span>
        <div class="node" aria-hidden="true"><span class="ring"></span><div class="glyph" id="glyph">◆</div></div>
        <div class="meta">
          <p class="kick"><span class="led" aria-hidden="true"></span><span id="kick-label">DONATION</span></p>
          <h1 class="name" id="name" data-t="NewViewer">NewViewer</h1>
          <p class="amount" id="amount"></p>
          <p class="sub" id="sub">power surge incoming</p>
          <span class="chargeline" aria-hidden="true"></span>
        </div>
      </div>
    </aside>
  </div>
  <script src="../alerts.js"></script>
</body>
</html>
