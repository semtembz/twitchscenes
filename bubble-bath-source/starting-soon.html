<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Bubble Bath — Starting Soon</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?seconds=60  ?handle=@you  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div id="stage">
    <!-- the bubble bath field: rising iridescent bubbles + sparkles -->
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- soap-film shimmer wash, wandering sweep, soft vignette -->
    <div class="bathsweep" aria-hidden="true"></div>
    <div class="wash" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>

    <!-- corner tag = editable slot (type your text, or delete the line) -->
    <div class="tag is-slot" data-slot="tag"><span class="slot-no">1</span><span class="slot-txt">your text here</span></div>

    <!-- the squishy translucent JELLY PANEL (signature composition) -->
    <main class="panel">
      <div class="crest" aria-hidden="true">
        <span class="dot"></span><span class="dot b"></span><span class="dot c"></span>
      </div>

      <!-- EDITABLE TEXT SLOTS: each .is-slot below ships a "[ your text here ]"
           placeholder — type your own text in, or delete the whole line to remove it.
           (Or set ?kicker=...&sub=...&tag=... at render time; use =- to remove one.) -->
      <p class="kicker is-slot" id="kicker" data-slot="kicker"><span class="slot-no">2</span><span class="slot-txt">your text here</span></p>

      <!-- HEADLINE = the standard scene message, never the theme name -->
      <h1 class="title">
        <span class="line">STARTING</span>
        <span class="accent">SOON</span>
      </h1>

      <div class="rule" aria-hidden="true"></div>

      <p class="sub is-slot" data-slot="sub"><span class="slot-no">3</span><span class="slot-txt">your text here</span></p>

      <div class="tube" aria-hidden="true"><div class="fill" id="fill"></div></div>
    </main>

    <!-- handle pill, lower-right on the bath -->
    <div class="handle" id="handle">@yourhandle</div>
  </div>
  <script src="shared.js"></script>
</body>
</html>
