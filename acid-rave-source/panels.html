<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Acid Rave — Twitch Panels (generator)</title>
  <!--
    Twitch profile panels are PNG image files (recommended 320 x 100 px) you
    upload to your channel's "About" page. This file renders each of the 12
    panels onto a <canvas> at EXACTLY 320 x 100 in the ACID RAVE "UV Blacklight"
    language:
        - a pitch-black UV void card with a thin neon brand frame
        - pulsing blacklight glow blobs + a mini equalizer band along the bottom
        - a bright neon line icon (acid / magenta / cyan / purple)
        - the label in a heavy bold-display face with a smooth neon glow
    Each panel has its own Download button + there is a "Download all".

    How to use:
      1. Open this file in a browser.
      2. Click "Download all" (or the individual Download buttons).
      3. Upload each .png to Twitch:
         twitch.tv/<you>/about -> Edit Panels -> + -> upload image.
  -->
  <style>
    /* ---- Acid Rave "UV Blacklight" palette (mirrors shared.css tokens) ---- */
    :root {
      --uv-black:  #07030F;
      --uv-black2: #04020A;
      --acid:      #C6FF00;
      --magenta:   #FF14C8;
      --cyan:      #00E5FF;
      --purple:    #B26BFF;
      --white:     #FFFFFF;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Bahnschrift","Roboto Condensed","DejaVu Sans Mono",Consolas,monospace;
      color: var(--white);
      padding: 36px 32px 60px;
      background:
        radial-gradient(900px 520px at 16% -10%, rgba(198,255,0,0.10), transparent 60%),
        radial-gradient(760px 520px at 100% 110%, rgba(255,20,200,0.12), transparent 60%),
        radial-gradient(620px 480px at 100% -10%, rgba(0,229,255,0.08), transparent 60%),
        linear-gradient(160deg, #0B0518, var(--uv-black2));
      min-height: 100vh;
    }
    .kicker {
      font-family: "Bahnschrift","Roboto Condensed",Consolas,monospace;
      letter-spacing: 7px; font-size: 12px;
      color: var(--acid); text-transform: uppercase; margin: 0 0 8px;
      display: flex; align-items: center; gap: 11px; text-indent: 6px;
      text-shadow: 0 0 16px rgba(198,255,0,0.6);
    }
    .dia { width: 9px; height: 9px; background: var(--acid); transform: rotate(45deg);
      box-shadow: 0 0 14px rgba(198,255,0,0.7); }
    h1 { font-family: "Arial Black","Impact",Haettenschweiler,"Franklin Gothic Heavy",system-ui,sans-serif;
      font-weight: 900; font-size: 34px; letter-spacing: 0; margin: 0 0 6px;
      color: var(--white); text-transform: uppercase;
      text-shadow: 0 0 26px rgba(255,20,200,0.5), 0 0 60px rgba(0,229,255,0.3); }
    p.lead { color: #B9A8D6; margin: 0 0 24px; max-width: 720px; line-height: 1.6;
      font-size: 15px; }
    code { font-family: "DejaVu Sans Mono","Courier New",monospace; color: var(--acid);
      background: rgba(198,255,0,0.08); padding: 2px 7px; border-radius: 3px; }
    .toolbar { margin: 0 0 30px; display: flex; gap: 14px; flex-wrap: wrap; }
    button {
      font-family: "Bahnschrift","Roboto Condensed",Consolas,monospace; font-weight: 700;
      font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
      padding: 12px 24px; cursor: pointer; color: var(--uv-black);
      background: linear-gradient(180deg, var(--acid), #9ED600);
      border: 1px solid rgba(198,255,0,0.6); border-radius: 999px;
      box-shadow: 0 0 26px rgba(198,255,0,0.4);
    }
    button:hover { filter: brightness(1.08); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(348px, 1fr)); gap: 26px; }
    .card {
      background: rgba(10,4,20,0.6); padding: 16px; border-radius: 8px;
      border: 1px solid rgba(178,107,255,0.28);
    }
    /* checkerboard so transparent corners of the panel are visible */
    .frame {
      border-radius: 6px; overflow: hidden; display: block;
      background-color: #0a0514;
      background-image:
        linear-gradient(45deg, #1a0f2a40 25%, transparent 25%),
        linear-gradient(-45deg, #1a0f2a40 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a0f2a40 75%),
        linear-gradient(-45deg, transparent 75%, #1a0f2a40 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    }
    canvas { display: block; width: 320px; height: 100px; }
    .card-row { display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px; font-size: 12px; }
    .card-row .name { font-family: "Bahnschrift","Roboto Condensed",Consolas,monospace; letter-spacing: 2px;
      color: #B9A8D6; text-transform: uppercase; }
    .card-row a { font-family: "Bahnschrift","Roboto Condensed",Consolas,monospace; letter-spacing: 1px;
      color: var(--cyan); text-decoration: none;
      border: 1px solid rgba(0,229,255,0.34); border-radius: 999px; padding: 5px 12px; }
    .card-row a:hover { background: rgba(0,229,255,0.14); }
  </style>
</head>
<body>
  <p class="kicker"><span class="dia"></span>ACID RAVE · PANELS</p>
  <h1>Acid Rave — Twitch Panels</h1>
  <p class="lead">
    Twelve <strong>320&times;100</strong> profile panels in the UV-blacklight rave style:
    a pitch-black void card, a thin neon frame, pulsing glow blobs, a mini equalizer band, and a
    bright neon line icon. Download all then upload at <code>twitch.tv/&lt;you&gt;/about → Edit Panels</code>.
  </p>
  <div class="toolbar">
    <button id="dlAll">Download all</button>
  </div>
  <div class="grid" id="grid"></div>

  <script>
  (function () {
    "use strict";

    // ---- Tokens (hex constants mirror the shared.css design tokens) ----
    var W = 320, H = 100;
    var UV_BLACK = '#07030F', UV_BLACK2 = '#04020A';
    var ACID = '#C6FF00', MAGENTA = '#FF14C8', CYAN = '#00E5FF', PURPLE = '#B26BFF', WHITE = '#FFFFFF';
    var PAL = [ACID, MAGENTA, CYAN, PURPLE];

    // ---- Panel inventory (per the brief: 12 panels) ----
    // Each panel is keyed to a neon accent color so the set reads as a set
    // while every card has its own pop.
    var PANELS = [
      { id: 'about',     title: 'ABOUT',     icon: 'wave',      c: ACID },
      { id: 'schedule',  title: 'SCHEDULE',  icon: 'calendar',  c: CYAN },
      { id: 'rules',     title: 'RULES',     icon: 'list',      c: MAGENTA },
      { id: 'donations', title: 'DONATIONS', icon: 'coin',      c: ACID },
      { id: 'discord',   title: 'DISCORD',   icon: 'discord',   c: PURPLE },
      { id: 'twitter',   title: 'TWITTER',   icon: 'x',         c: CYAN },
      { id: 'youtube',   title: 'YOUTUBE',   icon: 'play',      c: MAGENTA },
      { id: 'instagram', title: 'INSTAGRAM', icon: 'camera',    c: PURPLE },
      { id: 'merch',     title: 'MERCH',     icon: 'tag',       c: ACID },
      { id: 'sponsors',  title: 'SPONSORS',  icon: 'bolt',      c: CYAN },
      { id: 'subscribe', title: 'SUBSCRIBE', icon: 'star',      c: MAGENTA },
      { id: 'community', title: 'COMMUNITY', icon: 'people',    c: PURPLE }
    ];

    // ---- seeded RNG (mulberry32) so the glow / EQ scatter is reproducible ----
    function makeRand(seed) {
      var s = seed >>> 0;
      return function () {
        s |= 0; s = (s + 0x6D2B79F5) | 0;
        var t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    function hexRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }
    function rgba(hex, a) { var c = hexRgb(hex); return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a + ')'; }

    // ---- helpers ----------------------------------------------------------
    function roundRectPath(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    // soft additive blacklight bloom
    function bloom(ctx, cx, cy, rad, hex, alpha) {
      var c = hexRgb(hex);
      var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
      g.addColorStop(0,    'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + alpha + ')');
      g.addColorStop(0.5,  'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (alpha * 0.35).toFixed(3) + ')');
      g.addColorStop(1,    'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, rad, 0, 6.2832); ctx.fill();
    }

    // a mini equalizer band hugging the card's bottom edge (deterministic)
    function eqBand(ctx, rnd, x0, x1, baseY, maxH, accent) {
      var n = 26, gap = 2, bw = ((x1 - x0) / n) - gap;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (var i = 0; i < n; i++) {
        var v = Math.pow(rnd(), 0.7);
        var h = 4 + v * maxH;
        var col = (i % 3 === 0) ? accent : PAL[(rnd() * PAL.length) | 0];
        var cc = hexRgb(col);
        var bx = Math.round(x0 + i * (bw + gap));
        var g = ctx.createLinearGradient(0, baseY, 0, baseY - h);
        g.addColorStop(0, 'rgba(' + cc[0] + ',' + cc[1] + ',' + cc[2] + ',0)');
        g.addColorStop(1, 'rgba(' + cc[0] + ',' + cc[1] + ',' + cc[2] + ',0.85)');
        ctx.fillStyle = g;
        ctx.fillRect(bx, Math.round(baseY - h), Math.max(1, Math.round(bw)), Math.ceil(h));
        // bright tip
        ctx.fillStyle = 'rgba(' + cc[0] + ',' + cc[1] + ',' + cc[2] + ',0.9)';
        ctx.fillRect(bx, Math.round(baseY - h), Math.max(1, Math.round(bw)), 1.5);
      }
      ctx.restore();
    }

    // ---- panel renderer ---------------------------------------------------
    function drawPanel(ctx, p) {
      ctx.clearRect(0, 0, W, H);
      var rnd = makeRand(0xACE0 ^ hashStr(p.id));

      var pad = 3;
      var x = pad, y = pad, w = W - pad * 2, h = H - pad * 2;
      var rad = 10;

      // UV void card body, clipped to a rounded rect
      ctx.save();
      roundRectPath(ctx, x, y, w, h, rad);
      ctx.clip();

      var bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, '#0B0518');
      bg.addColorStop(0.55, UV_BLACK);
      bg.addColorStop(1, UV_BLACK2);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // pulsing blacklight glow blobs, biased to the edges (clear centre for text)
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      bloom(ctx, 40, 18, 84, p.c, 0.30);
      bloom(ctx, W - 40, 86, 90, PAL[(rnd() * PAL.length) | 0], 0.20);
      bloom(ctx, W - 26, 12, 70, CYAN, 0.14);
      bloom(ctx, 18, h - 4, 64, PURPLE, 0.12);
      ctx.restore();

      // faint UV grid floor texture
      ctx.save();
      ctx.strokeStyle = 'rgba(178,107,255,0.10)';
      ctx.lineWidth = 1;
      for (var gx = 22; gx < W; gx += 26) { ctx.beginPath(); ctx.moveTo(gx, h - 30); ctx.lineTo(gx, h); ctx.stroke(); }
      ctx.restore();

      // mini equalizer band hugging the bottom edge
      eqBand(ctx, rnd, 8, W - 8, h + pad, 30, p.c);

      // scanline sheen
      ctx.save();
      ctx.globalAlpha = 0.35; ctx.fillStyle = 'rgba(255,255,255,0.05)';
      for (var sy = y; sy < y + h; sy += 4) ctx.fillRect(0, sy, W, 1);
      ctx.restore();
      ctx.globalAlpha = 1;

      // deep vignette so the void stays inky
      var vg = ctx.createRadialGradient(W / 2, H / 2, 40, W / 2, H / 2, 200);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(4,2,10,0.55)');
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);
      ctx.restore(); // un-clip

      // neon brand frame drawn ON TOP (double stroke: accent outer + white inner)
      ctx.save();
      ctx.shadowColor = rgba(p.c, 0.85); ctx.shadowBlur = 10;
      ctx.strokeStyle = rgba(p.c, 0.9); ctx.lineWidth = 1.6;
      roundRectPath(ctx, x + 0.8, y + 0.8, w - 1.6, h - 1.6, rad); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
      roundRectPath(ctx, x + 4.5, y + 4.5, w - 9, h - 9, rad - 3); ctx.stroke();
      ctx.restore();

      // accent neon line down the left (a thin laser rail with end caps)
      ctx.save();
      var ruleX = x + 50;
      ctx.shadowColor = rgba(p.c, 0.8); ctx.shadowBlur = 8;
      ctx.strokeStyle = rgba(p.c, 0.85); ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.moveTo(ruleX, y + 18); ctx.lineTo(ruleX, y + h - 18); ctx.stroke();
      ctx.shadowBlur = 0;
      // diamond end caps
      ctx.fillStyle = WHITE;
      [y + 18, y + h - 18].forEach(function (cy) {
        ctx.save(); ctx.translate(ruleX, cy); ctx.rotate(Math.PI / 4);
        ctx.fillRect(-2, -2, 4, 4); ctx.restore();
      });
      ctx.restore();

      // bright neon line icon
      drawIcon(ctx, p.icon, 27, H / 2 - 4, 30, p.c);

      // kicker above the title — spaced neon caps
      ctx.save();
      ctx.font = '700 9px "Bahnschrift","Roboto Condensed",Consolas,monospace';
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = rgba(p.c, 0.9);
      ctx.shadowColor = rgba(p.c, 0.5); ctx.shadowBlur = 6;
      drawSpaced(ctx, 'ACID RAVE', 64, 32, 2.4);
      ctx.shadowBlur = 0;
      ctx.restore();

      // label — heavy bold-display with smooth neon glow, shrink-to-fit
      ctx.save();
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      var label = p.title;
      var size = 30;
      var maxW = W - 64 - 22;
      ctx.font = '900 ' + size + 'px "Arial Black","Impact",Haettenschweiler,"Franklin Gothic Heavy",system-ui,sans-serif';
      while (ctx.measureText(label).width > maxW && size > 14) {
        size -= 1;
        ctx.font = '900 ' + size + 'px "Arial Black","Impact",Haettenschweiler,"Franklin Gothic Heavy",system-ui,sans-serif';
      }
      var ty = 68;
      ctx.fillStyle = WHITE;
      ctx.shadowColor = rgba(p.c, 0.85); ctx.shadowBlur = 18;
      ctx.fillText(label, 64, ty);
      // crisp white core re-strike
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.96)';
      ctx.fillText(label, 64, ty);
      ctx.restore();

      // laser underline rule under the label (cyan->white->magenta)
      ctx.save();
      var barX = 64, barY = 79, barW = Math.min(maxW, ctx.measureText(label).width + 6);
      var grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      grad.addColorStop(0, 'rgba(0,229,255,0)');
      grad.addColorStop(0.15, CYAN);
      grad.addColorStop(0.5, WHITE);
      grad.addColorStop(0.85, MAGENTA);
      grad.addColorStop(1, 'rgba(255,20,200,0)');
      ctx.strokeStyle = grad; ctx.lineWidth = 1.6;
      ctx.shadowColor = 'rgba(0,229,255,0.6)'; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.moveTo(barX, barY); ctx.lineTo(barX + barW, barY); ctx.stroke();
      ctx.restore();
    }

    // tiny string hash so each panel seeds a different deterministic field
    function hashStr(str) {
      var hsum = 0; for (var i = 0; i < str.length; i++) { hsum = (hsum * 31 + str.charCodeAt(i)) | 0; }
      return hsum >>> 0;
    }

    // draw text with simple manual letter spacing (px between chars)
    function drawSpaced(ctx, str, x, y, sp) {
      var cx = x;
      for (var i = 0; i < str.length; i++) {
        var ch = str[i];
        ctx.fillText(ch, cx, y);
        cx += ctx.measureText(ch).width + sp;
      }
    }

    // ---- neon line icons --------------------------------------------------
    // All drawn with a consistent bright stroke + glow, centred on (cx, cy).
    function drawIcon(ctx, kind, cx, cy, s, accent) {
      ctx.save();
      ctx.translate(cx, cy);
      var h = s / 2;
      ctx.strokeStyle = WHITE;
      ctx.fillStyle = WHITE;
      ctx.lineWidth = 1.9;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.shadowColor = rgba(accent, 0.95);
      ctx.shadowBlur = 9;

      switch (kind) {
        case 'wave': { // sound wave / "about" pulse
          ctx.beginPath();
          var bars = [0.35, 0.7, 1.0, 0.55, 0.85, 0.4];
          for (var i = 0; i < bars.length; i++) {
            var bx = -h + i * (s / (bars.length - 1));
            ctx.moveTo(bx, -h * bars[i]); ctx.lineTo(bx, h * bars[i]);
          }
          ctx.stroke();
          break;
        }
        case 'calendar': {
          ctx.strokeRect(-h, -h * 0.7, s, s * 0.85);
          ctx.beginPath();
          ctx.moveTo(-h, -h * 0.35); ctx.lineTo(h, -h * 0.35);
          ctx.moveTo(-h * 0.55, -h);  ctx.lineTo(-h * 0.55, -h * 0.5);
          ctx.moveTo(h * 0.55, -h);   ctx.lineTo(h * 0.55, -h * 0.5);
          ctx.stroke();
          for (var r = 0; r < 2; r++)
            for (var c = 0; c < 3; c++) {
              ctx.beginPath();
              ctx.arc(-h * 0.5 + c * h * 0.5, -h * 0.02 + r * h * 0.45, 1.3, 0, Math.PI * 2);
              ctx.fill();
            }
          break;
        }
        case 'list': {
          for (var li = 0; li < 3; li++) {
            var ly = -h * 0.6 + li * h * 0.6;
            ctx.save(); ctx.translate(-h * 0.78, ly); ctx.rotate(Math.PI / 4);
            ctx.fillRect(-1.6, -1.6, 3.2, 3.2); ctx.restore();
            ctx.beginPath(); ctx.moveTo(-h * 0.42, ly); ctx.lineTo(h * 0.9, ly); ctx.stroke();
          }
          break;
        }
        case 'coin': {
          ctx.beginPath(); ctx.arc(0, 0, h * 0.95, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, 0, h * 0.72, 0, Math.PI * 2); ctx.stroke();
          ctx.font = '900 ' + Math.round(s * 0.56) + 'px "Arial Black",system-ui,sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('$', 0, 1);
          break;
        }
        case 'discord': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.85, -h * 0.45);
          ctx.quadraticCurveTo(0, -h * 0.85, h * 0.85, -h * 0.45);
          ctx.lineTo(h * 0.7, h * 0.55);
          ctx.quadraticCurveTo(h * 0.45, h * 0.8, h * 0.2, h * 0.55);
          ctx.lineTo(-h * 0.2, h * 0.55);
          ctx.quadraticCurveTo(-h * 0.45, h * 0.8, -h * 0.7, h * 0.55);
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath(); ctx.arc(-h * 0.32, 0, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(h * 0.32, 0, 2, 0, Math.PI * 2); ctx.fill();
          break;
        }
        case 'x': { // twitter/X
          ctx.beginPath();
          ctx.moveTo(-h * 0.8, -h * 0.8); ctx.lineTo(h * 0.8, h * 0.8);
          ctx.moveTo(h * 0.8, -h * 0.8);  ctx.lineTo(-h * 0.8, h * 0.8);
          ctx.stroke();
          break;
        }
        case 'play': {
          roundRect(ctx, -h, -h * 0.7, s, s * 0.85, 5); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.22, -h * 0.32);
          ctx.lineTo(-h * 0.22, h * 0.28);
          ctx.lineTo(h * 0.42, -h * 0.02);
          ctx.closePath();
          ctx.fill();
          break;
        }
        case 'camera': {
          roundRect(ctx, -h, -h * 0.55, s, s * 0.95, 6); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, h * 0.1, h * 0.4, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(h * 0.55, -h * 0.25, 1.6, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath();
          ctx.moveTo(-h * 0.35, -h * 0.55);
          ctx.lineTo(-h * 0.15, -h * 0.85);
          ctx.lineTo(h * 0.15, -h * 0.85);
          ctx.lineTo(h * 0.35, -h * 0.55);
          ctx.stroke();
          break;
        }
        case 'tag': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.1, -h * 0.85);
          ctx.lineTo(h * 0.85, -h * 0.85);
          ctx.lineTo(h * 0.85, h * 0.1);
          ctx.lineTo(-h * 0.15, h * 0.85);
          ctx.lineTo(-h * 0.85, h * 0.15);
          ctx.lineTo(-h * 0.85, -h * 0.6);
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath(); ctx.arc(-h * 0.5, -h * 0.5, 2, 0, Math.PI * 2); ctx.stroke();
          break;
        }
        case 'bolt': { // sponsors = lightning bolt
          ctx.beginPath();
          ctx.moveTo(h * 0.2, -h);
          ctx.lineTo(-h * 0.45, h * 0.1);
          ctx.lineTo(h * 0.05, h * 0.1);
          ctx.lineTo(-h * 0.2, h);
          ctx.lineTo(h * 0.55, -h * 0.15);
          ctx.lineTo(h * 0.05, -h * 0.15);
          ctx.closePath();
          ctx.stroke();
          break;
        }
        case 'star': {
          ctx.beginPath();
          for (var sp = 0; sp < 10; sp++) {
            var radS = (sp % 2 === 0) ? h * 0.95 : h * 0.42;
            var angS = -Math.PI / 2 + sp * Math.PI / 5;
            var X = Math.cos(angS) * radS, Y = Math.sin(angS) * radS;
            if (sp === 0) ctx.moveTo(X, Y); else ctx.lineTo(X, Y);
          }
          ctx.closePath();
          ctx.stroke();
          break;
        }
        case 'people': { // community = two figures
          ctx.beginPath(); ctx.arc(-h * 0.4, -h * 0.32, h * 0.3, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.85, h * 0.85);
          ctx.quadraticCurveTo(-h * 0.4, h * 0.1, h * 0.05, h * 0.85);
          ctx.stroke();
          ctx.beginPath(); ctx.arc(h * 0.5, -h * 0.42, h * 0.26, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(h * 0.08, h * 0.78);
          ctx.quadraticCurveTo(h * 0.5, h * 0.1, h * 0.92, h * 0.78);
          ctx.stroke();
          break;
        }
        default:
          ctx.beginPath(); ctx.arc(0, 0, h * 0.7, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();
    }

    // local rounded-rect path helper for icons
    function roundRect(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    // ---- build the grid ---------------------------------------------------
    var grid = document.getElementById('grid');
    var made = [];

    function build() {
      for (var i = 0; i < PANELS.length; i++) {
        var p = PANELS[i];
        var card = document.createElement('div'); card.className = 'card';
        var frame = document.createElement('div'); frame.className = 'frame';
        var cv = document.createElement('canvas'); cv.width = W; cv.height = H;
        var ctx = cv.getContext('2d');
        drawPanel(ctx, p);
        frame.appendChild(cv);

        var row = document.createElement('div'); row.className = 'card-row';
        var nm = document.createElement('span'); nm.className = 'name'; nm.textContent = p.title;
        var dl = document.createElement('a'); dl.textContent = 'Download'; dl.href = '#';
        (function (canvas, id) {
          dl.addEventListener('click', function (e) { e.preventDefault(); save(canvas, id); });
        })(cv, p.id);
        row.appendChild(nm); row.appendChild(dl);

        card.appendChild(frame); card.appendChild(row);
        grid.appendChild(card);
        made.push({ canvas: cv, id: p.id });
      }
    }

    function save(canvas, id) {
      var a = document.createElement('a');
      a.download = 'panel-' + id + '.png';
      a.href = canvas.toDataURL('image/png');
      document.body.appendChild(a); a.click(); a.remove();
    }

    document.getElementById('dlAll').addEventListener('click', function () {
      var i = 0;
      (function next() {
        if (i >= made.length) return;
        save(made[i].canvas, made[i].id);
        i++;
        setTimeout(next, 200);
      })();
    });

    // headless export hook: [{name, dataURL}] for every panel
    window.__exportAssets = function () {
      return made.map(function (m) { return { name: m.id, dataURL: m.canvas.toDataURL('image/png') }; });
    };

    // Fonts here are system display/mono faces (no @font-face / CDN), ready
    // immediately. document.fonts.ready still guards any late metrics.
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(build);
    } else {
      build();
    }
  })();
  </script>
</body>
