<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Stream Starting Soon — Pixel Japan</title>
  <!--
    OBS Browser Source — "Stream Starting Soon", pixelated Japanese style.
      • Size in OBS: 1920 x 1080, Use custom frame rate = 60
      • Left  : your photo, auto-pixelated to match the pixel-art look
      • Right : clean pixel "STREAM STARTING SOON" + Japanese dot text
      • Bottom: a loading bar that fills once over 60s (timer is internal, never shown)

    PHOTO: save your picture as  assets/intro-photo.jpg  (any size; it gets pixelated for you).

    Optional URL settings (append to the file URL in OBS):
      ?seconds=60                 how long the bar takes to fill (default 60, hidden)
      &photo=assets/intro-photo.jpg
      &pixel=180                  photo pixelation detail (lower = chunkier blocks)
      &handle=@yourname           shows a small handle line (optional)
  -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- base background sits behind everything -->
  <div class="bg" aria-hidden="true"></div>

  <!-- LEFT: pixelated photo -->
  <section class="photo" aria-hidden="true">
    <canvas id="photoCanvas" width="884" height="1080"></canvas>
    <div class="photo__grade"></div>
  </section>

  <!-- gentle drifting pixel sakura petals over the right side -->
  <canvas id="petals" class="petals" width="1920" height="1080" aria-hidden="true"></canvas>

  <!-- temple-beam divider between photo and message -->
  <div class="divider" aria-hidden="true"></div>

  <!-- RIGHT: the message -->
  <main class="panel">
    <div class="sun" aria-hidden="true"></div>

    <p class="kicker">
      <span class="dot" id="statusDot"></span>
      <span class="kicker__en" id="statusEn">STANDBY</span>
      <span class="kicker__jp" id="statusJp">まもなく配信開始</span>
    </p>

    <div class="rule" aria-hidden="true"></div>

    <h1 class="title">
      <span>STREAM</span>
      <span>STARTING</span>
      <span class="title__accent">SOON</span>
    </h1>

    <p class="sub">少々お待ちください</p>
    <p class="handle" id="handle" hidden></p>
  </main>

  <!-- frame drawn on top, never blocks anything -->
  <div class="frame" aria-hidden="true"></div>

  <!-- BOTTOM: loading bar (fills once over `seconds`, no numbers) -->
  <div class="loadbar" aria-hidden="true">
    <div class="loadbar__track">
      <div class="loadbar__fill" id="fill"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
