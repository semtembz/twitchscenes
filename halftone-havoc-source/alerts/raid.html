<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Halftone Havoc — Raid Alert</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, transparent, Local file -> this file.
       Background is TRANSPARENT so the alert composites over your scene/gameplay.
       Auto-plays a looping demo. Override via URL params:
         ?name=SomeName  ?amount=500   (?type= can also force a different event)
         ?noname=1 hides the baked name (your alert platform overlays the live name)
         ?render=1 deterministic capture mode for the headless webm pipeline -->
  <link rel="stylesheet" href="../alerts.css" />
</head>
<body data-event="raid">
  <div id="stage">
    <canvas class="fx" width="1920" height="1080" aria-hidden="true"></canvas>

    <aside class="alert" id="alert">
      <span class="tagid" aria-hidden="true">// HAVOC //</span>
      <div class="art" aria-hidden="true">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" aria-hidden="true">
          <polygon class="star-fill" points="100,4 116,40 146,16 144,52 184,42 162,76 198,92 166,108 192,140 152,134 158,170 124,150 116,196 92,162 64,194 58,156 22,176 30,138 4,118 36,100 6,70 42,66 30,30 66,46 78,8 100,38" />
          <polygon class="star-line" points="100,4 116,40 146,16 144,52 184,42 162,76 198,92 166,108 192,140 152,134 158,170 124,150 116,196 92,162 64,194 58,156 22,176 30,138 4,118 36,100 6,70 42,66 30,30 66,46 78,8 100,38" />
        </svg>
        <div class="glyph" id="glyph">⚑</div>
      </div>
      <div class="meta">
        <p class="kick"><span class="dot"></span> <span id="kick-label">RAID INCOMING</span></p>
        <h1 class="name" id="name">NewViewer</h1>
        <p class="amount"><span id="amount-val"></span></p>
        <p class="sub" id="sub"></p>
      </div>
    </aside>
  </div>
  <script src="../alerts.js"></script>
</body>
</html>
