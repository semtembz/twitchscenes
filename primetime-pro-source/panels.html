<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Primetime Pro — Twitch Panels (generator)</title>
  <!--
    Twitch profile panels are PNG image files (recommended 320 x 100 px) you
    upload to your channel's "About" page. This file renders each of the 12
    panels onto a <canvas> at EXACTLY 320 x 100 in the Primetime Pro
    "network sports broadcast" visual language:
        - brushed-steel + deep-blue glass lower-third plate with a chamfer
        - an orange flag tab on the left holding a line icon
        - a thin blue->orange rail + a blue sheen accent
        - the label in bold italic condensed broadcast caps
    Each panel has its own Download button + there is a "Download all".

    How to use:
      1. Open this file in a browser.
      2. Click "Download all" (or the individual Download buttons).
      3. Upload each .png to Twitch:
         twitch.tv/<you>/about -> Edit Panels -> + -> upload image.
  -->
  <style>
    /* ---- Primetime Pro "network sports broadcast" palette ---- */
    :root {
      --navy:#0A1B2A; --blue-deep:#0E2C4A; --blue:#16B8FF; --white:#F5F7FA;
      --orange:#FF5A1F;
      --steel-1:#3A4754; --steel-2:#5A6B79; --steel-3:#8595A3; --steel-hi:#C3CED8;
      --dim:#8FA6BC;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Bahnschrift","DIN Condensed","Saira Condensed","Arial Narrow",system-ui,sans-serif;
      color: var(--white);
      padding: 36px 32px 60px;
      background:
        radial-gradient(900px 520px at 50% -10%, rgba(22,184,255,0.18), transparent 60%),
        radial-gradient(700px 480px at 100% 110%, rgba(255,90,31,0.12), transparent 60%),
        linear-gradient(160deg, #103a5e, var(--navy) 70%, #07131f);
      min-height: 100vh;
    }
    .kicker {
      font-weight: 700; letter-spacing: 5px; font-size: 13px;
      color: var(--blue); text-transform: uppercase; margin: 0 0 8px;
      display: flex; align-items: center; gap: 9px;
    }
    .rec { width: 10px; height: 10px; background: var(--orange);
      box-shadow: 0 0 10px var(--orange); animation: blink 1.3s steps(1) infinite;
      transform: rotate(45deg); }
    @keyframes blink { 0%,55% { opacity: 1; } 56%,100% { opacity: .22; } }
    h1 { font-weight: 800; font-style: italic; font-size: 34px; letter-spacing: -.5px;
      text-transform: uppercase; margin: 0 0 6px; color: var(--white);
      text-shadow: 0 0 26px rgba(22,184,255,0.4); }
    h1 b { color: var(--orange); }
    p.lead { color: var(--dim); margin: 0 0 24px; max-width: 760px; line-height: 1.55; }
    code { font-family: "Consolas","Courier New", monospace; color: var(--blue);
      background: rgba(22,184,255,0.10); padding: 2px 7px; border-radius: 4px; }
    .toolbar { margin: 0 0 30px; display: flex; gap: 14px; flex-wrap: wrap; }
    button {
      font-weight: 800; font-size: 13px;
      letter-spacing: 3px; text-transform: uppercase;
      padding: 13px 24px; cursor: pointer; color: #1a0a02;
      background: linear-gradient(180deg, #ff7a45, var(--orange) 60%, #d8430f);
      border: 1px solid rgba(255,209,180,0.5);
      clip-path: polygon(10px 0,100% 0,calc(100% - 10px) 100%,0 100%);
      box-shadow: 0 6px 24px rgba(255,90,31,0.30);
    }
    button:hover { filter: brightness(1.1); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(348px, 1fr)); gap: 26px; }
    .card {
      background: rgba(14,44,74,0.55); padding: 16px;
      border: 1px solid rgba(22,184,255,0.18);
      clip-path: polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);
      backdrop-filter: blur(6px);
    }
    /* checkerboard so the panel's transparent corners are visible */
    .frame {
      overflow: hidden; display: block;
      background-color: #0a1622;
      background-image:
        linear-gradient(45deg, #122435 25%, transparent 25%),
        linear-gradient(-45deg, #122435 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #122435 75%),
        linear-gradient(-45deg, transparent 75%, #122435 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    }
    canvas { display: block; width: 320px; height: 100px; }
    .card-row { display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px; font-size: 12px; }
    .card-row .name { font-weight: 700; letter-spacing: 2px;
      color: var(--dim); text-transform: uppercase; }
    .card-row a { font-weight: 700; letter-spacing: 1px;
      color: var(--blue); text-decoration: none;
      border: 1px solid rgba(22,184,255,0.30); padding: 5px 12px; }
    .card-row a:hover { background: rgba(22,184,255,0.16); }
  </style>
</head>
<body>
  <p class="kicker"><span class="rec"></span>CH 01 · PRIMETIME · PANELS</p>
  <h1>PRIMETIME PRO — <b>PANELS</b></h1>
  <p class="lead">
    Twelve <strong>320&times;100</strong> profile panels in the network-sports broadcast style:
    a brushed-steel + deep-blue glass plate, an orange flag tab with a line icon, and a
    blue&rarr;orange rail. Download all then upload at <code>twitch.tv/&lt;you&gt;/about → Edit Panels</code>.
  </p>
  <div class="toolbar">
    <button id="dlAll">Download all</button>
  </div>
  <div class="grid" id="grid"></div>

  <script>
  (function () {
    "use strict";

    // ---- Tokens (hex constants mirror the shared.css design vars) ----
    var W = 320, H = 100;
    var NAVY = '#0A1B2A', BLUE_DEEP = '#0E2C4A', BLUE = '#16B8FF', WHITE = '#F5F7FA';
    var ORANGE = '#FF5A1F';
    var STEEL1 = '#3A4754', STEEL2 = '#5A6B79', STEEL3 = '#8595A3', STEEL_HI = '#C3CED8';
    var DIM = '#8FA6BC';

    // ---- Panel inventory (order per the design brief) ----
    var PANELS = [
      { id: 'about',     title: 'ABOUT',     icon: 'info' },
      { id: 'schedule',  title: 'SCHEDULE',  icon: 'calendar' },
      { id: 'rules',     title: 'RULES',     icon: 'list' },
      { id: 'donate',    title: 'DONATE',    icon: 'coin' },
      { id: 'discord',   title: 'DISCORD',   icon: 'discord' },
      { id: 'twitter',   title: 'TWITTER',   icon: 'twitter' },
      { id: 'youtube',   title: 'YOUTUBE',   icon: 'play' },
      { id: 'instagram', title: 'INSTAGRAM', icon: 'camera' },
      { id: 'merch',     title: 'MERCH',     icon: 'tag' },
      { id: 'specs',     title: 'PC SPECS',  icon: 'monitor' },
      { id: 'sponsors',  title: 'SPONSORS',  icon: 'ribbon' },
      { id: 'subscribe', title: 'SUBSCRIBE', icon: 'star' }
    ];

    // ---- helpers ----------------------------------------------------------
    // chamfered (cut-corner) rect path — the signature broadcast plate shape.
    // `cuts` = {tl,tr,br,bl} corner cut sizes (0 = square corner).
    function chamferPath(ctx, x, y, w, h, cuts) {
      var tl = cuts.tl||0, tr = cuts.tr||0, br = cuts.br||0, bl = cuts.bl||0;
      ctx.beginPath();
      ctx.moveTo(x + tl, y);
      ctx.lineTo(x + w - tr, y);
      ctx.lineTo(x + w, y + tr);
      ctx.lineTo(x + w, y + h - br);
      ctx.lineTo(x + w - br, y + h);
      ctx.lineTo(x + bl, y + h);
      ctx.lineTo(x, y + h - bl);
      ctx.lineTo(x, y + tl);
      ctx.closePath();
    }

    // brushed-steel vertical fill (1px bright/dark streaks)
    function steelFill(ctx, x, y, w, h) {
      var g = ctx.createLinearGradient(0, y, 0, y + h);
      g.addColorStop(0, STEEL2);
      g.addColorStop(0.55, STEEL1);
      g.addColorStop(1, '#2c3742');
      ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
      // fine vertical brushed streaks
      for (var sx = x; sx < x + w; sx += 2) {
        ctx.fillStyle = (sx % 4 === 0) ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
        ctx.fillRect(sx, y, 1, h);
      }
      // top sheen
      var sg = ctx.createLinearGradient(0, y, 0, y + h * 0.4);
      sg.addColorStop(0, 'rgba(255,255,255,0.12)');
      sg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = sg; ctx.fillRect(x, y, w, h * 0.4);
    }

    // ---- panel renderer ---------------------------------------------------
    function drawPanel(ctx, p) {
      ctx.clearRect(0, 0, W, H);

      var pad = 4;
      var cut = 18;
      var px = pad, py = pad, pw = W - pad * 2, ph = H - pad * 2;

      // ---- main glass plate body (deep blue, chamfered TL + BR) ----
      ctx.save();
      chamferPath(ctx, px, py, pw, ph, { tl: cut, br: cut });
      ctx.clip();

      var bg = ctx.createLinearGradient(0, py, 0, py + ph);
      bg.addColorStop(0, BLUE_DEEP);
      bg.addColorStop(0.6, '#0a2238');
      bg.addColorStop(1, NAVY);
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

      // blue glaze + orange ember glow
      var gl = ctx.createRadialGradient(W * 0.78, 0, 10, W * 0.78, 0, 220);
      gl.addColorStop(0, 'rgba(22,184,255,0.18)');
      gl.addColorStop(1, 'rgba(22,184,255,0)');
      ctx.fillStyle = gl; ctx.fillRect(0, 0, W, H);
      var em = ctx.createRadialGradient(W * 0.14, H, 10, W * 0.14, H, 160);
      em.addColorStop(0, 'rgba(255,90,31,0.14)');
      em.addColorStop(1, 'rgba(255,90,31,0)');
      ctx.fillStyle = em; ctx.fillRect(0, 0, W, H);

      // faint field scanlines
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      for (var sy = py; sy < py + ph; sy += 4) ctx.fillRect(0, sy, W, 1);
      // vertical broadcast hairlines
      ctx.fillStyle = 'rgba(22,184,255,0.05)';
      for (var vx = 96; vx < W; vx += 26) ctx.fillRect(vx, 0, 1, H);

      // blue diagonal sheen sweep
      var sh = ctx.createLinearGradient(W * 0.2, 0, W * 0.7, H);
      sh.addColorStop(0.30, 'rgba(22,184,255,0)');
      sh.addColorStop(0.48, 'rgba(22,184,255,0.14)');
      sh.addColorStop(0.62, 'rgba(22,184,255,0)');
      ctx.fillStyle = sh; ctx.fillRect(0, 0, W, H);
      ctx.restore();

      // ---- top blue edge + bottom shadow edge along the plate ----
      ctx.save();
      chamferPath(ctx, px, py, pw, ph, { tl: cut, br: cut });
      ctx.clip();
      ctx.fillStyle = 'rgba(22,184,255,0.6)'; ctx.fillRect(px, py, pw, 3);
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(px, py + ph - 3, pw, 3);
      ctx.restore();

      // ---- orange flag tab on the left (holds the icon) ----
      var flagW = 64;
      ctx.save();
      chamferPath(ctx, px, py, flagW, ph, { tl: cut });
      // cut the bottom-right of the flag at an angle (broadcast slant)
      ctx.clip();
      var fg = ctx.createLinearGradient(0, py, 0, py + ph);
      fg.addColorStop(0, '#ff7a45'); fg.addColorStop(0.55, ORANGE); fg.addColorStop(1, '#d8430f');
      ctx.fillStyle = fg; ctx.fillRect(px, py, flagW, ph);
      // brushed streaks on flag
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.fillRect(px, py, flagW, ph * 0.34);
      ctx.restore();

      // angled slice off the flag's right edge -> chevron into the plate
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(px + flagW, py);
      ctx.lineTo(px + flagW + 16, py);
      ctx.lineTo(px + flagW, py + ph);
      ctx.lineTo(px + flagW - 4, py + ph);
      ctx.closePath();
      ctx.fillStyle = '#d8430f';
      ctx.fill();
      ctx.restore();

      // icon centered on the flag
      drawIcon(ctx, p.icon, px + flagW / 2 - 2, py + ph / 2, 32);

      // ---- thin blue->orange rail just under the top edge of the text area ----
      var textX = px + flagW + 22;
      ctx.save();
      var rg = ctx.createLinearGradient(textX, 0, W - 18, 0);
      rg.addColorStop(0, ORANGE); rg.addColorStop(0.6, BLUE); rg.addColorStop(1, 'rgba(22,184,255,0)');
      ctx.fillStyle = rg; ctx.fillRect(textX, 22, W - 18 - textX, 4);
      ctx.restore();

      // ---- "CH 01" chip kicker above the title ----
      ctx.save();
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      ctx.font = '700 9px "Bahnschrift", system-ui, sans-serif';
      ctx.fillStyle = ORANGE;
      ctx.shadowColor = 'rgba(255,90,31,0.7)'; ctx.shadowBlur = 6;
      ctx.fillRect(textX, 14, 4, 6);       // tiny tally mark
      ctx.shadowBlur = 0;
      ctx.fillStyle = DIM;
      ctx.fillText('CH 01 · PRIMETIME', textX + 10, 19);
      ctx.restore();

      // ---- label: bold italic condensed broadcast caps ----
      ctx.save();
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
      var label = p.title;
      var size = 30;
      var maxW = W - textX - 18;
      ctx.font = '800 italic ' + size + 'px "Bahnschrift", "Arial Narrow", system-ui, sans-serif';
      while (ctx.measureText(label).width > maxW && size > 15) {
        size -= 1;
        ctx.font = '800 italic ' + size + 'px "Bahnschrift", "Arial Narrow", system-ui, sans-serif';
      }
      // drop shadow + blue glow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillText(label, textX + 1, 64);
      ctx.shadowColor = 'rgba(22,184,255,0.45)'; ctx.shadowBlur = 14;
      ctx.fillStyle = WHITE;
      ctx.fillText(label, textX, 63);
      ctx.restore();

      // ---- broadcast progress chip under the label (no numbers) ----
      ctx.save();
      var barX = textX, barY = 76, barW = W - textX - 18, barH = 6;
      chamferPath(ctx, barX, barY, barW, barH, { tl: 3, br: 3 });
      ctx.fillStyle = 'rgba(8,24,40,0.9)'; ctx.fill();
      ctx.strokeStyle = 'rgba(22,184,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
      // fill portion
      var fillW = barW * 0.66;
      ctx.save();
      chamferPath(ctx, barX, barY, barW, barH, { tl: 3, br: 3 });
      ctx.clip();
      var fg2 = ctx.createLinearGradient(barX, 0, barX + fillW, 0);
      fg2.addColorStop(0, ORANGE); fg2.addColorStop(1, BLUE);
      ctx.fillStyle = fg2; ctx.fillRect(barX, barY, fillW, barH);
      ctx.restore();
      // playhead tick
      ctx.fillStyle = WHITE; ctx.shadowColor = WHITE; ctx.shadowBlur = 8;
      ctx.fillRect(barX + fillW - 1, barY - 1, 2, barH + 2);
      ctx.restore();

      // ---- hairline plate border ----
      ctx.save();
      chamferPath(ctx, px + 0.5, py + 0.5, pw - 1, ph - 1, { tl: cut, br: cut });
      ctx.strokeStyle = 'rgba(22,184,255,0.25)'; ctx.lineWidth = 1; ctx.stroke();
      ctx.restore();
    }

    // ---- line icons -------------------------------------------------------
    // Drawn with a consistent white/ink stroke on the orange flag, centred on
    // (cx, cy), sized to roughly `s` px box.
    function drawIcon(ctx, kind, cx, cy, s) {
      ctx.save();
      ctx.translate(cx, cy);
      var h = s / 2;
      ctx.strokeStyle = '#1a0a02';
      ctx.fillStyle = '#1a0a02';
      ctx.lineWidth = 2.4;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';

      switch (kind) {
        case 'info': {
          ctx.beginPath(); ctx.arc(0, 0, h * 0.92, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, -h * 0.42, 1.7, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.moveTo(0, -h * 0.12); ctx.lineTo(0, h * 0.55); ctx.stroke();
          break;
        }
        case 'calendar': {
          ctx.strokeRect(-h, -h * 0.7, s, s * 0.85);
          ctx.beginPath();
          ctx.moveTo(-h, -h * 0.35); ctx.lineTo(h, -h * 0.35);
          ctx.moveTo(-h * 0.55, -h);  ctx.lineTo(-h * 0.55, -h * 0.5);
          ctx.moveTo(h * 0.55, -h);   ctx.lineTo(h * 0.55, -h * 0.5);
          ctx.stroke();
          for (var r = 0; r < 2; r++)
            for (var c = 0; c < 3; c++) {
              ctx.beginPath();
              ctx.arc(-h * 0.5 + c * h * 0.5, -h * 0.02 + r * h * 0.45, 1.4, 0, Math.PI * 2);
              ctx.fill();
            }
          break;
        }
        case 'list': {
          ctx.lineWidth = 2.6;
          for (var i = 0; i < 3; i++) {
            var ly = -h * 0.6 + i * h * 0.6;
            ctx.beginPath();
            ctx.arc(-h * 0.78, ly, 1.8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-h * 0.42, ly); ctx.lineTo(h * 0.9, ly); ctx.stroke();
          }
          break;
        }
        case 'coin': {
          ctx.beginPath(); ctx.arc(0, 0, h * 0.95, 0, Math.PI * 2); ctx.stroke();
          ctx.font = '800 ' + Math.round(s * 0.66) + 'px "Bahnschrift", system-ui, sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('$', 0, 1);
          break;
        }
        case 'discord': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.85, -h * 0.45);
          ctx.quadraticCurveTo(0, -h * 0.85, h * 0.85, -h * 0.45);
          ctx.lineTo(h * 0.7, h * 0.55);
          ctx.quadraticCurveTo(h * 0.45, h * 0.8, h * 0.2, h * 0.55);
          ctx.lineTo(-h * 0.2, h * 0.55);
          ctx.quadraticCurveTo(-h * 0.45, h * 0.8, -h * 0.7, h * 0.55);
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath(); ctx.arc(-h * 0.32, 0, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(h * 0.32, 0, 2, 0, Math.PI * 2); ctx.fill();
          break;
        }
        case 'twitter': {
          // X mark (modern)
          ctx.beginPath(); ctx.moveTo(-h * 0.8, -h * 0.8); ctx.lineTo(h * 0.8, h * 0.8); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(h * 0.8, -h * 0.8); ctx.lineTo(-h * 0.8, h * 0.8); ctx.stroke();
          break;
        }
        case 'play': {
          roundRect(ctx, -h, -h * 0.7, s, s * 0.85, 5); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.22, -h * 0.32);
          ctx.lineTo(-h * 0.22, h * 0.28);
          ctx.lineTo(h * 0.42, -h * 0.02);
          ctx.closePath();
          ctx.fill();
          break;
        }
        case 'camera': {
          roundRect(ctx, -h, -h * 0.55, s, s * 0.95, 6); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, h * 0.1, h * 0.4, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(h * 0.55, -h * 0.25, 1.6, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath();
          ctx.moveTo(-h * 0.35, -h * 0.55);
          ctx.lineTo(-h * 0.15, -h * 0.85);
          ctx.lineTo(h * 0.15, -h * 0.85);
          ctx.lineTo(h * 0.35, -h * 0.55);
          ctx.stroke();
          break;
        }
        case 'tag': {
          ctx.beginPath();
          ctx.moveTo(-h * 0.1, -h * 0.85);
          ctx.lineTo(h * 0.85, -h * 0.85);
          ctx.lineTo(h * 0.85, h * 0.1);
          ctx.lineTo(-h * 0.15, h * 0.85);
          ctx.lineTo(-h * 0.85, h * 0.15);
          ctx.lineTo(-h * 0.85, -h * 0.6);
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath(); ctx.arc(-h * 0.5, -h * 0.5, 2, 0, Math.PI * 2); ctx.stroke();
          break;
        }
        case 'monitor': {
          roundRect(ctx, -h, -h * 0.75, s, s * 0.95, 5); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.3, h * 0.2); ctx.lineTo(-h * 0.3, h * 0.55);
          ctx.lineTo(h * 0.3, h * 0.55); ctx.lineTo(h * 0.3, h * 0.2);
          ctx.moveTo(-h * 0.5, h * 0.55); ctx.lineTo(h * 0.5, h * 0.55);
          ctx.stroke();
          for (var b = 0; b < 3; b++) {
            var bh = (b + 1) * h * 0.16;
            ctx.beginPath();
            ctx.moveTo(-h * 0.45 + b * h * 0.32, -h * 0.02);
            ctx.lineTo(-h * 0.45 + b * h * 0.32, -h * 0.02 - bh);
            ctx.stroke();
          }
          break;
        }
        case 'ribbon': {
          ctx.beginPath(); ctx.arc(0, -h * 0.25, h * 0.55, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-h * 0.3, h * 0.2); ctx.lineTo(-h * 0.5, h * 0.85);
          ctx.lineTo(-h * 0.1, h * 0.55);
          ctx.moveTo(h * 0.3, h * 0.2);  ctx.lineTo(h * 0.5, h * 0.85);
          ctx.lineTo(h * 0.1, h * 0.55);
          ctx.stroke();
          ctx.beginPath(); ctx.arc(0, -h * 0.25, 1.6, 0, Math.PI * 2); ctx.fill();
          break;
        }
        case 'star': {
          ctx.beginPath();
          for (var sp = 0; sp < 10; sp++) {
            var rr = (sp % 2 === 0) ? h * 0.95 : h * 0.42;
            var ang = -Math.PI / 2 + sp * Math.PI / 5;
            var X = Math.cos(ang) * rr, Y = Math.sin(ang) * rr;
            if (sp === 0) ctx.moveTo(X, Y); else ctx.lineTo(X, Y);
          }
          ctx.closePath();
          ctx.stroke();
          break;
        }
        default:
          ctx.beginPath(); ctx.arc(0, 0, h * 0.7, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    // ---- build the grid ---------------------------------------------------
    var grid = document.getElementById('grid');
    var made = [];

    function build() {
      for (var i = 0; i < PANELS.length; i++) {
        var p = PANELS[i];
        var card = document.createElement('div'); card.className = 'card';
        var frame = document.createElement('div'); frame.className = 'frame';
        var cv = document.createElement('canvas'); cv.width = W; cv.height = H;
        var ctx = cv.getContext('2d');
        drawPanel(ctx, p);
        frame.appendChild(cv);

        var row = document.createElement('div'); row.className = 'card-row';
        var nm = document.createElement('span'); nm.className = 'name'; nm.textContent = p.title;
        var dl = document.createElement('a'); dl.textContent = 'Download'; dl.href = '#';
        (function (canvas, id) {
          dl.addEventListener('click', function (e) { e.preventDefault(); save(canvas, id); });
        })(cv, p.id);
        row.appendChild(nm); row.appendChild(dl);

        card.appendChild(frame); card.appendChild(row);
        grid.appendChild(card);
        made.push({ canvas: cv, id: p.id });
      }
    }

    function save(canvas, id) {
      var a = document.createElement('a');
      a.download = 'panel-' + id + '.png';
      a.href = canvas.toDataURL('image/png');
      document.body.appendChild(a); a.click(); a.remove();
    }

    document.getElementById('dlAll').addEventListener('click', function () {
      var i = 0;
      (function next() {
        if (i >= made.length) return;
        save(made[i].canvas, made[i].id);
        i++;
        setTimeout(next, 200);
      })();
    });

    // headless export hook: [{name, dataURL}] for every panel
    window.__exportAssets = function () {
      return made.map(function (m) { return { name: m.id, dataURL: m.canvas.toDataURL('image/png') }; });
    };

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(build);
    } else {
      build();
    }
  })();
  </script>
</body>
</html>
