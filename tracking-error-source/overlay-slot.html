<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Tracking Error — In-Game Overlay</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT in-game HUD in the VHS/CRT "tracking error" language:
       a thin OSD frame outline with cyan/red chroma corner ticks, a slim
       lower-left tape strip with a blinking red REC dot + @handle + decorative
       timecode, and a flickering "TRACKING" tag top-right. Most of the screen
       stays transparent so gameplay shows through; only a faint band of analog
       snow rides the lower strip. Decoration is pointer-events:none.
       Optional URL params: ?handle=@you  ?tag=ON%20AIR  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT overlay: no tube background, no scanline/curve full-bleed wash */
    html,body{background:transparent;}
    #stage{background:transparent;color:var(--phosphor);}
    /* everything decorative is click-through */
    #stage *{pointer-events:none;}

    /* the analog-snow canvas is masked to a faint lower band only (no full wash) */
    canvas.bg{position:absolute;inset:0;width:1920px;height:1080px;opacity:.5;
      mix-blend-mode:screen;
      -webkit-mask:linear-gradient(180deg, transparent 0 74%, #000 90%, transparent 100%);
              mask:linear-gradient(180deg, transparent 0 74%, #000 90%, transparent 100%);}

    /* ---- thin OSD frame: a single inset hairline rectangle (no fill) ---- */
    .vframe{position:absolute;inset:30px;border:2px solid var(--hair);z-index:18;
      box-shadow:inset 0 0 0 1px rgba(15,15,15,.5);
      animation:framein .8s var(--ease) both .1s;}
    @keyframes framein{from{opacity:0}to{opacity:1}}
    /* short chroma-split corner ticks (cyan one way, red the other) on each corner */
    .ctick{position:absolute;width:64px;height:64px;}
    .ctick::before,.ctick::after{content:"";position:absolute;background:var(--phosphor);
      box-shadow:0 0 8px rgba(232,232,232,.4);}
    .ctick::before{left:0;top:0;width:64px;height:3px;
      box-shadow:0 3px 0 0 rgba(255,0,51,.55),0 -3px 0 0 rgba(25,195,255,.5),0 0 8px rgba(232,232,232,.4);}
    .ctick::after{left:0;top:0;width:3px;height:64px;
      box-shadow:3px 0 0 0 rgba(25,195,255,.5),-3px 0 0 0 rgba(255,0,51,.55),0 0 8px rgba(232,232,232,.4);}
    .ctick.tl{left:-2px;top:-2px;}
    .ctick.tr{right:-2px;top:-2px;transform:scaleX(-1);}
    .ctick.bl{left:-2px;bottom:-2px;transform:scaleY(-1);}
    .ctick.br{right:-2px;bottom:-2px;transform:scale(-1,-1);}

    /* ---- slim lower-left tape strip: REC dot + handle + decorative TC ---- */
    .slot{position:absolute;left:62px;bottom:58px;height:58px;z-index:22;
      display:flex;align-items:center;gap:20px;padding:0 26px 0 22px;
      background:linear-gradient(180deg, rgba(15,15,15,.80), rgba(7,7,7,.66));
      border:1px solid var(--hair);
      box-shadow:0 14px 40px rgba(0,0,0,.5), inset 0 0 24px rgba(0,0,0,.45),
        0 0 1px rgba(232,232,232,.3);
      animation:slotin .8s var(--ease) both .18s;}
    @keyframes slotin{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}
    /* a faint scanline texture inside the strip (multiply) */
    .slot::before{content:"";position:absolute;inset:0;mix-blend-mode:multiply;opacity:.5;
      background:repeating-linear-gradient(0deg, var(--scan) 0 1px, transparent 1px 3px);}

    /* blinking red REC dot + REC label (mono) */
    .slot .rec{display:flex;align-items:center;gap:12px;
      font-family:var(--osd);font-weight:700;font-size:24px;letter-spacing:.18em;
      color:var(--phosphor);text-shadow:0 0 1px rgba(0,0,0,.9);}
    .slot .rec .d{width:16px;height:16px;border-radius:50%;background:var(--rec-red);
      box-shadow:0 0 14px var(--red-glow),0 0 4px var(--rec-red);
      animation:recblink 1.05s steps(1,end) infinite;}
    .slot .rec .l{animation:recblink 1.05s steps(1,end) infinite;}

    /* divider hair rule between rec and handle */
    .slot .div{width:1px;height:30px;
      background:linear-gradient(180deg,transparent,var(--osd-dim),transparent);}

    /* handle — OSD mono with a caution-yellow ▸ prefix */
    .slot .who{font-family:var(--osd);font-weight:700;font-size:28px;letter-spacing:.14em;
      color:var(--phosphor);white-space:nowrap;text-shadow:0 0 1px rgba(0,0,0,.9),0 1px 2px rgba(0,0,0,.6);}
    .slot .who::before{content:"\25B8\00A0";color:var(--caution);}

    /* decorative timecode tail, dim phosphor */
    .slot .tc{font-family:var(--osd);font-weight:700;font-size:22px;letter-spacing:.10em;
      color:var(--osd-dim);}

    /* ---- flickering TRACKING tag, top-right (just inside the frame) ---- */
    .trk{position:absolute;right:60px;top:56px;z-index:22;display:flex;align-items:center;gap:14px;
      font-family:var(--osd);font-weight:700;font-size:22px;letter-spacing:.34em;text-indent:.34em;
      color:var(--chroma-cyan);text-shadow:0 0 14px var(--cyan-glow);
      animation:flick 2.6s steps(1,end) infinite;}
    .trk .sq{width:11px;height:11px;border:2px solid var(--chroma-cyan);
      box-shadow:0 0 10px var(--cyan-glow);}
    @keyframes flick{0%,40%{opacity:1}41%{opacity:.2}43%{opacity:1}66%{opacity:1}67%{opacity:.25}69%{opacity:1}87%{opacity:.3}89%{opacity:1}}
    @keyframes recblink{0%,55%{opacity:1}56%,100%{opacity:.12}}

    /* ---- RENDER MODE: freeze entrances + blink/flicker to a clean final state ---- */
    #stage.render .vframe,
    #stage.render .slot,
    #stage.render .trk{animation:none!important;opacity:1!important;}
    #stage.render .slot{transform:none!important;}
    #stage.render .slot .rec .d,
    #stage.render .slot .rec .l{animation:none!important;opacity:1!important;}
    #stage.render .trk{opacity:1!important;}
  </style>
</head>
<body>
  <div id="stage">
    <!-- faint analog snow riding only the lower band -->
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- thin OSD frame with chroma-split corner ticks -->
    <div class="vframe" aria-hidden="true">
      <span class="ctick tl"></span><span class="ctick tr"></span>
      <span class="ctick bl"></span><span class="ctick br"></span>
    </div>

    <!-- flickering TRACKING tag, top-right -->
    <div class="trk" aria-hidden="true"><span class="sq"></span>TRACKING</div>

    <!-- slim lower-left tape strip -->
    <div class="slot">
      <span class="rec" aria-hidden="true"><span class="d"></span><span class="l">REC</span></span>
      <span class="div" aria-hidden="true"></span>
      <span class="who" id="handle">@yourhandle</span>
      <span class="tc" aria-hidden="true">00:00:00:00</span>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;            // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + tag (REC label override via ?tag) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;
    const tag = params.get("tag"), tagEl = document.querySelector(".slot .rec .l");
    if (tag && tagEl) tagEl.textContent = tag;

    /* ---- canvas: a faint bed of analog SNOW (deterministic seeded RNG) ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = (cv && cv.width) || 1920, H = (cv && cv.height) || 1080;

    // seeded mulberry32 — no Math.random in the frame fn (render reproducibility)
    let _s = 0x54450F >>> 0;
    function srnd(){ _s |= 0; _s = (_s + 0x6D2B79F5) | 0;
      let t = Math.imul(_s ^ (_s >>> 15), 1 | _s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }
    const R = (a, b) => a + srnd() * (b - a);

    let snow = [];
    function build(){
      _s = 0x54450F >>> 0;                          // reset seed -> identical field
      const NS = Math.max(0, num("snow", 220));
      snow = Array.from({ length: NS }, () => ({
        x: R(0, W), y: R(0, H), s: R(1, 3), a: R(0.05, 0.30),
      }));
    }
    build();

    function drawBg(dt){
      if (!ctx) return;
      const steps = dt * 60;
      ctx.clearRect(0, 0, W, H);                    // TRANSPARENT clear (mask shapes the band)
      for (const p of snow){
        p.x += (srnd() - 0.5) * 6 * steps;
        p.y += (srnd() - 0.5) * 6 * steps;
        if (p.x < 0) p.x += W; if (p.x > W) p.x -= W;
        if (p.y < 0) p.y += H; if (p.y > H) p.y -= H;
        const v = 0.18 + srnd() * 0.82;
        ctx.globalAlpha = p.a * v;
        ctx.fillStyle = "#E8E8E8";
        const sz = Math.max(1, Math.round(p.s));
        ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
      }
      ctx.globalAlpha = 1;
    }
    window.__vhsDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; build(); drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
