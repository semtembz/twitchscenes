      <p class="kicker is-slot" id="kicker" data-slot="kicker">[ your text here ]</p>

      <h1 class="title">
        <span class="line l1">SHORT</span>
        <span class="accent">BREAK</span>

        <div class="fill" id="fill"></div>
        <div class="leaf-tip" id="leaftip">
