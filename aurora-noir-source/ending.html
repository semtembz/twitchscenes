<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Aurora Noir — Thanks For Watching</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?seconds=60  ?handle=@you  ?render=1
       Editable text slots: ?tag=...&tag2=...&kicker=...&sub=...  (use =- to remove one) -->
  <link rel="stylesheet" href="shared.css" />
  <!-- ending headline is the longest standard line ("THANKS FOR WATCHING"); scope a
       slightly smaller size + tighter tracking so it fits the 1200px glass panel
       (980px inner) with comfortable margin and never overflows. -->
  <style>
    .title--end{font-size:104px;letter-spacing:.07em;text-indent:.07em;margin:18px 0 8px;}
    .title--end .accent{letter-spacing:.06em;text-indent:.06em;}
    /* the two-line title + sub stack sits tight against the loading bar on this
       screen; add clearance so the editable [16] slot is never touched/sliced
       by the bar (or its glow). Smaller title frees the room for it. */
    .glass .sub{margin-top:20px;}
    .glass .bar{margin-top:60px;}
  </style>
</head>
<body>
  <div id="stage">
    <!-- iridescent aurora borealis sheen, painted on canvas, behind everything -->
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>
    <div class="haze" aria-hidden="true"></div>
    <div class="sweep" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>

    <!-- EDITABLE TEXT SLOTS: each .is-slot ships a "[ your text here ]" placeholder —
         type your own text in, or delete the whole line to remove it.
         (Or set ?tag=...&tag2=...&kicker=...&sub=... at render time; use =- to remove one.)
         These corner tags flank the TOP EDGE of the glass panel, in the clear margin. -->
    <div class="tag tag--tl is-slot" data-slot="tag"><span class="slot-no">13</span><span class="slot-txt">your text here</span></div>
    <div class="tag tag--tr is-slot" data-slot="tag2"><span class="slot-no">14</span><span class="slot-txt">your text here</span></div>

    <!-- the darkened, frosted BLACK-GLASS panel with a thin iridescent edge -->
    <main class="glass">
      <div class="crest" aria-hidden="true">
        <span class="r"></span><span class="dot"></span><span class="r r--r"></span>
      </div>
      <p class="kicker is-slot" id="kicker" data-slot="kicker"><span class="slot-no">15</span><span class="slot-txt">your text here</span></p>
      <h1 class="title title--end">THANKS FOR<span class="accent">WATCHING</span></h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="sub is-slot" data-slot="sub"><span class="slot-no">16</span><span class="slot-txt">your text here</span></p>
      <div class="bar" aria-hidden="true"><div class="fill" id="fill"></div></div>
    </main>

    <div class="handle" id="handle">@yourhandle</div>
  </div>
  <script src="shared.js"></script>
</body>
</html>
