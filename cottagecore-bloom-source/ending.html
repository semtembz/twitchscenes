  <link rel="stylesheet" href="shared.css" />

       all breathing INSIDE the 712px herbarium card. Uses only shared
       tokens + the shared fadeup keyframe; render mode freezes the hero. */

    .ending .handle-hero{margin-top:34px;font-size:52px;letter-spacing:.22em;text-indent:.22em;
      color:var(--rose);
      text-shadow:0 1px 0 rgba(255,253,244,.7), 0 3px 18px rgba(226,160,180,.35);
      animation:fadeup 1s var(--ease) both 1.2s;}
    .ending .handle-tag{margin-top:14px;
      font-family:"Optima","Gill Sans","Gill Sans MT","Segoe UI",Candara,"Avenir Next",system-ui,sans-serif;
      letter-spacing:.42em;font-size:18px;text-indent:.42em;color:var(--leaf-deep);opacity:.85;
      text-transform:uppercase;animation:fadeup 1s var(--ease) both 1.3s;}
    #stage.render .ending .handle-hero,
    #stage.render .ending .handle-tag{animation:none!important;opacity:1;transform:none;}
  </style>
