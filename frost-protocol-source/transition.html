<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Transition — Frost Protocol Crystallizing Ice Wipe</title>
  <!--
    FROST PROTOCOL stinger ("Flash Freeze"). A cold-blue frost CRYSTALLIZES
    inward from all four void edges: a creeping sheet of frozen glass advances
    toward centre while hexagonal ice shards (six radial arms with dendrite
    side-branches) bloom along the frost line and drifting frost specks rush in.
    At full cover (t=0.5) the screen is a solid sheet of frosted glass with a
    crisp sub-zero light-flash and a flicker of bright registration ticks. Then
    the ice THAWS — the sheet retreats back to the edges and the screen clears.
    Transparent before & after, deterministic (seeded RNG, no Math.random in the
    frame fn), sine-driven, ~1200ms. Clinical & cold, NO velvet/neon/glitch.

    Plays ONCE on load, then clears.
      ?loop=1   loop it (for previewing)
      ?ms=1200  total duration in ms (default 1200)

    To use as an OBS Stinger you need a VIDEO file (OBS can't use a web page as a
    stinger). Use transition-export.html to record a transparent .webm, then add
    it as a Stinger transition with the Transition Point at ~50% (full cover).
  -->
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="c" width="1920" height="1080"></canvas>
  <script>
  (() => {
    "use strict";
    const W = 1920, H = 1080, CX = W / 2, CY = H / 2;
    const cv = document.getElementById('c'), ctx = cv.getContext('2d');
    const params = new URLSearchParams(location.search);
    const DUR = Number(params.get('ms')) || 1200;
    const LOOP = params.get('loop') === '1';

    /* ---- palette (frost protocol) ---- */
    const BG_DEEP = '#0C1014', BG_LIFT = '#11181F';
    const ACCENT = '#7FB4D6', ICE = '#CFE6F2', TEXT = '#F2F7FA';
    /* rgb tuples for alpha compositing */
    const ACC = [127, 180, 214], ICEC = [207, 230, 242], DEEP = [12, 16, 20];

    const clamp01 = (x) => x < 0 ? 0 : x > 1 ? 1 : x;
    const smooth = (x) => { x = clamp01(x); return x * x * (3 - 2 * x); };
    const lerp = (a, b, t) => a + (b - a) * t;
    const rgba = (c, a) => 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a.toFixed(3) + ')';

    /* ---- seeded RNG, used ONCE up-front to lay out the crystal field; the
       frame fn is a pure deterministic function of t (no Math.random). ---- */
    let seed = 0xF205 >>> 0;
    const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
    const R = (a, b) => a + rnd() * (b - a);

    /* hexagonal ICE SHARDS that bloom as the frost line passes them. Each is
       seeded at a fixed position; its "grow" window is keyed to how deep its
       position is from the nearest edge, so crystals form behind the advancing
       frost front and melt as it retreats. */
    const N_SHARD = 90;
    const shards = Array.from({ length: N_SHARD }, () => {
      const x = R(0, W), y = R(0, H);
      // depth = distance to nearest edge, normalized 0(edge)..1(centre-ish)
      const dEdge = Math.min(x, W - x, y * (W / H), (H - y) * (W / H)) / (Math.min(W, H) / 2);
      return {
        x, y,
        r: R(26, 78),
        arms: 6,
        rot: R(0, Math.PI),
        spin: R(-0.5, 0.5),
        branch: R(0.32, 0.6),     // where side-dendrites attach along an arm
        bAng: R(0.5, 0.85),       // dendrite angle off the main arm
        depth: clamp01(dEdge),
        jitter: R(0.85, 1.15),
        a: R(0.30, 0.62),
        col: rnd() < 0.4 ? ICEC : ACC,
      };
    });

    /* drifting FROST SPECKS that rush inward toward centre with the freeze. */
    const N_SPECK = 110;
    const specks = Array.from({ length: N_SPECK }, () => {
      const ang = R(0, Math.PI * 2), edge = R(0.62, 1.05);
      return {
        ang, edge,
        x0: CX + Math.cos(ang) * (W * 0.62) * edge,
        y0: CY + Math.sin(ang) * (H * 0.62) * edge,
        s: R(1.0, 3.2),
        lead: R(0, 0.22), span: R(0.45, 0.8),
        a: R(0.35, 0.85),
        tw: R(1.2, 2.6), phase: R(0, 6.2832),
        pull: R(0.18, 0.5),       // how far it gets pulled toward centre
        col: rnd() < 0.5 ? ICEC : ACC,
      };
    });

    /* draw one hexagonal crystal: six radial arms, each with a pair of
       dendrite side-branches. g = growth 0..1 (arm length fraction). */
    function drawShard(s, g, alpha) {
      if (g <= 0.01 || alpha <= 0.01) return;
      const r = s.r * s.jitter * g;
      ctx.save();
      ctx.translate(Math.round(s.x), Math.round(s.y));
      ctx.rotate(s.rot + s.spin * g * 0.6);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = s.col === ICEC ? ICE : ACCENT;
      ctx.lineWidth = 1.4;
      ctx.shadowColor = ACCENT;
      ctx.shadowBlur = 6 * g;
      ctx.beginPath();
      for (let i = 0; i < s.arms; i++) {
        const ang = (i / s.arms) * Math.PI * 2;
        const ax = Math.cos(ang), ay = Math.sin(ang);
        ctx.moveTo(0, 0);
        ctx.lineTo(ax * r, ay * r);
        // dendrite side-branches near the tip
        const bx = ax * r * s.branch, by = ay * r * s.branch;
        const bl = r * 0.34;
        const a1 = ang + s.bAng, a2 = ang - s.bAng;
        ctx.moveTo(bx, by); ctx.lineTo(bx + Math.cos(a1) * bl, by + Math.sin(a1) * bl);
        ctx.moveTo(bx, by); ctx.lineTo(bx + Math.cos(a2) * bl, by + Math.sin(a2) * bl);
        // a second, shorter branch pair further out
        const cx2 = ax * r * (s.branch + 0.30), cy2 = ay * r * (s.branch + 0.30);
        const cl = r * 0.20;
        ctx.moveTo(cx2, cy2); ctx.lineTo(cx2 + Math.cos(a1) * cl, cy2 + Math.sin(a1) * cl);
        ctx.moveTo(cx2, cy2); ctx.lineTo(cx2 + Math.cos(a2) * cl, cy2 + Math.sin(a2) * cl);
      }
      ctx.stroke();
      // tiny bright core
      ctx.shadowBlur = 0;
      ctx.fillStyle = rgba(ICEC, 0.9);
      ctx.beginPath(); ctx.arc(0, 0, 1.6 + g * 1.4, 0, 6.2832); ctx.fill();
      ctx.restore();
    }

    /* the advancing FROSTED-GLASS sheet. We build a radial "freeze front":
       cover drives how far the frost has crept from the edges toward centre.
       Painted as a vignette-inverse — opaque/frosty at the rim, clearing a
       shrinking transparent hole in the middle until full cover seals it. */
    function drawFrostSheet(cover) {
      if (cover <= 0.002) return;
      // hole radius shrinks to 0 as cover -> 1
      const maxR = Math.hypot(CX, CY);
      const hole = (1 - smooth(cover)) * maxR * 1.02;
      ctx.save();
      // frosted base — cold deep-blue glass, denser toward the edge
      const g = ctx.createRadialGradient(CX, CY, Math.max(0, hole * 0.62), CX, CY, maxR);
      const baseA = lerp(0.0, 0.92, smooth(cover));
      g.addColorStop(0.00, rgba(DEEP, 0));
      g.addColorStop(0.55, rgba([16, 23, 30], baseA * 0.7));
      g.addColorStop(1.00, rgba([10, 14, 18], baseA));
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      // a cold-blue ice tint layered over the frost
      const t2 = ctx.createRadialGradient(CX, CY, Math.max(0, hole * 0.5), CX, CY, maxR);
      t2.addColorStop(0.00, rgba(ACC, 0));
      t2.addColorStop(0.80, rgba(ACC, 0.10 * smooth(cover)));
      t2.addColorStop(1.00, rgba(ICEC, 0.16 * smooth(cover)));
      ctx.fillStyle = t2;
      ctx.fillRect(0, 0, W, H);

      // bright crystallizing rim at the freeze front (where the hole meets glass)
      if (hole > 2 && hole < maxR) {
        const frontA = Math.sin(smooth(cover) * Math.PI);   // strongest mid-sweep
        ctx.globalAlpha = 0.5 * frontA + 0.15;
        ctx.strokeStyle = ICE;
        ctx.lineWidth = 3;
        ctx.shadowColor = ACCENT;
        ctx.shadowBlur = 26;
        ctx.beginPath(); ctx.arc(CX, CY, hole, 0, 6.2832); ctx.stroke();
        ctx.globalAlpha = 0.18 * frontA;
        ctx.lineWidth = 16;
        ctx.beginPath(); ctx.arc(CX, CY, hole, 0, 6.2832); ctx.stroke();
      }
      ctx.restore();

      // fine frost striations across the sealed sheet near full cover
      if (cover > 0.45) {
        const sa = smooth((cover - 0.45) / 0.55);
        ctx.save();
        ctx.globalAlpha = 0.06 * sa;
        ctx.strokeStyle = ICE;
        ctx.lineWidth = 1;
        for (let x = -H; x < W + H; x += 26) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + H * 0.22, H); ctx.stroke();
        }
        ctx.restore();
      }
    }

    function drawSpecks(t, cover) {
      ctx.save();
      for (const p of specks) {
        const lt = clamp01((t - p.lead) / p.span);
        if (lt <= 0 || lt >= 1) continue;
        // rush inward toward centre, then settle
        const k = smooth(lt) * p.pull;
        const px = lerp(p.x0, CX, k) + Math.sin(p.phase + lt * 6.2832) * 6;
        const py = lerp(p.y0, CY, k) + Math.cos(p.phase + lt * 6.2832) * 6;
        const ends = Math.sin(lt * Math.PI);
        const twk = 0.55 + Math.sin(p.phase + lt * p.tw * 6.2832) * 0.45;
        const a = p.a * ends * twk * lerp(0.4, 1, cover);
        if (a <= 0.02) continue;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.col === ICEC ? ICE : ACCENT;
        ctx.shadowColor = ACCENT;
        ctx.shadowBlur = 6;
        const s = p.s;
        // a tiny ice diamond
        ctx.beginPath();
        ctx.moveTo(Math.round(px), Math.round(py - s));
        ctx.lineTo(Math.round(px + s), Math.round(py));
        ctx.lineTo(Math.round(px), Math.round(py + s));
        ctx.lineTo(Math.round(px - s), Math.round(py));
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawShards(cover) {
      // a shard blooms once the freeze front has reached its depth.
      // front goes 0(edge)->1(centre) with cover. growth = how far past front.
      const front = smooth(cover);
      for (const s of shards) {
        // growth 0..1 as front sweeps from the shard's depth onward
        const g = smooth(clamp01((front - s.depth * 0.92) / 0.34));
        if (g <= 0.01) continue;
        const a = s.a * Math.min(1, cover * 1.6);
        drawShard(s, g, a);
      }
    }

    /* a flicker of bright registration ticks at the centre at full cover —
       echoes the card's corner crop-marks; a clinical "frame locked" beat. */
    function drawRegTicks(t) {
      const pk = Math.exp(-Math.pow((t - 0.5) / 0.07, 2));   // peaks at t=0.5
      if (pk <= 0.03) return;
      ctx.save();
      ctx.globalAlpha = 0.9 * pk;
      ctx.strokeStyle = ICE;
      ctx.lineWidth = 2;
      ctx.shadowColor = ACCENT;
      ctx.shadowBlur = 14;
      const half = 260, arm = 34;
      const corners = [
        [CX - half, CY - half, 1, 1], [CX + half, CY - half, -1, 1],
        [CX - half, CY + half, 1, -1], [CX + half, CY + half, -1, -1],
      ];
      for (const [x, y, sx, sy] of corners) {
        ctx.beginPath();
        ctx.moveTo(x, y); ctx.lineTo(x + sx * arm, y);
        ctx.moveTo(x, y); ctx.lineTo(x, y + sy * arm);
        ctx.stroke();
      }
      ctx.restore();
    }

    const TEXTRGB = [242, 247, 250];

    function frame(t) {
      ctx.clearRect(0, 0, W, H);
      const cover = Math.sin(clamp01(t) * Math.PI);     // 0 -> 1 -> 0, full cover at t=0.5

      drawFrostSheet(cover);
      drawShards(cover);
      drawSpecks(t, cover);
      drawRegTicks(t);

      // crisp sub-zero light-flash at the very peak (full cover)
      const flash = Math.exp(-Math.pow((t - 0.5) / 0.045, 2));
      if (flash > 0.02) {
        ctx.save();
        const fg = ctx.createRadialGradient(CX, CY, 0, CX, CY, W * 0.62);
        fg.addColorStop(0, rgba(TEXTRGB, 0.40 * flash));
        fg.addColorStop(0.45, rgba(ICEC, 0.18 * flash));
        fg.addColorStop(1, rgba(ACC, 0));
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = fg;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    // Exposed so a verification step / headless pipeline can render any frame (t in 0..1).
    window.__txDraw = (t) => frame(clamp01(t));

    let start = null;
    function loop(ts) {
      if (start == null) start = ts;
      let t = (ts - start) / DUR;
      if (t >= 1) {
        if (LOOP) { start = ts + 600; t = 0; }            // pause then replay
        else { ctx.clearRect(0, 0, W, H); return; }       // play once, then clear
      }
      frame(clamp01(t));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
