<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Neon Tokyo — Ending</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?handle=@you -->
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>
    <div class="scan" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>

    <!-- EDITABLE TEXT SLOTS: each .is-slot below ships a "[ your text here ]"
         placeholder — type your own text in, or delete the whole line to remove it.
         (Or set ?kicker=...&sub=...&tag=...&tag2=... at render time; use =- to remove one.) -->
    <div class="hud" aria-hidden="true"><span class="blip"></span> <span class="is-slot" data-slot="tag"><span class="slot-no">13</span><span class="slot-txt">your text here</span></span></div>
    <div class="hud hud--tr is-slot" data-slot="tag2"><span class="slot-no">14</span><span class="slot-txt">your text here</span></div>
    <div class="sign sign--l" aria-hidden="true">完了</div>
    <div class="sign sign--r" aria-hidden="true">感謝</div>

    <main class="board">
      <p class="tag"><span class="sq"></span> <span class="is-slot" id="kicker" data-slot="kicker"><span class="slot-no">15</span><span class="slot-txt">your text here</span></span></p>
      <!-- HEADLINE = the standard scene message, never the theme name -->
      <h1 class="title">THANKS FOR<span class="l2"><b>WATCHING</b></span></h1>
      <p class="sub is-slot" data-slot="sub"><span class="slot-no">16</span><span class="slot-txt">your text here</span></p>
    </main>

    <div class="ground" aria-hidden="true"></div>
    <div class="handle" id="handle">@yourhandle</div>
  </div>
  <script src="shared.js"></script>
</body>
</html>
