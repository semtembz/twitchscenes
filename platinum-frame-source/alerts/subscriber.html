<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Platinum Frame — Subscriber Alert</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, transparent, Local file -> this file.
       Background is TRANSPARENT so the alert composites over your scene/gameplay.
       Auto-plays a looping demo. Override via URL params:
         ?name=SomeName  ?amount=10   (?type= can also force a different event)
         ?noname=1 hides the baked name (your alert platform overlays the live name)
         ?render=1 deterministic capture mode for the headless webm pipeline -->
  <link rel="stylesheet" href="../alerts.css" />
</head>
<body data-event="subscriber">
  <div id="stage">
    <canvas class="fx" width="1920" height="1080" aria-hidden="true"></canvas>

    <aside class="alert" id="alert">
      <div class="sweep" aria-hidden="true"></div>
      <span class="tick tick--tl" aria-hidden="true"></span>
      <span class="tick tick--tr" aria-hidden="true"></span>
      <span class="tick tick--bl" aria-hidden="true"></span>
      <span class="tick tick--br" aria-hidden="true"></span>
      <span class="nid" aria-hidden="true">NODE&nbsp;9AA7-B2</span>

      <div class="plate" aria-hidden="true"><span class="glyph" id="glyph">✦</span></div>

      <div class="meta">
        <p class="kick"><span class="dia" aria-hidden="true"></span><span id="kick-label">NEW SUBSCRIBER</span></p>
        <h1 class="name" id="name">Viewer</h1>
        <p class="amount" id="amount"></p>
        <p class="sub" id="sub"></p>
      </div>

      <span class="strip" aria-hidden="true"></span>
    </aside>
  </div>
  <script src="../alerts.js"></script>
</body>
</html>
