<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Hologrid — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one holographic ~16:9 webcam frame. Place your
       camera BEHIND this overlay; the inside of the frame is fully transparent
       so the camera shows through it. Chamfered cyan border + bright corner
       targeting brackets + a chromatic-fringe readout + a mint #handle plate.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint data motes drift around the frame, additive holo glow */
    canvas.bg{pointer-events:none;opacity:.5;mix-blend-mode:screen;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* glowing cyan holo border; INSIDE stays transparent.
       sci-fi chamfer cuts top-right + bottom-left (matches the .panel motif). */
    .frame{position:absolute;inset:0;background:transparent;
      border:1px solid var(--panel-edge);
      box-shadow:
        0 0 0 1px rgba(2,4,10,.4),
        0 0 24px rgba(54,194,255,.35),
        0 0 64px rgba(27,43,107,.30),
        inset 0 0 30px rgba(54,194,255,.10);
      clip-path:polygon(0 0, calc(100% - 30px) 0, 100% 30px, 100% 100%, 30px 100%, 0 calc(100% - 30px));}
    /* inner cyan hairline double border (transparent inside) */
    .frame::before{content:"";position:absolute;inset:9px;border:1px solid var(--hair-soft);
      clip-path:inherit;pointer-events:none;}
    /* glowing multi-stop top hairline running across the frame (panel signature) */
    .frame::after{content:"";position:absolute;left:0;right:0;top:0;height:2px;pointer-events:none;
      background:linear-gradient(90deg,transparent,var(--cyan) 28%,var(--mint) 50%,var(--violet) 72%,transparent);
      box-shadow:0 0 16px rgba(54,194,255,.6);opacity:.9;}

    /* bright corner BRACKETS framing the cam (HUD targeting marks) */
    .bracket{position:absolute;width:42px;height:42px;pointer-events:none;
      animation:brin 1.1s var(--ease) both .42s;}
    .bracket::before,.bracket::after{content:"";position:absolute;background:var(--bracket);
      box-shadow:0 0 10px rgba(54,194,255,.7);}
    .bracket::before{width:42px;height:2px;} .bracket::after{width:2px;height:42px;}
    .bracket.tl{left:-5px;top:-5px;}    .bracket.tl::before{left:0;top:0;}    .bracket.tl::after{left:0;top:0;}
    .bracket.tr{right:-5px;top:-5px;}   .bracket.tr::before{right:0;top:0;}   .bracket.tr::after{right:0;top:0;}
    .bracket.bl{left:-5px;bottom:-5px;} .bracket.bl::before{left:0;bottom:0;} .bracket.bl::after{left:0;bottom:0;}
    .bracket.br{right:-5px;bottom:-5px;}.bracket.br::before{right:0;bottom:0;}.bracket.br::after{right:0;bottom:0;}
    @keyframes brin{from{opacity:0}to{opacity:1}}

    /* a thin scanning energy line sweeping along the bottom edge of the frame */
    .scan{position:absolute;left:30px;right:0;bottom:0;height:2px;overflow:hidden;pointer-events:none;}
    .scan::before{content:"";position:absolute;top:0;left:0;height:100%;width:40%;
      background:linear-gradient(90deg,transparent,var(--cyan),var(--mint),transparent);
      box-shadow:0 0 14px rgba(54,194,255,.7);
      animation:scanline 3.4s var(--ease) infinite;}
    @keyframes scanline{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}

    /* small mono caption + blinking LED, top-left above the frame */
    .cap{position:absolute;left:2px;top:-40px;display:flex;align-items:center;gap:12px;
      font-family:var(--mono);letter-spacing:.40em;font-size:16px;color:var(--cyan);
      text-indent:.40em;opacity:.85;text-transform:uppercase;
      text-shadow:0 0 14px rgba(54,194,255,.35);}
    .cap .led{width:9px;height:9px;border-radius:50%;background:var(--mint);
      box-shadow:0 0 12px var(--mint);animation:blink 1.8s steps(1,end) infinite;}
    @keyframes blink{0%,72%{opacity:1}73%,100%{opacity:.25}}

    /* chromatic-fringe telemetry readout, top-right above the frame */
    .read{position:absolute;right:2px;top:-40px;display:flex;align-items:center;gap:13px;
      font-family:var(--mono);letter-spacing:.26em;font-size:15px;color:rgba(54,194,255,.5);
      text-indent:.26em;}
    .read .r{width:70px;height:1px;background:linear-gradient(90deg,transparent,var(--hair));}

    /* handle nameplate — chamfered holo pill clipped to bottom-center of the frame */
    .plate{position:absolute;left:50%;bottom:-18px;transform:translateX(-50%);
      display:flex;align-items:center;gap:14px;white-space:nowrap;
      background:
        linear-gradient(180deg, rgba(54,194,255,.08), rgba(27,43,107,.24)),
        var(--panel);
      border:1px solid var(--panel-edge);padding:8px 26px;
      box-shadow:0 14px 34px rgba(2,4,10,.5), 0 0 24px rgba(54,194,255,.12),
        inset 0 1px 0 rgba(234,242,255,.10);
      clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%);}
    .plate .led{width:9px;height:9px;border-radius:50%;background:var(--mint);
      box-shadow:0 0 12px var(--mint);animation:blink 1.8s steps(1,end) infinite;}
    .plate .who{font-family:var(--mono);font-weight:600;letter-spacing:.16em;font-size:24px;
      color:var(--mint);text-shadow:0 0 18px rgba(91,255,208,.4);}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .bracket{animation:none!important;}
    #stage.render .scan::before{animation:none;display:none;}
    #stage.render .cap .led,#stage.render .plate .led{animation:none;opacity:1;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .bracket{opacity:1;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>

      <!-- bright corner targeting brackets in every corner -->
      <span class="bracket tl" aria-hidden="true"></span>
      <span class="bracket tr" aria-hidden="true"></span>
      <span class="bracket bl" aria-hidden="true"></span>
      <span class="bracket br" aria-hidden="true"></span>

      <!-- scanning energy line along the bottom edge -->
      <span class="scan" aria-hidden="true"></span>

      <span class="cap" aria-hidden="true"><span class="led"></span>ON CAMERA</span>
      <span class="read" aria-hidden="true"><span class="r"></span>FEED // CAM-01</span>

      <div class="plate"><span class="led" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint data motes (cyan/mint/violet) drifting around the frame ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    const R = (a, b) => a + Math.random() * (b - a);
    const TINT = ["#36C2FF", "#5BFFD0", "#B66BFF"];
    const motes = Array.from({ length: Math.max(0, num("motes", 38)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.5), vy: R(-9, -3) / 60, sway: R(0.3, 1.1),
      ph: R(0, 6.28), a: R(0.16, 0.55), tint: TINT[(Math.random() * 3) | 0],
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const m of motes){
        m.y += m.vy * dt * 60; m.ph += 0.04 * dt * 60; m.x += Math.sin(m.ph) * m.sway * 0.6;
        if (m.y < -10){ m.y = H + 10; m.x = Math.random() * W; }
        if (m.x < -10) m.x = W + 10; if (m.x > W + 10) m.x = -10;
        const tw = 0.55 + Math.sin(m.ph * 1.6) * 0.45;
        ctx.globalAlpha = m.a * tw;
        ctx.fillStyle = m.tint;
        const s = Math.max(1, Math.round(m.z * 1.6));
        ctx.fillRect(Math.round(m.x), Math.round(m.y), s, s);
      }
      ctx.restore();
      ctx.globalAlpha = 1;
    }
    window.__holoDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
