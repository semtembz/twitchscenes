<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sakura Static Twitch Panels — generator</title>
  <!--
    Twitch panels are PNG image files (recommended 320 x 100 px) you upload to
    your channel's "About" page. This file renders each panel onto a canvas at
    exactly 320 x 100 in the sakura-static visual language, with a Download button
    per panel that saves it as a PNG.

    How to use:
      1. Open this file in a browser.
      2. Click "Download all" (or the individual Download buttons).
      3. Upload each .png to Twitch:
         twitch.tv/<you>/about -> Edit Panels -> + -> upload image.
  -->
  <style>
    :root {
      --indigo-1: #0e0a12; --indigo-2: #1c1322;
      --vermilion: #ff5e9c; --vermilion-dark: #7b2d5e;
      --gold: #ffd1e6; --gold-soft: #ffe3f0;
      --washi: #f7f2f5;
    }
    @font-face {
      font-family: "Silkscreen";
      src: url("assets/fonts/Silkscreen-Regular.ttf") format("truetype");
      font-weight: 400;
    }
    @font-face {
      font-family: "Silkscreen";
      src: url("assets/fonts/Silkscreen-Bold.ttf") format("truetype");
      font-weight: 700;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, "Segoe UI", sans-serif; background: #07050a; color: var(--washi); padding: 32px; }
    h1 { font-family: "Silkscreen"; font-weight: 700; font-size: 28px; color: var(--gold-soft); letter-spacing: 2px; margin: 0 0 6px; }
    p.lead { color: #c9a6bc; margin: 0 0 22px; }
    .toolbar { margin: 0 0 28px; display: flex; gap: 14px; flex-wrap: wrap; }
    button { font-family: "Silkscreen"; font-weight: 700; font-size: 14px; letter-spacing: 2px;
      padding: 10px 18px; background: var(--vermilion); color: var(--washi); border: 2px solid var(--gold); cursor: pointer; }
    button:hover { background: var(--vermilion-dark); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
    .card { background: #11163a; padding: 14px; border: 1px solid #33203a; }
    canvas { display: block; width: 320px; height: 100px; image-rendering: pixelated; }
    .card-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; color: #c9a6bc; }
    .card-row .name { font-family: "Silkscreen"; color: var(--gold-soft); letter-spacing: 1px; }
    .card-row a { color: var(--gold-soft); text-decoration: none; border-bottom: 1px dashed var(--gold); }
  </style>
</head>
<body>
  <h1>SAKURA STATIC TWITCH PANELS</h1>
  <p class="lead">Each tile is a 320 &times; 100 PNG ready to upload to your Twitch panels page.</p>
  <div class="toolbar">
    <button id="dlAll">Download all</button>
  </div>
  <div class="grid" id="grid"></div>

  <script>
    // ---- Panel inventory ----
    // Each panel: title, optional subtitle, and a small geometric icon drawn in gold.
    const PANELS = [
      { id: 'about',     title: 'ABOUT ME',  sub: 'who i am',           icon: 'user' },
      { id: 'rules',     title: 'RULES',     sub: 'chat guidelines',    icon: 'shield' },
      { id: 'schedule',  title: 'SCHEDULE',  sub: 'when i go live',     icon: 'cal' },
      { id: 'donate',    title: 'DONATE',    sub: 'support the stream', icon: 'coin' },
      { id: 'subscribe', title: 'SUBSCRIBE', sub: 'join the squad',     icon: 'star' },
      { id: 'discord',   title: 'DISCORD',   sub: 'come hang out',      icon: 'chat' },
      { id: 'twitter',   title: 'TWITTER',   sub: 'follow me',          icon: 'bird' },
      { id: 'instagram', title: 'INSTAGRAM', sub: 'pictures of stuff',  icon: 'cam' },
      { id: 'youtube',   title: 'YOUTUBE',   sub: 'vods & highlights',  icon: 'play' },
      { id: 'socials',   title: 'SOCIALS',   sub: 'all my links',       icon: 'links' },
      { id: 'specs',     title: 'PC SPECS',  sub: 'my setup',           icon: 'cpu' },
      { id: 'merch',     title: 'MERCH',     sub: 'wear the brand',     icon: 'tag' },
    ];

    // ---- Tokens (must match the screens) ----
    const W = 320, H = 100, ICON_W = 92;
    const INDIGO_1 = '#0e0a12', INDIGO_2 = '#1c1322';
    const VERMILION = '#ff5e9c', VERMILION_DARK = '#7b2d5e';
    const GOLD = '#ffd1e6', GOLD_SOFT = '#ffe3f0';
    const WASHI = '#f7f2f5', WASHI_DIM = '#c9a6bc';

    function drawPanel(ctx, p) {
      // background gradient (indigo)
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, INDIGO_2); g.addColorStop(1, INDIGO_1);
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

      // subtle right-side pixel dot texture (very faint)
      ctx.fillStyle = 'rgba(255,209,230,0.06)';
      for (let y = 6; y < H; y += 14) for (let x = ICON_W + 14; x < W - 6; x += 14) ctx.fillRect(x, y, 1.5, 1.5);

      // left vermilion strip (icon area)
      ctx.fillStyle = VERMILION; ctx.fillRect(0, 0, ICON_W, H);
      ctx.fillStyle = VERMILION_DARK; ctx.fillRect(ICON_W - 4, 0, 4, H);
      // gold pixel rivets down the strip
      ctx.fillStyle = GOLD_SOFT;
      for (let y = 14; y < H; y += 24) ctx.fillRect(ICON_W - 12, y, 3, 3);

      drawIcon(ctx, p.icon, ICON_W / 2 - 14, H / 2 - 14, 28);

      // right side: gold accent rule + title + subtitle
      // gold pixel rule
      const rx = ICON_W + 16;
      for (let i = 0; i < 5; i++) { ctx.fillStyle = GOLD; ctx.fillRect(rx + i * 8, 22, 5, 3); }

      // title (Silkscreen bold)
      ctx.font = 'bold 22px "Silkscreen", monospace';
      ctx.textBaseline = 'top'; ctx.textAlign = 'left';
      // hard pixel shadow then washi top
      ctx.fillStyle = VERMILION_DARK; ctx.fillText(p.title, rx + 2, 34 + 2);
      ctx.fillStyle = WASHI; ctx.fillText(p.title, rx, 34);

      // subtitle (Silkscreen regular, small)
      ctx.font = '11px "Silkscreen", monospace';
      ctx.fillStyle = GOLD_SOFT;
      ctx.fillText(p.sub, rx, 66);

      // outer 2px gold border
      ctx.strokeStyle = GOLD; ctx.lineWidth = 2;
      ctx.strokeRect(1, 1, W - 2, H - 2);
      // inner 1px vermilion highlight
      ctx.strokeStyle = VERMILION_DARK; ctx.lineWidth = 1;
      ctx.strokeRect(3, 3, W - 6, H - 6);
    }

    // tiny pixel icons drawn in gold-soft, all 28x28-ish
    function drawIcon(ctx, kind, x, y, s) {
      ctx.save(); ctx.translate(x, y);
      ctx.fillStyle = GOLD_SOFT; ctx.shadowColor = GOLD; ctx.shadowBlur = 8;
      const px = (xx, yy, w, h) => ctx.fillRect(Math.round(xx), Math.round(yy), Math.round(w), Math.round(h));
      switch (kind) {
        case 'user':   // head + shoulders
          px(s*0.34, s*0.10, s*0.32, s*0.28);
          px(s*0.18, s*0.50, s*0.64, s*0.40); break;
        case 'shield':
          px(s*0.20, s*0.10, s*0.60, s*0.10);
          px(s*0.20, s*0.20, s*0.60, s*0.45);
          px(s*0.30, s*0.65, s*0.40, s*0.10);
          px(s*0.40, s*0.75, s*0.20, s*0.10); break;
        case 'cal':    // calendar
          px(s*0.12, s*0.20, s*0.76, s*0.65);
          ctx.fillStyle = VERMILION; px(s*0.16, s*0.30, s*0.68, s*0.10);  // header band
          ctx.fillStyle = GOLD_SOFT;
          for (let r = 0; r < 3; r++) for (let c = 0; c < 4; c++) px(s*0.20 + c*s*0.18, s*0.46 + r*s*0.12, s*0.10, s*0.06);
          px(s*0.24, s*0.06, s*0.06, s*0.18); px(s*0.70, s*0.06, s*0.06, s*0.18); // hangers
          break;
        case 'coin':   // $
          px(s*0.30, s*0.16, s*0.40, s*0.10);
          px(s*0.22, s*0.26, s*0.10, s*0.20);
          px(s*0.22, s*0.46, s*0.56, s*0.10);
          px(s*0.68, s*0.56, s*0.10, s*0.20);
          px(s*0.30, s*0.74, s*0.40, s*0.10);
          px(s*0.45, s*0.04, s*0.10, s*0.92); break;
        case 'star':
          px(s*0.42, s*0.04, s*0.16, s*0.20);
          px(s*0.20, s*0.24, s*0.60, s*0.12);
          px(s*0.10, s*0.36, s*0.80, s*0.16);
          px(s*0.24, s*0.52, s*0.52, s*0.16);
          px(s*0.16, s*0.68, s*0.20, s*0.20);
          px(s*0.64, s*0.68, s*0.20, s*0.20); break;
        case 'chat':   // speech bubble
          px(s*0.10, s*0.14, s*0.80, s*0.50);
          px(s*0.18, s*0.64, s*0.16, s*0.20);   // tail
          ctx.fillStyle = INDIGO_1;
          px(s*0.22, s*0.30, s*0.18, s*0.10);
          px(s*0.45, s*0.30, s*0.18, s*0.10);
          px(s*0.68, s*0.30, s*0.10, s*0.10); break;
        case 'bird':   // tiny stylized bird
          px(s*0.18, s*0.30, s*0.50, s*0.20);
          px(s*0.32, s*0.48, s*0.30, s*0.16);
          px(s*0.40, s*0.20, s*0.16, s*0.10);
          px(s*0.62, s*0.40, s*0.20, s*0.08); break;
        case 'cam':
          px(s*0.12, s*0.22, s*0.76, s*0.56);
          ctx.fillStyle = INDIGO_1;
          px(s*0.34, s*0.36, s*0.32, s*0.30);
          ctx.fillStyle = GOLD_SOFT;
          px(s*0.66, s*0.30, s*0.10, s*0.10); break;
        case 'play':
          px(s*0.10, s*0.20, s*0.80, s*0.60);
          ctx.fillStyle = INDIGO_1;
          for (let i = 0; i < 8; i++) px(s*0.34 + i*2, s*0.32 + i*2, s*0.06 - i*0.4, s*0.06 - i*0.4);
          // triangle play arrow
          ctx.fillStyle = INDIGO_1;
          for (let i = 0; i < 10; i++) px(s*0.36, s*0.34 + i*s*0.034, s*0.34 - i*s*0.030, s*0.034);
          break;
        case 'links':
          for (let r = 0; r < 3; r++) px(s*0.18, s*0.20 + r*s*0.22, s*0.60, s*0.12);
          break;
        case 'cpu':
          px(s*0.20, s*0.20, s*0.60, s*0.60);
          ctx.fillStyle = INDIGO_1; px(s*0.28, s*0.28, s*0.44, s*0.44);
          ctx.fillStyle = GOLD_SOFT;
          for (let i = 0; i < 3; i++) { px(s*0.30 + i*s*0.18, s*0.08, s*0.06, s*0.12); px(s*0.30 + i*s*0.18, s*0.80, s*0.06, s*0.12); }
          for (let i = 0; i < 3; i++) { px(s*0.08, s*0.30 + i*s*0.18, s*0.12, s*0.06); px(s*0.80, s*0.30 + i*s*0.18, s*0.12, s*0.06); }
          break;
        case 'tag':
          for (let r = 0; r < 10; r++) {
            const w = s*0.74 - r*s*0.04;
            if (w > 0) px(s*0.10 + r*s*0.04, s*0.16 + r*0.5, w, s*0.06);
          }
          px(s*0.10, s*0.16, s*0.20, s*0.60); // left band
          ctx.fillStyle = INDIGO_1; px(s*0.18, s*0.26, s*0.08, s*0.08); // hole
          break;
        default:
          px(s*0.30, s*0.30, s*0.40, s*0.40);
      }
      ctx.restore();
    }

    // ---- Build the grid ----
    const grid = document.getElementById('grid');
    const made = [];

    async function build() {
      await document.fonts.load('bold 22px "Silkscreen"');
      await document.fonts.load('11px "Silkscreen"');
      await document.fonts.ready;
      for (const p of PANELS) {
        const card = document.createElement('div'); card.className = 'card';
        const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
        const ctx = cv.getContext('2d');
        drawPanel(ctx, p);
        const row = document.createElement('div'); row.className = 'card-row';
        const nm = document.createElement('span'); nm.className = 'name'; nm.textContent = p.title;
        const dl = document.createElement('a'); dl.textContent = 'Download'; dl.href = '#';
        dl.addEventListener('click', (e) => { e.preventDefault(); save(cv, p.id); });
        row.appendChild(nm); row.appendChild(dl);
        card.appendChild(cv); card.appendChild(row);
        grid.appendChild(card);
        made.push({ canvas: cv, id: p.id });
      }
    }

    function save(canvas, id) {
      const a = document.createElement('a');
      a.download = 'panel-' + id + '.png';
      a.href = canvas.toDataURL('image/png');
      document.body.appendChild(a); a.click(); a.remove();
    }

    document.getElementById('dlAll').addEventListener('click', () => {
      // sequential to avoid the browser blocking multi-downloads
      let i = 0; const next = () => { if (i >= made.length) return; save(made[i].canvas, made[i].id); i++; setTimeout(next, 180); }; next();
    });

    build();
  </script>
</body>
</html>
