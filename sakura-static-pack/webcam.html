<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Sakura Static — Webcam Frame</title>
  <!--
    TRANSPARENT webcam frame overlay (1920x1080) that composites OVER your cam.
    OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
    Place this overlay ABOVE your webcam source in OBS, sized to match — the inside
    of the frame is fully transparent, so the camera shows through it.

    Draws a single rounded ~16:9 frame with a glowing magenta hairline border, soft
    corner petals, a small "@yourhandle" handle tag, and a corner サ kana accent.

    Optional URL params:
      ?handle=@you   handle shown on the tag (default @yourhandle)
      ?petals=10     corner petal count (default 10)
      ?pos=lower     frame position: center | lower (default center)
      ?w=960&h=540   frame size in stage px (defaults 960x540, kept ~16:9)

    Self-contained + offline: no CDN, no remote fonts/scripts. Scaled #stage + fit()
    + delta-clamped rAF. Exposes window.__draw() to render one canvas frame on demand.
  -->
  <style>
    :root{
      --plum-deep:#0E0A12; --plum-deepest:#07050A; --plum-mid:#1C1322;
      --mag:#FF5E9C; --mag-deep:#7B2D5E; --pink:#FFD1E6; --pink-soft:#FFE3F0;
      --washi:#F7F2F5; --dim:#C9A6BC;
      --card:rgba(24,15,30,0.62); --hair:rgba(255,209,230,0.22);
      --ease:cubic-bezier(.2,.9,.2,1);
    }
    *{box-sizing:border-box;}
    /* TRANSPARENT everywhere so the cam (under this overlay) shows through */
    html,body{margin:0;height:100%;overflow:hidden;background:transparent;}

    #stage{position:absolute;top:50%;left:50%;width:1920px;height:1080px;
      transform:translate(-50%,-50%) scale(var(--scale,1));transform-origin:center;
      overflow:hidden;background:transparent;
      font-family:system-ui,"Segoe UI",Roboto,sans-serif;color:var(--washi);}

    /* petals are drawn around the frame corners only */
    canvas.bg{position:absolute;inset:0;width:1920px;height:1080px;pointer-events:none;}

    /* the cam frame wrapper — centered or lower-third */
    .cam{position:absolute;left:50%;top:50%;width:960px;height:540px;
      transform:translate(-50%,-50%);
      animation:fade .8s var(--ease) both .15s;}
    .cam.lower{top:auto;bottom:90px;transform:translateX(-50%);}

    /* glowing magenta hairline border; INSIDE stays transparent */
    .frame{position:absolute;inset:0;border-radius:26px;background:transparent;
      border:1px solid var(--hair);
      box-shadow:
        0 0 0 2px rgba(255,94,156,.55),
        0 0 22px rgba(255,94,156,.45),
        0 0 60px rgba(255,94,156,.18),
        inset 0 0 24px rgba(255,94,156,.16),
        inset 0 0 0 1px rgba(255,209,230,.30);}
    /* a soft inner hairline ring for the frosted/CRT feel (still transparent inside) */
    .frame::after{content:"";position:absolute;inset:6px;border-radius:21px;
      border:1px solid rgba(255,209,230,.16);pointer-events:none;}

    /* little L-shaped corner ticks (top-left + bottom-right) */
    .tick{position:absolute;width:30px;height:30px;pointer-events:none;}
    .tick.tl{top:-2px;left:-2px;border-top:3px solid var(--mag);border-left:3px solid var(--mag);
      border-top-left-radius:24px;}
    .tick.br{bottom:-2px;right:-2px;border-bottom:3px solid var(--mag);border-right:3px solid var(--mag);
      border-bottom-right-radius:24px;}
    .tick.tl,.tick.br{box-shadow:0 0 12px rgba(255,94,156,.5);}

    /* handle tag — frosted pill clipped to bottom-left of the frame */
    .tag{position:absolute;left:18px;bottom:-18px;display:flex;align-items:center;gap:10px;
      font-family:"Courier New",monospace;letter-spacing:3px;font-size:20px;color:var(--pink-soft);
      background:var(--card);border:1px solid var(--hair);border-radius:14px;
      padding:8px 16px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      box-shadow:0 10px 30px rgba(0,0,0,.5), 0 0 22px rgba(255,94,156,.18);}
    .tag .rec{width:11px;height:11px;border-radius:50%;background:var(--mag);
      box-shadow:0 0 12px var(--mag);animation:blink 1.6s steps(1,end) infinite;}
    @keyframes blink{0%,55%{opacity:1}56%,100%{opacity:.15}}

    /* corner サ kana accent (top-right of the frame) */
    .kana{position:absolute;top:-12px;right:6px;font-size:64px;font-weight:700;
      color:rgba(255,209,230,.12);text-shadow:0 0 18px rgba(255,94,156,.18);
      user-select:none;line-height:1;}

    @keyframes fade{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true">
        <span class="tick tl"></span>
        <span class="tick br"></span>
      </div>
      <div class="kana" aria-hidden="true">&#12469;</div>
      <div class="tag"><span class="rec"></span><span id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const $ = (s) => document.querySelector(s);
    const $id = (id) => document.getElementById(id);

    /* ---- fit the 1920x1080 stage to the window (defensive) ---- */
    function fit() {
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw / 1920, ih / 1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size ---- */
    const handle = params.get("handle"), handleEl = $id("handle");
    if (handle && handleEl) handleEl.textContent = handle;

    const cam = $id("cam");
    if (cam) {
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 960), fh = num("h", 540);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: soft petals clustered around the frame corners ---- */
    const cv = $(".bg");
    if (cv) {
      const ctx = cv.getContext("2d");
      if (!ctx) return;
      const W = cv.width || 1920, H = cv.height || 1080;
      const PINKS = ["#FF5E9C", "#FFD1E6", "#FF9EC4"];
      const R = (a, b) => a + Math.random() * (b - a);
      const PETALS = Math.max(0, num("petals", 10));

      /* compute frame rect in stage coords so petals hug its corners */
      function frameRect() {
        const fw = num("w", 960), fh = num("h", 540);
        const lower = (params.get("pos") || "center").toLowerCase() === "lower";
        const cx = W / 2;
        const cy = lower ? (H - 90 - fh / 2) : (H / 2);
        return { x: cx - fw / 2, y: cy - fh / 2, w: fw, h: fh };
      }
      let RECT = frameRect();
      window.addEventListener("resize", () => { RECT = frameRect(); });

      /* spawn a petal near one of the four frame corners, drifting gently down */
      const mk = (initial) => {
        const corners = [
          { x: RECT.x, y: RECT.y }, { x: RECT.x + RECT.w, y: RECT.y },
          { x: RECT.x, y: RECT.y + RECT.h }, { x: RECT.x + RECT.w, y: RECT.y + RECT.h },
        ];
        const c0 = corners[(Math.random() * 4) | 0];
        return {
          x: c0.x + R(-70, 70), y: (initial ? c0.y + R(-70, 70) : c0.y - R(40, 120)),
          life: 0, ttl: R(3.5, 7), s: R(12, 24), vy: R(8, 20) / 60,
          sway: R(0.3, 0.9), ph: R(0, 6.28), drift: R(-0.2, 0.2),
          rot: R(0, 6.28), vr: R(-0.5, 0.5) / 60, a: R(0.18, 0.4),
          c: PINKS[(Math.random() * PINKS.length) | 0],
        };
      };
      const petals = Array.from({ length: PETALS }, () => mk(true));

      function drawPetal(p) {
        ctx.save(); ctx.translate(Math.round(p.x), Math.round(p.y)); ctx.rotate(p.rot);
        ctx.globalAlpha = p.a; ctx.fillStyle = p.c; ctx.shadowColor = p.c; ctx.shadowBlur = 8;
        const s = p.s;
        ctx.beginPath(); ctx.moveTo(0, -s);
        ctx.bezierCurveTo(s * 0.6, -s * 0.6, s * 0.5, s * 0.5, 0, s);
        ctx.bezierCurveTo(-s * 0.5, s * 0.5, -s * 0.6, -s * 0.6, 0, -s); ctx.closePath(); ctx.fill();
        ctx.restore();
      }

      function frame(dt) {
        const sec = (dt || 0) / 1000;
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < petals.length; i++) {
          const p = petals[i];
          p.y += p.vy; p.ph += 0.02; p.rot += p.vr;
          p.x += Math.sin(p.ph) * p.sway + p.drift;
          p.life += sec;
          if (p.life > p.ttl || p.y > H + 40) petals[i] = mk(false);
          drawPetal(petals[i]);
        }
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      }
      window.__draw = () => frame(0); // rAF-independent verification hook
      frame(0);

      let last = null, since = 0; const MIN = 1000 / 30;
      function loop(now) {
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        since += dt; if (since < MIN) return;
        frame(since); since = 0;
      }
      requestAnimationFrame(loop);
    } else {
      window.__draw = function () {};
    }
  })();
  </script>
</body>
</html>
