<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Strawberry Milk — Webcam Frame</title>
  <!--
    TRANSPARENT webcam frame overlay (1920x1080) that composites OVER your cam.
    OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
    Place this overlay ABOVE your webcam source in OBS, sized to match — the inside
    of the frame is fully transparent, so the camera shows through it.

    Draws a single rounded ~16:9 frame with a glowing pink-milk border, a dashed
    candy-stitch inner ring, soft corner pearls + hearts, a glossy "@yourhandle"
    handle tag, and a little corner heart accent.

    Optional URL params:
      ?handle=@you   handle shown on the tag (default @yourhandle)
      ?drift=10      corner sweet count (default 10)
      ?pos=lower     frame position: center | lower (default center)
      ?w=960&h=540   frame size in stage px (defaults 960x540, kept ~16:9)

    Self-contained + offline: no CDN, no remote fonts/scripts. Scaled #stage + fit()
    + delta-clamped rAF. Exposes window.__draw() to render one canvas frame on demand.
  -->
  <style>
    :root{
      --cream:#FFF1F4; --milk:#FFE3EC; --pink:#FFB3C6; --hot:#FF8FAB;
      --rose:#A45D6E; --mint:#BFEAD6; --gloss:#FFFFFF;
      --ink:#7A4453; --ink-soft:#B07E8C; --bead:#C98AA0;
      --card:rgba(255,255,255,0.82); --hair:rgba(255,143,171,0.55);
      --ease:cubic-bezier(.34,1.56,.64,1);
      --ease-soft:cubic-bezier(.22,1,.36,1);
    }
    *{box-sizing:border-box;}
    /* TRANSPARENT everywhere so the cam (under this overlay) shows through */
    html,body{margin:0;height:100%;overflow:hidden;background:transparent;}

    #stage{position:absolute;top:50%;left:50%;width:1920px;height:1080px;
      transform:translate(-50%,-50%) scale(var(--scale,1));transform-origin:center;
      overflow:hidden;background:transparent;color:var(--ink);
      font-family:"Baloo 2","Quicksand","Varela Round","Trebuchet MS",system-ui,sans-serif;}

    /* sweets are drawn around the frame corners only */
    canvas.bg{position:absolute;inset:0;width:1920px;height:1080px;pointer-events:none;}

    /* the cam frame wrapper — centered or lower-third */
    .cam{position:absolute;left:50%;top:50%;width:960px;height:540px;
      transform:translate(-50%,-50%);
      animation:pop .85s var(--ease) both .15s;}
    .cam.lower{top:auto;bottom:90px;transform:translateX(-50%);}

    /* glowing pink-milk border; INSIDE stays transparent */
    .frame{position:absolute;inset:0;border-radius:36px;background:transparent;
      box-shadow:
        0 0 0 6px var(--gloss),
        0 0 0 12px rgba(255,179,198,.65),
        0 0 28px rgba(255,143,171,.45),
        0 0 70px rgba(255,143,171,.20),
        inset 0 0 0 3px rgba(255,143,171,.55),
        inset 0 0 30px rgba(255,143,171,.16);}
    /* dashed candy-stitch ring just inside the frame (still transparent inside) */
    .frame::after{content:"";position:absolute;inset:14px;border-radius:26px;
      border:4px dashed rgba(255,143,171,.55);pointer-events:none;}

    /* little rounded corner ticks (top-left + bottom-right) */
    .tick{position:absolute;width:34px;height:34px;pointer-events:none;}
    .tick.tl{top:-3px;left:-3px;border-top:5px solid var(--hot);border-left:5px solid var(--hot);
      border-top-left-radius:30px;}
    .tick.br{bottom:-3px;right:-3px;border-bottom:5px solid var(--hot);border-right:5px solid var(--hot);
      border-bottom-right-radius:30px;}
    .tick.tl,.tick.br{filter:drop-shadow(0 0 8px rgba(255,143,171,.55));}

    /* handle tag — glossy pill clipped to bottom-left of the frame */
    .tag{position:absolute;left:22px;bottom:-22px;display:flex;align-items:center;gap:10px;
      font-weight:800;letter-spacing:2px;font-size:22px;color:var(--rose);
      background:var(--gloss);border-radius:30px;padding:10px 22px;
      box-shadow:0 12px 26px rgba(164,93,110,.20), inset 0 0 0 3px var(--milk);}
    .tag .heart{width:16px;height:16px;color:var(--hot);
      animation:beat 1.4s var(--ease-soft) infinite;}
    @keyframes beat{0%,100%{transform:scale(1)}30%{transform:scale(1.28)}}

    /* corner heart accent (top-right of the frame) */
    .accent{position:absolute;top:-26px;right:10px;width:54px;height:54px;color:var(--pink);
      opacity:.55;filter:drop-shadow(0 6px 10px rgba(255,143,171,.35));
      animation:bobble 3.4s var(--ease-soft) infinite;}
    @keyframes bobble{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-7px) rotate(6deg)}}

    @keyframes pop{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.85)}
      60%{opacity:1;transform:translate(-50%,-50%) scale(1.03)}
      100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    }
    /* lower-third variant pops without re-centering Y */
    .cam.lower{animation:popLower .85s var(--ease) both .15s;}
    @keyframes popLower{
      0%{opacity:0;transform:translateX(-50%) scale(.85)}
      60%{opacity:1;transform:translateX(-50%) scale(1.03)}
      100%{opacity:1;transform:translateX(-50%) scale(1)}
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true">
        <span class="tick tl"></span>
        <span class="tick br"></span>
      </div>
      <svg class="accent" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21C5 16 2 12 2 8.5 2 5.4 4.4 3 7.5 3 9.3 3 11 4 12 5.5 13 4 14.7 3 16.5 3 19.6 3 22 5.4 22 8.5 22 12 19 16 12 21z"/></svg>
      <div class="tag"><svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21C5 16 2 12 2 8.5 2 5.4 4.4 3 7.5 3 9.3 3 11 4 12 5.5 13 4 14.7 3 16.5 3 19.6 3 22 5.4 22 8.5 22 12 19 16 12 21z"/></svg><span id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const $ = (s) => document.querySelector(s);
    const $id = (id) => document.getElementById(id);

    /* ---- fit the 1920x1080 stage to the window (defensive) ---- */
    function fit() {
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw / 1920, ih / 1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size ---- */
    const handle = params.get("handle"), handleEl = $id("handle");
    if (handle && handleEl) handleEl.textContent = handle;

    const cam = $id("cam");
    if (cam) {
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 960), fh = num("h", 540);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: soft pearls + hearts clustered around the frame corners ---- */
    const cv = $(".bg");
    if (cv) {
      const ctx = cv.getContext("2d");
      if (!ctx) { window.__draw = function () {}; return; }
      const W = cv.width || 1920, H = cv.height || 1080;
      const HEART = ["#FF8FAB", "#FFB3C6", "#FFFFFF"];
      const BEAD = ["#C98AA0", "#A45D6E", "#FFB3C6"];
      const R = (a, b) => a + Math.random() * (b - a);
      const N = Math.max(0, num("drift", 10));

      /* compute frame rect in stage coords so sweets hug its corners */
      function frameRect() {
        const fw = num("w", 960), fh = num("h", 540);
        const lower = (params.get("pos") || "center").toLowerCase() === "lower";
        const cx = W / 2;
        const cy = lower ? (H - 90 - fh / 2) : (H / 2);
        return { x: cx - fw / 2, y: cy - fh / 2, w: fw, h: fh };
      }
      let RECT = frameRect();
      window.addEventListener("resize", () => { RECT = frameRect(); });

      /* spawn a sweet near one of the four frame corners, drifting gently up */
      const mk = (initial) => {
        const corners = [
          { x: RECT.x, y: RECT.y }, { x: RECT.x + RECT.w, y: RECT.y },
          { x: RECT.x, y: RECT.y + RECT.h }, { x: RECT.x + RECT.w, y: RECT.y + RECT.h },
        ];
        const c0 = corners[(Math.random() * 4) | 0];
        const kind = Math.random() < 0.55 ? 0 : 1; // 0 = pearl, 1 = heart
        return {
          kind,
          x: c0.x + R(-70, 70), y: (initial ? c0.y + R(-70, 70) : c0.y + R(40, 120)),
          life: 0, ttl: R(3.5, 7), s: kind === 1 ? R(12, 22) : R(7, 13),
          vy: R(8, 18) / 60, sway: R(0.3, 0.9), ph: R(0, 6.28), drift: R(-0.18, 0.18),
          rot: R(0, 6.28), vr: R(-0.4, 0.4) / 60, a: R(0.16, 0.36),
          c: kind === 1 ? HEART[(Math.random() * HEART.length) | 0] : BEAD[(Math.random() * BEAD.length) | 0],
        };
      };
      const items = Array.from({ length: N }, () => mk(true));

      function heart(p, x, y) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(p.rot); ctx.globalAlpha = p.a; ctx.fillStyle = p.c;
        const s = p.s;
        ctx.beginPath();
        ctx.moveTo(0, s * 0.34);
        ctx.bezierCurveTo(s * 0.9, -s * 0.55, s * 0.55, -s * 1.05, 0, -s * 0.5);
        ctx.bezierCurveTo(-s * 0.55, -s * 1.05, -s * 0.9, -s * 0.55, 0, s * 0.34);
        ctx.closePath(); ctx.fill(); ctx.restore();
      }
      function pearl(p, x, y) {
        ctx.save(); ctx.globalAlpha = p.a; ctx.fillStyle = p.c;
        ctx.beginPath(); ctx.arc(x, y, p.s, 0, 6.2832); ctx.fill();
        ctx.globalAlpha = p.a * 0.5; ctx.fillStyle = "#FFFFFF";
        ctx.beginPath(); ctx.arc(x - p.s * 0.3, y - p.s * 0.3, p.s * 0.32, 0, 6.2832); ctx.fill();
        ctx.restore();
      }

      function frame(dt) {
        const sec = (dt || 0) / 1000;
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < items.length; i++) {
          const p = items[i];
          p.y -= p.vy; p.ph += 0.02; p.rot += p.vr;
          p.x += Math.sin(p.ph) * p.sway + p.drift;
          p.life += sec;
          if (p.life > p.ttl || p.y < -40) items[i] = mk(false);
          const x = Math.round(items[i].x), y = Math.round(items[i].y);
          if (items[i].kind === 1) heart(items[i], x, y); else pearl(items[i], x, y);
        }
        ctx.globalAlpha = 1;
      }
      window.__draw = () => frame(0); // rAF-independent verification hook
      frame(0);

      let last = null, since = 0; const MIN = 1000 / 30;
      function loop(now2) {
        requestAnimationFrame(loop);
        if (last == null) last = now2;
        let dt = now2 - last; last = now2; if (dt > 100) dt = 100;
        since += dt; if (since < MIN) return;
        frame(since); since = 0;
      }
      requestAnimationFrame(loop);
    } else {
      window.__draw = function () {};
    }
  })();
  </script>
</body>
</html>
