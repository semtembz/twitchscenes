<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Velvet Lounge — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one art-deco ~16:9 webcam frame. Place your camera
       BEHIND this overlay; the inside of the frame is fully transparent so the
       camera shows through it.
       Optional URL params: ?handle=@you   ?pos=center|lower   ?w=1120&h=630 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint gold dust motes drift around the frame */
    canvas.bg{pointer-events:none;opacity:.6;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* glowing brass hairline border; INSIDE stays transparent.
       stepped (ziggurat) deco corners match the frame language. */
    .frame{position:absolute;inset:0;background:transparent;
      border:1px solid var(--brass);
      box-shadow:
        0 0 0 1px rgba(20,10,20,.5),
        0 0 22px rgba(230,201,140,.35),
        0 0 60px rgba(181,137,78,.18),
        inset 0 0 26px rgba(230,201,140,.10);
      clip-path:polygon(
        0 22px,12px 22px,12px 12px,22px 12px,22px 0,
        calc(100% - 22px) 0,calc(100% - 22px) 12px,calc(100% - 12px) 12px,calc(100% - 12px) 22px,100% 22px,
        100% calc(100% - 22px),calc(100% - 12px) calc(100% - 22px),calc(100% - 12px) calc(100% - 12px),calc(100% - 22px) calc(100% - 12px),calc(100% - 22px) 100%,
        22px 100%,22px calc(100% - 12px),12px calc(100% - 12px),12px calc(100% - 22px),0 calc(100% - 22px));}
    /* inner hairline double border (transparent inside) */
    .frame::before{content:"";position:absolute;inset:10px;border:1px solid var(--line-soft);
      clip-path:inherit;pointer-events:none;}

    /* deco sunburst / fan ornaments in every corner of the frame */
    .fan{position:absolute;width:118px;height:118px;pointer-events:none;opacity:.9;
      animation:fanin 1.1s var(--ease) both .3s;}
    .fan svg{width:100%;height:100%;display:block;}
    .fan--tl{left:18px;top:18px;}
    .fan--tr{right:18px;top:18px;transform:scaleX(-1);}
    .fan--bl{left:18px;bottom:18px;transform:scaleY(-1);}
    .fan--br{right:18px;bottom:18px;transform:scale(-1,-1);}
    @keyframes fanin{from{opacity:0}to{opacity:.9}}

    /* handle tag — frosted deco pill clipped to bottom-center of the frame */
    .tag{position:absolute;left:50%;bottom:-19px;transform:translateX(-50%);
      display:flex;align-items:center;gap:14px;white-space:nowrap;
      background:linear-gradient(180deg, rgba(20,10,20,.85), rgba(12,6,12,.78));
      border:1px solid var(--line);padding:8px 24px;
      box-shadow:0 12px 30px rgba(0,0,0,.5), 0 0 22px rgba(230,201,140,.12);
      clip-path:polygon(10px 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,10px 100%,0 50%);}
    .tag .who{
      font-family:"Optima","Gill Sans","Futura","Century Gothic",system-ui,sans-serif;
      letter-spacing:.34em;font-size:22px;color:var(--brass-lt);text-indent:.34em;
      text-shadow:0 0 16px rgba(230,201,140,.4);}
    .tag .dia{width:9px;height:9px;border:1px solid var(--brass-lt);transform:rotate(45deg);
      background:var(--brass-lt);box-shadow:0 0 10px var(--glow);
      animation:pulse 2.4s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

    /* small deco caption + monogram, top-left above the frame */
    .cap{position:absolute;left:8px;top:-42px;display:flex;align-items:center;gap:13px;
      font-family:"Optima","Gill Sans","Futura",system-ui,sans-serif;
      letter-spacing:.5em;font-size:17px;color:var(--brass);text-indent:.5em;opacity:.85;}
    .cap .dia{width:8px;height:8px;border:1px solid var(--brass);transform:rotate(45deg);
      box-shadow:0 0 8px rgba(230,201,140,.3);}

    /* corner monogram mark — top-right above the frame */
    .crest-tr{position:absolute;right:6px;top:-44px;display:flex;align-items:center;gap:14px;}
    .crest-tr .r{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--brass));}
    .crest-tr .dia{width:11px;height:11px;border:1px solid var(--brass-lt);transform:rotate(45deg);
      box-shadow:0 0 12px var(--glow);}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .fan{animation:none!important;}
    #stage.render .tag .dia{animation:none;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .fan{opacity:.9;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>

      <!-- deco sunburst / fan ornaments in every corner -->
      <span class="fan fan--tl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#B5894E" stroke-width="1.4">
            <path d="M2 2 L2 86 A84 84 0 0 1 86 2 Z" fill="rgba(181,137,78,0.06)" stroke="#E6C98C"/>
            <line x1="2" y1="2" x2="2" y2="86"/><line x1="2" y1="2" x2="20" y2="84"/>
            <line x1="2" y1="2" x2="40" y2="78"/><line x1="2" y1="2" x2="58" y2="66"/>
            <line x1="2" y1="2" x2="72" y2="50"/><line x1="2" y1="2" x2="82" y2="32"/>
            <line x1="2" y1="2" x2="86" y2="2"/>
          </g>
          <circle cx="2" cy="2" r="4" fill="#E6C98C"/>
        </svg>
      </span>
      <span class="fan fan--tr" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#B5894E" stroke-width="1.4">
            <path d="M2 2 L2 86 A84 84 0 0 1 86 2 Z" fill="rgba(181,137,78,0.06)" stroke="#E6C98C"/>
            <line x1="2" y1="2" x2="2" y2="86"/><line x1="2" y1="2" x2="20" y2="84"/>
            <line x1="2" y1="2" x2="40" y2="78"/><line x1="2" y1="2" x2="58" y2="66"/>
            <line x1="2" y1="2" x2="72" y2="50"/><line x1="2" y1="2" x2="82" y2="32"/>
            <line x1="2" y1="2" x2="86" y2="2"/>
          </g>
          <circle cx="2" cy="2" r="4" fill="#E6C98C"/>
        </svg>
      </span>
      <span class="fan fan--bl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#B5894E" stroke-width="1.4">
            <path d="M2 2 L2 86 A84 84 0 0 1 86 2 Z" fill="rgba(181,137,78,0.06)" stroke="#E6C98C"/>
            <line x1="2" y1="2" x2="2" y2="86"/><line x1="2" y1="2" x2="20" y2="84"/>
            <line x1="2" y1="2" x2="40" y2="78"/><line x1="2" y1="2" x2="58" y2="66"/>
            <line x1="2" y1="2" x2="72" y2="50"/><line x1="2" y1="2" x2="82" y2="32"/>
            <line x1="2" y1="2" x2="86" y2="2"/>
          </g>
          <circle cx="2" cy="2" r="4" fill="#E6C98C"/>
        </svg>
      </span>
      <span class="fan fan--br" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#B5894E" stroke-width="1.4">
            <path d="M2 2 L2 86 A84 84 0 0 1 86 2 Z" fill="rgba(181,137,78,0.06)" stroke="#E6C98C"/>
            <line x1="2" y1="2" x2="2" y2="86"/><line x1="2" y1="2" x2="20" y2="84"/>
            <line x1="2" y1="2" x2="40" y2="78"/><line x1="2" y1="2" x2="58" y2="66"/>
            <line x1="2" y1="2" x2="72" y2="50"/><line x1="2" y1="2" x2="82" y2="32"/>
            <line x1="2" y1="2" x2="86" y2="2"/>
          </g>
          <circle cx="2" cy="2" r="4" fill="#E6C98C"/>
        </svg>
      </span>

      <span class="cap" aria-hidden="true"><span class="dia"></span>ON CAMERA</span>
      <span class="crest-tr" aria-hidden="true"><span class="r"></span><span class="dia"></span></span>
      <div class="tag"><span class="dia" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint gold dust motes drifting around the frame ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv.getContext("2d");
    const W = cv.width || 1920, H = cv.height || 1080;
    const R = (a, b) => a + Math.random() * (b - a);
    const dust = Array.from({ length: Math.max(0, num("dust", 40)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.5), vy: R(-6, 8) / 60, sway: R(0.3, 1.1),
      ph: R(0, 6.28), a: R(0.16, 0.55),
    }));
    function drawBg(dt){
      ctx.clearRect(0, 0, W, H);
      for (const d of dust){
        d.y += d.vy * dt * 60; d.ph += 0.03 * dt * 60; d.x += Math.sin(d.ph) * d.sway * 0.6;
        if (d.y < -10){ d.y = H + 10; d.x = Math.random() * W; }
        if (d.y > H + 10){ d.y = -10; d.x = Math.random() * W; }
        const tw = 0.55 + Math.sin(d.ph * 1.7) * 0.45;
        ctx.globalAlpha = d.a * tw;
        ctx.fillStyle = "#E6C98C"; ctx.shadowColor = "#E6C98C"; ctx.shadowBlur = 6 * d.z;
        const s = Math.max(1, Math.round(d.z * 1.7));
        ctx.fillRect(Math.round(d.x), Math.round(d.y), s, s);
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    window.__velvetDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
