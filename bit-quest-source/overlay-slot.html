<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Bit Quest — In-Game Overlay</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT in-game HUD in the "16-bit JRPG" language: thin pixel
       corner brackets with gold gem rivets, a chunky JRPG status-bar strip
       lower-left carrying @handle + a clean "ON AIR" tag (with a blinking
       pixel LED), a slim pixel EXP sliver, and a small editable corner slot
       top-right. Most of the screen stays transparent so gameplay shows
       through; only a few drifting pixel sparkles live near the strip.
       Decoration is pointer-events:none.
       Optional URL params: ?handle=@you  ?tag=ON%20AIR  ?render=1
       Editable slot: ?slot=... (use =- to remove it) -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT overlay: no night background, no scanlines/vign full-bleed */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* a sparse drift of pixel sparkles, very low alpha, hugging the HUD */
    canvas.bg{pointer-events:none;opacity:.7;}

    /* ---- thin pixel registration brackets + gold gem rivets in the corners ---- */
    .px{position:absolute;width:56px;height:56px;pointer-events:none;opacity:.82;
      animation:pxin 1s var(--ease) both .2s;}
    .px::before,.px::after{content:"";position:absolute;background:#FFFFFF;
      box-shadow:3px 3px 0 var(--ink);}
    .px::before{width:56px;height:5px;} .px::after{width:5px;height:56px;}
    .px--tl{left:46px;top:46px;}   .px--tl::before{left:0;top:0;}    .px--tl::after{left:0;top:0;}
    .px--tr{right:46px;top:46px;}  .px--tr::before{right:0;top:0;}   .px--tr::after{right:0;top:0;}
    .px--bl{left:46px;bottom:46px;}.px--bl::before{left:0;bottom:0;} .px--bl::after{left:0;bottom:0;}
    .px--br{right:46px;bottom:46px;}.px--br::before{right:0;bottom:0;}.px--br::after{right:0;bottom:0;}
    @keyframes pxin{from{opacity:0}to{opacity:.82}}

    /* a gold gem rivet pinned to the elbow of each bracket */
    .rivet{position:absolute;width:16px;height:16px;background:var(--gold);transform:rotate(45deg);
      box-shadow:0 0 0 3px var(--ink), 0 0 12px rgba(255,203,71,.6);pointer-events:none;
      animation:pxin 1s var(--ease) both .35s;}
    .rivet--tl{left:48px;top:48px;}   .rivet--tr{right:48px;top:48px;}
    .rivet--bl{left:48px;bottom:48px;}.rivet--br{right:48px;bottom:48px;}

    /* ---- chunky JRPG status-bar strip, lower-left (pixel window styling) ---- */
    .slot{position:absolute;left:56px;bottom:56px;height:64px;
      display:flex;align-items:center;gap:20px;padding:0 28px 0 22px;
      background:linear-gradient(180deg, var(--win-top) 0%, #2B43C4 55%, var(--win-bot) 100%);
      border:4px solid #FFFFFF;
      box-shadow:
        0 0 0 4px var(--win-bot),                  /* blue gap */
        0 0 0 8px #FFFFFF,                          /* outer white line */
        0 0 0 11px var(--ink),                      /* dark keyline */
        10px 12px 0 rgba(15,8,32,.5),               /* hard pixel drop shadow */
        inset 0 0 0 3px var(--win-edge);            /* inner blue highlight edge */
      animation:slotin .9s var(--ease) both .15s;}
    /* subtle inner top sheen on the glassy blue */
    .slot::before{content:"";position:absolute;left:6px;right:6px;top:5px;height:42%;
      background:linear-gradient(180deg, rgba(255,255,255,.22), transparent);
      pointer-events:none;opacity:.6;}
    @keyframes slotin{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}

    /* "ON AIR" status — blinking pixel LED + spaced pixel caps (functional, clean) */
    .slot .tag{position:relative;display:flex;align-items:center;gap:12px;
      font-family:var(--pixel);font-weight:700;letter-spacing:.22em;font-size:18px;
      text-transform:uppercase;color:var(--gold);text-indent:.22em;
      text-shadow:2px 2px 0 var(--ink);}
    .slot .tag .led{width:11px;height:11px;background:var(--pink);
      box-shadow:0 0 0 2px var(--ink), 0 0 10px rgba(255,143,177,.9);
      animation:ledblink 1.4s var(--step) infinite;}
    @keyframes ledblink{0%,55%{opacity:1}56%,100%{opacity:.25}}

    /* thin pixel divider with a tiny gold gem notch, between tag and handle */
    .slot .div{position:relative;width:3px;height:34px;background:rgba(255,255,255,.85);
      box-shadow:1px 1px 0 var(--ink);}
    .slot .div::after{content:"";position:absolute;left:50%;top:50%;width:8px;height:8px;
      background:var(--gold);transform:translate(-50%,-50%) rotate(45deg);
      box-shadow:0 0 0 2px var(--ink);}

    /* handle — gold pixel caps */
    .slot .who{position:relative;font-family:var(--pixel);font-weight:700;letter-spacing:.12em;
      font-size:28px;color:var(--text);text-shadow:3px 3px 0 var(--ink);white-space:nowrap;}

    /* a slim pixel EXP sliver hugging the bottom of the strip (decorative accent) */
    .slot .exp-mini{position:absolute;left:-11px;right:-11px;bottom:-18px;height:7px;
      background:#0E0726;box-shadow:0 0 0 3px var(--ink);}
    .slot .exp-mini i{position:absolute;left:0;top:0;height:100%;width:64%;
      background:var(--teal);
      -webkit-mask:repeating-linear-gradient(90deg,#000 0 14px,transparent 14px 18px);
              mask:repeating-linear-gradient(90deg,#000 0 14px,transparent 14px 18px);}

    /* small editable corner slot, top-right (themed flavor = is-slot) */
    .slot-tr{position:absolute;top:50px;right:124px;display:flex;align-items:center;gap:13px;
      font-family:var(--pixel);font-weight:700;letter-spacing:.16em;font-size:20px;
      color:var(--teal);text-shadow:2px 2px 0 var(--ink);
      animation:pxin 1s var(--ease) both .3s;}
    .slot-tr::before{content:"\25B6";color:var(--gold);font-size:18px;
      text-shadow:2px 2px 0 var(--ink);}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .slot,#stage.render .px,#stage.render .rivet,#stage.render .slot-tr{animation:none!important;}
    #stage.render .slot .tag .led{animation:none;opacity:1;}
    #stage.render .slot{opacity:1;transform:none;}
    #stage.render .px{opacity:.82;} #stage.render .rivet{opacity:1;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- thin pixel registration brackets + gold gem rivets in all four corners -->
    <span class="px px--tl" aria-hidden="true"></span>
    <span class="px px--tr" aria-hidden="true"></span>
    <span class="px px--bl" aria-hidden="true"></span>
    <span class="px px--br" aria-hidden="true"></span>
    <span class="rivet rivet--tl" aria-hidden="true"></span>
    <span class="rivet rivet--tr" aria-hidden="true"></span>
    <span class="rivet rivet--bl" aria-hidden="true"></span>
    <span class="rivet rivet--br" aria-hidden="true"></span>

    <!-- small editable corner slot, top-right -->
    <div class="slot-tr is-slot" id="slot" data-slot="slot"><span class="slot-txt"><span class="slot-no">18</span><span class="slot-txt">your text here</span></span></div>

    <!-- chunky JRPG status-bar strip, lower-left -->
    <div class="slot">
      <span class="exp-mini" aria-hidden="true"><i></i></span>
      <span class="tag"><span class="led" aria-hidden="true"></span>ON AIR</span>
      <span class="div" aria-hidden="true"></span>
      <span class="who" id="handle">@yourhandle</span>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + tag (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;
    const tag = params.get("tag"), tagEl = document.querySelector(".slot .tag");
    if (tag && tagEl) tagEl.lastChild.textContent = tag;

    /* ---- editable text slots: ?slot=Text fills, ?slot=- removes ---- */
    document.querySelectorAll("[data-slot]").forEach((elm) => {
      const v = params.get(elm.dataset.slot);
      if (v == null) return;
      if (v === "-" || v === "" || v === "none" || v === "off") { elm.remove(); return; }
      elm.textContent = v;
      elm.classList.remove("is-slot");
    });

    /* ---- canvas: a few subtle drifting pixel sparkles (low alpha), deterministic ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    // tiny seeded PRNG (mulberry32) — no Math.random in the frame fn
    let _s = 0x1f2e >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const PAL = ["#FFCB47", "#FFFFFF", "#3AD6C5"];
    const sparks = Array.from({ length: Math.max(0, num("sparks", 30)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.5, 1.4), vx: R(-2, 2)/60, vy: R(-4, 2)/60,
      ph: R(0, 6.28), tw: R(0.4, 1.2), a: R(0.16, 0.5),
      c: PAL[Math.floor(srnd()*PAL.length)],
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, W, H);
      for (const p of sparks){
        p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.ph += 0.04 * dt * 60;
        if (p.x < -8) p.x = W + 8; if (p.x > W + 8) p.x = -8;
        if (p.y < -8) p.y = H + 8; if (p.y > H + 8) p.y = -8;
        const tw = 0.5 + Math.sin(p.ph * p.tw) * 0.5;
        ctx.globalAlpha = p.a * tw;
        ctx.fillStyle = p.c;
        const sz = Math.max(2, Math.round(p.z * 3));
        ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
      }
      ctx.globalAlpha = 1;
    }
    window.__bitDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
