<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Aurora Noir — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one "Aurora behind Black Glass" webcam frame: a
       thin iridescent mint->violet hairline border (mask-composite edge) with a
       soft inner top-light pool, fine corner light-knots, a slow iridescent
       sweep, and a frosted black-glass nameplate carrying #handle. Place your
       camera BEHIND this overlay; the inside of the frame is fully transparent
       so the cam shows through.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint aurora light-motes drift around the frame */
    canvas.bg{pointer-events:none;opacity:.55;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* the black-glass frame border; INSIDE stays transparent so the cam shows. */
    .frame{position:absolute;inset:0;pointer-events:none;border-radius:18px;
      border:1px solid var(--edge);
      box-shadow:
        0 0 0 1px rgba(8,9,13,.5),
        0 0 26px rgba(91,224,192,.20),
        0 0 70px rgba(138,123,255,.12),
        inset 0 0 30px rgba(91,224,192,.05);}
    /* thin iridescent edge (mint->violet) via mask-composite — the signature catch-light */
    .frame::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.5px;
      background:linear-gradient(135deg, var(--edge-mint) 0%, rgba(234,240,242,.10) 38%,
        rgba(234,240,242,.04) 60%, var(--edge-violet) 100%);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;mask-composite:exclude;opacity:.9;pointer-events:none;}
    /* soft iridescent inner top-light pool, hugging the upper rim only (transparent center) */
    .frame::after{content:"";position:absolute;inset:1px;border-radius:inherit;pointer-events:none;
      background:radial-gradient(120% 50% at 50% 0%, rgba(91,224,192,.08), transparent 55%);
      -webkit-mask:linear-gradient(180deg,#000,transparent 28%);
              mask:linear-gradient(180deg,#000,transparent 28%);}

    /* slow iridescent scan/sweep line travelling down the cam frame */
    .scan{position:absolute;left:1px;right:1px;top:0;height:2px;pointer-events:none;
      mix-blend-mode:screen;
      background:linear-gradient(90deg,transparent,rgba(91,224,192,.5) 45%,rgba(138,123,255,.45) 55%,transparent);
      box-shadow:0 0 16px rgba(91,224,192,.4);opacity:.55;
      animation:camscan 6.5s linear infinite;}
    @keyframes camscan{0%{transform:translateY(0);opacity:0}10%{opacity:.55}90%{opacity:.55}100%{transform:translateY(628px);opacity:0}}

    /* fine iridescent corner light-knots (the aurora pooling at the frame corners) */
    .knot{position:absolute;width:13px;height:13px;border-radius:50%;pointer-events:none;
      background:radial-gradient(circle at 35% 35%, var(--white), var(--mint) 55%, var(--violet));
      box-shadow:0 0 14px var(--glow-mint),0 0 22px var(--glow-violet);
      animation:knotin 1.1s var(--ease) both .35s;}
    .knot--tl{left:-6px;top:-6px;}  .knot--tr{right:-6px;top:-6px;}
    .knot--bl{left:-6px;bottom:-6px;} .knot--br{right:-6px;bottom:-6px;}
    @keyframes knotin{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}

    /* small "ON CAMERA" caption + dot, top-left above the frame (functional, clean) */
    .cap{position:absolute;left:2px;top:-44px;display:flex;align-items:center;gap:12px;
      font-family:var(--sans);font-weight:400;letter-spacing:.4em;font-size:16px;color:var(--mint);
      text-indent:.4em;opacity:.85;white-space:nowrap;text-shadow:0 0 12px rgba(91,224,192,.3);
      animation:knotin 1.1s var(--ease) both .45s;}
    .cap .dot{width:8px;height:8px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%, var(--white), var(--mint) 60%, var(--violet));
      box-shadow:0 0 10px var(--glow-mint);animation:dotpulse 2.2s ease-in-out infinite;}
    @keyframes dotpulse{0%,100%{opacity:1}50%{opacity:.42}}

    /* iridescent crest mark — top-right above the frame */
    .crest-tr{position:absolute;right:0;top:-44px;display:flex;align-items:center;gap:13px;
      animation:knotin 1.1s var(--ease) both .45s;}
    .crest-tr .r{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--mint),var(--violet));}
    .crest-tr .pt{width:9px;height:9px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%, var(--white), var(--mint) 60%, var(--violet));
      box-shadow:0 0 10px var(--glow-mint);}

    /* frosted black-glass nameplate pill, clipped to bottom-center of the frame */
    .tag{position:absolute;left:50%;bottom:-21px;transform:translateX(-50%);
      display:flex;align-items:center;gap:13px;white-space:nowrap;border-radius:12px;
      background:linear-gradient(180deg, rgba(20,22,29,.55), rgba(8,9,13,.66));
      -webkit-backdrop-filter:blur(13px) saturate(122%);
              backdrop-filter:blur(13px) saturate(122%);
      border:1px solid var(--edge);padding:9px 26px;
      box-shadow:0 14px 34px rgba(0,0,0,.5), inset 0 1px 0 rgba(234,240,242,.10),
        0 0 22px rgba(91,224,192,.08);}
    /* thin iridescent edge on the nameplate */
    .tag::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.3px;
      pointer-events:none;
      background:linear-gradient(120deg, var(--edge-mint), rgba(234,240,242,.08) 55%, var(--edge-violet));
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;mask-composite:exclude;opacity:.85;}
    .tag .who{font-family:var(--sans);font-weight:400;letter-spacing:.28em;font-size:22px;color:var(--white);
      text-indent:.28em;text-shadow:0 0 14px rgba(91,224,192,.32),0 0 22px rgba(138,123,255,.2);}
    .tag .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;
      background:radial-gradient(circle at 35% 35%, var(--white), var(--mint) 60%, var(--violet));
      box-shadow:0 0 10px var(--glow-mint);animation:dotpulse 2.2s ease-in-out infinite;}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .knot,#stage.render .cap,#stage.render .crest-tr{animation:none!important;}
    #stage.render .scan{animation:none;display:none;}
    #stage.render .cap .dot,#stage.render .tag .dot{animation:none;opacity:1;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .knot{opacity:1;transform:scale(1);}
    #stage.render .cap{opacity:.85;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>
      <div class="scan" aria-hidden="true"></div>

      <!-- fine iridescent corner light-knots -->
      <span class="knot knot--tl" aria-hidden="true"></span>
      <span class="knot knot--tr" aria-hidden="true"></span>
      <span class="knot knot--bl" aria-hidden="true"></span>
      <span class="knot knot--br" aria-hidden="true"></span>

      <span class="cap" aria-hidden="true"><span class="dot"></span>ON CAMERA</span>
      <span class="crest-tr" aria-hidden="true"><span class="r"></span><span class="pt"></span></span>
      <div class="tag"><span class="dot" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint aurora light-motes drifting around the frame, deterministic ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    // tiny seeded PRNG (mulberry32) — no Math.random in the frame fn
    let _s = 0xA09A >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const motes = Array.from({ length: Math.max(0, num("motes", 64)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.6), vx: R(-3, 3)/60, vy: R(-7, -1)/60,
      ph: R(0, 6.28), tw: R(0.4, 1.4), a: R(0.14, 0.5), mint: srnd() < 0.55,
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = "lighter";
      ctx.shadowBlur = 0;
      for (const p of motes){
        p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.ph += 0.045 * dt * 60;
        if (p.x < -8) p.x = W + 8; if (p.x > W + 8) p.x = -8;
        if (p.y < -8) { p.y = H + 8; p.x = srnd() * W; }
        const tw = 0.5 + Math.sin(p.ph * p.tw) * 0.5;
        ctx.globalAlpha = p.a * tw;
        ctx.fillStyle = p.mint ? "#5BE0C0" : "#8A7BFF";
        const sz = Math.max(1, Math.round(p.z * 1.6));
        ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
      }
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = "source-over";
    }
    window.__auroraDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
