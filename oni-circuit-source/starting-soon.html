<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Oni Circuit — Starting Soon</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?seconds=60  ?handle=@you  ?render=1
       Editable text slots: ?kicker=... ?sub=... ?tag=... ?tag2=...  (=- removes one) -->
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div id="stage">
    <!-- generative field: oni mask + neon blade + circuit etching + embers -->
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- structural overlays -->
    <div class="grid" aria-hidden="true"></div>
    <div class="scan" aria-hidden="true"></div>
    <div class="veil" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>

    <!-- kanji accent (鬼), lower-left margin -->
    <div class="kanji" aria-hidden="true">鬼</div>

    <!-- sharp corner registration ticks -->
    <span class="tick tick--tl" aria-hidden="true"></span>
    <span class="tick tick--tr" aria-hidden="true"></span>
    <span class="tick tick--bl" aria-hidden="true"></span>
    <span class="tick tick--br" aria-hidden="true"></span>

    <!-- EDITABLE TEXT SLOTS: each .is-slot ships a "[ your text here ]" placeholder —
         type your own text in, or delete the whole line to remove it. (Or set
         ?tag=...&tag2=...&kicker=...&sub=... at render time; use =- to remove one.) -->
    <div class="tag tag--tl is-slot" data-slot="tag"><span class="slot-no">1</span><span class="slot-txt">your text here</span></div>
    <div class="tag tag--tr is-slot" data-slot="tag2"><span class="slot-no">2</span><span class="slot-txt">your text here</span></div>

    <!-- CENTER STACK — guaranteed clear zone (mask + blade stay in the margins) -->
    <main class="core">
      <div class="crest" aria-hidden="true">
        <span class="bar"></span><span class="node"></span><span class="bar bar--r"></span>
      </div>
      <p class="kicker is-slot" id="kicker" data-slot="kicker"><span class="slot-no">3</span><span class="slot-txt">your text here</span></p>
      <h1 class="title">
        <span class="l1">STARTING</span>
        <span class="l2">SOON</span>
      </h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="sub is-slot" data-slot="sub"><span class="slot-no">4</span><span class="slot-txt">your text here</span></p>
      <div class="blade" aria-hidden="true"><div class="fill" id="fill"></div></div>
    </main>

    <div class="handle" id="handle">@yourhandle</div>
  </div>
  <script src="shared.js"></script>
</body>
</html>
