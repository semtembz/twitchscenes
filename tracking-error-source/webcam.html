<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Tracking Error — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one VHS/CRT "tracking error" webcam frame. Place
       your camera BEHIND this overlay; the inside of the frame is fully
       transparent so the camera shows through it. The border is a phosphor
       hairline with chroma-split corner ticks, a blinking red REC dot top-left,
       a flickering "TRACKING" caption, a decorative timecode, and a mono
       nameplate (the #handle) clipped to the bottom edge. A faint band of analog
       snow rides only the frame's lower edge.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;color:var(--phosphor);}
    #stage *{pointer-events:none;}

    /* the analog-snow canvas is masked to a faint lower band only (no full wash) */
    canvas.bg{position:absolute;inset:0;width:1920px;height:1080px;opacity:.45;
      mix-blend-mode:screen;
      -webkit-mask:linear-gradient(180deg, transparent 0 70%, #000 88%, transparent 100%);
              mask:linear-gradient(180deg, transparent 0 70%, #000 88%, transparent 100%);}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);z-index:18;
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}
    @keyframes camin{
      0%{opacity:0;transform:translate(-50%,-50%) scaleY(.86) skewX(-4deg)}
      60%{opacity:1;transform:translate(-50%,-50%) scaleY(1.03) skewX(1deg)}
      100%{opacity:1;transform:translate(-50%,-50%) scaleY(1) skewX(0)}
    }

    /* phosphor hairline border; INSIDE stays transparent (cam shows through) */
    .frame{position:absolute;inset:0;background:transparent;
      border:2px solid var(--hair);
      box-shadow:
        0 0 0 1px rgba(15,15,15,.6),
        0 0 22px rgba(0,0,0,.5),
        inset 0 0 0 1px rgba(15,15,15,.5);}
    /* inner phosphor hairline */
    .frame::before{content:"";position:absolute;inset:8px;border:1px solid rgba(232,232,232,.10);
      pointer-events:none;}
    /* a faint multiply scanline veil hugging the border edges only (transparent core) */
    .frame::after{content:"";position:absolute;inset:0;pointer-events:none;mix-blend-mode:multiply;opacity:.5;
      background:repeating-linear-gradient(0deg, var(--scan) 0 1px, transparent 1px 3px);
      -webkit-mask:linear-gradient(#000,#000) padding-box,
              repeating-linear-gradient(0deg,#000 0 6px,transparent 6px 100%);
      -webkit-mask:
        linear-gradient(90deg,#000 0 14px,transparent 14px calc(100% - 14px),#000 calc(100% - 14px) 100%),
        linear-gradient(0deg,#000 0 14px,transparent 14px calc(100% - 14px),#000 calc(100% - 14px) 100%);
      -webkit-mask-composite:source-over;
              mask:
        linear-gradient(90deg,#000 0 14px,transparent 14px calc(100% - 14px),#000 calc(100% - 14px) 100%),
        linear-gradient(0deg,#000 0 14px,transparent 14px calc(100% - 14px),#000 calc(100% - 14px) 100%);}

    /* chroma-split corner ticks (cyan one way, red the other) on each corner */
    .ctick{position:absolute;width:54px;height:54px;}
    .ctick::before,.ctick::after{content:"";position:absolute;background:var(--phosphor);
      box-shadow:0 0 8px rgba(232,232,232,.4);}
    .ctick::before{left:0;top:0;width:54px;height:3px;
      box-shadow:0 3px 0 0 rgba(255,0,51,.55),0 -3px 0 0 rgba(25,195,255,.5),0 0 8px rgba(232,232,232,.4);}
    .ctick::after{left:0;top:0;width:3px;height:54px;
      box-shadow:3px 0 0 0 rgba(25,195,255,.5),-3px 0 0 0 rgba(255,0,51,.55),0 0 8px rgba(232,232,232,.4);}
    .ctick.tl{left:-2px;top:-2px;}
    .ctick.tr{right:-2px;top:-2px;transform:scaleX(-1);}
    .ctick.bl{left:-2px;bottom:-2px;transform:scaleY(-1);}
    .ctick.br{right:-2px;bottom:-2px;transform:scale(-1,-1);}

    /* blinking red REC dot + REC, top-left just inside the frame */
    .rec{position:absolute;left:18px;top:16px;display:flex;align-items:center;gap:11px;
      font-family:var(--osd);font-weight:700;font-size:22px;letter-spacing:.18em;
      color:var(--phosphor);text-shadow:0 0 1px rgba(0,0,0,.9),0 1px 2px rgba(0,0,0,.6);}
    .rec .d{width:15px;height:15px;border-radius:50%;background:var(--rec-red);
      box-shadow:0 0 14px var(--red-glow),0 0 4px var(--rec-red);
      animation:recblink 1.05s steps(1,end) infinite;}
    .rec .l{animation:recblink 1.05s steps(1,end) infinite;}
    @keyframes recblink{0%,55%{opacity:1}56%,100%{opacity:.12}}

    /* decorative SP/PLAY + timecode, top-right just inside the frame */
    .ostat{position:absolute;right:18px;top:16px;text-align:right;
      font-family:var(--osd);font-weight:700;font-size:20px;letter-spacing:.14em;
      color:var(--phosphor);text-shadow:0 0 1px rgba(0,0,0,.9),0 1px 2px rgba(0,0,0,.6);}
    .ostat .sp{color:var(--caution);}

    /* flickering TRACKING caption, top-left ABOVE the frame */
    .trk{position:absolute;left:0;top:-40px;display:flex;align-items:center;gap:12px;
      font-family:var(--osd);font-weight:700;font-size:20px;letter-spacing:.34em;text-indent:.34em;
      color:var(--chroma-cyan);text-shadow:0 0 14px var(--cyan-glow);
      animation:flick 2.6s steps(1,end) infinite;}
    .trk .sq{width:10px;height:10px;border:2px solid var(--chroma-cyan);box-shadow:0 0 10px var(--cyan-glow);}
    @keyframes flick{0%,40%{opacity:1}41%{opacity:.2}43%{opacity:1}66%{opacity:1}67%{opacity:.25}69%{opacity:1}87%{opacity:.3}89%{opacity:1}}

    /* decorative timecode strip, bottom-left ABOVE the nameplate level */
    .tc{position:absolute;left:0;bottom:-38px;
      font-family:var(--osd);font-weight:700;font-size:20px;letter-spacing:.10em;color:var(--osd-dim);}

    /* nameplate — mono handle clipped to bottom-center of the frame */
    .plate{position:absolute;left:50%;bottom:-19px;transform:translateX(-50%);
      display:flex;align-items:center;gap:14px;white-space:nowrap;z-index:2;
      background:linear-gradient(180deg, rgba(15,15,15,.88), rgba(7,7,7,.80));
      border:1px solid var(--hair);padding:9px 26px 7px;
      box-shadow:0 12px 30px rgba(0,0,0,.5), inset 0 0 18px rgba(0,0,0,.4);}
    /* faint scanline texture inside the plate */
    .plate::before{content:"";position:absolute;inset:0;mix-blend-mode:multiply;opacity:.5;
      background:repeating-linear-gradient(0deg, var(--scan) 0 1px, transparent 1px 3px);}
    .plate .who{font-family:var(--osd);font-weight:700;font-size:26px;letter-spacing:.14em;
      color:var(--phosphor);text-shadow:0 0 1px rgba(0,0,0,.9),0 1px 2px rgba(0,0,0,.6);}
    .plate .who::before{content:"\25B8\00A0";color:var(--caution);}

    /* ---- RENDER MODE: freeze entrances + blink/flicker to a clean final state ---- */
    #stage.render .cam{animation:none!important;opacity:1!important;
      transform:translate(-50%,-50%) scaleY(1) skewX(0)!important;}
    #stage.render .cam.lower{transform:translateX(-50%)!important;}
    #stage.render .rec .d,
    #stage.render .rec .l,
    #stage.render .trk{animation:none!important;opacity:1!important;}
  </style>
</head>
<body>
  <div id="stage">
    <!-- faint analog snow riding only the lower band -->
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>

      <!-- chroma-split corner ticks -->
      <span class="ctick tl" aria-hidden="true"></span>
      <span class="ctick tr" aria-hidden="true"></span>
      <span class="ctick bl" aria-hidden="true"></span>
      <span class="ctick br" aria-hidden="true"></span>

      <!-- OSD chrome inside the frame corners -->
      <span class="rec" aria-hidden="true"><span class="d"></span><span class="l">REC</span></span>
      <div class="ostat" aria-hidden="true"><span class="sp">SP</span>&nbsp;00:00:00:00</div>

      <!-- captions outside the frame -->
      <span class="trk" aria-hidden="true"><span class="sq"></span>TRACKING</span>
      <span class="tc" aria-hidden="true">TC 00:00:00:00</span>

      <!-- nameplate with the handle -->
      <div class="plate"><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;            // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: a faint bed of analog SNOW (deterministic seeded RNG) ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = (cv && cv.width) || 1920, H = (cv && cv.height) || 1080;

    // seeded mulberry32 — no Math.random in the frame fn (render reproducibility)
    let _s = 0x54450F >>> 0;
    function srnd(){ _s |= 0; _s = (_s + 0x6D2B79F5) | 0;
      let t = Math.imul(_s ^ (_s >>> 15), 1 | _s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }
    const R = (a, b) => a + srnd() * (b - a);

    let snow = [];
    function build(){
      _s = 0x54450F >>> 0;                          // reset seed -> identical field
      const NS = Math.max(0, num("snow", 200));
      snow = Array.from({ length: NS }, () => ({
        x: R(0, W), y: R(0, H), s: R(1, 3), a: R(0.05, 0.28),
      }));
    }
    build();

    function drawBg(dt){
      if (!ctx) return;
      const steps = dt * 60;
      ctx.clearRect(0, 0, W, H);                    // TRANSPARENT clear (mask shapes the band)
      for (const p of snow){
        p.x += (srnd() - 0.5) * 6 * steps;
        p.y += (srnd() - 0.5) * 6 * steps;
        if (p.x < 0) p.x += W; if (p.x > W) p.x -= W;
        if (p.y < 0) p.y += H; if (p.y > H) p.y -= H;
        const v = 0.18 + srnd() * 0.82;
        ctx.globalAlpha = p.a * v;
        ctx.fillStyle = "#E8E8E8";
        const sz = Math.max(1, Math.round(p.s));
        ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
      }
      ctx.globalAlpha = 1;
    }
    window.__vhsDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; build(); drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
