<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Transition — Neon-Glitch Bar Wipe (Midnight Akihabara)</title>
  <!--
    NEON TOKYO stinger ("Midnight Akihabara"). A bank of SEGMENTED neon bars —
    magenta + cyan + violet — sweeps vertically across the screen. At the mid
    (full-cover) point a hard CRT scanline TEAR + RGB datamosh jitter + white
    flash hits, then the bars sweep off and the screen clears.
    Transparent before & after, deterministic, ~1300ms.

    Plays ONCE on load, then clears.
      ?loop=1   loop it (for previewing)
      ?ms=1300  total duration in ms (default 1300)

    To use as an OBS Stinger you need a VIDEO file (OBS can't use a web page as a
    stinger). Use transition-export.html to record a transparent .webm, then add
    it as a Stinger transition with the Transition Point at ~50% (the tear hit).
  -->
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="c" width="1920" height="1080"></canvas>
  <script>
  (() => {
    "use strict";
    const W = 1920, H = 1080;
    const cv = document.getElementById('c'), ctx = cv.getContext('2d');
    const params = new URLSearchParams(location.search);
    const DUR = Number(params.get('ms')) || 1300;
    const LOOP = params.get('loop') === '1';

    /* ---- palette (neon tokyo) ---- */
    const MAG = '#FF2D95', CYAN = '#00E0FF', VIOLET = '#7A3CFF', YELLOW = '#FFD400';
    const BG = '#0A0A14', BG2 = '#12121F', BG3 = '#05050C', INK = '#EAF6FF';
    const BARCOLS = [MAG, CYAN, VIOLET, MAG, CYAN];

    const clamp01 = (x) => x < 0 ? 0 : x > 1 ? 1 : x;
    const smooth = (x) => { x = clamp01(x); return x * x * (3 - 2 * x); };
    const lerp = (a, b, t) => a + (b - a) * t;

    /* ---- deterministic seeded rng so the look is stable + matches the export ---- */
    let seed = 90210;
    const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
    const R = (a, b) => a + rnd() * (b - a);

    /* ---- the bar bank: vertical neon columns that sweep top->bottom. Each column
           is staggered slightly so the bank reads as a raked, skewed wave. The
           columns are SEGMENTED (gaps) to echo the scenes' segmented loading bar. ---- */
    const N_COLS = 22;
    const colW = W / N_COLS;
    const cols = Array.from({ length: N_COLS }, (_, i) => ({
      x: i * colW,
      col: BARCOLS[i % BARCOLS.length],
      lead: (i / N_COLS) * 0.18,                 // raked stagger across the bank
      jitter: R(-7, 7),                          // per-column x glitch amplitude
      segs: 7 + (i % 3),                         // segment count down the column
      phase: R(0, 6.2832),
    }));

    // tiny deterministic per-key noise (reproducible flicker)
    function hash(a, b) {
      const v = Math.sin((a * 12.9898 + b * 78.233) * 43758.5453);
      return v - Math.floor(v);
    }

    /* ---- one segmented neon column, filled from the top to `fill` (0..1 of H) ---- */
    function drawColumn(x, w, fill, col, segs, jx, alpha) {
      if (alpha <= 0.01 || fill <= 0) return;
      const skew = 26;                            // angular shear (px) — hard cyberpunk slant
      const gap = 10;
      const segH = H / segs;
      const filledPx = fill * (H + skew);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = col;
      ctx.shadowColor = col;
      ctx.shadowBlur = 26;
      for (let s = 0; s < segs; s++) {
        const sy = s * segH;
        const eyy = sy + segH - gap;
        if (sy > filledPx) break;
        const bottom = Math.min(eyy, filledPx);
        if (bottom <= sy) continue;
        const x0 = Math.round(x + jx);
        // skewed parallelogram segment (top edge sheared right)
        ctx.beginPath();
        ctx.moveTo(x0 + skew * (1 - sy / H), sy);
        ctx.lineTo(x0 + w + skew * (1 - sy / H), sy);
        ctx.lineTo(x0 + w + skew * (1 - bottom / H), bottom);
        ctx.lineTo(x0 + skew * (1 - bottom / H), bottom);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    /* ---- the bar bank flooding in then retracting ---- */
    function drawBars(t, cover, ghostDX, ghostCol) {
      ctx.save();
      if (ghostDX) {
        ctx.globalCompositeOperation = 'screen';
      }
      for (const c of cols) {
        // local sweep for this column: in on the first half, out on the second
        const lt = clamp01((t - c.lead) / (1 - 0.18));
        // cover-shaped fill: grows to full at mid, retracts after
        let fill;
        if (lt < 0.5) fill = smooth(lt / 0.5);            // sweep down to full
        else fill = 1 - smooth((lt - 0.5) / 0.5);         // ... then a rising clear from top
        // present alpha follows the overall cover so ends are clean transparent
        const a = lerp(0.0, 1, clamp01(cover * 1.3));
        const jx = (ghostDX || 0) + c.jitter * (hash(c.x, Math.floor(t * 40)) - 0.5) * (cover);
        drawColumn(c.x, colW - 4, fill, ghostCol || c.col, c.segs, jx, a * (ghostDX ? 0.45 : 1));
      }
      ctx.restore();
    }

    /* ---- a solid dark wash UNDER the bars at full cover so the swap reads as a
           true black-out moment (cyberpunk night), kept transparent at the ends ---- */
    function drawWash(cover) {
      if (cover <= 0.02) return;
      const a = smooth((cover - 0.35) / 0.65);
      if (a <= 0.01) return;
      ctx.save();
      const g = ctx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0.00, BG2);
      g.addColorStop(0.45, BG);
      g.addColorStop(1.00, BG3);
      ctx.fillStyle = g;
      ctx.globalAlpha = a;
      ctx.fillRect(0, 0, W, H);
      // faint scanlines over the wash
      ctx.globalAlpha = a * 0.10;
      ctx.fillStyle = CYAN;
      for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
      ctx.restore();
    }

    /* ---- CRT scanline TEAR + RGB datamosh, peaking at the full-cover mid point ---- */
    function drawGlitch(t) {
      const gx = Math.exp(-Math.pow((t - 0.5) / 0.10, 2));   // gaussian pulse around mid
      if (gx < 0.02) return;

      // torn horizontal slices: shove random bands of the already-drawn frame sideways,
      // re-tinting some in magenta/cyan for a datamosh feel.
      const bands = 12;
      for (let i = 0; i < bands; i++) {
        if (hash(i, Math.floor(t * 60)) > 0.62) continue;    // only some bands tear
        const by = Math.floor(R(0, H));
        const bh = Math.floor(R(6, 54));
        const dx = (R(-1, 1)) * 90 * gx;
        try { ctx.drawImage(cv, 0, by, W, bh, dx, by, W, bh); } catch (e) {}
      }

      // RGB split: stamp the bar bank twice, offset, in screen blend (magenta L / cyan R)
      const off = 18 * gx;
      const cover = Math.sin(clamp01(t) * Math.PI);
      drawBars(t, cover, -off, 'rgba(255,45,149,1)');
      drawBars(t, cover,  off, 'rgba(0,224,255,1)');

      // hard scanline tear band right at the mid — a bright cyan rip across the screen
      const tear = Math.exp(-Math.pow((t - 0.5) / 0.05, 2));
      if (tear > 0.02) {
        const ty = H * 0.5 + Math.sin(t * 60) * 30;
        ctx.save();
        ctx.globalAlpha = 0.85 * tear;
        ctx.fillStyle = INK;
        ctx.shadowColor = CYAN; ctx.shadowBlur = 50;
        ctx.fillRect(0, Math.round(ty - 3), W, 6);
        ctx.globalAlpha = 0.5 * tear;
        ctx.fillStyle = MAG; ctx.shadowColor = MAG; ctx.shadowBlur = 40;
        ctx.fillRect(0, Math.round(ty - 26), W, 4);
        ctx.fillStyle = CYAN; ctx.shadowColor = CYAN;
        ctx.fillRect(0, Math.round(ty + 22), W, 4);
        ctx.restore();
      }

      // dense scanlines flicker over everything during the pulse
      ctx.save();
      ctx.globalAlpha = 0.20 * gx;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 1);
      ctx.restore();

      // a quick white/cyan flash at the very peak
      const flash = Math.exp(-Math.pow((t - 0.5) / 0.04, 2));
      if (flash > 0.02) {
        ctx.save();
        ctx.globalAlpha = 0.45 * flash;
        ctx.fillStyle = INK;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
    }

    function frame(t) {
      ctx.clearRect(0, 0, W, H);
      seed = 90210;                              // reset rng each frame -> deterministic
      const cover = Math.sin(clamp01(t) * Math.PI);   // 0 -> 1 -> 0, full at t=0.5

      drawWash(cover);
      drawBars(t, cover, 0, null);
      drawGlitch(t);

      ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    // Exposed so a verification step can render any frame (t in 0..1) on demand.
    window.__txDraw = (t) => frame(clamp01(t));

    let start = null;
    function loop(ts) {
      if (start == null) start = ts;
      let t = (ts - start) / DUR;
      if (t >= 1) {
        if (LOOP) { start = ts + 700; t = 0; }         // pause then replay
        else { ctx.clearRect(0, 0, W, H); return; }    // play once, then clear
      }
      frame(clamp01(t));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
