<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Witching Hour — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one "Candlelit Study" webcam frame: a candle-gold
       hairline double border with delicate celestial star-compass corner accents,
       a soft warm edge-glow, a crescent-moon nameplate carrying #handle, and a
       small "ON CAMERA" caption. Place your camera BEHIND this overlay; the inside
       of the frame is fully transparent so the cam shows through.
       Optional URL params: ?handle=@you  ?pos=center|lower  ?w=1120&h=630  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint gold embers/dust drift around the frame */
    canvas.bg{pointer-events:none;opacity:.55;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* candle-gold hairline border; INSIDE stays transparent. a soft warm
       candle-glow hugs the edge only so the camera image is never washed. */
    .frame{position:absolute;inset:0;pointer-events:none;background:transparent;
      border:1px solid var(--line);
      box-shadow:
        0 0 0 1px rgba(6,8,11,.5),
        0 0 24px rgba(231,200,120,.30),
        0 0 64px rgba(201,162,75,.14),
        inset 0 0 28px rgba(231,200,120,.07);}
    /* inner hairline double border (transparent inside) */
    .frame::before{content:"";position:absolute;inset:11px;border:1px solid var(--line-soft);
      pointer-events:none;}
    /* edge-only warm candle-glow so the camera center stays clear */
    .frame::after{content:"";position:absolute;inset:1px;pointer-events:none;
      background:
        linear-gradient(180deg, rgba(231,200,120,.06), transparent 13%, transparent 87%, rgba(6,8,11,.12)),
        linear-gradient(90deg, rgba(201,162,75,.05), transparent 10%, transparent 90%, rgba(201,162,75,.05));}

    /* delicate celestial star-compass corner accents (etched gold) */
    .corner{position:absolute;width:104px;height:104px;pointer-events:none;opacity:.92;
      animation:cornin 1.1s var(--ease) both .3s;}
    .corner svg{width:100%;height:100%;display:block;}
    .corner--tl{left:18px;top:18px;}
    .corner--tr{right:18px;top:18px;transform:scaleX(-1);}
    .corner--bl{left:18px;bottom:18px;transform:scaleY(-1);}
    .corner--br{right:18px;bottom:18px;transform:scale(-1,-1);}
    @keyframes cornin{from{opacity:0}to{opacity:.92}}

    /* small engraved caption + crescent, top-left above the frame */
    .cap{position:absolute;left:2px;top:-44px;display:flex;align-items:center;gap:13px;
      font-family:var(--serif-title);
      letter-spacing:.46em;font-size:16px;color:var(--gold);text-indent:.46em;
      text-transform:uppercase;opacity:.85;text-shadow:0 0 12px rgba(201,162,75,.3);
      animation:fade 1.1s var(--ease) both .45s;}
    .cap .moon{width:12px;height:12px;position:relative;flex:none;
      filter:drop-shadow(0 0 6px var(--glow));}
    .cap .moon::before{content:"";position:absolute;inset:0;border-radius:50%;
      box-shadow:inset -4px 1px 0 0 var(--gold-lt);}
    @keyframes fade{from{opacity:0}to{opacity:.85}}

    /* a crescent + double-rule crest mark, top-right above the frame */
    .crest-tr{position:absolute;right:2px;top:-44px;display:flex;align-items:center;gap:14px;
      animation:fade 1.1s var(--ease) both .45s;}
    .crest-tr .r{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
    .crest-tr .moon{width:14px;height:14px;position:relative;flex:none;
      filter:drop-shadow(0 0 8px var(--glow));}
    .crest-tr .moon::before{content:"";position:absolute;inset:0;border-radius:50%;
      box-shadow:inset -5px 1px 0 0 var(--gold-lt);}

    /* handle nameplate — parchment-dark plate clipped to bottom-center of the frame */
    .plate{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);
      display:flex;align-items:center;gap:14px;white-space:nowrap;
      background:linear-gradient(180deg, rgba(20,50,58,.36), rgba(6,8,11,.82));
      border:1px solid var(--line);padding:9px 28px;
      box-shadow:0 14px 34px rgba(0,0,0,.5), 0 0 22px rgba(231,200,120,.10),
        inset 0 0 24px rgba(7,9,12,.4);}
    /* inner hairline double border on the plate */
    .plate::before{content:"";position:absolute;inset:4px;border:1px solid var(--line-soft);
      pointer-events:none;}
    .plate .who{font-family:var(--serif-title);
      letter-spacing:.18em;font-size:24px;color:var(--gold-lt);text-indent:.18em;
      text-shadow:0 0 16px rgba(231,200,120,.4);}
    .plate .moon{width:11px;height:11px;position:relative;flex:none;
      filter:drop-shadow(0 0 8px var(--glow));}
    .plate .moon::before{content:"";position:absolute;inset:0;border-radius:50%;
      box-shadow:inset -4px 1px 0 0 var(--gold-lt);}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .corner,
    #stage.render .cap,#stage.render .crest-tr{animation:none!important;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .corner{opacity:.92;}
    #stage.render .cap{opacity:.85;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>

      <!-- delicate celestial star-compass corner accents in every corner -->
      <span class="corner corner--tl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
          <path d="M6 6 L6 60 M6 6 L60 6" stroke="#E7C878"/>
          <path d="M6 6 L42 42" stroke="#C9A24B"/>
          <path d="M22 22 l5 -13 5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 z" fill="rgba(201,162,75,0.10)" stroke="#E7C878"/>
          <circle cx="27" cy="27" r="2" fill="#E7C878" stroke="none"/>
        </svg>
      </span>
      <span class="corner corner--tr" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
          <path d="M6 6 L6 60 M6 6 L60 6" stroke="#E7C878"/>
          <path d="M6 6 L42 42" stroke="#C9A24B"/>
          <path d="M22 22 l5 -13 5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 z" fill="rgba(201,162,75,0.10)" stroke="#E7C878"/>
          <circle cx="27" cy="27" r="2" fill="#E7C878" stroke="none"/>
        </svg>
      </span>
      <span class="corner corner--bl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
          <path d="M6 6 L6 60 M6 6 L60 6" stroke="#E7C878"/>
          <path d="M6 6 L42 42" stroke="#C9A24B"/>
          <path d="M22 22 l5 -13 5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 z" fill="rgba(201,162,75,0.10)" stroke="#E7C878"/>
          <circle cx="27" cy="27" r="2" fill="#E7C878" stroke="none"/>
        </svg>
      </span>
      <span class="corner corner--br" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
          <path d="M6 6 L6 60 M6 6 L60 6" stroke="#E7C878"/>
          <path d="M6 6 L42 42" stroke="#C9A24B"/>
          <path d="M22 22 l5 -13 5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 z" fill="rgba(201,162,75,0.10)" stroke="#E7C878"/>
          <circle cx="27" cy="27" r="2" fill="#E7C878" stroke="none"/>
        </svg>
      </span>

      <span class="cap" aria-hidden="true"><span class="moon"></span>ON CAMERA</span>
      <span class="crest-tr" aria-hidden="true"><span class="r"></span><span class="moon"></span></span>
      <div class="plate"><span class="moon" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint gold embers/dust drifting around the frame, deterministic ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    // tiny seeded PRNG (mulberry32) — no Math.random in the frame fn
    let _s = 0x7717 >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const embers = Array.from({ length: Math.max(0, num("embers", 48)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.6), vy: R(-12, -3)/60, sway: R(0.3, 1.1),
      ph: R(0, 6.28), tw: R(0.5, 1.4), a: R(0.16, 0.5),
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      for (const e of embers){
        e.y += e.vy * dt * 60; e.ph += 0.035 * dt * 60; e.x += Math.sin(e.ph) * e.sway * 0.6;
        if (e.y < -12){ e.y = H + 12; e.x = (e.x + 137) % W; }
        const tw = 0.55 + Math.sin(e.ph * e.tw) * 0.45;
        ctx.globalAlpha = e.a * tw;
        ctx.fillStyle = "#E7C878"; ctx.shadowColor = "#E7C878"; ctx.shadowBlur = 6 * e.z;
        const sz = Math.max(1, Math.round(e.z * 1.6));
        ctx.fillRect(Math.round(e.x), Math.round(e.y), sz, sz);
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    window.__witchDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
