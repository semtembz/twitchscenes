<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Sakura Static — Ending</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?handle=@you -->
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>

    <div class="chan" aria-hidden="true">
      <span class="sig"><i style="height:8px"></i><i style="height:14px"></i><i style="height:20px"></i><i style="height:12px"></i></span>
      <span>CH&nbsp;03</span><span style="opacity:.5">·</span><span>END</span>
      <span class="rec"></span>
    </div>
    <div class="kana" aria-hidden="true">サ<b>ク</b>ラ</div>

    <main class="card card--center card--noart" style="text-align:center;">
      <div class="meta">
        <p class="kick" style="justify-content:center;"><span class="dot"></span> <span id="kicker">THANKS FOR</span></p>
        <h1 class="title">WATCHING<br><b>&#9825;</b></h1>
        <p class="sub">see you next stream — take care of yourselves</p>
        <p class="handle handle--big" id="handle" style="position:static;margin-top:10px;letter-spacing:4px;">@yourhandle</p>
      </div>
    </main>
  </div>
  <script src="shared.js"></script>
</body>
</html>
