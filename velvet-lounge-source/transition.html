<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Transition — Velvet Lounge Brass Deco Curtain Wipe</title>
  <!--
    VELVET LOUNGE stinger ("The Gilt Room"). A pair of plum-velvet panels glide
    in from the left & right like speakeasy curtains and meet at the centre; a
    brass art-deco SUNBURST blooms at the seam, hairline gold deco rays fan out,
    a flurry of gold-dust motes drifts up, and a soft cream/gold light-flash hits
    at the full-cover (mid) point. The panels then part and the screen clears.
    Transparent before & after, deterministic, sine-driven, ~1300ms. Luxe, no glitch.

    Plays ONCE on load, then clears.
      ?loop=1   loop it (for previewing)
      ?ms=1300  total duration in ms (default 1300)

    To use as an OBS Stinger you need a VIDEO file (OBS can't use a web page as a
    stinger). Use transition-export.html to record a transparent .webm, then add it
    as a Stinger transition with the Transition Point at ~50% (the full-cover bloom).
  -->
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="c" width="1920" height="1080"></canvas>
  <script>
  (() => {
    "use strict";
    const W = 1920, H = 1080, CX = W / 2, CY = H / 2;
    const cv = document.getElementById('c'), ctx = cv.getContext('2d');
    const params = new URLSearchParams(location.search);
    const DUR = Number(params.get('ms')) || 1300;
    const LOOP = params.get('loop') === '1';

    /* ---- palette (velvet lounge) ---- */
    const PLUM_BLACK = '#140A14', PLUM_BLACK2 = '#0C060C', VELVET = '#3A1B33', VELVET2 = '#5A2C4C';
    const BRASS = '#B5894E', BRASS_LT = '#E6C98C', CREAM = '#F2E9DC';
    const DUSTS = [BRASS_LT, CREAM, BRASS, '#D8B97A'];

    const clamp01 = (x) => x < 0 ? 0 : x > 1 ? 1 : x;
    const smooth = (x) => { x = clamp01(x); return x * x * (3 - 2 * x); };       // smoothstep
    const lerp = (a, b, t) => a + (b - a) * t;

    /* ---- a fixed flurry of gold-dust motes; positions are a deterministic
       function of t so the look is stable frame-to-frame and in the export.
       Each mote drifts upward with a slow sine sway; its window is staggered so
       the flurry builds with the flood and thins as the panels part. ---- */
    let seed = 0x5eed;
    const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
    const R = (a, b) => a + rnd() * (b - a);

    const N_DUST = 64;
    const dust = Array.from({ length: N_DUST }, () => ({
      x0: R(W * 0.12, W * 0.88), y0: R(H * 0.55, H * 1.12),
      rise: R(H * 0.55, H * 1.15), sway: R(18, 70), swf: R(1.0, 2.6), phase: R(0, 6.2832),
      s: R(1.4, 4.2), c: DUSTS[(rnd() * DUSTS.length) | 0],
      lead: R(0, 0.30), span: R(0.5, 0.85), a: R(0.4, 0.95), tw: R(1.3, 2.4),
    }));

    function drawDust(t, cover) {
      ctx.save();
      for (const d of dust) {
        const lt = clamp01((t - d.lead) / d.span);
        if (lt <= 0 || lt >= 1) continue;
        const px = d.x0 + Math.sin(d.phase + lt * d.swf * 6.2832) * d.sway;
        const py = d.y0 - d.rise * lt;
        const ends = Math.sin(lt * Math.PI);                 // 0 at ends, 1 mid
        const twk = 0.55 + Math.sin(d.phase + lt * d.tw * 6.2832) * 0.45;
        const present = lerp(0.45, 1, cover);
        const a = d.a * ends * twk * present;
        if (a <= 0.02) continue;
        ctx.globalAlpha = a;
        ctx.fillStyle = d.c;
        ctx.shadowColor = BRASS_LT;
        ctx.shadowBlur = 8;
        const s = d.s;
        // a tiny gilt diamond
        ctx.beginPath();
        ctx.moveTo(Math.round(px), Math.round(py - s));
        ctx.lineTo(Math.round(px + s), Math.round(py));
        ctx.lineTo(Math.round(px), Math.round(py + s));
        ctx.lineTo(Math.round(px - s), Math.round(py));
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    /* ---- the velvet curtain panels: two plum-velvet slabs glide in from the
           left & right and meet at the centre seam, then part. cover 0..1..0. ---- */
    function drawPanels(cover) {
      if (cover <= 0.001) return;
      const half = CX * cover;            // each panel covers this many px from its edge
      // left panel
      let g = ctx.createLinearGradient(0, 0, half, 0);
      g.addColorStop(0.00, PLUM_BLACK2);
      g.addColorStop(0.55, PLUM_BLACK);
      g.addColorStop(0.88, VELVET);
      g.addColorStop(1.00, VELVET2);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, Math.ceil(half), H);
      // right panel (mirror)
      g = ctx.createLinearGradient(W, 0, W - half, 0);
      g.addColorStop(0.00, PLUM_BLACK2);
      g.addColorStop(0.55, PLUM_BLACK);
      g.addColorStop(0.88, VELVET);
      g.addColorStop(1.00, VELVET2);
      ctx.fillStyle = g;
      ctx.fillRect(Math.floor(W - half), 0, Math.ceil(half) + 1, H);

      // velvet sheen — faint diagonal threads over each panel
      ctx.save();
      ctx.globalAlpha = 0.06 * cover;
      ctx.strokeStyle = CREAM;
      ctx.lineWidth = 1;
      for (let x = -H; x < W + H; x += 12) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + H * 0.4, H); ctx.stroke();
      }
      ctx.restore();

      // bright brass leading edge on each panel's inner border
      const edgeA = Math.sin(cover * Math.PI);               // strongest mid-sweep
      if (edgeA > 0.02 && half > 2 && half < CX - 2) {
        ctx.save();
        ctx.shadowColor = BRASS_LT;
        ctx.shadowBlur = 48;
        ctx.globalAlpha = 0.85 * edgeA;
        ctx.strokeStyle = BRASS_LT;
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(half, 0); ctx.lineTo(half, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(W - half, 0); ctx.lineTo(W - half, H); ctx.stroke();
        ctx.globalAlpha = 0.32 * edgeA;                       // softer wide brass wash behind
        ctx.strokeStyle = BRASS;
        ctx.lineWidth = 22;
        ctx.beginPath(); ctx.moveTo(half, 0); ctx.lineTo(half, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(W - half, 0); ctx.lineTo(W - half, H); ctx.stroke();
        ctx.restore();
      }
    }

    /* ---- the brass art-deco SUNBURST that blooms at the centre seam as the
           panels meet. hairline gold rays radiate from CY; a stepped diamond
           medallion sits at the core. Strongest at full cover (t=0.5). ---- */
    function drawSunburst(cover) {
      const bloom = Math.pow(cover, 1.3);
      if (bloom <= 0.02) return;
      ctx.save();
      ctx.translate(CX, CY);

      // radiating hairline deco rays
      const rays = 48;
      const len = lerp(120, Math.max(W, H) * 0.62, bloom);
      const spin = (1 - cover) * 0.10;                        // a whisper of rotation as it parts
      ctx.rotate(spin);
      ctx.lineWidth = 1.2;
      for (let i = 0; i < rays; i++) {
        const ang = (i / rays) * Math.PI * 2;
        const long = (i % 2 === 0);
        const l = long ? len : len * 0.62;
        ctx.globalAlpha = (long ? 0.34 : 0.20) * bloom;
        ctx.strokeStyle = (i % 4 === 0) ? BRASS_LT : BRASS;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ang) * 26, Math.sin(ang) * 26);
        ctx.lineTo(Math.cos(ang) * l, Math.sin(ang) * l);
        ctx.stroke();
      }

      // soft gold core glow
      const cr = lerp(60, 240, bloom);
      const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, cr);
      cg.addColorStop(0.0, 'rgba(242,233,220,' + (0.55 * bloom).toFixed(3) + ')');
      cg.addColorStop(0.4, 'rgba(230,201,140,' + (0.30 * bloom).toFixed(3) + ')');
      cg.addColorStop(1.0, 'rgba(181,137,78,0)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = cg;
      ctx.beginPath(); ctx.arc(0, 0, cr, 0, 6.2832); ctx.fill();

      // concentric brass deco rings
      ctx.globalAlpha = 0.5 * bloom;
      ctx.strokeStyle = BRASS_LT;
      ctx.lineWidth = 1.4;
      for (const rr of [34, 54]) { ctx.beginPath(); ctx.arc(0, 0, rr * (0.7 + bloom * 0.6), 0, 6.2832); ctx.stroke(); }

      // stepped diamond medallion at the very core
      const ms = lerp(8, 34, bloom);
      ctx.globalAlpha = 0.9 * bloom;
      ctx.shadowColor = BRASS_LT; ctx.shadowBlur = 30 * bloom;
      ctx.strokeStyle = BRASS_LT; ctx.lineWidth = 2;
      ctx.fillStyle = 'rgba(181,137,78,0.18)';
      ctx.beginPath();
      ctx.moveTo(0, -ms); ctx.lineTo(ms, 0); ctx.lineTo(0, ms); ctx.lineTo(-ms, 0); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      const mi = ms * 0.55;
      ctx.moveTo(0, -mi); ctx.lineTo(mi, 0); ctx.lineTo(0, mi); ctx.lineTo(-mi, 0); ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function frame(t) {
      ctx.clearRect(0, 0, W, H);
      const cover = Math.sin(clamp01(t) * Math.PI);          // 0 -> 1 -> 0, full cover at t=0.5

      drawPanels(cover);

      // vignette over the velvet so the panels read as deep, moody plush, not flat
      if (cover > 0.02) {
        ctx.save();
        const vg = ctx.createRadialGradient(CX, CY, H * 0.18, CX, CY, H * 0.92);
        vg.addColorStop(0, 'rgba(0,0,0,0)');
        vg.addColorStop(1, 'rgba(10,4,10,' + (0.6 * cover).toFixed(3) + ')');
        ctx.fillStyle = vg;
        ctx.globalCompositeOperation = 'multiply';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      drawSunburst(cover);
      drawDust(t, cover);

      // soft cream/gold light-flash at the very peak (full cover)
      const flash = Math.exp(-Math.pow((t - 0.5) / 0.05, 2));
      if (flash > 0.02) {
        ctx.save();
        const fg = ctx.createRadialGradient(CX, CY, 0, CX, CY, W * 0.6);
        fg.addColorStop(0, 'rgba(242,233,220,' + (0.42 * flash).toFixed(3) + ')');
        fg.addColorStop(0.5, 'rgba(230,201,140,' + (0.16 * flash).toFixed(3) + ')');
        fg.addColorStop(1, 'rgba(230,201,140,0)');
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = fg;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }

      ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    // Exposed so a verification step / headless pipeline can render any frame (t in 0..1).
    window.__txDraw = (t) => frame(clamp01(t));

    let start = null;
    function loop(ts) {
      if (start == null) start = ts;
      let t = (ts - start) / DUR;
      if (t >= 1) {
        if (LOOP) { start = ts + 700; t = 0; }                // pause then replay
        else { ctx.clearRect(0, 0, W, H); return; }           // play once, then clear
      }
      frame(clamp01(t));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
