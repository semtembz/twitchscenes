<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Transition — Strawberry Milk Pour / Sweet Wipe</title>
  <!--
    STRAWBERRY MILK stinger ("cozy kawaii cafe"). A creamy pink milk POUR floods
    the screen on a soft wavy diagonal wipe while a flurry of strawberry slices,
    boba pearls and little hearts drifts across. At the mid (full-cover) point a
    gentle SPARKLE BLOOM + soft cream flash blooms — no harsh glitch, just sweet.
    Then the pour retracts and the screen clears. Transparent before & after,
    sine-driven, ~1300ms. Plays ONCE on load, then clears.

      ?loop=1   loop it (for previewing)
      ?ms=1300  total duration in ms (default 1300)

    To use as an OBS Stinger you need a VIDEO file (OBS can't use a web page as a
    stinger). Use transition-export.html to record a transparent .webm, then add it
    as a Stinger transition with the Transition Point at ~50% (the full-cover bloom).
  -->
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="c" width="1920" height="1080"></canvas>
  <script>
  (() => {
    "use strict";
    const W = 1920, H = 1080;
    const cv = document.getElementById('c'), ctx = cv.getContext('2d');
    const params = new URLSearchParams(location.search);
    const DUR = Number(params.get('ms')) || 1300;
    const LOOP = params.get('loop') === '1';

    /* ---- palette (strawberry milk) ---- */
    const CREAM = '#FFF1F4', MILK = '#FFE3EC', PINK = '#FFB3C6', HOT = '#FF8FAB';
    const ROSE = '#A45D6E', MINT = '#BFEAD6', GLOSS = '#FFFFFF';
    const BEAD = '#C98AA0';
    const SWEETS = [HOT, PINK, MILK, GLOSS];   // tint pool for hearts/pearls

    const clamp01 = (x) => x < 0 ? 0 : x > 1 ? 1 : x;
    const smooth = (x) => { x = clamp01(x); return x * x * (3 - 2 * x); };       // smoothstep
    const lerp = (a, b, t) => a + (b - a) * t;

    /* ---- a fixed flurry of sweets; positions are a deterministic function of t ----
       Each sweet travels diagonally across the screen on a slow sine sway. Their
       on-screen window is staggered so the flurry builds with the pour and thins as
       it retracts. seeded so the look is stable frame-to-frame and in the export. ---- */
    let seed = 7766;
    const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
    const R = (a, b) => a + rnd() * (b - a);

    const N_SWEETS = 44;
    const sweets = Array.from({ length: N_SWEETS }, () => {
      // kind: 0 = boba pearl, 1 = strawberry slice, 2 = heart
      const kind = rnd() < 0.36 ? 0 : (rnd() < 0.5 ? 1 : 2);
      return {
        kind,
        // start just off the top-left, end off the bottom-right (a diagonal sweep)
        x0: R(-220, W * 0.7), y0: R(-260, -20),
        vx: R(W * 0.45, W * 1.15), vy: R(H * 1.05, H * 1.65),   // total travel across the clip
        s: kind === 0 ? R(9, 18) : (kind === 1 ? R(18, 36) : R(16, 32)),
        sway: R(26, 80), swf: R(1.2, 3.0), phase: R(0, 6.2832),
        rot0: R(0, 6.2832), vr: R(-6, 6),
        c: SWEETS[(rnd() * SWEETS.length) | 0],
        bead: rnd() < 0.5 ? BEAD : ROSE,
        lead: R(0, 0.22), span: R(0.55, 0.9), a: R(0.6, 0.95),
      };
    });

    /* ---- sweet shapes (match the scenes' canvas field) ---- */
    function drawHeart(s, rot, col, alpha) {
      ctx.rotate(rot);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = col;
      ctx.shadowColor = HOT;
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.moveTo(0, s * 0.34);
      ctx.bezierCurveTo(s * 0.9, -s * 0.55, s * 0.55, -s * 1.05, 0, -s * 0.5);
      ctx.bezierCurveTo(-s * 0.55, -s * 1.05, -s * 0.9, -s * 0.55, 0, s * 0.34);
      ctx.closePath();
      ctx.fill();
    }
    function drawStrawberry(s, rot, alpha) {
      ctx.rotate(rot);
      ctx.globalAlpha = alpha;
      ctx.shadowColor = HOT;
      ctx.shadowBlur = 14;
      ctx.fillStyle = HOT;
      ctx.beginPath(); ctx.arc(0, 0, s, 0, 6.2832); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.lineWidth = Math.max(2, s * 0.18); ctx.strokeStyle = MILK;
      ctx.beginPath(); ctx.arc(0, 0, s - ctx.lineWidth * 0.5, 0, 6.2832); ctx.stroke();
      ctx.fillStyle = CREAM;
      for (let i = 0; i < 6; i++) {
        const ang = (i / 6) * 6.2832, rr = s * 0.55;
        ctx.beginPath();
        ctx.arc(Math.round(Math.cos(ang) * rr), Math.round(Math.sin(ang) * rr), Math.max(1, s * 0.09), 0, 6.2832);
        ctx.fill();
      }
    }
    function drawPearl(s, col, alpha) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = col;
      ctx.shadowColor = ROSE;
      ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(0, 0, s, 0, 6.2832); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = alpha * 0.55; ctx.fillStyle = GLOSS;
      ctx.beginPath(); ctx.arc(-s * 0.3, -s * 0.3, s * 0.32, 0, 6.2832); ctx.fill();
    }

    function drawSweet(p, px, py, rot, alpha) {
      if (alpha <= 0.01) return;
      ctx.save();
      ctx.translate(Math.round(px), Math.round(py));
      if (p.kind === 2) drawHeart(p.s, rot, p.c, alpha);
      else if (p.kind === 1) drawStrawberry(p.s, rot, alpha);
      else drawPearl(p.s, p.bead, alpha);
      ctx.restore();
    }

    function drawSweets(t, coverAlpha) {
      ctx.save();
      for (const p of sweets) {
        // local life 0..1 across this sweet's staggered window
        const lt = clamp01((t - p.lead) / p.span);
        if (lt <= 0 || lt >= 1) continue;
        const px = p.x0 + p.vx * lt + Math.sin(p.phase + lt * p.swf * 6.2832) * p.sway;
        const py = p.y0 + p.vy * lt;
        const rot = p.rot0 + p.vr * lt;
        // fade each sweet in/out at the ends of its own window, plus overall presence
        const ends = Math.sin(lt * Math.PI);          // 0 at ends, 1 mid
        // sweets read most over the pour; keep a touch visible against transparency too
        const present = lerp(0.6, 1, coverAlpha);
        drawSweet(p, px, py, rot, p.a * ends * present);
      }
      ctx.restore();
    }

    /* ---- the creamy pink milk POUR: a soft band that grows to full cover at
           t=0.5 then retracts. Drawn as a wide pink gradient masked by a wavy wipe. ---- */
    function wipePoint(lead, side) {
      // intersection of the diagonal x+y = lead with the screen rect.
      if (side === 'a') return lead <= H ? [0, lead] : [lead - H, H];
      return lead <= W ? [lead, 0] : [W, lead - W];
    }

    function drawPour(cover) {
      if (cover <= 0.001) return;
      // diagonal wipe progress: the leading edge sweeps top-left -> bottom-right.
      const diag = W + H;
      const lead = cover * (diag + 480) - 240;        // pixels along x+y that are covered
      ctx.save();
      // build the creamy milk band
      const g = ctx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0.00, GLOSS);
      g.addColorStop(0.22, CREAM);
      g.addColorStop(0.52, MILK);
      g.addColorStop(0.80, PINK);
      g.addColorStop(1.00, HOT);
      ctx.fillStyle = g;
      ctx.globalAlpha = Math.min(1, cover * 1.25);
      // fill a clipped polygon whose hypotenuse = the wipe line x+y = lead, with a
      // gentle scalloped/wavy leading edge so the pour reads soft, not a hard razor.
      const pA = wipePoint(lead, 'a'), pB = wipePoint(lead, 'b');
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(pB[0], pB[1]);
      // wavy edge from pB back toward pA (perpendicular ripples along the diagonal)
      const steps = 26, amp = 26 * Math.sin(cover * Math.PI) + 8;
      const nx = -Math.SQRT1_2, ny = -Math.SQRT1_2;     // inward normal of x+y=lead
      for (let i = 1; i < steps; i++) {
        const u = i / steps;
        const bx = lerp(pB[0], pA[0], u), by = lerp(pB[1], pA[1], u);
        const w = Math.sin(u * Math.PI * 4 + cover * 6.2832) * amp;
        ctx.lineTo(bx + nx * w, by + ny * w);
      }
      ctx.lineTo(pA[0], pA[1]);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // glossy frothy leading edge: a bright milk-cream glow band right at the wipe line
      const edgeA = Math.sin(cover * Math.PI);        // strongest mid-sweep
      if (edgeA > 0.02 && lead > 0 && lead < diag) {
        ctx.save();
        // soft wide pink wash just behind the edge
        ctx.globalAlpha = 0.4 * edgeA;
        ctx.strokeStyle = HOT;
        ctx.lineWidth = 30;
        ctx.shadowColor = HOT;
        ctx.shadowBlur = 50;
        ctx.beginPath();
        ctx.moveTo(pA[0], pA[1]);
        ctx.lineTo(pB[0], pB[1]);
        ctx.stroke();
        // crisp glossy froth line on top
        ctx.globalAlpha = 0.85 * edgeA;
        ctx.strokeStyle = GLOSS;
        ctx.lineWidth = 7;
        ctx.shadowColor = MILK;
        ctx.shadowBlur = 40;
        ctx.stroke();
        ctx.restore();

        // a scatter of froth bubbles riding the leading edge
        ctx.save();
        ctx.globalAlpha = 0.7 * edgeA;
        ctx.fillStyle = GLOSS;
        ctx.shadowColor = MILK; ctx.shadowBlur = 14;
        for (let i = 0; i < 14; i++) {
          const u = (i + 0.5) / 14;
          const bx = lerp(pA[0], pB[0], u), by = lerp(pA[1], pB[1], u);
          const w = Math.sin(u * Math.PI * 5 + cover * 6.2832) * 16;
          const r = 3 + (i % 3) * 2;
          ctx.beginPath();
          ctx.arc(Math.round(bx + nx * w), Math.round(by + ny * w), r, 0, 6.2832);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    /* ---- sweet SPARKLE BLOOM + soft cream flash, peaking at the full-cover mid point.
           (the kawaii answer to a glitch: gentle, glossy, adorable) ---- */
    function rndPulse(i, t) {
      const v = Math.sin((i * 12.9898 + t * 78.233) * 43758.5453);
      return v - Math.floor(v);
    }

    function sparkle(x, y, r, alpha, col) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = col;
      ctx.shadowColor = GLOSS; ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.moveTo(x, y - r); ctx.lineTo(x + r * 0.3, y - r * 0.3);
      ctx.lineTo(x + r, y); ctx.lineTo(x + r * 0.3, y + r * 0.3);
      ctx.lineTo(x, y + r); ctx.lineTo(x - r * 0.3, y + r * 0.3);
      ctx.lineTo(x - r, y); ctx.lineTo(x - r * 0.3, y - r * 0.3);
      ctx.closePath(); ctx.fill();
    }

    function drawBloom(t, cover) {
      // bloom envelope: a soft pulse centred on t=0.5
      const gx = Math.exp(-Math.pow((t - 0.5) / 0.1, 2));   // gaussian pulse
      if (gx < 0.02) return;

      // a burst of twinkling stars/sparkles scattered over the full-cover pour
      ctx.save();
      const N = 30;
      for (let i = 0; i < N; i++) {
        const sx = rndPulse(i * 2 + 1, 3.7) * W;
        const sy = rndPulse(i * 2 + 2, 9.1) * H;
        const tw = 0.5 + 0.5 * Math.sin(i * 1.7 + t * 30);
        const r = (6 + (i % 4) * 5) * gx * (0.5 + tw * 0.7);
        const col = (i % 3 === 0) ? HOT : GLOSS;
        sparkle(Math.round(sx), Math.round(sy), r, (0.35 + tw * 0.55) * gx, col);
      }
      ctx.restore();

      // soft cream flash at the very peak (gentle, not a hard white)
      const flash = Math.exp(-Math.pow((t - 0.5) / 0.05, 2));
      if (flash > 0.02) {
        ctx.save();
        const fg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, H * 0.7);
        fg.addColorStop(0, 'rgba(255,255,255,' + (0.6 * flash).toFixed(3) + ')');
        fg.addColorStop(0.6, 'rgba(255,227,236,' + (0.4 * flash).toFixed(3) + ')');
        fg.addColorStop(1, 'rgba(255,179,198,0)');
        ctx.fillStyle = fg;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
    }

    function frame(t) {
      ctx.clearRect(0, 0, W, H);
      // cover = 0 -> 1 -> 0 (one smooth sine). full cover at t=0.5.
      const cover = Math.sin(clamp01(t) * Math.PI);

      drawPour(cover);
      drawSweets(t, cover);
      drawBloom(t, cover);

      // gentle inner glow over the pour so it reads as creamy & dimensional, not flat
      if (cover > 0.02) {
        ctx.save();
        const vg = ctx.createRadialGradient(W / 2, H * 0.42, H * 0.18, W / 2, H / 2, H * 0.92);
        vg.addColorStop(0, 'rgba(255,255,255,0)');
        vg.addColorStop(1, 'rgba(164,93,110,' + (0.34 * cover).toFixed(3) + ')');
        ctx.fillStyle = vg;
        ctx.globalCompositeOperation = 'multiply';
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.globalCompositeOperation = 'source-over';
    }

    // Exposed so a verification step can render any frame (t in 0..1) on demand.
    window.__txDraw = (t) => frame(clamp01(t));

    let start = null;
    function loop(ts) {
      if (start == null) start = ts;
      let t = (ts - start) / DUR;
      if (t >= 1) {
        if (LOOP) { start = ts + 700; t = 0; }        // pause then replay
        else { ctx.clearRect(0, 0, W, H); return; }   // play once, then clear
      }
      frame(clamp01(t));
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
