<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Platinum Frame — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one razor-thin platinum ~16:9 webcam frame. Place your
       camera BEHIND this overlay; the inside of the frame is fully transparent so the
       camera shows through it.
       Optional URL params: ?handle=@you   ?pos=center|lower   ?w=1120&h=630 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint cold steel specks drift around the frame */
    canvas.bg{pointer-events:none;opacity:.6;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* razor-thin platinum hairline border; INSIDE stays transparent.
       a precise stepped/offset double hairline matching the frame language. */
    .frame{position:absolute;inset:0;background:transparent;
      border:1px solid var(--hair);
      box-shadow:
        0 0 22px rgba(215,222,230,.18),
        0 0 60px rgba(0,0,0,.4),
        inset 0 0 1px rgba(244,247,250,.18);}
    /* OFFSET inner hairline nudged toward lower-right (transparent inside) */
    .frame::before{content:"";position:absolute;left:13px;top:13px;right:7px;bottom:7px;
      border:1px solid var(--hair-soft);pointer-events:none;}
    /* centre-top + mirrored centre-bottom reference tick (echo .frame::after) */
    .frame::after{content:"";position:absolute;left:50%;top:-1px;width:1px;height:16px;
      transform:translateX(-50%);background:var(--hair);pointer-events:none;
      box-shadow:0 612px 0 var(--hair);}

    /* minimal L-shaped corner REGISTRATION ticks on the frame corners */
    .tk{position:absolute;width:26px;height:26px;pointer-events:none;
      animation:tkin 1.1s var(--ease) both .3s;}
    .tk::before,.tk::after{content:"";position:absolute;background:var(--tick);
      box-shadow:0 0 7px rgba(215,222,230,.5);}
    .tk::before{width:26px;height:1px;} .tk::after{width:1px;height:26px;}
    .tk--tl{left:-1px;top:-1px;}    .tk--tl::before{left:0;top:0;}    .tk--tl::after{left:0;top:0;}
    .tk--tr{right:-1px;top:-1px;}   .tk--tr::before{right:0;top:0;}   .tk--tr::after{right:0;top:0;}
    .tk--bl{left:-1px;bottom:-1px;} .tk--bl::before{left:0;bottom:0;} .tk--bl::after{left:0;bottom:0;}
    .tk--br{right:-1px;bottom:-1px;}.tk--br::before{right:0;bottom:0;}.tk--br::after{right:0;bottom:0;}
    @keyframes tkin{from{opacity:0}to{opacity:1}}

    /* handle tag — frosted platinum strip clipped to bottom-center of the frame */
    .tag{position:absolute;left:50%;bottom:-19px;transform:translateX(-50%);
      display:flex;align-items:center;gap:14px;white-space:nowrap;
      background:linear-gradient(180deg, rgba(26,30,36,.85), rgba(14,16,19,.78));
      border:1px solid var(--hair);padding:9px 26px;
      box-shadow:0 12px 30px rgba(0,0,0,.5), 0 0 22px rgba(215,222,230,.10);}
    .tag .who{font-family:var(--sans);font-weight:300;
      letter-spacing:.30em;font-size:22px;color:var(--platinum);text-indent:.30em;
      text-shadow:0 0 16px rgba(215,222,230,.35);}
    .tag .dia{width:8px;height:8px;transform:rotate(45deg);
      background:var(--white);box-shadow:0 0 10px var(--glow);
      animation:pulse 2.4s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

    /* small caption + diamond, top-left above the frame (clean functional label) */
    .cap{position:absolute;left:8px;top:-44px;display:flex;align-items:center;gap:14px;
      font-family:var(--sans);font-weight:300;
      letter-spacing:.5em;font-size:16px;color:var(--steel);text-indent:.5em;opacity:.85;}
    .cap .dia{width:8px;height:8px;border:1px solid var(--steel);transform:rotate(45deg);
      box-shadow:0 0 8px rgba(215,222,230,.25);}

    /* corner registration mark — top-right above the frame */
    .crest-tr{position:absolute;right:6px;top:-46px;display:flex;align-items:center;gap:14px;}
    .crest-tr .r{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--hair));}
    .crest-tr .dia{width:9px;height:9px;border:1px solid var(--platinum);transform:rotate(45deg);
      box-shadow:0 0 12px var(--glow);}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.978)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .tk{animation:none!important;}
    #stage.render .tag .dia{animation:none;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .tk{opacity:1;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true"></div>

      <!-- L-shaped corner registration ticks -->
      <span class="tk tk--tl" aria-hidden="true"></span>
      <span class="tk tk--tr" aria-hidden="true"></span>
      <span class="tk tk--bl" aria-hidden="true"></span>
      <span class="tk tk--br" aria-hidden="true"></span>

      <span class="cap" aria-hidden="true"><span class="dia"></span>ON CAMERA</span>
      <span class="crest-tr" aria-hidden="true"><span class="r"></span><span class="dia"></span></span>
      <div class="tag"><span class="dia" aria-hidden="true"></span><span class="who" id="handle">@yourhandle</span></div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint cold steel specks drifting around the frame ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    // tiny seeded PRNG (mulberry32) — deterministic field
    let _s = 0x9A07 >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const specks = Array.from({ length: Math.max(0, num("specks", 36)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.5, 1.6), vx: R(-3,3)/60, vy: R(-2.4,2.4)/60,
      ph: R(0, 6.28), tw: R(0.5,1.3), a: R(0.14, 0.5), ice: srnd() < 0.4,
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      for (const p of specks){
        p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.ph += 0.03 * p.tw * dt * 60;
        if (p.x < -8) p.x = W + 8; if (p.x > W + 8) p.x = -8;
        if (p.y < -8) p.y = H + 8; if (p.y > H + 8) p.y = -8;
        const tw = 0.55 + Math.sin(p.ph) * 0.45;
        ctx.globalAlpha = p.a * tw;
        ctx.fillStyle = p.ice ? "#D7DEE6" : "#9AA7B2";
        ctx.shadowColor = p.ice ? "#F4F7FA" : "#9AA7B2";
        ctx.shadowBlur = 6 * p.z;
        const s = Math.max(1, Math.round(p.z * 1.5));
        ctx.fillRect(Math.round(p.x), Math.round(p.y), s, s);
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    window.__platinumDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
