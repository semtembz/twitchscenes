<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Mecha Hangar — In-Game Overlay</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT in-game HUD in the Mecha Hangar language: thin amber/black
       hazard corner brackets, a riveted-steel handle SLOT lower-left (bolt heads
       + a red ON-AIR beacon + a stencil "BAY 07" tag), and a tiny stamped
       designation top-right. Most of the screen stays transparent so gameplay
       shows through. A few rising welding sparks hug the lower edge.
       pointer-events:none on all decoration.
       Optional URL params: ?handle=@you   ?tag=ON%20AIR -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent overlay: drop the opaque stage bg + all full-bleed scene layers */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* the spark canvas hugs the bottom; subtle so it never fights gameplay */
    canvas.bg{pointer-events:none;opacity:.7;}

    /* ---- thin amber/black HAZARD corner BRACKETS (frame the play area) ---- */
    .brk{position:absolute;width:128px;height:128px;pointer-events:none;z-index:5;
      animation:brkin .8s var(--ease) both .1s;}
    .brk::before,.brk::after{content:"";position:absolute;pointer-events:none;}
    /* L-shaped legs cut from a hazard-striped band, with a steel edge line */
    .brk::before{left:0;top:0;width:128px;height:14px;
      background:repeating-linear-gradient(45deg,var(--amber) 0 13px,#14171A 13px 26px);
      box-shadow:inset 0 0 0 1px rgba(11,16,20,.9),0 0 14px rgba(0,0,0,.5);}
    .brk::after{left:0;top:0;width:14px;height:128px;
      background:repeating-linear-gradient(45deg,var(--amber) 0 13px,#14171A 13px 26px);
      box-shadow:inset 0 0 0 1px rgba(11,16,20,.9),0 0 14px rgba(0,0,0,.5);}
    .brk--tl{left:46px;top:46px;}
    .brk--tr{right:46px;top:46px;transform:scaleX(-1);}
    .brk--bl{left:46px;bottom:46px;transform:scaleY(-1);}
    .brk--br{right:46px;bottom:46px;transform:scale(-1,-1);}
    @keyframes brkin{from{opacity:0}to{opacity:1}}

    /* a tiny corner bolt head pinned in each bracket elbow */
    .brk i{position:absolute;left:24px;top:24px;width:18px;height:18px;border-radius:4px;
      background:linear-gradient(135deg,var(--steel-hi),var(--steel) 55%,var(--steel-lo));
      border:1px solid rgba(11,16,20,.85);
      box-shadow:0 1px 3px rgba(0,0,0,.6),inset 0 1px 0 rgba(94,114,127,.5);}
    .brk i::before{content:"";position:absolute;inset:0;margin:auto;width:6px;height:6px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%,var(--rivet-hi),var(--rivet) 60%,#1c252b);}

    /* ---- riveted-steel HANDLE SLOT, lower-left ---- */
    .slot{position:absolute;left:88px;bottom:74px;height:66px;z-index:11;
      display:flex;align-items:center;gap:20px;padding:0 30px 0 26px;
      background:linear-gradient(180deg,rgba(30,42,51,.78),rgba(16,22,27,.84));
      border:2px solid rgba(11,16,20,.85);
      box-shadow:
        inset 0 0 0 2px var(--steel-hi),
        inset 0 0 28px rgba(0,0,0,.55),
        0 16px 44px rgba(0,0,0,.55),
        0 0 26px rgba(245,166,35,.06);
      /* chamfered industrial corners, matching the bay door language */
      clip-path:polygon(16px 0,100% 0,100% calc(100% - 16px),calc(100% - 16px) 100%,0 100%,0 16px);
      animation:slotin .9s var(--ease-mech) both .18s;}
    /* hazard-striped accent rail down the left edge of the slot */
    .slot::before{content:"";position:absolute;left:0;top:0;bottom:0;width:8px;pointer-events:none;
      background:repeating-linear-gradient(-45deg,var(--amber) 0 9px,#14171A 9px 18px);
      box-shadow:inset -1px 0 0 rgba(11,16,20,.9);}
    /* slow amber sheen sweeps the steel face */
    .slot::after{content:"";position:absolute;top:0;bottom:0;width:120px;left:-120px;pointer-events:none;
      mix-blend-mode:screen;
      background:linear-gradient(105deg,transparent,rgba(245,166,35,.14),transparent);
      animation:slotsweep 6.5s linear infinite;}
    @keyframes slotin{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}
    @keyframes slotsweep{0%{left:-120px}100%{left:100%}}

    /* "ON AIR" tag — red reactor beacon + stencil caps */
    .slot .tag{display:flex;align-items:center;gap:12px;
      font-family:"Bahnschrift","DIN Condensed","Stencil Std","Impact",system-ui,sans-serif;
      letter-spacing:.34em;font-size:18px;font-weight:700;text-transform:uppercase;
      color:var(--amber);text-indent:.34em;text-shadow:0 0 14px rgba(245,166,35,.4);}
    .slot .tag .beam{width:11px;height:11px;border-radius:50%;background:var(--red);
      box-shadow:0 0 12px var(--red-glow),0 0 4px var(--red);
      animation:beam 1.3s steps(1) infinite;}
    @keyframes beam{0%,55%{opacity:1}56%,100%{opacity:.28}}

    /* steel divider with a bolt head, between tag and handle */
    .slot .div{position:relative;width:2px;height:34px;
      background:linear-gradient(180deg,transparent,var(--rivet),transparent);}
    .slot .div::after{content:"";position:absolute;left:50%;top:50%;width:9px;height:9px;border-radius:50%;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle at 35% 30%,var(--rivet-hi),var(--rivet) 60%,#1c252b);
      box-shadow:0 0 4px rgba(0,0,0,.6);}

    /* handle — mono, amber, matching the screen's #handle */
    .slot .who{
      font-family:"Consolas","SFMono-Regular",ui-monospace,monospace;
      letter-spacing:.16em;font-size:27px;font-weight:700;color:var(--text);
      text-shadow:0 2px 0 rgba(0,0,0,.4),0 0 22px rgba(245,166,35,.22);white-space:nowrap;}

    /* tiny stamped bay designation, top-right (blinking red dot) */
    .desig-tr{position:absolute;top:62px;right:206px;z-index:12;display:flex;align-items:center;gap:12px;
      max-width:560px;white-space:nowrap;
      font-family:"Bahnschrift","DIN Condensed","Stencil Std","Impact",system-ui,sans-serif;
      letter-spacing:.3em;font-size:18px;font-weight:700;text-transform:uppercase;
      color:var(--steel-lt);opacity:.7;text-indent:.3em;
      animation:fade .9s var(--ease) both .28s;}
    .desig-tr .dot{width:9px;height:9px;border-radius:50%;background:var(--red);
      box-shadow:0 0 10px var(--red-glow);animation:reddot 1.2s steps(1) infinite;}
    @keyframes fade{from{opacity:0}to{opacity:.7}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .brk,
    #stage.render .slot,
    #stage.render .desig-tr{animation:none!important;}
    #stage.render .slot::after{animation:none;display:none;}
    #stage.render .slot .tag .beam,
    #stage.render .desig-tr .dot{animation:none;}
    #stage.render .brk{opacity:1;}
    #stage.render .slot{opacity:1;transform:none;}
    #stage.render .desig-tr{opacity:.7;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- thin hazard corner brackets -->
    <div class="brk brk--tl" aria-hidden="true"><i></i></div>
    <div class="brk brk--tr" aria-hidden="true"><i></i></div>
    <div class="brk brk--bl" aria-hidden="true"><i></i></div>
    <div class="brk brk--br" aria-hidden="true"><i></i></div>

    <!-- stamped designation, top-right — editable text slot -->
    <div class="desig-tr is-slot" data-slot="tag2"><span class="dot"></span><span class="slot-no">35</span><span class="slot-txt">your text here</span></div>

    <!-- riveted-steel handle slot, lower-left -->
    <div class="slot">
      <span class="tag"><span class="beam" aria-hidden="true"></span>ON AIR</span>
      <span class="div" aria-hidden="true"></span>
      <span class="who" id="handle">@yourhandle</span>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + tag (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;
    const tag = params.get("tag"), tagEl = document.querySelector(".slot .tag");
    if (tag && tagEl) tagEl.lastChild.textContent = tag;

    /* ---- editable text slots: any [data-slot] ships a muted "[35] your text here"
       placeholder the buyer edits or deletes. ?slotname=Text sets it; ?slotname=-
       (or empty/none/off) removes it entirely. ---- */
    document.querySelectorAll("[data-slot]").forEach((sl) => {
      const v = params.get(sl.dataset.slot);
      if (v == null) return;
      if (v === "-" || v === "" || v === "none" || v === "off") { sl.remove(); return; }
      sl.textContent = v;
      sl.classList.remove("is-slot");
    });

    /* ---- canvas: a few rising welding SPARKS hugging the lower edge ----
       deterministic seeded RNG (mulberry32) so render mode is reproducible. */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;

    let _s = 0x4D3C >>> 0;
    function srnd(){
      _s |= 0; _s = (_s + 0x6D2B79F5) | 0;
      let t = Math.imul(_s ^ (_s >>> 15), 1 | _s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    const R = (a, b) => a + srnd() * (b - a);

    function spawnSpark(){
      // sparks rise from the lower-left handle zone + a faint sweep across the floor
      return {
        x: R(40, W * 0.62),
        y: H + R(0, 24),
        vx: R(-1.6, 1.8),
        vy: R(-9, -5.5),
        g: R(0.09, 0.17),
        life: 0, max: R(46, 96),
        heat: R(0.7, 1),
        sz: R(0.9, 2.0),
      };
    }

    let sparks = [];
    function buildField(){
      _s = 0x4D3C >>> 0;
      sparks = [];
      if (!ctx) return;
      const NS = Math.max(0, num("sparks", 22));
      sparks = Array.from({ length: NS }, () => {
        const s = spawnSpark();
        s.life = R(0, s.max);
        s.y = H - (s.life / s.max) * R(80, 460);
        return s;
      });
    }
    buildField();

    function drawBg(dt){
      if (!ctx) return;
      const f = dt * 60;
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = "lighter";
      for (const s of sparks){
        s.vy += s.g * f;
        s.x += s.vx * f; s.y += s.vy * f;
        s.life += f;
        if (s.life >= s.max || s.y > H + 36){ Object.assign(s, spawnSpark()); continue; }
        const k = s.life / s.max;
        const fade = k < 0.12 ? k / 0.12 : (1 - (k - 0.12) / 0.88);
        const a = Math.max(0, fade) * 0.9;
        const heat = s.heat * (1 - k * 0.6);
        const cr = 255, cg = Math.round(120 + heat * 130), cb = Math.round(30 + heat * 90);
        const x = Math.round(s.x), y = Math.round(s.y);
        ctx.globalAlpha = a * 0.5;
        const g = ctx.createRadialGradient(x, y, 0, x, y, s.sz * 5);
        g.addColorStop(0, `rgba(${cr},${cg},${cb},0.9)`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, s.sz * 5, 0, 6.2832); ctx.fill();
        ctx.globalAlpha = a;
        ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
        ctx.fillRect(x, y, Math.max(1, Math.round(s.sz)), Math.max(1, Math.round(s.sz)));
        ctx.globalAlpha = a * 0.5;
        ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.8)`;
        ctx.lineWidth = Math.max(1, s.sz * 0.8);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(Math.round(s.x - s.vx * 1.6), Math.round(s.y - s.vy * 1.6));
        ctx.stroke();
      }
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
    }
    window.__mechaDraw = () => drawBg(1/30); // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; buildField(); drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
