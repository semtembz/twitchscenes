<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Primetime Pro — Member Alert</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, transparent, Local file -> this file.
       Background is TRANSPARENT so the alert composites over your scene/gameplay.
       Auto-plays a looping demo. Override via URL params:
         ?name=SomeName  ?amount=10   (?type= can also force a different event)
         ?noname=1 hides the baked name (your alert platform overlays the live name)
         ?render=1 deterministic capture mode for the headless webm pipeline -->
  <link rel="stylesheet" href="../alerts.css" />
</head>
<body data-event="member">
  <div id="stage">
    <canvas class="fx" width="1920" height="1080" aria-hidden="true"></canvas>

    <aside class="alert" id="alert">
      <span class="rail" aria-hidden="true"></span>
      <div class="art" aria-hidden="true"><div class="glyph" id="glyph">◆</div></div>
      <div class="plate">
        <span class="scanveil" aria-hidden="true"></span>
        <span class="tagid" aria-hidden="true"><b>PTP</b>&nbsp;· CH&nbsp;03</span>
        <span class="sig" aria-hidden="true"><i style="height:5px"></i><i style="height:9px"></i><i style="height:14px"></i><i style="height:8px"></i></span>
        <div class="meta">
          <p class="kick"><span class="dot"></span> LIVE · <span id="kick-label">NEW MEMBER</span></p>
          <h1 class="name" id="name">NewFan</h1>
          <p class="amount" id="amount"></p>
          <p class="sub" id="sub">added to the squad</p>
        </div>
      </div>
    </aside>
  </div>
  <script src="../alerts.js"></script>
</body>
</html>
