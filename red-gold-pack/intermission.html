<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Intermission — Red / Gold</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?seconds=180 (hidden timer)  ?handle=@you  ?photo=assets/x.jpg -->
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div id="stage">
    <div class="bg" aria-hidden="true"></div>

    <section class="photo" aria-hidden="true">
      <img id="photoImg" class="photo__img" alt="" />
      <div class="photo__grade"></div>
    </section>

    <canvas id="petals" class="petals" width="1920" height="1080" aria-hidden="true"></canvas>
    <div class="divider" aria-hidden="true"></div>

    <main class="panel">
      <div class="sun" aria-hidden="true"></div>
      <p class="kicker"><span class="dot"></span> <span id="statusEn" data-done="RESUMING">INTERMISSION</span></p>
      <div class="rule" aria-hidden="true"></div>
      <h1 class="title">BACK<br><span class="title__accent">SHORTLY</span></h1>
      <p class="sub">stretching our legs — the stream resumes soon</p>
      <p class="handle" id="handle" hidden></p>
    </main>

    <div class="frame" aria-hidden="true"></div>

    <div class="loadstatus" id="loadstatus" aria-hidden="true">
      <span class="spinner" id="spinner"></span>
      <span id="loadtext" data-done="RESUMING">BREAK</span>
    </div>

    <div class="loadbar" aria-hidden="true">
      <div class="loadbar__track"><div class="loadbar__fill" id="fill"></div></div>
    </div>
  </div>

  <script src="shared.js"></script>
</body>
</html>
