<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Starlit Dreamcore — In-Game Overlay</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT in-game HUD in the "Sleeping Sky" language: thin lavender
       hairline corner accents tipped with a soft star diamond, a slim
       frameless dream-light strip lower-left carrying @handle + a clean "LIVE"
       status star, and a small constellation tag top-right. Almost everything
       stays transparent so the gameplay shows through; only a faint drift of
       twinkling star-dust lives near the strip. Decoration is pointer-events:none.
       Optional URL params: ?handle=@you  ?tag=LIVE  ?label=...  ?render=1 -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* TRANSPARENT overlay: no sky background, no moon/nebula/haze full-bleed */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* a sparse drift of twinkling star-dust, very low alpha, hugging the HUD */
    canvas.bg{pointer-events:none;opacity:.62;}

    /* ---- thin lavender hairline corner accents, each tipped with a soft star
       diamond (the constellation crop-mark motif) ---- */
    .ds{position:absolute;width:58px;height:58px;pointer-events:none;opacity:.7;
      animation:dsin 1.1s var(--ease) both .2s;}
    .ds::before,.ds::after{content:"";position:absolute;background:var(--hair);
      box-shadow:0 0 7px rgba(184,164,255,.3);}
    .ds::before{width:58px;height:1px;} .ds::after{width:1px;height:58px;}
    .ds--tl{left:48px;top:48px;}  .ds--tl::before{left:0;top:0;}  .ds--tl::after{left:0;top:0;}
    .ds--tr{right:48px;top:48px;} .ds--tr::before{right:0;top:0;} .ds--tr::after{right:0;top:0;}
    .ds--bl{left:48px;bottom:48px;}  .ds--bl::before{left:0;bottom:0;}  .ds--bl::after{left:0;bottom:0;}
    .ds--br{right:48px;bottom:48px;} .ds--br::before{right:0;bottom:0;} .ds--br::after{right:0;bottom:0;}
    /* the soft star diamond at the inner vertex of each accent */
    .ds .st{position:absolute;width:11px;height:11px;background:var(--white);
      clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%);
      filter:drop-shadow(0 0 7px var(--halo-pink)) drop-shadow(0 0 12px var(--halo));}
    .ds--tl .st{left:-5px;top:-5px;}  .ds--tr .st{right:-5px;top:-5px;}
    .ds--bl .st{left:-5px;bottom:-5px;} .ds--br .st{right:-5px;bottom:-5px;}
    @keyframes dsin{from{opacity:0}to{opacity:.7}}

    /* ---- slim frameless dream-light strip, lower-left ---- */
    .slot{position:absolute;left:58px;bottom:58px;height:60px;
      display:flex;align-items:center;gap:20px;padding:0 30px 0 24px;
      /* a soft luminous bloom, no hard border — dreamcore stays frameless */
      background:
        linear-gradient(180deg, rgba(53,43,87,.46), rgba(28,23,51,.34)),
        radial-gradient(120% 160% at 0% 50%, rgba(184,164,255,.14), transparent 70%);
      border-top:1px solid var(--hair-soft);border-bottom:1px solid var(--hair-soft);
      box-shadow:0 18px 50px rgba(20,16,38,.5), inset 0 0 40px rgba(108,92,224,.08),
        0 0 30px rgba(184,164,255,.07);
      animation:slotin .9s var(--ease) both .15s;}
    /* a soft lavender hairline underline that glows beneath the strip */
    .slot::before{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:1px;
      pointer-events:none;
      background:linear-gradient(90deg,transparent,var(--lavender),transparent);
      box-shadow:0 0 12px rgba(184,164,255,.5);opacity:.55;}
    /* slow soft star-light sweep travels along the strip */
    .slot::after{content:"";position:absolute;top:0;bottom:0;width:130px;left:-130px;pointer-events:none;
      mix-blend-mode:screen;
      background:linear-gradient(105deg, transparent, rgba(242,198,255,.16), transparent);
      animation:slotsweep 6.5s linear infinite;}
    @keyframes slotin{from{opacity:0;transform:translateX(-26px)}to{opacity:1;transform:none}}
    @keyframes slotsweep{0%{left:-130px}100%{left:100%}}

    /* "LIVE" status — spaced soft caps + a gently breathing star (functional, clean) */
    .slot .tag{display:flex;align-items:center;gap:12px;font-family:var(--display);
      letter-spacing:.4em;font-size:18px;font-weight:600;text-transform:uppercase;
      color:var(--lavender);text-indent:.4em;text-shadow:0 0 14px rgba(184,164,255,.45);}
    .slot .tag .st{width:12px;height:12px;background:var(--white);
      clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%);
      filter:drop-shadow(0 0 7px var(--halo-pink)) drop-shadow(0 0 12px var(--halo));
      animation:starpulse 2.6s ease-in-out infinite;}
    @keyframes starpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.82)}}

    /* thin lavender divider rule with a tiny diamond, between tag and handle */
    .slot .div{position:relative;width:1px;height:32px;
      background:linear-gradient(180deg,transparent,var(--lavender),transparent);}
    .slot .div::after{content:"";position:absolute;left:50%;top:50%;width:6px;height:6px;
      transform:translate(-50%,-50%) rotate(45deg);background:var(--pink);
      box-shadow:0 0 8px var(--halo-pink);}

    /* handle — soft humanist sans in star-white, gently glowing */
    .slot .who{font-family:var(--display);font-weight:600;letter-spacing:.06em;font-size:29px;
      color:var(--white);text-shadow:0 0 24px rgba(184,164,255,.4),0 1px 0 rgba(20,16,38,.4);
      white-space:nowrap;}

    /* small constellation tag, top-right — an editable brand slot */
    .mono-tr{position:absolute;top:46px;right:120px;display:flex;align-items:center;gap:13px;
      font-family:var(--display);font-weight:600;letter-spacing:.46em;font-size:17px;
      color:var(--lavender);text-indent:.46em;opacity:.8;white-space:nowrap;
      text-shadow:0 0 12px rgba(184,164,255,.4);
      animation:fade 1s var(--ease) both .3s;}
    .mono-tr .st{width:9px;height:9px;background:var(--pink);flex:none;
      clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%);
      filter:drop-shadow(0 0 6px var(--halo-pink));}
    @keyframes fade{from{opacity:0}to{opacity:.8}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .slot,#stage.render .ds,#stage.render .mono-tr{animation:none!important;}
    #stage.render .slot::after{animation:none;display:none;}
    #stage.render .slot .tag .st{animation:none;opacity:1;transform:none;}
    #stage.render .slot{opacity:1;transform:none;}
    #stage.render .ds{opacity:.7;}
    #stage.render .mono-tr{opacity:.8;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <!-- thin lavender hairline corner accents, star-tipped, in all four corners -->
    <span class="ds ds--tl" aria-hidden="true"><span class="st"></span></span>
    <span class="ds ds--tr" aria-hidden="true"><span class="st"></span></span>
    <span class="ds ds--bl" aria-hidden="true"><span class="st"></span></span>
    <span class="ds ds--br" aria-hidden="true"><span class="st"></span></span>

    <!-- small constellation brand tag, top-right — EDITABLE SLOT: type your own
         text in, or delete the line to remove it (or ?tag2=... / =- at render time) -->
    <div class="mono-tr is-slot" data-slot="tag2"><span class="st" aria-hidden="true"></span><span class="slot-txt"><span class="slot-no">24</span><span class="slot-txt">your text here</span></span></div>

    <!-- slim frameless dream-light strip, lower-left -->
    <div class="slot">
      <span class="tag"><span class="st" aria-hidden="true"></span><span id="tag">LIVE</span></span>
      <span class="div" aria-hidden="true"></span>
      <span class="who" id="handle">@yourhandle</span>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render && stage) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;          // never write --scale:0
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + functional tag/label (null-guarded) ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;
    const tag = params.get("tag") || params.get("label"), tagEl = document.getElementById("tag");
    if (tag && tagEl) tagEl.textContent = tag;

    /* ---- editable text slots: any [data-slot] ships "[25] your text here" ---- */
    document.querySelectorAll("[data-slot]").forEach((s) => {
      const v = params.get(s.dataset.slot);
      if (v == null) return;
      if (v === "-" || v === "" || v === "none" || v === "off") { s.remove(); return; }
      const t = s.querySelector(".slot-txt"); if (t) t.textContent = v; else s.textContent = v;
      s.classList.remove("is-slot");
    });

    /* ---- canvas: a few subtle drifting twinkling star-dust motes (low alpha),
       deterministic seeded RNG so render mode is reproducible ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    // tiny seeded PRNG (mulberry32) — no Math.random in the frame fn
    let _s = 0x5747 >>> 0;
    function srnd(){ _s|=0; _s=(_s+0x6D2B79F5)|0; let t=Math.imul(_s^(_s>>>15),1|_s);
      t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }
    const R = (a,b) => a + srnd()*(b-a);
    const TINT = ["#FFFFFF","#F2C6FF","#B8A4FF","#D9CCFF"];
    const dust = Array.from({ length: Math.max(0, num("dust", 50)) }, () => ({
      x: R(0, W), y: R(0, H), z: R(0.4, 1.6), vy: R(-5, -1)/60, sway: R(0.2, 0.9),
      ph: R(0, 6.28), tw: R(0.5, 1.5), a: R(0.16, 0.5),
      c: TINT[(srnd()*TINT.length)|0],
    }));
    function drawBg(dt){
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      for (const d of dust){
        d.y += d.vy * dt * 60; d.ph += 0.03 * dt * 60; d.x += Math.sin(d.ph) * d.sway * 0.5;
        if (d.y < -10){ d.y = H + 10; d.x = R(0, W); }
        if (d.x < -10) d.x = W + 10; if (d.x > W + 10) d.x = -10;
        const tw = 0.5 + Math.sin(d.ph * d.tw) * 0.5;
        ctx.globalAlpha = d.a * tw;
        ctx.fillStyle = d.c; ctx.shadowColor = d.c; ctx.shadowBlur = 7 * d.z;
        const sz = Math.max(1, Math.round(d.z * 1.6));
        ctx.fillRect(Math.round(d.x), Math.round(d.y), sz, sz);
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    window.__dreamDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
