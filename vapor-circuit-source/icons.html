<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vapor Circuit Icon Set — generator</title>
  <!--
    A consistent set of 18 stand-alone TRANSPARENT PNG icons in the Vapor Circuit
    "Outrun Motherboard" language: neon CIRCUIT-TRACE line icons — each glyph drawn
    as right-angle / rounded neon strokes with junction VIA dots and a soft glow on
    a fully transparent background. Each icon is rendered at 200 x 200 px.

    Two families share ONE stroke weight, ONE corner radius, ONE glow + via style:
      - SOCIAL  : Twitch, YouTube, Twitter/X, Instagram, Discord, TikTok,
                  Kick, Patreon, PayPal/donate, Steam
      - LABELS  : follow (heart), subscribe (star), bits/cheer (diamond),
                  raid (flag), host (broadcast), like (thumb), share (node graph),
                  member (crown)

    Pure vector strokes on a canvas (no baked-in fonts), so they stay crisp.

    How to use:
      1. Open this file in a browser.
      2. Click "Download all" (or a single Download under any icon).
      3. Drop the transparent PNGs into overlays, panels, alert boxes, etc.
  -->
  <style>
    :root{
      --bg:#1A0B2E; --bg2:#10071F; --bg3:#0A0416;
      --pink:#FF6AD5; --violet:#8A4BFF; --cyan:#26D6FF; --gold:#FFD166; --text:#F3E9FF;
      --display:"Eurostile","Bahnschrift","Arial Narrow",system-ui,sans-serif;
      --mono:"Consolas","SFMono-Regular",ui-monospace,monospace;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:var(--mono);color:var(--text);padding:32px;min-height:100vh;
      background:
        radial-gradient(1100px 700px at 30% -10%, #2a1747 0%, rgba(42,23,71,0) 60%),
        linear-gradient(180deg, #21103B 0%, var(--bg3) 100%);
      background-attachment:fixed;}
    h1{font-family:var(--display);font-weight:700;font-size:30px;letter-spacing:.02em;margin:0 0 6px;
      text-transform:uppercase;text-shadow:0 0 18px rgba(255,106,213,.45);}
    p.lead{color:#C9B6F2;margin:0 0 22px;max-width:760px;line-height:1.6;font-size:15px;}
    .toolbar{margin:0 0 26px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
    button{font-family:var(--display);font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;
      padding:11px 22px;color:var(--cyan);background:rgba(16,7,31,.62);border:1px solid rgba(38,214,255,.36);
      border-radius:3px;cursor:pointer;box-shadow:0 0 18px rgba(138,75,255,.20);transition:all .15s ease;}
    button:hover{background:rgba(42,23,71,.6);border-color:var(--cyan);box-shadow:0 0 24px rgba(38,214,255,.4);}
    .section{margin:8px 0 6px;font-family:var(--mono);letter-spacing:.4em;font-size:12px;color:var(--cyan);
      text-transform:uppercase;opacity:.95;border-top:1px solid rgba(138,75,255,.20);padding-top:22px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:18px;margin-bottom:10px;}
    .card{background:rgba(16,7,31,.62);padding:12px 12px 10px;border:1px solid rgba(138,75,255,.26);border-radius:4px;
      box-shadow:0 0 22px rgba(138,75,255,.10);display:flex;flex-direction:column;align-items:center;
      --c:rgba(38,214,255,0.05);}
    .canvas-wrap{border-radius:4px;overflow:hidden;
      background-image:
        linear-gradient(45deg,var(--c) 25%,transparent 25%),
        linear-gradient(-45deg,var(--c) 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,var(--c) 75%),
        linear-gradient(-45deg,transparent 75%,var(--c) 75%);
      background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;}
    canvas{display:block;width:126px;height:126px;}
    .card .name{margin-top:9px;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--cyan);text-align:center;}
    .card a{margin-top:4px;font-family:var(--mono);font-size:11px;color:#C9B6F2;text-decoration:none;
      border-bottom:1px dashed rgba(38,214,255,.4);}
    .card a:hover{color:var(--cyan);}
  </style>
</head>
<body>
  <h1>VAPOR CIRCUIT ICON SET</h1>
  <p class="lead">
    18 transparent PNG line icons in one cohesive outrun-motherboard style &mdash; neon
    circuit-trace strokes with junction vias and a soft glow, shared stroke weight &amp; corner
    radius. Each is 200&times;200 with its own Download, plus a Download-all.
  </p>
  <div class="toolbar"><button id="dlAll">Download all</button></div>

  <div class="section">Social platforms</div>
  <div class="grid" id="grid-social"></div>

  <div class="section">Stream labels &amp; events</div>
  <div class="grid" id="grid-label"></div>

  <script>
  (function () {
    'use strict';

    const SIZE = 200, PAD = 30, STROKE = 9, RADIUS = 12;
    const PINK = '#FF6AD5', VIOLET = '#8A4BFF', CYAN = '#26D6FF', GOLD = '#FFD166', WHITE = '#FFFFFF';
    const NEON = [PINK, VIOLET, CYAN];
    const BOX = { x: PAD, y: PAD, w: SIZE - PAD * 2, h: SIZE - PAD * 2 };

    // shared pen: one cap/join/weight + neon glow per stroke; color cycles per icon
    function pen(ctx, build, opts) {
      opts = opts || {};
      ctx.save();
      ctx.lineWidth = opts.weight || STROKE;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.strokeStyle = opts.color || ctx._col || CYAN;
      ctx.fillStyle = opts.color || ctx._col || CYAN;
      ctx.shadowColor = opts.glow || opts.color || ctx._col || CYAN;
      ctx.shadowBlur = opts.blur != null ? opts.blur : 13;
      ctx.beginPath(); build(ctx);
      if (opts.fill) ctx.fill(); else ctx.stroke();
      ctx.restore();
    }
    // a junction via dot (white core + colored glow) — the signature PCB node
    function via(ctx, x, y, r, col) {
      ctx.save();
      ctx.shadowColor = col || ctx._col || CYAN; ctx.shadowBlur = 12;
      ctx.fillStyle = col || ctx._col || CYAN;
      ctx.beginPath(); ctx.arc(x, y, r || STROKE * 0.62, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0; ctx.fillStyle = WHITE;
      ctx.beginPath(); ctx.arc(x, y, (r || STROKE * 0.62) * 0.45, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    function roundRectPath(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
    }
    function starPath(ctx, cx, cy, outer, inner, points) {
      for (let i = 0; i < points * 2; i++) {
        const rad = (i % 2 === 0) ? outer : inner;
        const a = -Math.PI / 2 + (i * Math.PI) / points;
        const px = cx + Math.cos(a) * rad, py = cy + Math.sin(a) * rad;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
    }
    function diamondPath(ctx, cx, cy, d) {
      ctx.moveTo(cx, cy - d); ctx.lineTo(cx + d, cy); ctx.lineTo(cx, cy + d); ctx.lineTo(cx - d, cy); ctx.closePath();
    }

    // ---- icon drawers (draw inside BOX; ctx._col = the per-icon accent) ----
    const ICONS = {
      // SOCIAL
      twitch(ctx) {
        const b = BOX;
        pen(ctx, c => {
          c.moveTo(b.x + RADIUS, b.y); c.lineTo(b.x + b.w, b.y);
          c.lineTo(b.x + b.w, b.y + b.h * 0.62);
          c.lineTo(b.x + b.w * 0.74, b.y + b.h * 0.88);
          c.lineTo(b.x + b.w * 0.52, b.y + b.h * 0.88);
          c.lineTo(b.x + b.w * 0.34, b.y + b.h);
          c.lineTo(b.x + b.w * 0.34, b.y + b.h * 0.88);
          c.lineTo(b.x, b.y + b.h * 0.88); c.lineTo(b.x, b.y + RADIUS);
          c.arcTo(b.x, b.y, b.x + RADIUS, b.y, RADIUS); c.closePath();
        });
        const ey = b.y + b.h * 0.30, eh = b.h * 0.26;
        pen(ctx, c => { c.moveTo(b.x + b.w * 0.40, ey); c.lineTo(b.x + b.w * 0.40, ey + eh); }, { weight: STROKE - 2 });
        pen(ctx, c => { c.moveTo(b.x + b.w * 0.64, ey); c.lineTo(b.x + b.w * 0.64, ey + eh); }, { weight: STROKE - 2 });
      },
      youtube(ctx) {
        const b = BOX; const ry = b.y + b.h * 0.16, rh = b.h * 0.68;
        pen(ctx, c => roundRectPath(c, b.x, ry, b.w, rh, RADIUS + 6));
        const cx = b.x + b.w / 2, cy = ry + rh / 2, t = rh * 0.30;
        pen(ctx, c => { c.moveTo(cx - t * 0.85, cy - t); c.lineTo(cx + t * 1.15, cy); c.lineTo(cx - t * 0.85, cy + t); c.closePath(); }, { fill: true, color: WHITE, glow: ctx._col });
      },
      'twitter-x'(ctx) {
        const b = BOX;
        pen(ctx, c => { c.moveTo(b.x, b.y); c.lineTo(b.x + b.w, b.y + b.h); });
        pen(ctx, c => { c.moveTo(b.x + b.w, b.y); c.lineTo(b.x, b.y + b.h); });
        via(ctx, b.x, b.y, STROKE * 0.5); via(ctx, b.x + b.w, b.y + b.h, STROKE * 0.5);
        via(ctx, b.x + b.w, b.y, STROKE * 0.5); via(ctx, b.x, b.y + b.h, STROKE * 0.5);
      },
      instagram(ctx) {
        const b = BOX;
        pen(ctx, c => roundRectPath(c, b.x, b.y, b.w, b.h, RADIUS + 14));
        const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
        pen(ctx, c => { c.arc(cx, cy, b.w * 0.24, 0, Math.PI * 2); });
        via(ctx, b.x + b.w * 0.78, b.y + b.h * 0.22, STROKE * 0.5, WHITE);
      },
      discord(ctx) {
        const b = BOX; const cx = b.x + b.w / 2, cy = b.y + b.h * 0.50;
        pen(ctx, c => {
          c.moveTo(b.x + b.w * 0.16, b.y + b.h * 0.20);
          c.quadraticCurveTo(cx, b.y + b.h * 0.06, b.x + b.w * 0.84, b.y + b.h * 0.20);
          c.quadraticCurveTo(b.x + b.w * 1.02, b.y + b.h * 0.62, b.x + b.w * 0.80, b.y + b.h * 0.88);
          c.lineTo(b.x + b.w * 0.66, b.y + b.h * 0.74);
          c.lineTo(b.x + b.w * 0.34, b.y + b.h * 0.74);
          c.lineTo(b.x + b.w * 0.20, b.y + b.h * 0.88);
          c.quadraticCurveTo(b.x - b.w * 0.02, b.y + b.h * 0.62, b.x + b.w * 0.16, b.y + b.h * 0.20);
          c.closePath();
        });
        via(ctx, cx - b.w * 0.16, cy, STROKE * 0.5, WHITE);
        via(ctx, cx + b.w * 0.16, cy, STROKE * 0.5, WHITE);
      },
      tiktok(ctx) {
        const b = BOX;
        pen(ctx, c => {
          c.moveTo(b.x + b.w * 0.58, b.y);
          c.lineTo(b.x + b.w * 0.58, b.y + b.h * 0.66);
          c.arc(b.x + b.w * 0.40, b.y + b.h * 0.66, b.w * 0.18, 0, Math.PI * 2);
        });
        pen(ctx, c => {
          c.moveTo(b.x + b.w * 0.58, b.y);
          c.quadraticCurveTo(b.x + b.w * 0.78, b.y + b.h * 0.04, b.x + b.w * 0.92, b.y + b.h * 0.22);
        });
        via(ctx, b.x + b.w * 0.92, b.y + b.h * 0.22, STROKE * 0.5);
      },
      kick(ctx) {
        const b = BOX;
        pen(ctx, c => { c.moveTo(b.x + b.w * 0.18, b.y); c.lineTo(b.x + b.w * 0.18, b.y + b.h); });
        pen(ctx, c => { c.moveTo(b.x + b.w * 0.18, b.y + b.h * 0.50); c.lineTo(b.x + b.w * 0.60, b.y + b.h * 0.06); });
        pen(ctx, c => { c.moveTo(b.x + b.w * 0.36, b.y + b.h * 0.36); c.lineTo(b.x + b.w * 0.78, b.y + b.h); });
        via(ctx, b.x + b.w * 0.18, b.y + b.h * 0.50, STROKE * 0.5);
      },
      patreon(ctx) {
        const b = BOX;
        pen(ctx, c => { c.arc(b.x + b.w * 0.62, b.y + b.h * 0.40, b.w * 0.30, 0, Math.PI * 2); });
        pen(ctx, c => { c.moveTo(b.x + b.w * 0.10, b.y); c.lineTo(b.x + b.w * 0.10, b.y + b.h); });
        via(ctx, b.x + b.w * 0.10, b.y + b.h, STROKE * 0.5);
      },
      paypal(ctx) {
        const b = BOX; const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
        pen(ctx, c => { c.arc(cx, cy, b.w * 0.46, 0, Math.PI * 2); });
        pen(ctx, c => {
          c.moveTo(cx + b.w * 0.14, cy - b.h * 0.22);
          c.quadraticCurveTo(cx - b.w * 0.22, cy - b.h * 0.30, cx - b.w * 0.16, cy - b.h * 0.02);
          c.quadraticCurveTo(cx + b.w * 0.22, cy + b.h * 0.04, cx + b.w * 0.14, cy + b.h * 0.24);
          c.quadraticCurveTo(cx - b.w * 0.20, cy + b.h * 0.32, cx - b.w * 0.16, cy + b.h * 0.10);
        }, { weight: STROKE - 2 });
        pen(ctx, c => { c.moveTo(cx - b.w * 0.02, cy - b.h * 0.34); c.lineTo(cx - b.w * 0.02, cy + b.h * 0.36); }, { weight: STROKE - 4, color: WHITE, glow: ctx._col });
      },
      steam(ctx) {
        const b = BOX; const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
        pen(ctx, c => { c.arc(cx, cy, b.w * 0.46, 0, Math.PI * 2); });
        pen(ctx, c => { c.arc(b.x + b.w * 0.66, b.y + b.h * 0.34, b.w * 0.16, 0, Math.PI * 2); });
        pen(ctx, c => { c.arc(b.x + b.w * 0.30, b.y + b.h * 0.66, b.w * 0.10, 0, Math.PI * 2); });
        pen(ctx, c => { c.moveTo(b.x + b.w * 0.30, b.y + b.h * 0.66); c.lineTo(b.x + b.w * 0.66, b.y + b.h * 0.34); }, { weight: STROKE - 3 });
      },

      // LABELS / EVENTS
      follow(ctx) {
        const b = BOX; const cx = b.x + b.w / 2, top = b.y + b.h * 0.20;
        pen(ctx, c => {
          c.moveTo(cx, b.y + b.h * 0.94);
          c.lineTo(b.x + b.w * 0.08, top + b.h * 0.18);
          c.arc(b.x + b.w * 0.29, top, b.w * 0.21, Math.PI * 0.95, Math.PI * 1.95);
          c.arc(b.x + b.w * 0.71, top, b.w * 0.21, Math.PI * 1.05, Math.PI * 2.05);
          c.lineTo(cx, b.y + b.h * 0.94); c.closePath();
        });
      },
      subscribe(ctx) {
        const b = BOX; const cx = b.x + b.w / 2, cy = b.y + b.h * 0.54;
        pen(ctx, c => starPath(c, cx, cy, b.w * 0.46, b.w * 0.19, 5));
      },
      'bits-cheer'(ctx) {
        const b = BOX; const cx = b.x + b.w / 2;
        const top = b.y + b.h * 0.06, mid = b.y + b.h * 0.34, bot = b.y + b.h * 0.96;
        pen(ctx, c => {
          c.moveTo(b.x + b.w * 0.22, top); c.lineTo(b.x + b.w * 0.78, top);
          c.lineTo(b.x + b.w, mid); c.lineTo(cx, bot); c.lineTo(b.x, mid); c.closePath();
        });
        pen(ctx, c => { c.moveTo(b.x, mid); c.lineTo(b.x + b.w, mid); }, { weight: STROKE - 4 });
        pen(ctx, c => { c.moveTo(b.x + b.w * 0.22, top); c.lineTo(cx, mid); c.lineTo(b.x + b.w * 0.78, top); }, { weight: STROKE - 4 });
        pen(ctx, c => { c.moveTo(cx, mid); c.lineTo(cx, bot); }, { weight: STROKE - 4 });
      },
      raid(ctx) {
        const b = BOX; const px = b.x + b.w * 0.18;
        pen(ctx, c => { c.moveTo(px, b.y); c.lineTo(px, b.y + b.h); });
        pen(ctx, c => {
          c.moveTo(px, b.y + b.h * 0.06); c.lineTo(b.x + b.w * 0.92, b.y + b.h * 0.06);
          c.lineTo(b.x + b.w * 0.74, b.y + b.h * 0.26); c.lineTo(b.x + b.w * 0.92, b.y + b.h * 0.46);
          c.lineTo(px, b.y + b.h * 0.46); c.closePath();
        });
        via(ctx, px, b.y + b.h, STROKE * 0.5);
      },
      host(ctx) {
        const b = BOX; const cx = b.x + b.w / 2, cy = b.y + b.h * 0.62;
        via(ctx, cx, cy, STROKE * 0.7);
        for (let i = 1; i <= 2; i++) {
          const r = b.w * (0.14 + i * 0.16);
          pen(ctx, c => { c.arc(cx, cy, r, Math.PI * 1.20, Math.PI * 1.80); }, { weight: STROKE - 2 });
        }
        pen(ctx, c => { c.moveTo(cx, cy); c.lineTo(cx, b.y); });
      },
      like(ctx) {
        const b = BOX;
        pen(ctx, c => roundRectPath(c, b.x, b.y + b.h * 0.42, b.w * 0.26, b.h * 0.58, RADIUS - 4));
        pen(ctx, c => {
          c.moveTo(b.x + b.w * 0.32, b.y + b.h);
          c.lineTo(b.x + b.w * 0.32, b.y + b.h * 0.46);
          c.lineTo(b.x + b.w * 0.50, b.y + b.h * 0.18);
          c.quadraticCurveTo(b.x + b.w * 0.58, b.y, b.x + b.w * 0.64, b.y + b.h * 0.10);
          c.quadraticCurveTo(b.x + b.w * 0.70, b.y + b.h * 0.22, b.x + b.w * 0.58, b.y + b.h * 0.40);
          c.lineTo(b.x + b.w, b.y + b.h * 0.40);
          c.quadraticCurveTo(b.x + b.w, b.y + b.h * 0.46, b.x + b.w * 0.94, b.y + b.h * 0.70);
          c.quadraticCurveTo(b.x + b.w * 0.90, b.y + b.h, b.x + b.w * 0.70, b.y + b.h);
          c.closePath();
        });
      },
      share(ctx) {
        const b = BOX;
        const a = { x: b.x + b.w * 0.78, y: b.y + b.h * 0.12 };
        const d = { x: b.x + b.w * 0.78, y: b.y + b.h * 0.88 };
        const e = { x: b.x + b.w * 0.16, y: b.y + b.h * 0.50 };
        pen(ctx, c => { c.moveTo(e.x, e.y); c.lineTo(a.x, a.y); }, { weight: STROKE - 3 });
        pen(ctx, c => { c.moveTo(e.x, e.y); c.lineTo(d.x, d.y); }, { weight: STROKE - 3 });
        [a, d, e].forEach(n => via(ctx, n.x, n.y, STROKE * 1.0));
      },
      member(ctx) {
        const b = BOX;
        const baseY = b.y + b.h * 0.80, topY = b.y + b.h * 0.12, midY = b.y + b.h * 0.44;
        pen(ctx, c => {
          c.moveTo(b.x, baseY); c.lineTo(b.x, midY);
          c.lineTo(b.x + b.w * 0.27, b.y + b.h * 0.60);
          c.lineTo(b.x + b.w * 0.50, topY);
          c.lineTo(b.x + b.w * 0.73, b.y + b.h * 0.60);
          c.lineTo(b.x + b.w, midY); c.lineTo(b.x + b.w, baseY); c.closePath();
        });
        pen(ctx, c => { c.moveTo(b.x, baseY); c.lineTo(b.x + b.w, baseY); }, { weight: STROKE - 3 });
        pen(ctx, c => diamondPath(c, b.x + b.w * 0.50, b.y + b.h * 0.52, STROKE * 0.7), { fill: true, color: WHITE, glow: ctx._col });
      },
    };

    // each icon gets a fixed accent from the neon set (cycled so the set varies)
    const SOCIAL = [
      ['twitch', 'TWITCH'], ['youtube', 'YOUTUBE'], ['twitter-x', 'TWITTER / X'],
      ['instagram', 'INSTAGRAM'], ['discord', 'DISCORD'], ['tiktok', 'TIKTOK'],
      ['kick', 'KICK'], ['patreon', 'PATREON'], ['paypal', 'DONATE'], ['steam', 'STEAM'],
    ];
    const LABEL = [
      ['follow', 'FOLLOW'], ['subscribe', 'SUBSCRIBE'], ['bits-cheer', 'BITS / CHEER'],
      ['raid', 'RAID'], ['host', 'HOST'], ['like', 'LIKE'], ['share', 'SHARE'], ['member', 'MEMBER'],
    ];

    let colorIdx = 0;
    const made = [];

    function renderIcon(id) {
      const cv = document.createElement('canvas');
      cv.width = SIZE; cv.height = SIZE;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, SIZE, SIZE);
      ctx._col = NEON[colorIdx % NEON.length]; colorIdx++;
      const fn = ICONS[id]; if (fn) fn(ctx);
      return cv;
    }
    function buildGrid(targetId, list) {
      const grid = document.getElementById(targetId);
      for (const [id, label] of list) {
        const cv = renderIcon(id);
        const card = document.createElement('div'); card.className = 'card';
        const wrap = document.createElement('div'); wrap.className = 'canvas-wrap'; wrap.appendChild(cv);
        const nm = document.createElement('div'); nm.className = 'name'; nm.textContent = label;
        const dl = document.createElement('a'); dl.href = '#'; dl.textContent = 'Download';
        dl.addEventListener('click', e => { e.preventDefault(); save(cv, id); });
        card.appendChild(wrap); card.appendChild(nm); card.appendChild(dl);
        grid.appendChild(card); made.push({ canvas: cv, id });
      }
    }
    function save(canvas, id) {
      const a = document.createElement('a'); a.download = 'icon-' + id + '.png';
      a.href = canvas.toDataURL('image/png'); document.body.appendChild(a); a.click(); a.remove();
    }
    document.getElementById('dlAll').addEventListener('click', () => {
      let i = 0; const next = () => { if (i >= made.length) return; save(made[i].canvas, made[i].id); i++; setTimeout(next, 180); }; next();
    });

    buildGrid('grid-social', SOCIAL);
    buildGrid('grid-label', LABEL);
    window.__exportAssets = () => made.map(m => ({ name: m.id, dataURL: m.canvas.toDataURL('image/png') }));
  })();
  </script>
</body>
</html>
