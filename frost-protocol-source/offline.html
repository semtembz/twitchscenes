<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Offline Screen — Frost Protocol (PNG generator)</title>
  <!--
    FROST PROTOCOL · "Clean Room HUD" OFFLINE image generator.

    Twitch's offline image is a static 1920x1080 PNG you upload to your channel.
    This page bakes the clean-room look onto a <canvas> and downloads it:
      - deep cold-blue void (radial + linear gradients)
      - a precise measurement GRID (60px minor / 300px major, radially masked)
        with mono coordinate labels + L-shaped crop-bracket registration marks
      - corner tags PROTOCOL / CLEAN ROOM + a THERMAL note
      - a CENTERED (offset left:54%) frosted-glass console card with a 1px
        cold-blue hairline, an inner condensation sheet, and four bright
        L-shaped corner registration ticks
      - a clinical mono readout row, the "//"-kicker, an etched condensed
        OFFLINE title with the accent word ice-light, a mono sub
      - behind the card: slowly-crystallized hexagonal ICE shards + frost specks

    Everything random is drawn from a SEEDED PRNG, so the ice field is identical
    on every render (Math.random is never used) — re-running gives the same frame.

    ?handle=@you customises the bottom-right handle.

    How to use:
      1. Open this file in a browser (optionally ?handle=@you).
      2. Click "Download offline-screen.png".
      3. Upload it: twitch.tv/<you>/dashboard -> Settings -> Channel -> Brand
         -> "Video Player Banner" (shown when you're offline).
  -->
  <style>
    :root{
      --bg-deep:#0C1014; --bg-lift:#11181F; --accent:#7FB4D6; --ice:#CFE6F2; --text:#F2F7FA;
      --dim:rgba(207,230,242,.55);
      --mono:"JetBrains Mono","Consolas","SFMono-Regular",ui-monospace,"Liberation Mono",monospace;
      --display:"Eurostile","Bahnschrift","DIN Condensed","Oswald","Arial Narrow",system-ui,sans-serif;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:var(--mono);
      background:var(--bg-deep);color:var(--text);padding:32px;}
    h1{font-family:var(--display);font-weight:700;font-size:30px;color:var(--text);
      letter-spacing:.02em;text-transform:uppercase;margin:0 0 6px;text-shadow:0 2px 18px rgba(4,7,10,.6);}
    p.lead{color:var(--dim);margin:0 0 22px;max-width:820px;line-height:1.6;
      font-family:var(--mono);font-size:14px;letter-spacing:.04em;}
    .kicker{font-family:var(--mono);letter-spacing:.42em;
      font-size:13px;color:var(--accent);margin:0 0 14px;text-transform:uppercase;}
    .kicker::before{content:"// ";color:var(--ice);opacity:.7;}
    button{font-family:var(--mono);font-weight:600;font-size:13px;
      letter-spacing:3px;text-transform:uppercase;padding:13px 26px;color:var(--bg-deep);
      background:linear-gradient(180deg,var(--ice),var(--accent));border:1px solid rgba(127,180,214,.6);
      border-radius:2px;cursor:pointer;box-shadow:0 0 30px rgba(127,180,214,.22);}
    button:hover{filter:brightness(1.08);}
    .preview{margin-top:22px;background:#0c1116;padding:14px;border:1px solid #1d2a35;
      border-radius:6px;display:inline-block;}
    canvas{display:block;width:960px;height:540px;border-radius:4px;}
    code{font-family:var(--mono);color:var(--accent);background:rgba(127,180,214,.08);
      padding:2px 6px;border-radius:3px;}
  </style>
</head>
<body>
  <p class="kicker">FROST PROTOCOL · OFFLINE SCREEN</p>
  <h1>OFFLINE SCREEN GENERATOR</h1>
  <p class="lead">
    Renders a 1920&times;1080 offline still in the clean-room HUD style — seeded so the
    ice field is reproducible. Pass <code>?handle=@you</code> to set the handle.
    Click Download then upload it on Twitch under
    <code>Settings → Channel → Brand → Video Player Banner</code>.
  </p>
  <button id="dl">Download offline-screen.png</button>

  <div class="preview">
    <canvas id="c" width="1920" height="1080"></canvas>
  </div>

  <script>
    "use strict";
    const W = 1920, H = 1080;
    const params = new URLSearchParams(location.search);
    // ---- palette (JS hex constants mirror the shared.css design tokens) ----
    const BG_DEEP = '#0C1014', ACCENT = '#7FB4D6', ICE = '#CFE6F2', TEXT = '#F2F7FA';
    const MONO = '"JetBrains Mono","Consolas","SFMono-Regular",ui-monospace,"Liberation Mono",monospace';
    const DISP = '"Eurostile","Bahnschrift","DIN Condensed","Oswald","Arial Narrow",system-ui,sans-serif';

    const cv = document.getElementById('c');
    const ctx = cv.getContext('2d');

    // ---- seeded PRNG (mulberry32) — NEVER Math.random, so it's reproducible ----
    function makeRand(seed) {
      let s = seed >>> 0;
      return () => {
        s |= 0; s = (s + 0x6D2B79F5) | 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    const R = (rnd, a, b) => a + rnd() * (b - a);

    // ---- rounded rectangle path ----
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    // ---- one hexagonal ICE crystal shard (six arms + dendrite branches) ----
    function shard(cx, cy, r, rot, alpha, ice) {
      ctx.save();
      ctx.translate(Math.round(cx), Math.round(cy));
      ctx.rotate(rot);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = ice ? ICE : ACCENT;
      ctx.lineWidth = 1.2; ctx.lineCap = 'round';
      for (let i = 0; i < 6; i++) {
        const ang = (Math.PI / 3) * i;
        const ex = Math.cos(ang) * r, ey = Math.sin(ang) * r;
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(ex, ey);
        const bl = r * 0.26;
        for (const f of [0.55, 0.8]) {
          const bx = Math.cos(ang) * r * f, by = Math.sin(ang) * r * f;
          ctx.moveTo(bx, by);
          ctx.lineTo(bx + Math.cos(ang + 1.05) * bl, by + Math.sin(ang + 1.05) * bl);
          ctx.moveTo(bx, by);
          ctx.lineTo(bx + Math.cos(ang - 1.05) * bl, by + Math.sin(ang - 1.05) * bl);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = alpha * 0.5;
      ctx.fillStyle = ice ? ICE : ACCENT;
      ctx.beginPath(); ctx.arc(0, 0, Math.max(1, r * 0.08), 0, 6.2832); ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // ---- bright L-shaped corner registration ticks ----
    function regTicks(x, y, w, h, len, weight, glow) {
      ctx.save();
      ctx.strokeStyle = 'rgba(207,230,242,0.85)';
      ctx.lineWidth = weight; ctx.lineCap = 'butt';
      ctx.shadowColor = 'rgba(127,180,214,0.6)'; ctx.shadowBlur = glow;
      const corners = [
        [x, y, 1, 1], [x + w, y, -1, 1],
        [x, y + h, 1, -1], [x + w, y + h, -1, -1]
      ];
      corners.forEach(c => {
        ctx.beginPath();
        ctx.moveTo(c[0], c[1]); ctx.lineTo(c[0] + len * c[2], c[1]);
        ctx.moveTo(c[0], c[1]); ctx.lineTo(c[0], c[1] + len * c[3]);
        ctx.stroke();
      });
      ctx.restore();
    }

    // ---- thin void crop-bracket (hairline) ----
    function crop(x, y, dx, dy, len) {
      ctx.save();
      ctx.strokeStyle = 'rgba(127,180,214,0.42)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, y); ctx.lineTo(x + len * dx, y);
      ctx.moveTo(x, y); ctx.lineTo(x, y + len * dy);
      ctx.stroke();
      ctx.restore();
    }

    function spacedWidth(str, sp) {
      let total = 0;
      for (const ch of str) total += ctx.measureText(ch).width + sp;
      return total - sp;
    }
    function drawSpaced(str, x, y, sp) {
      let cx = x;
      for (const ch of str) { ctx.fillText(ch, cx, y); cx += ctx.measureText(ch).width + sp; }
    }
    function drawSpacedCentered(str, x, y, sp) {
      const total = spacedWidth(str, sp);
      const prev = ctx.textAlign; ctx.textAlign = 'left';
      drawSpaced(str, x - total / 2, y, sp);
      ctx.textAlign = prev;
    }
    function drawSpacedRight(str, x, y, sp) {
      const total = spacedWidth(str, sp);
      const prev = ctx.textAlign; ctx.textAlign = 'left';
      drawSpaced(str, x - total, y, sp);
      ctx.textAlign = prev;
    }

    async function draw() {
      await document.fonts.ready;
      const rnd = makeRand(0x7FB4D6); // fixed seed (accent hex) -> identical ice field

      // ---- BACKGROUND: deep cold-blue void (mirrors shared.css #stage) ----
      const grad = ctx.createLinearGradient(0, 0, W * 0.6, H);
      grad.addColorStop(0, '#0E141A'); grad.addColorStop(0.52, BG_DEEP); grad.addColorStop(1, '#080B0E');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      // cold-blue radial glows
      bloom(W * 0.70, H * 0.18, W * 0.55, 'rgba(127,180,214,0.10)');
      bloom(W * 0.12, H * 0.92, W * 0.42, 'rgba(127,180,214,0.06)');

      // ---- MEASUREMENT GRID (60 minor / 300 major), radially masked ----
      drawGrid();

      // ---- crystallizing ice shards behind the card (seeded) ----
      for (let i = 0; i < 24; i++) {
        const x = R(rnd, 0, W), y = R(rnd, 0, H), r = R(rnd, 36, 120);
        const a = R(rnd, 0.05, 0.16), rot = R(rnd, 0, 6.283), ice = rnd() < 0.5;
        shard(x, y, r, rot, a, ice);
      }
      // ---- drifting frost specks (seeded) ----
      ctx.save();
      for (let i = 0; i < 110; i++) {
        const x = R(rnd, 8, W - 8), y = R(rnd, 8, H - 8);
        const z = R(rnd, 0.5, 1.8), a = R(rnd, 0.25, 0.75);
        ctx.globalAlpha = a; ctx.fillStyle = ICE;
        const sp = Math.max(1, Math.round(z * 1.6));
        ctx.fillRect(Math.round(x), Math.round(y), sp, sp);
      }
      ctx.restore();
      ctx.globalAlpha = 1;

      // ---- DEEP VOID VIGNETTE ----
      const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.30, W / 2, H / 2, W * 0.66);
      vig.addColorStop(0, 'rgba(0,0,0,0)'); vig.addColorStop(1, 'rgba(4,7,10,0.88)');
      ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

      // ---- coordinate labels along the edges ----
      ctx.save();
      ctx.font = '400 22px ' + MONO; ctx.fillStyle = 'rgba(127,180,214,0.34)';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';   drawSpaced('X:000', 64, 44, 3);
      ctx.textAlign = 'center'; drawSpacedCentered('X:960', W / 2, 44, 3);
      ctx.textAlign = 'right';  drawSpacedRight('X:1920', W - 64, 44, 3);
      ctx.textAlign = 'left';
      drawSpaced('Y:120', 36, 200, 3);
      drawSpaced('Y:540', 36, H / 2, 3);
      drawSpaced('Y:960', 36, H - 200, 3);
      ctx.restore();

      // ---- void crop-bracket registration marks (four corners) ----
      crop(64, 64, 1, 1, 46);
      crop(W - 64, 64, -1, 1, 46);
      crop(64, H - 64, 1, -1, 46);
      crop(W - 64, H - 64, -1, -1, 46);

      // ---- corner tags on the void ----
      ctx.save();
      ctx.font = '400 26px ' + MONO; ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = 'rgba(127,180,214,0.78)';
      ctx.textAlign = 'left';  drawSpaced('[ your text here ]', 130, 150, 9);
      ctx.fillStyle = 'rgba(207,230,242,0.55)';
      drawSpaced('[ your text here ]', 130, H - 150, 9);
      ctx.font = '400 20px ' + MONO; ctx.fillStyle = 'rgba(127,180,214,0.4)';
      drawSpaced('[ your text here ]', 130, H - 118, 4);
      ctx.restore();

      // ============================================================
      // FROSTED-GLASS CONSOLE CARD — the signature composition (offset)
      // ============================================================
      const fw = 1180, fh = 660;
      const fx = Math.round(W * 0.54 - fw / 2), fy = Math.round(H / 2 - fh / 2);

      // glass body: blurred backdrop is baked by drawing a frosted fill
      // (we already drew the ice field under it; here we lift + blur-sample)
      ctx.save();
      // soft drop shadow
      ctx.shadowColor = 'rgba(0,0,0,0.55)'; ctx.shadowBlur = 90; ctx.shadowOffsetY = 40;
      roundRect(fx, fy, fw, fh, 2);
      const gg = ctx.createLinearGradient(0, fy, 0, fy + fh);
      gg.addColorStop(0, 'rgba(207,230,242,0.06)');
      gg.addColorStop(0.5, 'rgba(17,24,31,0.40)');
      gg.addColorStop(1, 'rgba(17,24,31,0.50)');
      ctx.fillStyle = gg; ctx.fill();
      ctx.restore();

      // inner condensation gradient sheet (clipped)
      ctx.save();
      roundRect(fx, fy, fw, fh, 2); ctx.clip();
      const c1 = ctx.createRadialGradient(fx + fw * 0.88, fy - 60, 0, fx + fw * 0.88, fy - 60, 420);
      c1.addColorStop(0, 'rgba(207,230,242,0.10)'); c1.addColorStop(1, 'rgba(207,230,242,0)');
      ctx.fillStyle = c1; ctx.fillRect(fx, fy, fw, fh);
      const c2 = ctx.createRadialGradient(fx + 40, fy + fh + 40, 0, fx + 40, fy + fh + 40, 380);
      c2.addColorStop(0, 'rgba(127,180,214,0.06)'); c2.addColorStop(1, 'rgba(127,180,214,0)');
      ctx.fillStyle = c2; ctx.fillRect(fx, fy, fw, fh);
      // top inner edge highlight
      ctx.fillStyle = 'rgba(207,230,242,0.10)'; ctx.fillRect(fx, fy, fw, 1);
      ctx.restore();

      // cold-blue hairline border
      ctx.strokeStyle = 'rgba(127,180,214,0.42)'; ctx.lineWidth = 1;
      roundRect(fx + 0.5, fy + 0.5, fw - 1, fh - 1, 2); ctx.stroke();

      // bright L-shaped corner registration ticks
      regTicks(fx, fy, fw, fh, 34, 2.2, 8);

      // ---- card content (left-aligned, mirrors starting-soon.html) ----
      const px = fx + 92;   // matches CSS padding-left 92
      // clinical readout row
      ctx.save();
      ctx.font = '400 20px ' + MONO; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(207,230,242,0.55)';
      let rx = px, ry = fy + 110;
      // LED
      ctx.save();
      ctx.fillStyle = ACCENT; ctx.shadowColor = ACCENT; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(rx + 5, ry, 5, 0, 6.2832); ctx.fill();
      ctx.restore();
      ctx.fillStyle = ACCENT; ctx.fillText('SYS//OK', rx + 18, ry);
      ctx.fillStyle = 'rgba(207,230,242,0.55)';
      ctx.fillText('NODE 7FB4-D6', rx + 175, ry);
      ctx.fillText('FEED ', rx + 380, ry);
      ctx.fillStyle = ACCENT; ctx.fillText('OFFLINE', rx + 440, ry);
      ctx.fillStyle = 'rgba(207,230,242,0.55)';
      ctx.fillText('LAT 47.61 / LON -122.33', rx + 575, ry);
      ctx.restore();

      // kicker — editable buyer text (neutral placeholder)
      ctx.save();
      ctx.font = '600 24px ' + MONO; ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = ICE; ctx.globalAlpha = 0.7; ctx.fillText('//', px, fy + 168);
      ctx.globalAlpha = 1; ctx.fillStyle = ACCENT;
      drawSpaced('[ your text here ]', px + 44, fy + 168, 8);
      ctx.restore();

      // big condensed TITLE: OFFLINE (etched + ice-light gradient)
      ctx.save();
      ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
      ctx.font = '700 150px ' + DISP;
      // base etched shadow
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillText('OFFLINE', px, fy + 320 + 2);
      const tg = ctx.createLinearGradient(0, fy + 200, 0, fy + 330);
      tg.addColorStop(0, TEXT); tg.addColorStop(0.46, ICE); tg.addColorStop(1, ACCENT);
      ctx.fillStyle = tg;
      ctx.shadowColor = 'rgba(127,180,214,0.35)'; ctx.shadowBlur = 32;
      ctx.fillText('OFFLINE', px, fy + 320);
      ctx.restore();

      // sub — quiet mono telemetry
      ctx.save();
      ctx.font = '400 24px ' + MONO; ctx.fillStyle = 'rgba(207,230,242,0.55)';
      drawSpaced('[ your text here ]', px, fy + 380, 3);
      ctx.restore();

      // segmented calibration meter (full, idle) under the sub
      drawMeter(px, fy + 440, 560, 1.0);

      // ---- HANDLE (bottom-right, ice-light on the void) ----
      const handle = params.get('handle') || '@yourhandle';
      const handleAt = handle.startsWith('@') ? handle : '@' + handle;
      const handleClean = handle.replace(/^@/, '');
      ctx.save();
      ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
      ctx.font = '400 30px ' + MONO; ctx.fillStyle = ICE;
      ctx.shadowColor = 'rgba(127,180,214,0.35)'; ctx.shadowBlur = 14;
      drawSpacedRight(handleAt, W - 130, H - 150, 6);
      ctx.shadowBlur = 0;
      ctx.font = '400 20px ' + MONO; ctx.fillStyle = 'rgba(127,180,214,0.4)';
      drawSpacedRight('twitch.tv/' + handleClean.toLowerCase(), W - 130, H - 118, 2);
      ctx.restore();
    }

    function bloom(x, y, r, color) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, color); g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.fill();
    }

    function drawGrid() {
      // radial mask via temp clip-by-alpha: simplest is to draw lines then fade with vignette later.
      ctx.save();
      // minor 60px
      ctx.strokeStyle = 'rgba(127,180,214,0.10)'; ctx.lineWidth = 1;
      for (let x = 0; x <= W; x += 60) { ctx.beginPath(); ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, H); ctx.stroke(); }
      for (let y = 0; y <= H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y + 0.5); ctx.lineTo(W, y + 0.5); ctx.stroke(); }
      // major 300px
      ctx.strokeStyle = 'rgba(127,180,214,0.20)';
      for (let x = 0; x <= W; x += 300) { ctx.beginPath(); ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, H); ctx.stroke(); }
      for (let y = 0; y <= H; y += 300) { ctx.beginPath(); ctx.moveTo(0, y + 0.5); ctx.lineTo(W, y + 0.5); ctx.stroke(); }
      ctx.restore();
      // radial fade-to-edges mask (darken corners so the grid fades out)
      const m = ctx.createRadialGradient(W * 0.6, H * 0.45, H * 0.2, W * 0.6, H * 0.45, W * 0.62);
      m.addColorStop(0, 'rgba(12,16,20,0)'); m.addColorStop(1, 'rgba(12,16,20,0.55)');
      ctx.fillStyle = m; ctx.fillRect(0, 0, W, H);
    }

    // segmented cold-blue calibration meter (p = fill fraction 0..1)
    function drawMeter(x, y, w, p) {
      const barH = 8;
      ctx.save();
      // track w/ segment dividers
      ctx.fillStyle = 'rgba(127,180,214,0.06)'; ctx.fillRect(x, y, w, barH);
      ctx.fillStyle = 'rgba(127,180,214,0.18)';
      for (let sx = x + 26; sx < x + w; sx += 28) ctx.fillRect(sx, y, 2, barH);
      // border
      ctx.strokeStyle = 'rgba(127,180,214,0.16)'; ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, w - 1, barH - 1);
      // segmented fill clipped to cells
      const fillW = w * Math.max(0, Math.min(1, p));
      ctx.save();
      ctx.beginPath(); ctx.rect(x, y, fillW, barH); ctx.clip();
      const fg = ctx.createLinearGradient(x, 0, x + w, 0);
      fg.addColorStop(0, ACCENT); fg.addColorStop(1, ICE);
      ctx.fillStyle = fg; ctx.shadowColor = 'rgba(127,180,214,0.6)'; ctx.shadowBlur = 12;
      for (let cx = x; cx < x + fillW; cx += 28) ctx.fillRect(cx, y, 26, barH);
      ctx.restore();
      // bright leading head
      ctx.fillStyle = ICE; ctx.shadowColor = 'rgba(207,230,242,0.9)'; ctx.shadowBlur = 8;
      ctx.fillRect(x + fillW - 1, y - 4, 2, 16);
      ctx.shadowBlur = 0;
      // end caps
      ctx.strokeStyle = 'rgba(127,180,214,0.42)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x + 0.5, y - 5); ctx.lineTo(x + 0.5, y + barH + 5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + w - 0.5, y - 5); ctx.lineTo(x + w - 0.5, y + barH + 5); ctx.stroke();
      ctx.restore();
    }

    function download() {
      const a = document.createElement('a');
      a.download = 'offline-screen.png';
      a.href = cv.toDataURL('image/png');
      document.body.appendChild(a); a.click(); a.remove();
    }

    document.getElementById('dl').addEventListener('click', download);
    window.__exportAssets = () => [{ name: 'offline', dataURL: document.getElementById('c').toDataURL('image/png') }];
    draw();
  </script>
</body>
</html>
