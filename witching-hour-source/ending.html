<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Witching Hour — Thanks for Watching</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       Optional URL params: ?handle=@you  ?render=1
       Editable text: ?kicker=...  ?sub=...  ?tag=...  ?tag2=...  ?tag3=...  (=- removes one) -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* ending: no loading bar — the candle-gold handle is the hero. The title
       is the longest standard line ("THANKS FOR WATCHING"), so it sets two
       lines and the size is trimmed so the whole block (kicker -> title ->
       sub -> hero handle -> tag) breathes INSIDE the 1180px frame with margin. */
    .ending .title{font-size:104px;margin:14px 0 4px;}
    .ending .sub{margin-top:22px;}
    .ending .handle-hero{margin-top:34px;font-family:var(--serif-title);
      font-size:50px;letter-spacing:.30em;text-indent:.30em;color:var(--gold-lt);
      text-shadow:0 0 26px rgba(231,200,120,.45);
      animation:framein 1s var(--ease) both .5s;}
    #stage.render .ending .handle-hero{animation:none;opacity:1;transform:translate(0,0);}
    .ending .handle-tag{margin-top:14px;font-family:var(--serif-title);
      letter-spacing:.46em;font-size:18px;text-indent:.46em;color:var(--gold);opacity:.82;
      text-transform:uppercase;text-shadow:0 0 12px rgba(201,162,75,.3);}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>
    <div class="candle" aria-hidden="true"></div>
    <div class="sheen" aria-hidden="true"></div>
    <div class="vign" aria-hidden="true"></div>

    <!-- faint CELESTIAL ornament etched in candle-gold, LOW + corners (margins) -->
    <!-- lower-left: crescent moon + a constellation arc -->
    <span class="celestial celestial--bl" aria-hidden="true">
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
        <!-- crescent moon -->
        <path d="M86 96 A46 46 0 1 0 86 192 A36 36 0 1 1 86 96 Z" fill="rgba(201,162,75,0.10)" stroke="#E7C878"/>
        <!-- constellation: nodes + lines -->
        <g stroke="#E7C878" opacity="0.9">
          <line x1="150" y1="232" x2="196" y2="206"/>
          <line x1="196" y1="206" x2="236" y2="232"/>
          <line x1="236" y1="232" x2="270" y2="196"/>
          <line x1="196" y1="206" x2="214" y2="160"/>
        </g>
        <g fill="#E7C878">
          <circle cx="150" cy="232" r="3"/><circle cx="196" cy="206" r="3.4"/>
          <circle cx="236" cy="232" r="3"/><circle cx="270" cy="196" r="2.6"/>
          <circle cx="214" cy="160" r="2.6"/>
        </g>
        <!-- a small spark stars -->
        <g fill="#E7C878" opacity="0.7">
          <circle cx="118" cy="232" r="1.6"/><circle cx="246" cy="120" r="1.6"/>
          <circle cx="60" cy="248" r="1.4"/>
        </g>
      </svg>
    </span>
    <!-- lower-right: alchemical / zodiac glyph cluster + constellation -->
    <span class="celestial celestial--br" aria-hidden="true">
      <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
        <!-- alchemical sun/gold circle with dot -->
        <circle cx="92" cy="150" r="34" stroke="#E7C878"/>
        <circle cx="92" cy="150" r="3.4" fill="#E7C878" stroke="none"/>
        <!-- mercury / saturn-ish glyph -->
        <g stroke="#E7C878">
          <circle cx="196" cy="120" r="18"/>
          <path d="M196 138 L196 168 M182 152 L210 152"/>
          <path d="M178 100 A18 18 0 0 1 214 100"/>
        </g>
        <!-- a triad alchemy triangle (fire) -->
        <path d="M156 232 L196 200 L236 232 Z" stroke="#E7C878"/>
        <line x1="170" y1="221" x2="222" y2="221" stroke="#E7C878"/>
        <!-- constellation spark line -->
        <g stroke="#E7C878" opacity="0.85">
          <line x1="60" y1="232" x2="104" y2="252"/>
          <line x1="104" y1="252" x2="138" y2="226"/>
        </g>
        <g fill="#E7C878">
          <circle cx="60" cy="232" r="2.6"/><circle cx="104" cy="252" r="3"/><circle cx="138" cy="226" r="2.4"/>
        </g>
      </svg>
    </span>
    <!-- faint upper-corner star sparks (very low opacity, margins only) -->
    <span class="celestial celestial--tl" aria-hidden="true">
      <svg viewBox="0 0 188 188" xmlns="http://www.w3.org/2000/svg" fill="#E7C878">
        <path d="M40 40 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z"/>
        <circle cx="120" cy="64" r="2"/><circle cx="78" cy="120" r="1.6"/><circle cx="140" cy="120" r="1.3"/>
      </svg>
    </span>
    <span class="celestial celestial--tr" aria-hidden="true">
      <svg viewBox="0 0 188 188" xmlns="http://www.w3.org/2000/svg" fill="#E7C878">
        <path d="M148 40 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z"/>
        <circle cx="68" cy="64" r="2"/><circle cx="110" cy="118" r="1.6"/><circle cx="48" cy="120" r="1.3"/>
      </svg>
    </span>

    <!-- EDITABLE TEXT SLOTS: each .is-slot below ships a "[ your text here ]"
         placeholder — type your own text in, or delete the whole line to remove it.
         (Or set ?tag=...&tag2=...&kicker=...&sub=...&tag3=... at render time; use =- to remove one.) -->
    <div class="tag tag--tl is-slot" data-slot="tag"><span class="slot-no">13</span><span class="slot-txt">your text here</span></div>
    <div class="tag tag--tr is-slot" data-slot="tag2"><span class="slot-no">14</span><span class="slot-txt">your text here</span></div>

    <main class="frame ending">
      <!-- delicate celestial star-compass corner accents -->
      <span class="corner corner--tl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
          <path d="M6 6 L6 60 M6 6 L60 6" stroke="#E7C878"/>
          <path d="M6 6 L42 42" stroke="#C9A24B"/>
          <!-- a small compass-star where the rules meet -->
          <g stroke="#E7C878">
            <path d="M22 22 l5 -13 5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 z" fill="rgba(201,162,75,0.10)"/>
          </g>
          <circle cx="27" cy="27" r="2" fill="#E7C878" stroke="none"/>
        </svg>
      </span>
      <span class="corner corner--tr" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
          <path d="M6 6 L6 60 M6 6 L60 6" stroke="#E7C878"/>
          <path d="M6 6 L42 42" stroke="#C9A24B"/>
          <g stroke="#E7C878">
            <path d="M22 22 l5 -13 5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 z" fill="rgba(201,162,75,0.10)"/>
          </g>
          <circle cx="27" cy="27" r="2" fill="#E7C878" stroke="none"/>
        </svg>
      </span>
      <span class="corner corner--bl" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
          <path d="M6 6 L6 60 M6 6 L60 6" stroke="#E7C878"/>
          <path d="M6 6 L42 42" stroke="#C9A24B"/>
          <g stroke="#E7C878">
            <path d="M22 22 l5 -13 5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 z" fill="rgba(201,162,75,0.10)"/>
          </g>
          <circle cx="27" cy="27" r="2" fill="#E7C878" stroke="none"/>
        </svg>
      </span>
      <span class="corner corner--br" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#C9A24B" stroke-width="1.3">
          <path d="M6 6 L6 60 M6 6 L60 6" stroke="#E7C878"/>
          <path d="M6 6 L42 42" stroke="#C9A24B"/>
          <g stroke="#E7C878">
            <path d="M22 22 l5 -13 5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 z" fill="rgba(201,162,75,0.10)"/>
          </g>
          <circle cx="27" cy="27" r="2" fill="#E7C878" stroke="none"/>
        </svg>
      </span>

      <div class="crest" aria-hidden="true">
        <span class="r"></span><span class="moon"></span><span class="r r--r"></span>
      </div>
      <p class="kicker is-slot" id="kicker" data-slot="kicker"><span class="slot-no">15</span><span class="slot-txt">your text here</span></p>
      <h1 class="title">THANKS FOR<span class="accent">WATCHING</span></h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="sub is-slot" data-slot="sub"><span class="slot-no">16</span><span class="slot-txt">your text here</span></p>
      <div class="handle-hero" id="handle">@yourhandle</div>
      <p class="handle-tag is-slot" data-slot="tag3"><span class="slot-no">17</span><span class="slot-txt">your text here</span></p>
    </main>
  </div>
  <script src="shared.js"></script>
</body>
</html>
