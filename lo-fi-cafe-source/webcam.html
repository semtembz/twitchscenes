<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Lo-Fi Cafe — Webcam Frame</title>
  <!-- OBS Browser Source: 1920x1080, custom FPS 60, Local file -> this file.
       TRANSPARENT scene with one cozy "rainy window pane" webcam frame. Place your
       camera BEHIND this overlay; the inside of the frame is fully transparent so
       the camera shows through it. The frame reads as a rounded cafe window: a warm
       wooden-ish edge, a faint fog film hugging the rim, low-contrast muntin
       cross-bars, three gentle steam ribbons rising from a corner, amber doodle
       stamps in the corners, and a "menu tape tab" nameplate with @handle.
       Optional URL params: ?handle=@you   ?pos=center|lower   ?w=1120&h=630
                             ?rain=NN   ?bokeh=N -->
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* transparent everywhere so the cam (under this overlay) shows through */
    html,body{background:transparent;}
    #stage{background:transparent;}

    /* faint warm rain + bokeh drift around the frame (low alpha) */
    canvas.bg{pointer-events:none;opacity:.45;}

    /* the cam frame wrapper — centered or lower-third, ~16:9 */
    .cam{position:absolute;left:50%;top:50%;width:1120px;height:630px;
      transform:translate(-50%,-50%);
      animation:camin .9s var(--ease) both .1s;}
    .cam.lower{top:auto;bottom:96px;transform:translateX(-50%);}

    /* warm rounded "window-pane" border; INSIDE stays transparent.
       a soft wooden edge + fog-on-glass inner rim, like the main window. */
    .frame{position:absolute;inset:0;background:transparent;border-radius:26px;
      border:3px solid rgba(140,106,86,.55);
      box-shadow:
        0 0 0 2px rgba(244,235,226,.30),
        0 26px 60px rgba(60,40,28,.42),
        inset 0 0 70px rgba(110,80,64,.34),
        inset 0 0 0 1px rgba(244,235,226,.22);}
    /* fog-on-glass film hugging the inner rim (transparent center) */
    .frame::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
      background:radial-gradient(120% 100% at 50% 42%, transparent 66%, rgba(232,213,196,.34) 100%);}
    /* low-contrast muntin cross-bars so it reads as a window pane */
    .muntin{position:absolute;background:rgba(140,106,86,.26);pointer-events:none;border-radius:2px;
      box-shadow:0 0 0 1px rgba(244,235,226,.16);}
    .muntin.v{left:50%;top:14px;bottom:14px;width:5px;transform:translateX(-2.5px);}
    .muntin.h{left:14px;right:14px;top:50%;height:5px;transform:translateY(-2.5px);}

    /* three gentle steam ribbons rising from the lower-left corner of the sill */
    .steam{position:absolute;left:30px;bottom:-6px;width:80px;height:90px;pointer-events:none;}
    .steam i{position:absolute;bottom:0;width:8px;height:78px;border-radius:6px;
      background:linear-gradient(180deg, transparent, rgba(244,235,226,.55) 40%, transparent);
      filter:blur(1.5px);opacity:0;transform-origin:bottom center;}
    .steam i:nth-child(1){left:4px;  animation:steam 4.2s ease-in-out infinite .0s;}
    .steam i:nth-child(2){left:26px; animation:steam 4.8s ease-in-out infinite .7s;height:88px;}
    .steam i:nth-child(3){left:48px; animation:steam 4.5s ease-in-out infinite 1.3s;}
    @keyframes steam{
      0%{opacity:0;transform:translateY(8px) scaleY(.6) skewX(0deg)}
      25%{opacity:.8}
      50%{transform:translateY(-30px) scaleY(1) skewX(8deg)}
      75%{opacity:.45;transform:translateY(-56px) scaleY(1.05) skewX(-8deg)}
      100%{opacity:0;transform:translateY(-84px) scaleY(1.1) skewX(4deg)}
    }

    /* amber doodle stamps in every corner of the frame (music note, bean, sun, leaf) */
    .stamp{position:absolute;font-size:30px;line-height:1;color:var(--coffee);opacity:.55;
      pointer-events:none;animation:bob 5.4s ease-in-out infinite;}
    .stamp--tl{left:14px;top:8px;}
    .stamp--tr{right:14px;top:8px;animation-delay:.7s;}
    .stamp--bl{left:14px;bottom:8px;animation-delay:1.1s;}
    .stamp--br{right:14px;bottom:8px;animation-delay:1.6s;}
    @keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-9px) rotate(6deg)}}

    /* "ON CAMERA" tape tab pinned to the top-center of the frame */
    .cap{position:absolute;left:50%;top:-21px;transform:translateX(-50%) rotate(-1.5deg);
      display:flex;align-items:center;gap:11px;white-space:nowrap;
      padding:7px 24px;border-radius:14px;background:var(--amber);color:var(--cream);
      font-size:17px;font-weight:700;letter-spacing:.32em;text-indent:.32em;text-transform:uppercase;
      box-shadow:0 8px 16px rgba(60,40,28,.32);
      animation:fade .9s var(--ease) both .35s;}
    .cap .dot{width:9px;height:9px;border-radius:50%;background:var(--cream);text-indent:0;
      box-shadow:0 0 10px rgba(244,235,226,.6);animation:pulse 2.6s ease-in-out infinite;}
    @keyframes fade{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:.55;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}

    /* handle nameplate — a rounded "menu-card" pill clipped to the bottom-center */
    .tag{position:absolute;left:50%;bottom:-23px;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center;white-space:nowrap;
      background:linear-gradient(180deg, rgba(244,235,226,.92), rgba(232,213,196,.86));
      border:2px solid rgba(140,106,86,.34);border-radius:16px;padding:9px 26px 7px;
      box-shadow:0 12px 28px rgba(60,40,28,.4), inset 0 0 0 1px rgba(244,235,226,.6);}
    /* dashed hand-drawn inner outline, like the menu card */
    .tag::before{content:"";position:absolute;inset:5px;border-radius:11px;
      border:2px dashed rgba(140,106,86,.30);pointer-events:none;}
    .tag .who{position:relative;font-weight:600;letter-spacing:.06em;font-size:26px;color:var(--ink);
      text-shadow:0 1px 0 rgba(244,235,226,.7);}
    /* tiny hand-drawn wavy underline under the handle */
    .tag .ul{position:relative;display:block;width:100%;height:7px;margin-top:3px;overflow:visible;}
    .tag .ul path{fill:none;stroke:var(--amber);stroke-width:4;stroke-linecap:round;
      stroke-dasharray:300;stroke-dashoffset:300;animation:draw 1.3s var(--ease) forwards .8s;}
    @keyframes draw{to{stroke-dashoffset:0;}}

    @keyframes camin{from{opacity:0;transform:translate(-50%,-50%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

    /* render mode: freeze entrances + free animations to a clean final state */
    #stage.render .cam,#stage.render .cap,#stage.render .tag{animation:none!important;}
    #stage.render .cam{opacity:1;transform:translate(-50%,-50%) scale(1);}
    #stage.render .cam.lower{transform:translateX(-50%);}
    #stage.render .cap{opacity:1;}
    #stage.render .cap .dot{animation:none;opacity:1;transform:scale(1);}
    #stage.render .stamp{animation:none;}
    #stage.render .steam i{animation:none;opacity:.45;transform:translateY(-34px) scaleY(1) skewX(6deg);}
    #stage.render .tag .ul path{animation:none;stroke-dashoffset:0;}
  </style>
</head>
<body>
  <div id="stage">
    <canvas class="bg" width="1920" height="1080" aria-hidden="true"></canvas>

    <div class="cam" id="cam">
      <div class="frame" aria-hidden="true">
        <span class="muntin v"></span>
        <span class="muntin h"></span>
      </div>

      <!-- three gentle steam ribbons -->
      <span class="steam" aria-hidden="true"><i></i><i></i><i></i></span>

      <!-- amber doodle stamps in every corner -->
      <span class="stamp stamp--tl" aria-hidden="true">&#9834;</span>
      <span class="stamp stamp--tr" aria-hidden="true">&#9728;</span>
      <span class="stamp stamp--bl" aria-hidden="true">&#9749;</span>
      <span class="stamp stamp--br" aria-hidden="true">&#127793;</span>

      <span class="cap" aria-hidden="true"><span class="dot"></span>ON CAMERA</span>

      <div class="tag">
        <span class="who" id="handle">@yourhandle</span>
        <svg class="ul" viewBox="0 0 200 7" preserveAspectRatio="none" aria-hidden="true">
          <path d="M2 4 Q 26 1 50 4 T 100 4 T 150 4 T 198 4" />
        </svg>
      </div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";
    const params = new URLSearchParams(location.search);
    const num = (k, d) => Number(params.get(k)) || d;
    const stage = document.getElementById("stage");
    const render = params.get("render") === "1";
    if (render) stage.classList.add("render");

    /* ---- fit the 1920x1080 stage to the window (guarded) ---- */
    function fit(){
      const iw = window.innerWidth, ih = window.innerHeight;
      if (iw < 10 || ih < 10) return;
      document.documentElement.style.setProperty("--scale", Math.min(iw/1920, ih/1080));
    }
    fit(); window.addEventListener("resize", fit);
    let ticks = 0; const iv = setInterval(() => { fit(); if (++ticks > 10) clearInterval(iv); }, 60);

    /* ---- optional handle + position + size ---- */
    const h = params.get("handle"), el = document.getElementById("handle");
    if (h && el) el.textContent = h;

    const cam = document.getElementById("cam");
    if (cam){
      if ((params.get("pos") || "center").toLowerCase() === "lower") cam.classList.add("lower");
      const fw = num("w", 1120), fh = num("h", 630);
      if (fw > 50) cam.style.width = fw + "px";
      if (fh > 50) cam.style.height = fh + "px";
    }

    /* ---- canvas: faint warm rain streaks + a couple soft bokeh motes ---- */
    const cv = document.querySelector(".bg");
    const ctx = cv ? cv.getContext("2d") : null;
    const W = cv ? (cv.width || 1920) : 1920, H = cv ? (cv.height || 1080) : 1080;
    const R = (a, b) => a + Math.random() * (b - a);
    const LIGHTS = ["#D9925A", "#F4EBE2", "#E8C79A", "#C9A88A"];
    const bokeh = ctx ? Array.from({ length: Math.max(0, num("bokeh", 5)) }, () => ({
      x: R(0, W), y: R(40, H * 0.7), r: R(120, 260),
      c: LIGHTS[(Math.random() * LIGHTS.length) | 0],
      a: R(0.04, 0.10), vx: R(-4, 4) / 60, vy: R(-2, 2) / 60, ph: R(0, 6.28), ps: R(0.3, 0.9),
    })) : [];
    const rain = ctx ? Array.from({ length: Math.max(0, num("rain", 50)) }, () => ({
      x: R(0, W), y: R(0, H), len: R(28, 80), vy: R(420, 720) / 60, w: R(1, 2), a: R(0.06, 0.18),
    })) : [];
    function drawBg(dt){
      if (!ctx) return;
      const f = dt * 60;
      ctx.clearRect(0, 0, W, H);
      for (const b of bokeh){
        b.x += b.vx * f; b.y += b.vy * f; b.ph += 0.01 * b.ps * f;
        if (b.x < -300) b.x = W + 300; if (b.x > W + 300) b.x = -300;
        if (b.y < -300) b.y = H + 300; if (b.y > H + 300) b.y = -300;
        const rr = b.r * (1 + Math.sin(b.ph) * 0.14);
        const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, rr);
        g.addColorStop(0, b.c); g.addColorStop(0.45, b.c); g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.globalAlpha = b.a; ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(Math.round(b.x), Math.round(b.y), rr, 0, 6.2832); ctx.fill();
      }
      ctx.lineCap = "round";
      for (const r of rain){
        r.y += r.vy * f;
        if (r.y - r.len > H){ r.y = -R(0, 120); r.x = R(0, W); }
        ctx.globalAlpha = r.a; ctx.strokeStyle = "rgba(244,235,226,0.9)"; ctx.lineWidth = r.w;
        const x = Math.round(r.x);
        ctx.beginPath(); ctx.moveTo(x, Math.round(r.y - r.len)); ctx.lineTo(x, Math.round(r.y)); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
    window.__cafeDraw = function(){ drawBg(1/30); }; // rAF-independent verification hook
    drawBg(1/30);

    if (render){
      // deterministic frame stepping for the headless pipeline
      let rf = 0;
      window.__renderPlay = function(){ rf = 0; drawBg(0); };
      window.__renderAdvance = function(){ drawBg(1/30); rf++; return rf*(1000/30); };
    } else {
      let last = null, acc = 0; const FRAME = 1000/30;
      function loop(now){
        requestAnimationFrame(loop);
        if (last == null) last = now;
        let dt = now - last; last = now; if (dt > 100) dt = 100;
        acc += dt; if (acc < FRAME) return; const step = acc/1000; acc = 0;
        drawBg(step);
      }
      requestAnimationFrame(loop);
    }
  })();
  </script>
</body>
</html>
